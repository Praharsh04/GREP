origin:"Latin compromissum - a 'mutual promise' to abide by an arbiter's decision. It’s about promising to give up a little bit to gain a whole.",
hook:"One person wants to watch a horror movie, the other wants a rom-com. They settle on a <strong>psychological thriller</strong>. Neither got exactly what they wanted, but they are both sitting on the couch together. That middle ground is a <span class='hook-keyword'>compromise</span>."},

{g:13,w:"Conciliatory",pos:"adjective",def:"Intended or likely to placate or pacify.",
etym:[{m:"CON-",s:"together"},{m:"CALARE",s:"to call"}],
origin:"Latin conciliare - 'to bring together' or 'to unite in feelings.' It's the act of extending an olive branch to stop a fight.",
hook:"After a week of screaming at each other, one roommate buys a <strong>box of the other's favorite donuts</strong> and leaves a small 'sorry' note. That peace-offering, intended to lower the temperature of the room, is <span class='hook-keyword'>conciliatory</span>."},

{g:13,w:"Countenance",pos:"noun",def:"A person's face or facial expression; support.",
etym:[{m:"CONTINERE",s:"to hold together"}],
origin:"Latin continentia - 'way of holding oneself.' It originally described one's general behavior or 'bearing,' later narrowing to just the expression of the face.",
hook:"The poker player sat perfectly still. Despite losing ten thousand dollars on a single card, his <strong>stoic, unmoving face</strong> gave away nothing. His <span class='hook-keyword'>countenance</span> was as hard and unreadable as a marble statue."},

{g:13,w:"Covert",pos:"adjective",def:"Not openly acknowledged or displayed.",
etym:[{m:"COVRIR",s:"to cover"}],
origin:"Old French covert - 'hidden' or 'shrouded.' It describes things that happen 'under the covers' of normal visibility.",
hook:"Two spies meeting in a <strong>crowded library to trade microchips</strong> while pretending to read the same newspaper. It’s not a secret because it’s quiet; it’s a secret because it’s disguised. That 'stealth-mode' operation is <span class='hook-keyword'>covert</span>."},

{g:13,w:"Credible",pos:"adjective",def:"Able to be believed; convincing.",
etym:[{m:"CREDERE",s:"to believe"}],
origin:"Latin credibilis - 'worthy of trust.' It describes a source that has the 'credit' required to buy your belief.",
hook:"The witness didn't just tell a story; they brought <strong>time-stamped receipts and high-definition video</strong> to prove every word. Because the evidence matched the story perfectly, the account was entirely <span class='hook-keyword'>credible</span>."},

{g:13,w:"Diffuse",pos:"verb",def:"Spread or cause to spread over a wide area or among a large number of people.",
etym:[{m:"DIS-",s:"apart"},{m:"FUNDERE",s:"to pour"}],
origin:"Latin diffundere - 'to pour out in different directions.' Like water spilling on a flat table and slowly moving outward until it covers the whole surface.",
hook:"Someone sprays a <strong>single burst of lavender perfume</strong> in the corner of a massive ballroom. Within minutes, the scent has managed to <span class='hook-keyword'>diffuse</span> through the air until people on the far side of the room can smell it."},

{g:13,w:"Documentary",pos:"adjective",def:"Consisting of official pieces of written, printed, or other matter; providing a factual record.",
etym:[{m:"DOCUMENTUM",s:"lesson/proof"}],
origin:"Latin docere - 'to teach.' A documentary record isn't just a story; it’s a 'lesson' provided by hard evidence.",
hook:"The detective refused to listen to rumors. He wanted <strong>bank statements, signed contracts, and logged emails</strong>-the cold, <span class='hook-keyword'>documentary</span> evidence that would hold up in a court of law."},

{g:13,w:"Exhaustive",pos:"adjective",def:"Examining, including, or considering all elements or aspects; fully comprehensive.",
etym:[{m:"EX-",s:"out"},{m:"HAURIRE",s:"to drain"}],
origin:"Latin exhaurire - 'to drain out.' To be exhaustive is to look at a topic so thoroughly that there is literally nothing left to say or find.",
hook:"Before the rocket launch, the engineers didn't just check the fuel. they did an <strong>8,000-point inspection</strong> of every bolt, wire, and computer chip. Their search for errors was <span class='hook-keyword'>exhaustive</span>; they 'drained' every possibility of failure."},

{g:13,w:"Exhilarating",pos:"adjective",def:"Making one feel very happy, animated, or elated; thrilling.",
etym:[{m:"EX-",s:"out"},{m:"HILARIS",s:"cheerful"}],
origin:"Latin exhilarare - 'to make cheerful.' It describes a feeling so intense it 'forces' the cheerfulness out of you.",
hook:"The moment the <strong>rollercoaster drops from its highest peak</strong> and your stomach floats in your chest while you scream with joy. That rush of pure, high-speed adrenaline is the definition of <span class='hook-keyword'>exhilarating</span>."},

{g:13,w:"Extraneous",pos:"adjective",def:"Irrelevant or unrelated to the subject being dealt with.",
etym:[{m:"EXTRA",s:"outside"}],
origin:"Latin extraneus - 'external' or 'from the outside.' It describes information that 'belongs' somewhere else and is currently just in the way.",
hook:"You're trying to read a <strong>technical manual for a microwave</strong>, but the first ten pages are just a history of the company's founder's childhood. That information is <span class='hook-keyword'>extraneous</span>-it’s outside the scope of what you actually need to know."},

{g:13,w:"Fervor",pos:"noun",def:"Intense and passionate feeling.",
etym:[{m:"FERVERE",s:"to boil"}],
origin:"Latin fervor - 'heat' or 'boiling.' It describes an emotion that has reached a temperature where it can no longer be calm.",
hook:"A crowd at a <strong>championship game in the final ten seconds</strong>. They aren't just cheering; they are screaming, jumping, and crying. That heat of collective passion is pure <span class='hook-keyword'>fervor</span>."},

{g:13,w:"Futile",pos:"adjective",def:"Incapable of producing any useful result; pointless.",
etym:[{m:"FUTTIS",s:"leaky (vessel)"}],
origin:"Latin futilis - originally described a jar that leaked so much it couldn't hold anything. Like pouring water into a bucket with no bottom.",
hook:"Trying to <strong>dry the ocean with a single paper towel</strong>. No matter how hard you work or how fast you move, the result is never going to change. The effort is completely and utterly <span class='hook-keyword'>futile</span>."},

{g:13,w:"Illusory",pos:"adjective",def:"Based on illusion; not real.",
etym:[{m:"IN-",s:"at/against"},{m:"LUDERE",s:"to play"}],
origin:"Latin illudere - 'to mock' or 'to play with.' An illusory thing is nature or fate playing a trick on your eyes.",
hook:"A <strong>shimmering puddle of water on a hot desert highway</strong>. It looks like a lake, but as you get closer, it vanishes into thin air. The promise of water was <span class='hook-keyword'>illusory</span>-a trick played by heat and light."},

{g:13,w:"Invidious",pos:"adjective",def:"Likely to arouse or incur resentment or anger in others.",
etym:[{m:"IN-",s:"into/against"},{m:"VIDERE",s:"to see"}],
origin:"Latin invidiosus - from 'invidia' (envy). It describes an action that causes people to 'look at you' with jealousy and anger.",
hook:"A teacher gives an <strong>'A' to only one student</strong> and tells the rest of the class they are all failures. This creates an <span class='hook-keyword'>invidious</span> situation; it’s practically designed to make everyone hate that one student."},

{g:13,w:"Lethargic",pos:"adjective",def:"Affected by lethargy; sluggish and apathetic.",
etym:[{m:"LETHE",s:"forgetfulness"}],
origin:"Greek lethe - the name of the river in the underworld whose water caused forgetfulness. To be lethargic is to act as if you've drunk from that river of 'sleep'.",
hook:"After eating a <strong>massive Thanksgiving dinner</strong>, you collapse onto the couch. You know you should do the dishes, but you can't even lift your arm. That heavy, sleepy, slow-motion feeling is being <span class='hook-keyword'>lethargic</span>."},

{g:13,w:"Metaphorical",pos:"adjective",def:"Characteristic of or relating to metaphor; figurative.",
etym:[{m:"META-",s:"over/across"},{m:"PHEREIN",s:"to carry"}],
origin:"Greek metaphora - 'a carrying over.' A metaphor 'carries' the meaning of one thing over to another thing.",
hook:"When a singer says their <strong>'heart is made of glass,'</strong> they don't mean they need an X-ray for a transparent organ. They are being <span class='hook-keyword'>metaphorical</span>-carrying the 'fragility' of glass over to the feeling of love."},

{g:13,w:"Mimic",pos:"verb",def:"Imitate (someone or their actions or words), typically in order to entertain or ridicule.",
etym:[{m:"MIMOS",s:"mime/actor"}],
origin:"Greek mimos - 'actor' or 'buffoon.' It’s the art of becoming a mirror of someone else's behavior.",
hook:"A parrot that can <strong>perfectly copy the sound of a ringing phone</strong>. It doesn't know what a phone is; it just knows how to <span class='hook-keyword'>mimic</span> the frequency. It’s an act of pure, mindless imitation."},

{g:13,w:"Numinous",pos:"adjective",def:"Having a strong religious or spiritual quality; suggesting the presence of a divinity.",
etym:[{m:"NUMEN",s:"divine will/nod"}],
origin:"Latin numen - the 'nod' of a god, signifying their presence. It describes the 'holy shiver' you feel in a sacred place.",
hook:"Standing alone in a <strong>1,000-year-old stone cathedral</strong> while the sun shines through the stained glass. The air feels 'thick' with history and something you can't see. That spiritual weight is <span class='hook-keyword'>numinous</span>."},

{g:13,w:"Obscure",pos:"adjective",def:"Not discovered or known about; uncertain.",
etym:[{m:"OBSCURUS",s:"dark"}],
origin:"Latin obscurus - 'covered over' or 'dark.' It’s something that is hidden because the light of knowledge hasn't hit it yet.",
hook:"A researcher finds a <strong>reference to a lost city in a book</strong> written in a language that only three people on Earth can speak. The city isn't just rare; it is <span class='hook-keyword'>obscure</span>-hidden in the shadows of history."},

{g:13,w:"Overt",pos:"adjective",def:"Done or shown openly; plainly or readily apparent.",
etym:[{m:"OUVRIR",s:"to open"}],
origin:"Old French overt - 'uncovered' or 'opened.' It is the opposite of covert; it’s an action with the 'lid' taken off.",
hook:"A billionaire <strong>standing on a stage with a giant cardboard check</strong> for ten million dollars. There are no secrets here; the generosity is <span class='hook-keyword'>overt</span>. He wants everyone to see exactly what he is doing."},

{g:13,w:"Pellucid",pos:"adjective",def:"Translucently clear; easily understood.",
etym:[{m:"PER-",s:"through"},{m:"LUCERE",s:"to shine"}],
origin:"Latin pellucidus - 'shining through.' It describes something so clear that light (or logic) passes through it with zero resistance.",
hook:"The water in a <strong>high-altitude mountain spring</strong>. You can see every tiny pebble at the bottom, ten feet down, as if the water isn't even there. That perfect, glass-like clarity is <span class='hook-keyword'>pellucid</span>."},

{g:13,w:"Perpetuate",pos:"verb",def:"Make (something, typically an undesirable situation) continue indefinitely.",
etym:[{m:"PER-",s:"throughout"},{m:"PETERE",s:"to seek/aim for"}],
origin:"Latin perpetuare - 'to make permanent.' It’s about keeping a cycle spinning so it never has a chance to stop.",
hook:"A rumor starts in a small town. Instead of checking the facts, <strong>everyone tells ten more people</strong>. By sharing the lie, they all help <span class='hook-keyword'>perpetuate</span> the scandal, keeping it alive long after it should have died."},

{g:13,w:"Rational",pos:"adjective",def:"Based on or in accordance with reason or logic.",
etym:[{m:"RATIO",s:"reckoning/calculation"}],
origin:"Latin rationalis - 'pertaining to reason.' It’s the mental process of 'calculating' the best path based on facts rather than feelings.",
hook:"In a burning building, most people scream and run in circles. One person <strong>checks the door for heat</strong> and crawls toward the exit to stay under the smoke. That calm, logic-driven behavior is <span class='hook-keyword'>rational</span>."},

{g:13,w:"Scathing",pos:"adjective",def:"Witheringly harsh; fiercely critical.",
etym:[{m:"SKATHA",s:"to harm/injure"}],
origin:"Old Norse skatha - 'to damage.' A scathing review doesn't just disagree; it aims to leave a physical 'burn' on the subject's reputation.",
hook:"The food critic didn't just say the meal was bad; they wrote that the <strong>'soup tasted like a wet wool sweater'</strong> and the service was 'an insult to humanity.' That level of brutal, burning honesty is <span class='hook-keyword'>scathing</span>."},

{g:13,w:"Subtle",pos:"adjective",def:"So delicate or precise as to be difficult to analyze or describe.",
etym:[{m:"SUB-",s:"under"},{m:"TELA",s:"web/weaving"}],
origin:"Latin subtilis - 'woven finely.' Like a web made of silk so thin it’s invisible unless you look at it from the perfect angle.",
hook:"The chef adds <strong>one single leaf of mint</strong> to a massive pot of spicy stew. You can't taste the mint directly, but there is a tiny, cooling 'ghost' in the background of every bite. That delicate, almost-hidden touch is <span class='hook-keyword'>subtle</span>."},

{g:13,w:"Superficial",pos:"adjective",def:"Existing or occurring at or on the surface.",
etym:[{m:"SUPER-",s:"above"},{m:"FACIES",s:"face"}],
origin:"Latin superficialis - 'pertaining to the top surface.' It describes things that never 'go deep' or see what’s under the 'face' of a thing.",
hook:"A car gets into a fender-bender. The <strong>paint is scratched</strong>, but the engine and frame are perfect. The damage is <span class='hook-keyword'>superficial</span>-it’s only on the 'face' of the car and doesn't affect its soul or function."},

{g:14,w:"Acquiesce",pos:"verb",def:"Accept something reluctantly but without protest.",
etym:[{m:"AD-",s:"to"},{m:"QUIESCERE",s:"to rest"}],
origin:"Latin acquiescere - 'to find rest' or 'to become quiet.' It describes the moment you stop fighting and just say 'fine.'",
hook:"You've been arguing with your friends for an hour about where to eat. Exhausted and hungry, you finally <strong>shrug your shoulders and say 'whatever'</strong> when they suggest pizza again. You have chosen to <span class='hook-keyword'>acquiesce</span>."},

{g:14,w:"Adroit",pos:"adjective",def:"Clever or skillful in using the hands or mind.",
etym:[{m:"A DROIT",s:"to the right"}],
origin:"French - 'à droit' means 'rightly.' Historically, the right hand was considered skilled, while the left ('sinister') was clumsy.",
hook:"Watch a <strong>master pickpocket</strong> move through a crowd or a debater dismantle an argument with a single sentence. It’s a quick, graceful, almost invisible cleverness. That mental or physical nimbleness is being <span class='hook-keyword'>adroit</span>."},

{g:14,w:"Amend",pos:"verb",def:"Make minor changes in a text to make it fairer, more accurate, or more up-to-date.",
etym:[{m:"E-",s:"out"},{m:"MENDA",s:"fault/blemish"}],
origin:"Latin emendare - 'to free from faults.' It’s the process of taking a 'blemish' out of a law or a document.",
hook:"The club's rules say 'no dogs,' but a member with a <strong>service animal</strong> joins. The board decides to <span class='hook-keyword'>amend</span> the constitution to include a 'medical exception.' They fixed the fault to make it fairer."},

{g:14,w:"Animus",pos:"noun",def:"Hostility or ill feeling; motivation to do something.",
etym:[{m:"ANIMUS",s:"spirit/mind"}],
origin:"Latin animus - meaning 'soul' or 'mind.' In English, it shifted toward the 'spirit of rebellion' or the 'spirit of intense dislike.'",
hook:"Two neighbors have been <strong>feuding over a fence line</strong> for thirty years. They don't even remember why it started, but they feel a jolt of hatred whenever they see each other. That deep-seated spirit of ill-will is <span class='hook-keyword'>animus</span>."},

{g:14,w:"Apologist",pos:"noun",def:"A person who offers an argument in defense of something controversial.",
etym:[{m:"APO-",s:"away from"},{m:"LOGOS",s:"speech"}],
origin:"Greek apologia - a formal 'speech in defense.' An apologist doesn't apologize (say sorry); they defend the thing most people hate.",
hook:"Even when a company is <strong>caught dumping chemicals in a river</strong>, they hire a smooth-talking executive to explain why it was actually 'environmentally neutral.' That person, the paid defender of the indefensible, is an <span class='hook-keyword'>apologist</span>."},

{g:14,w:"Astringent",pos:"adjective",def:"Slightly acidic or bitter; sharp or severe in manner or style.",
etym:[{m:"AD-",s:"to"},{m:"STRINGERE",s:"to draw tight"}],
origin:"Latin astringere - 'to bind fast.' It describes a taste (like a lemon) or a comment so sharp it makes your mouth or your skin 'tighten up.'",
hook:"The judge’s <strong>critique of the lawyer's sloppy paperwork</strong> was <span class='hook-keyword'>astringent</span>. It wasn't just a correction; it was a sharp, biting remark that made the whole courtroom feel a little uncomfortable and 'tight'."},

{g:14,w:"Collaborate",pos:"verb",def:"Work jointly on an activity, especially to produce or create something.",
etym:[{m:"COM-",s:"together"},{m:"LABORARE",s:"to work"}],
origin:"Latin collaborare - 'to work with.' It’s the process of two 'labors' merging into a single, better result.",
hook:"A <strong>scientist in Tokyo and a doctor in Berlin</strong> share their notes over Zoom to find a cure for a rare virus. They aren't competing; they are choosing to <span class='hook-keyword'>collaborate</span> to build something neither could do alone."},

{g:14,w:"Competent",pos:"adjective",def:"Having the necessary ability, knowledge, or skill to do something successfully.",
etym:[{m:"COM-",s:"together"},{m:"PETERE",s:"to aim for/seek"}],
origin:"Latin competent- - 'meeting' or 'coinciding.' It describes a person whose skills 'meet' the requirements of the job perfectly.",
hook:"You don't need a world-class chef to boil water; you just need someone <strong><span class='hook-keyword'>competent</span></strong>. It’s the person who knows exactly how to do the task without making a mess-reliable, capable, and ready."},

{g:14,w:"Correlate",pos:"verb",def:"Have a mutual relationship or connection, in which one thing affects or depends on another.",
etym:[{m:"CON-",s:"together"},{m:"RELATUS",s:"brought back"}],
origin:"Latin - 'brought back together.' It describes two separate data points that seem to 'travel' together through life.",
hook:"Researchers notice that as <strong>ice cream sales go up, the number of sunburns also goes up</strong>. The two facts <span class='hook-keyword'>correlate</span>-they aren't the same thing, but they are clearly dancing to the same rhythm (the summer heat)."},

{g:14,w:"Deride",pos:"verb",def:"Express contempt for; ridicule.",
etym:[{m:"DE-",s:"down"},{m:"RIDERE",s:"to laugh"}],
origin:"Latin deridere - 'to laugh down.' It’s not laughing *with* someone; it’s using laughter as a weapon to make someone feel small.",
hook:"A group of <strong>bullies pointing and laughing</strong> at a student who wore the wrong shoes to school. They aren't just having fun; they are trying to <span class='hook-keyword'>deride</span> the student, using mockery to 'push them down' socially."},

{g:14,w:"Dictate",pos:"verb",def:"State or order authoritatively.",
etym:[{m:"DICERE",s:"to say/speak"}],
origin:"Latin dictare - 'to say often' or 'to prescribe.' A dictator is someone whose 'speech' becomes the law for everyone else.",
hook:"The <strong>principal stands on the stage</strong> and says, 'From now on, there will be no more lunch in the library.' She isn't asking for an opinion; she is there to <span class='hook-keyword'>dictate</span> the new reality of the school."},

{g:14,w:"Discreet",pos:"adjective",def:"Careful and circumspect in one's speech or actions, especially to avoid giving offense or to gain an advantage.",
etym:[{m:"DISCERNERE",s:"to separate/distinguish"}],
origin:"Latin discretus - 'separated.' A discreet person knows how to 'separate' what should be said from what should be kept quiet.",
hook:"You notice a friend has <strong>spinach in their teeth</strong>. Instead of shouting it out in front of the whole party, you pull them aside and whisper it quietly. That quiet, careful way of handling a secret is being <span class='hook-keyword'>discreet</span>."},

{g:14,w:"Divorced",pos:"adjective",def:"Separated or entirely disconnected from something.",
etym:[{m:"DIS-",s:"apart"},{m:"VERTERE",s:"to turn"}],
origin:"Latin divertere - 'to turn away from.' It describes a situation where two things have 'turned' so far away they no longer touch.",
hook:"A politician gives a speech about 'the struggles of the poor' while <strong>sitting on a gold-plated throne</strong> on a private island. His words are completely <span class='hook-keyword'>divorced</span> from his actual life; they are two separate universes."},

{g:14,w:"Elitist",pos:"adjective",def:"Demonstrating a superior attitude or behavior associated with an elite.",
etym:[{m:"ELIRE",s:"to pick out"}],
origin:"French élite - 'selection' or 'the chosen.' It’s the belief that because you were 'picked' for success, you are inherently better than the rest.",
hook:"A woman refuses to go into a <strong>coffee shop because they don't use 'hand-pressed organic beans from the north side of the hill.'</strong> She looks at the other customers like they are eating dirt. That snobbish, superior attitude is <span class='hook-keyword'>elitist</span>."},

{g:14,w:"Exacting",pos:"adjective",def:"Making great demands on one's skill, attention, or other resources.",
etym:[{m:"EX-",s:"thoroughly"},{m:"AGERE",s:"to drive/do"}],
origin:"Latin exigere - 'to drive out' or 'to demand.' It’s a task that 'drives' you to be perfect because it won't accept anything less.",
hook:"Building a <strong>Swiss watch</strong> is an <span class='hook-keyword'>exacting</span> job. If a single gear is off by one-hundredth of a millimeter, the whole thing fails. It demands total focus and perfect skill-every single second."},

{g:14,w:"Flummoxed",pos:"adjective",def:"Bewildered or perplexed.",
etym:[{m:"FLUMMOX",s:"unknown origin"}],
origin:"Likely an 18th-century slang word that sounds like what it describes-the sound of someone being so confused they can only make 'flum' noises.",
hook:"You open a <strong>'simple' instructions manual for a bookshelf</strong> and discover it’s written in a mix of ancient Greek and binary code. You sit on the floor, surrounded by wooden planks, completely <span class='hook-keyword'>flummoxed</span> by where to start."},

{g:14,w:"Fruitful",pos:"adjective",def:"Producing good or helpful results; productive.",
etym:[{m:"FRUCTUS",s:"enjoyment/fruit"}],
origin:"Latin fructus - 'the produce of a tree.' A fruitful meeting is one where you 'harvest' a lot of great ideas.",
hook:"Two business partners meet for <strong>lunch and leave with ten new clients</strong> and a plan to double their profits. The meeting wasn't just long; it was <span class='hook-keyword'>fruitful</span>. They 'picked the fruit' of their hard work together."},

{g:14,w:"Inborn",pos:"adjective",def:"Existing from birth.",
etym:[{m:"IN-",s:"in"},{m:"BERAN",s:"to bear/birth"}],
origin:"Old English - 'born into.' It describes a skill or trait that didn't come from a teacher, but from the DNA itself.",
hook:"A <strong>five-year-old child sits down at a piano</strong> and begins playing a complex Mozart sonata despite never having a single lesson. The talent wasn't learned; it was <span class='hook-keyword'>inborn</span>. It was there from the very first breath."},

{g:14,w:"Polymath",pos:"noun",def:"A person of wide-ranging knowledge or learning.",
etym:[{m:"POLY",s:"many"},{m:"MANTHANEIN",s:"to learn"}],
origin:"Greek polymathēs - 'having learned much.' It describes a 'giant brain' that refuses to stick to just one subject.",
hook:"Leonardo da Vinci was a world-class <strong>painter, a brilliant engineer, a master of anatomy, and a pioneer of flight</strong>. He didn't just have one job; he was a <span class='hook-keyword'>polymath</span> who 'learned many' different ways to understand the world."},

{g:14,w:"Reticent",pos:"adjective",def:"Not revealing one's thoughts or feelings readily.",
etym:[{m:"RE-",s:"intensive"},{m:"TACERE",s:"to be silent"}],
origin:"Latin reticent- - 'keeping silent.' It describes a person who has a 'wall of silence' around their inner thoughts.",
hook:"When asked how she felt about the massive lottery win, the woman just <strong>shrugged and looked away</strong>, refusing to say a word to the reporters. She wasn't shy; she was being <span class='hook-keyword'>reticent</span>-intentionally keeping her feelings 'under lock and key'."},

{g:14,w:"Stringent",pos:"adjective",def:"Strict, precise, and exacting.",
etym:[{m:"STRINGERE",s:"to draw tight"}],
origin:"Latin stringent- - 'drawing tight.' Like a knot being pulled so tight that nothing can move or slip through.",
hook:"A <strong>NASA laboratory</strong> has <span class='hook-keyword'>stringent</span> rules about dust. One single speck of dirt could ruin a telescope, so every scientist must wear a pressurized suit and go through three airlocks. The rules are 'pulled tight' to ensure total safety."},

{g:14,w:"Subservient",pos:"adjective",def:"Prepared to obey others unquestioningly.",
etym:[{m:"SUB-",s:"under"},{m:"SERVIRE",s:"to serve"}],
origin:"Latin subservient- - 'serving under.' It describes a person who has accepted that their only job is to do what they are told.",
hook:"In a <strong>cult</strong>, the members are often completely <span class='hook-keyword'>subservient</span> to the leader. They don't ask 'why'; they just do as they are told, treating the leader's every word as a command that must be followed instantly."},

{g:14,w:"Surreptitious",pos:"adjective",def:"Kept secret, especially because it would not be approved of.",
etym:[{m:"SUB-",s:"secretly/under"},{m:"RAPERE",s:"to seize"}],
origin:"Latin surrepticius - 'stolen,' or 'snatched secretly.' It describes an action done while 'creeping under' the radar.",
hook:"A student <strong>checking their phone under the desk</strong> during a final exam, moving only their eyes, hiding the glow with a sweater. It’s not just a secret; it’s a secret because they know they'll get caught. That 'stealth-mode' behavior is <span class='hook-keyword'>surreptitious</span>."},

{g:14,w:"Tantalizing",pos:"adjective",def:"Tormenting or teasing with the sight or promise of something unobtainable.",
etym:[{m:"TANTALUS",s:"mythological king"}],
origin:"Greek myth of Tantalus, who was punished by being made to stand in water that vanished when he tried to drink, under fruit that moved away when he reached for it.",
hook:"The <strong>smell of fresh chocolate chip cookies</strong> wafting through the house while you are on a strict, no-sugar diet. The cookies are right there-you can see them, you can smell them-but you can't have them. That painful tease is <span class='hook-keyword'>tantalizing</span>."},

{g:14,w:"Tantamount",pos:"adjective",def:"Equivalent in seriousness to; virtually the same as.",
etym:[{m:"TANT AMONTER",s:"amount to as much"}],
origin:"Anglo-French - 'to amount to so much.' It’s the mathematical equals sign of the English language.",
hook:"If a general <strong>refuses to obey the president's direct order</strong>, it is <span class='hook-keyword'>tantamount</span> to treason. It’s not 'basically' the same; it 'amounts to' exactly the same level of crime."},

{g:14,w:"Torpor",pos:"noun",def:"A state of physical or mental inactivity; lethargy.",
etym:[{m:"TORPERE",s:"to be numb/stiff"}],
origin:"Latin - 'numbness.' It’s the state of a bear in the middle of winter-alive, but totally 'stiff' and 'numb' to the world.",
hook:"After a <strong>twenty-hour flight across the world</strong>, you collapse into your hotel bed. You are awake, but your brain feels like it’s filled with wet cement. You can't think, you can't move-you are in a state of absolute <span class='hook-keyword'>torpor</span>."},

{g:14,w:"Trenchant",pos:"adjective",def:"Vigorous or incisive in expression or style.",
etym:[{m:"TRENCHER",s:"to cut"}],
origin:"Old French - 'cutting.' A trenchant remark doesn't just bump into you; it 'cuts' through the noise to get to the truth.",
hook:"The <strong>investigative journalist's report</strong> was <span class='hook-keyword'>trenchant</span>. It didn't use soft words; it used sharp, clear facts that cut right through the government's lies and exposed the scandal to everyone."},

{g:14,w:"Umbrage",pos:"noun",def:"Offense or annoyance.",
etym:[{m:"UMBRA",s:"shadow"}],
origin:"Latin umbra - 'shadow.' Taking umbrage is like a 'shadow' falling over your mood because someone insulted you.",
hook:"When the waiter <strong>suggested she 'might need a smaller portion'</strong> because of her weight, she took immediate <span class='hook-keyword'>umbrage</span>. A dark shadow of offense fell over the dinner, and she demanded to speak to the manager."},

{g:14,w:"Versatile",pos:"adjective",def:"Able to adapt or be adapted to many different functions or activities.",
etym:[{m:"VERTERE",s:"to turn"}],
origin:"Latin versatilis - 'turning easily.' It’s the ability to 'turn' your hand to any task and do it well.",
hook:"A <strong>Swiss Army Knife</strong> is the most <span class='hook-keyword'>versatile</span> tool in the world. It can be a knife, a screwdriver, a saw, or a pair of scissors. It 'turns' from one job to the next without missing a beat."},

{g:14,w:"Wayward",pos:"adjective",def:"Difficult to control or predict because of unusual or perverse behavior.",
etym:[{m:"AWAY",s:"away"},{m:"WARD",s:"direction"}],
origin:"Middle English a-wayward - 'turned away.' It’s the child or the situation that refuses to stay on the path and instead goes 'away' in its own direction.",
hook:"The <strong><span class='hook-keyword'>wayward</span> kite</strong> refused to fly straight. No matter how hard I pulled the string, it dove toward the trees, spun in circles, and finally crashed into a neighbor's pool. It simply wouldn't be controlled."},

{g:15,w:"Alienate",pos:"verb",def:"Cause (someone) to feel isolated or estranged.",
etym:[{m:"ALIENUS",s:"of another/foreign"}],
origin:"Latin - 'to make into a stranger.' It describes the process of turning a friend into an 'alien' who no longer belongs in your world.",
hook:"By <strong>constantly insulting her friends' hobbies</strong> and never listening to their problems, she slowly began to <span class='hook-keyword'>alienate</span> everyone in her life. One by one, they stopped calling, until she was a stranger to her own social circle."},

{g:15,w:"Apathy",pos:"noun",def:"Lack of interest, enthusiasm, or concern.",
etym:[{m:"A-",s:"without"},{m:"PATHOS",s:"feeling/suffering"}],
origin:"Greek apatheia - 'freedom from suffering.' Originally a Stoic ideal of peace, it evolved into the modern sense of 'not giving a damn.'",
hook:"The <strong>world is ending outside the window</strong>, but the person on the couch can't even be bothered to change the channel or look up. It’s not that they are angry; it’s that the 'feeling' machine inside them has shut off. This emotional void is <span class='hook-keyword'>apathy</span>."},

{g:15,w:"Apropos",pos:"adjective",def:"Very appropriate to a particular situation.",
etym:[{m:"A PROPOS",s:"to the purpose"}],
origin:"French - 'to the purpose.' It describes a comment that is 'exactly what we were looking for' at that exact moment.",
hook:"We were just discussing how to save money on the wedding, and <strong><span class='hook-keyword'>apropos</span> of that</strong>, my sister just called to say we can use her backyard for free. The timing was perfect; the call was exactly 'to the purpose'."},

{g:15,w:"Apt",pos:"adjective",def:"Appropriate or suitable in the circumstances; having a tendency to do something.",
etym:[{m:"APTUS",s:"fitted"}],
origin:"Latin - 'fastened' or 'fitted.' It describes a person or a word that 'fits' the situation like a perfectly sized shoe.",
hook:"Calling the world's tallest building 'The Needle' is an <strong><span class='hook-keyword'>apt</span> nickname</strong>. It 'fits' the physical reality perfectly. It's also true that a tall building is 'apt to' attract lightning; it has a natural tendency for it."},

{g:15,w:"Cloak",pos:"verb",def:"Hide, cover, or disguise (something).",
etym:[{m:"CLOKE",s:"bell-shaped garment"}],
origin:"Old French cloque - 'bell.' Originally a bell-shaped cape used to hide one's body, later becoming a metaphor for hiding anything secret.",
hook:"The <strong>spy agency used a fake flower shop</strong> to <span class='hook-keyword'>cloak</span> their high-tech headquarters. On the outside, it was just roses and daisies; on the inside, it was microchips and satellites. The beauty of the shop was a 'garment' hiding the truth."},

{g:15,w:"Consensus",pos:"noun",def:"A general agreement.",
etym:[{m:"CON-",s:"together"},{m:"SENTIRE",s:"to feel"}],
origin:"Latin - 'feeling together.' It’s the moment when everyone in the room stops arguing because they all 'feel' the same way about the solution.",
hook:"After six hours of arguing, the <strong>jury finally reached a <span class='hook-keyword'>consensus</span></strong>. All twelve people nodded at once. They had stopped being twelve separate voices and had become one 'feeling together' on the verdict."},

{g:15,w:"Distort",pos:"verb",def:"Pull or twist out of shape; give a misleading or false account of.",
etym:[{m:"DIS-",s:"apart"},{m:"TORQUERE",s:"to twist"}],
origin:"Latin distorquere - 'to twist different ways.' It describes a physical or verbal 'twist' that makes the original unrecognizable.",
hook:"Look into a <strong>funhouse mirror</strong>. Your head looks like a giant balloon and your legs look like tiny noodles. The mirror's curved glass manages to <span class='hook-keyword'>distort</span> your reflection until it’s a 'twisted' version of reality."},

{g:15,w:"Divergent",pos:"adjective",def:"Tending to be different or develop in different directions.",
etym:[{m:"DIS-",s:"in two ways"},{m:"VERGERE",s:"to bend/incline"}],
origin:"Latin divergent- - 'bending in different ways.' It describes two paths that start together but 'bend away' from each other forever.",
hook:"Two childhood best friends go to college. One joins a <strong>peace commune in the woods</strong>, the other becomes a <strong>corporate CEO on Wall Street</strong>. Their life paths have become <span class='hook-keyword'>divergent</span>; they are 'bending' in opposite directions."},

{g:15,w:"Elated",pos:"adjective",def:"Ecstatically happy.",
etym:[{m:"E-",s:"out"},{m:"FERRE",s:"to bear/carry"}],
origin:"Latin elatus - 'carried out' or 'lifted up.' It describes a joy so light it 'lifts you off the ground.'",
hook:"The moment she <strong>saw her name on the list of medical school graduates</strong>, she didn't just smile; she screamed and jumped into the air. She felt <span class='hook-keyword'>elated</span>-as if her happiness had 'carried her out' of her body and into the clouds."},

{g:15,w:"Enchant",pos:"verb",def:"Fill (someone) with great delight; charm.",
etym:[{m:"IN-",s:"in"},{m:"CANTARE",s:"to sing"}],
origin:"Latin incantare - 'to chant a magic spell.' It’s the act of using beauty or charm to 'sing a spell' into someone's heart.",
hook:"The <strong>beautiful melody of the violin</strong> seemed to <span class='hook-keyword'>enchant</span> the entire audience. For ten minutes, no one moved, no one coughed, and no one checked their phone. It was as if the musician had 'sung' them into a magical trance."},

{g:15,w:"Entrenched",pos:"adjective",def:"(Of an attitude or habit) firmly established and difficult to change.",
etym:[{m:"IN-",s:"in"},{m:"TRENCHER",s:"to cut/ditch"}],
origin:"Old French - 'cut into a ditch.' Like a soldier in a trench during a war, an entrenched belief is 'dug in' so deep that no argument can move it.",
hook:"The old man had <strong><span class='hook-keyword'>entrenched</span> views about technology</strong>. He refused to even look at a smartphone, insisting that letters and landlines were the only 'proper' way to talk. His opinion was 'dug in' and nothing would change it."},

{g:15,w:"Exotic",pos:"adjective",def:"Originating in or characteristic of a distant foreign country.",
etym:[{m:"EXO",s:"outside"}],
origin:"Greek exōtikos - 'from the outside.' It describes things that look and feel like they belong to a 'world outside' your own experience.",
hook:"In the middle of a snowy city in Ohio, someone opens a <strong>tropical plant shop</strong> full of giant, purple, prehistoric-looking leaves from the Amazon. The plants look <span class='hook-keyword'>exotic</span>-they are clearly 'from the outside' world of the jungle."},

{g:15,w:"Exploitative",pos:"adjective",def:"Making use of a situation or treating others unfairly in order to gain an advantage.",
etym:[{m:"EXPLICARE",s:"to unfold"}],
origin:"French exploiter - 'to achieve or fulfill.' It shifted from 'achieving a goal' to 'achieving a goal by using people like tools'.",
hook:"A company <strong>pays its workers only fifty cents a day</strong> to make thousand-dollar sneakers. The system is <span class='hook-keyword'>exploitative</span>; the owners are 'unfolding' their own wealth by 'using up' the lives of their desperate employees."},

{g:15,w:"Foreseeable",pos:"adjective",def:"Able to be foreseen or predicted.",
etym:[{m:"FORE-",s:"before"},{m:"SEE",s:"to perceive"}],
origin:"Old English - 'to see before it happens.' It describes the parts of the future that are clear enough that only a fool would be surprised.",
hook:"If you <strong>don't study for your exam</strong>, it is a <span class='hook-keyword'>foreseeable</span> result that you will fail. You don't need a crystal ball to 'see before' it happens; the logic of the situation makes the outcome obvious."},

{g:15,w:"Forsake",pos:"verb",def:"Abandon (someone or something).",
etym:[{m:"FOR-",s:"completely"},{m:"SACAN",s:"to deny/refuse"}],
origin:"Old English forsacan - 'to deny completely.' It describes the cold, intentional act of leaving something (a person or a promise) behind forever.",
hook:"In the middle of the desert, the <strong>traitor decided to <span class='hook-keyword'>forsake</span> his companions</strong>, taking the only water bottle and the only map. He 'denied' his friendship and his duty, leaving them to vanish in the sand."},

{g:15,w:"Gratify",pos:"verb",def:"Give (someone) pleasure or satisfaction.",
etym:[{m:"GRATUS",s:"pleasing"}],
origin:"Latin gratificare - 'to do a favor' or 'to please.' It describes an action that fills the 'pleasure' center of someone's brain.",
hook:"It would <strong><span class='hook-keyword'>gratify</span> the young artist</strong> immensely to see her painting hanging in the national gallery. Seeing her work on that wall would 'please' her years of hard work and sacrifice, giving her total satisfaction."},

{g:15,w:"Heed",pos:"verb",def:"Pay attention to; take notice of.",
etym:[{m:"HEDAN",s:"to observe/take care"}],
origin:"Old English - 'to guard' or 'to protect.' To heed a warning is to 'protect' yourself by actually observing the danger.",
hook:"The sign says <strong>'DANGER: THIN ICE,'</strong> but the skater refuses to <span class='hook-keyword'>heed</span> the warning. He doesn't 'guard' himself with the knowledge; he ignores it, and ten seconds later, he is in the freezing water. Listen to the sign!"},

{g:15,w:"Judicious",pos:"adjective",def:"Having, showing, or done with good judgment or sense.",
etym:[{m:"JUDICIUM",s:"judgment"}],
origin:"Latin - 'pertaining to a judge.' It describes a choice made with the same careful, balanced logic that a judge uses in a courtroom.",
hook:"With only fifty dollars left in his bank account, he made a <strong><span class='hook-keyword'>judicious</span> choice</strong>: he bought groceries and a bus pass instead of a new video game. It was a 'judge-like' decision focused on survival and logic."},

{g:15,w:"Lucid",pos:"adjective",def:"Expressed clearly; easy to understand; bright or luminous.",
etym:[{m:"LUCERE",s:"to shine"}],
origin:"Latin lucidus - 'shining.' A lucid explanation is one where the truth 'shines' through the words so clearly that no confusion remains.",
hook:"The professor took a <strong>1,000-page physics book</strong> and explained the whole thing in ten <span class='hook-keyword'>lucid</span> sentences. He made the 'dark' and difficult subject 'shine' with clarity, so even a child could understand it."},

{g:15,w:"Pertinent",pos:"adjective",def:"Relevant or applicable to a particular matter.",
etym:[{m:"PER-",s:"thoroughly"},{m:"TENERE",s:"to hold"}],
origin:"Latin pertinent- - 'holding through' or 'reaching to.' It describes a fact that 'holds' onto the subject and won't let go.",
hook:"The detective told the witness to stop talking about the weather and only share <strong>details <span class='hook-keyword'>pertinent</span> to the murder</strong>. He only wanted the facts that 'held onto' the crime-the time of the gunshot and the face of the killer."},

{g:15,w:"Propriety",pos:"noun",def:"The state or quality of conforming to conventionally accepted standards of behavior.",
etym:[{m:"PROPRIUS",s:"one's own"}],
origin:"Latin proprietas - 'property' or 'proper behavior.' It’s the act of 'owning' your behavior so that it matches what society expects.",
hook:"He always behaved with the <strong>utmost <span class='hook-keyword'>propriety</span> at formal dinners</strong>. He never spoke with food in his mouth, he never used the wrong fork, and he always stood up when the host entered. He was 'proper' in every single way."},

{g:15,w:"Scintillating",pos:"adjective",def:"Sparkling or shining brightly; brilliantly and excitingly clever.",
etym:[{m:"SCINTILLA",s:"spark"}],
origin:"Latin scintillare - 'to emit sparks.' A scintillating conversation is one where ideas 'spark' off each other like fireworks.",
hook:"The <strong>conversation at the dinner party</strong> was <span class='hook-keyword'>scintillating</span>. Everyone was brilliant, funny, and fast, and the jokes were flying through the air like bright 'sparks.' No one wanted to leave the table for even a second."},

{g:15,w:"Sensational",pos:"adjective",def:"Causing great public interest and excitement.",
etym:[{m:"SENSUS",s:"feeling"}],
origin:"Latin - 'pertaining to the senses.' It describes news or an event that 'shocks the senses' and makes everyone feel something intense.",
hook:"The tabloid magazine published a <strong><span class='hook-keyword'>sensational</span> story</strong> about a cat that could speak seven languages and was running for president. It 'shocked the senses' of the whole city, and soon everyone was talking about it."},

{g:15,w:"Sophisticated",pos:"adjective",def:"Having a great deal of worldly experience and knowledge of culture.",
etym:[{m:"SOPHISTICARE",s:"to tamper with/adulterate"}],
origin:"Greek sophistēs - 'wise man.' It originally meant 'corrupted' (not simple/pure), but evolved to mean 'refined' by experience and education.",
hook:"She had a highly <strong><span class='hook-keyword'>sophisticated</span> taste in fine wine</strong>. She didn't just 'like' red wine; she could tell you the exact year, the name of the vineyard, and the type of soil the grapes grew in. She was 'refined' by knowledge."},

{g:15,w:"Strife",pos:"noun",def:"Angry or bitter disagreement over fundamental issues; conflict.",
etym:[{m:"ESTRIF",s:"quarrel"}],
origin:"Old French - 'to strive or fight.' It describes a state of permanent, grinding 'friction' between two people or groups.",
hook:"The <strong>civil war caused decades of <span class='hook-keyword'>strife</span></strong> in the nation. Families were torn apart, neighbors wouldn't speak to each other, and the air was thick with the 'bitter disagreement' of two groups who refused to compromise."},

{g:15,w:"Understated",pos:"adjective",def:"Presented or expressed in a subtle and effective way.",
etym:[{m:"UNDER-",s:"below"},{m:"STATE",s:"to declare"}],
origin:"English formation - 'to state less than the reality.' It’s the power of 'less is more.'",
hook:"She wore a <strong>simple black dress with a single pearl necklace</strong>. Amidst a room full of neon colors and giant feathers, her <span class='hook-keyword'>understated</span> elegance was the most beautiful thing there. She was 'declaring' her style by 'saying' very little."},

{g:15,w:"Unscrupulous",pos:"adjective",def:"Having or showing no moral principles; not honest or fair.",
etym:[{m:"UN-",s:"not"},{m:"SCRUPULUS",s:"small stone/doubt"}],
origin:"Latin scrupulus - a 'small sharp stone' in your shoe. An unscrupulous person has 'no stone' in their shoe; they feel no 'pain of doubt' or guilt when they lie.",
hook:"The <strong><span class='hook-keyword'>unscrupulous</span> car salesman</strong> knew the engine was about to explode, but he smiled and told the elderly woman it was 'the most reliable car in the world.' He felt zero guilt; his moral compass was completely broken."},

{g:15,w:"Veracity",pos:"noun",def:"Conformity to facts; accuracy; habitual truthfulness.",
etym:[{m:"VERAX",s:"truthful"}],
origin:"Latin verax - 'truth-telling.' It isn't just about a single true statement; it is the quality of being consistently aligned with reality.",
hook:"A witness is on the stand. Every date, every name, and every detail matches the <strong>video footage</strong> perfectly. They don't exaggerate or guess. The absolute reliability of their account is its <span class='hook-keyword'>veracity</span>-it is 'truth-telling' at its best."},

{g:15,w:"Virulent",pos:"adjective",def:"Extremely severe or harmful in its effects; bitterly hostile.",
etym:[{m:"VIRUS",s:"poison"}],
origin:"Latin virulentus - 'full of poison.' It describes a disease or a comment so toxic that it actively destroys whatever it touches.",
hook:"The <strong><span class='hook-keyword'>virulent</span> flu strain</strong> spread through the city in just two days, making thousands of people deathly ill. It was a 'poisonous' attack on the health of the population, aggressive and unstoppable."},

{g:15,w:"Volatile",pos:"adjective",def:"Liable to change rapidly and unpredictably, especially for the worse.",
etym:[{m:"VOLARE",s:"to fly"}],
origin:"Latin volatilis - 'fleeting' or 'able to fly.' It describes a situation or a chemical that can 'fly away' into chaos at any second.",
hook:"The <strong>stock market was extremely <span class='hook-keyword'>volatile</span></strong> this morning. One minute, people were millionaires; ten minutes later, they had lost everything. The situation was like a 'flying' bird that no one could catch or predict."},

{g:16,w:"Antedate",pos:"verb",def:"Precede in time; come before (something) in date.",
etym:[{m:"ANTE",s:"before"},{m:"DATE",s:"time"}],
origin:"Latin - 'to date before.' It’s the chronological equivalent of being the ancestor of an idea or an event.",
hook:"The invention of the <strong>hand-axe <span class='hook-keyword'>antedates</span> the invention of the wheel</strong> by hundreds of thousands of years. The axe was the 'before-date' ancestor that set the stage for all human technology."},

{g:16,w:"Banish",pos:"verb",def:"Send (someone) away from a country or place as an official punishment.",
etym:[{m:"BANIR",s:"to proclaim/summon"}],
origin:"Old French banir - 'to proclaim as an outlaw.' To banish someone is to 'proclaim' to the whole world that they no longer belong here.",
hook:"The <strong>king decided to <span class='hook-keyword'>banish</span> the traitor</strong>. He was escorted to the border, told he would be killed if he ever returned, and forced to live the rest of his life as a ghost in a foreign land. He was 'proclaimed' gone forever."},

{g:16,w:"Bridle",pos:"verb",def:"Show one's resentment or anger, especially by throwing up the head.",
etym:[{m:"BREGDAN",s:"to pull/move quickly"}],
origin:"Old English bridel - the leather straps used to control a horse. To bridle is to act like a horse that is 'pulling' against the bit in its mouth.",
hook:"When her boss <strong>suggested she 'wasn't smart enough' to lead the project</strong>, she began to <span class='hook-keyword'>bridle</span>. She sat up straight, her face turned red, and she 'pulled' against the insult with immediate, visible anger."},

{g:16,w:"Comply",pos:"verb",def:"Act in accordance with a wish or command.",
etym:[{m:"COMPLERE",s:"to fill up"}],
origin:"Latin - 'to fill up' a requirement. When you comply, you 'fill up' the space between the rule and your actions until they match.",
hook:"The <strong>security guard told him to 'step back'</strong> from the fence. He didn't argue; he simply chose to <span class='hook-keyword'>comply</span>, moving three feet back to 'fill up' the safety requirement and avoid any trouble."},

{g:16,w:"Crestfallen",pos:"adjective",def:"Sad and disappointed.",
etym:[{m:"CREST",s:"top/head"},{m:"FALLEN",s:"dropped"}],
origin:"Reference to a bird (like a rooster) whose 'crest' of feathers 'falls' down when it has been defeated in a fight.",
hook:"He had <strong>practiced his proposal for six months</strong>, but when she said 'no,' he walked out of the restaurant completely <span class='hook-keyword'>crestfallen</span>. His 'feathers' had dropped; the pride and joy were gone, replaced by heavy disappointment."},

{g:16,w:"Curtail",pos:"verb",def:"Reduce in extent or quantity; impose a restriction on.",
etym:[{m:"CURTAL",s:"short"}],
origin:"Old French courtault - 'shortened.' It originally described a horse whose tail had been cut short; now it describes 'cutting' any activity short.",
hook:"Because of the budget crisis, the city had to <strong><span class='hook-keyword'>curtail</span> the firework show</strong>. Instead of an hour of explosions, it was cut 'short' to only ten minutes. They 'cut the tail' off the celebration to save money."},

{g:16,w:"Elucidate",pos:"verb",def:"Make (something) clear; explain.",
etym:[{m:"E-",s:"out"},{m:"LUCIDUS",s:"clear/bright"}],
origin:"Latin elucidare - 'to make bright.' To elucidate is to 'bring the light out' of a dark and confusing subject.",
hook:"The <strong>complex legal contract was impossible to read</strong>, so the lawyer sat down to <span class='hook-keyword'>elucidate</span> the main points. She 'made it bright' by using simple words, so everyone finally understood what they were signing."},

{g:16,w:"Evade",pos:"verb",def:"Escape or avoid, especially by cleverness or trickery.",
etym:[{m:"E-",s:"out of"},{m:"VADERE",s:"to go"}],
origin:"Latin evadere - 'to go out' or 'to escape.' It’s the act of 'going out' of the path of a danger or a question.",
hook:"The <strong>politician tried to <span class='hook-keyword'>evade</span> the reporter's question</strong> about the scandal. Instead of answering, he started talking about his favorite childhood dog, 'going out' of the path of the truth to escape the blame."},

{g:16,w:"Feckless",pos:"adjective",def:"Lacking initiative or strength of character; irresponsible.",
etym:[{m:"FECK",s:"effect/value"},{m:"-LESS",s:"without"}],
origin:"Scottish - 'without effect.' A feckless person is like a lightbulb that doesn't turn on; they simply have 'no effect' on the world around them.",
hook:"The <strong><span class='hook-keyword'>feckless</span> heir to the fortune</strong> spent all his days sleeping on the couch while the family business burned to the ground. He had 'no effect' on the crisis; he just sat there, irresponsible and useless."},

{g:16,w:"Fester",pos:"verb",def:"Become worse or more intense, especially through long-term neglect.",
etym:[{m:"FISTULA",s:"pipe/ulcer"}],
origin:"Latin - 'a pipe-like ulcer.' It describes a wound (or an anger) that is 'bubbling' under the surface because it hasn't been cleaned out.",
hook:"If you <strong>don't talk about your anger toward your roommate</strong>, it will only <span class='hook-keyword'>fester</span>. Like a dirty cut, it will 'bubble' and get 'more intense' until one day it explodes into a massive, ugly argument."},

{g:16,w:"Iconoclastic",pos:"adjective",def:"Characterized by attack on cherished beliefs or institutions.",
etym:[{m:"EIKON",s:"image/idol"},{m:"KLAN",s:"to break"}],
origin:"Greek eikonoklastes - 'breaker of images.' Originally used for people who literally smashed religious statues; now used for those who smash 'sacred' ideas.",
hook:"A young chef enters a <strong>famous 5-star French restaurant</strong> and insists on serving gourmet food in cardboard boxes. They are intentionally 'breaking the images' of fine dining. That rebellious spirit is <span class='hook-keyword'>iconoclastic</span>."},

{g:16,w:"Immure",pos:"verb",def:"Enclose or confine (someone) against their will.",
etym:[{m:"IN-",s:"in"},{m:"MURUS",s:"wall"}],
origin:"Latin immurare - 'to wall in.' It describes the act of putting someone 'inside the walls' so they can never leave.",
hook:"The <strong>evil king decided to <span class='hook-keyword'>immure</span> the princess</strong> in a stone tower with no stairs and no doors. She was 'walled in' forever, a prisoner of the stone, with only the birds in the window for company."},

{g:16,w:"Improvise",pos:"verb",def:"Create and perform spontaneously without preparation.",
etym:[{m:"IM-",s:"not"},{m:"PROVISUS",s:"foreseen"}],
origin:"Latin improvisus - 'not seen beforehand.' To improvise is to act when you 'haven't seen' the plan yet, making it up as you go.",
hook:"When the <strong>lead actor forgot all his lines</strong>, he had to <span class='hook-keyword'>improvise</span>. He didn't have a 'foreseen' plan, so he just started making up a story about a dragon. The audience loved it, and they never knew he was lost."},

{g:16,w:"Inhibit",pos:"verb",def:"Hinder, restrain, or prevent (an action or process).",
etym:[{m:"IN-",s:"in"},{m:"HABERE",s:"to hold"}],
origin:"Latin inhibere - 'to hold in.' To inhibit something is to 'hold it in' so it can't grow or move forward.",
hook:"The <strong>freezing temperatures will <span class='hook-keyword'>inhibit</span> the growth of the flowers</strong>. The cold 'holds in' the plants' energy, preventing them from blooming until the spring sun finally 'lets them go' again."},

{g:16,w:"Inscrutable",pos:"adjective",def:"Impossible to understand or interpret.",
etym:[{m:"IN-",s:"not"},{m:"SCRUTARI",s:"to search"}],
origin:"Latin inscrutabilis - 'that cannot be searched into.' It describes a person or a puzzle that has no 'handle' for your mind to grab onto.",
hook:"The <strong>poker player wore a perfectly <span class='hook-keyword'>inscrutable</span> expression</strong>. Even when he had a winning hand, his face was as hard and unreadable as a mountain. You could 'search' his eyes forever and find zero information."},

{g:16,w:"Lionize",pos:"verb",def:"Give a lot of public attention and approval to; treat as a celebrity.",
etym:[{m:"LION",s:"the animal"}],
origin:"Derived from the 'lions' kept at the Tower of London, which were once the city's most famous and visited celebrities. To lionize is to treat someone like a 'lion'.",
hook:"A humble scientist discovers a new species of frog, and suddenly they are on <strong>every late-night talk show</strong>. People are asking for their autograph at the grocery store. The public has decided to <span class='hook-keyword'>lionize</span> them, turning a quiet researcher into a 'king'."},

{g:16,w:"Monotonous",pos:"adjective",def:"Dull, tedious, and repetitious; lacking in variety.",
etym:[{m:"MONO-",s:"single"},{m:"TONOS",s:"tone/sound"}],
origin:"Greek monotonos - 'having a single tone.' Like a piano that only has one key, a monotonous life is just the same 'sound' over and over.",
hook:"Stamping <strong>10,000 envelopes for eight hours straight</strong> is incredibly <span class='hook-keyword'>monotonous</span>. There is only 'one tone' to the day: reach, lick, stamp. reach, lick, stamp. By the third hour, your brain starts to turn into mush."},

{g:16,w:"Peculiar",pos:"adjective",def:"Strange or odd; unusual; belonging exclusively to.",
etym:[{m:"PECULIUM",s:"private property"}],
origin:"Latin peculiaris - 'of one's own property.' It evolved from 'something that only belongs to you' to 'something so weird that it must be unique to you'.",
hook:"It was highly <strong><span class='hook-keyword'>peculiar</span> to see a penguin</strong> walking down the middle of a hot street in Miami. It didn't belong there; it was a 'unique' and 'strange' sight that made everyone stop and stare in confusion."},

{g:16,w:"Premeditate",pos:"verb",def:"Think out or plan (an action, especially a crime) beforehand.",
etym:[{m:"PRAE-",s:"before"},{m:"MEDITARI",s:"to consider"}],
origin:"Latin praemeditari - 'to consider before.' It describes the cold, logical 'pre-thinking' that happens before a major action.",
hook:"The detectives proved that the <strong>thief had spent three months <span class='hook-keyword'>premeditate</span> the robbery</strong>. He didn't just 'do' it; he 'considered it before' by drawing maps, timing the guards, and buying a getaway car. It was a cold, calculated plan."},

{g:16,w:"Profligate",pos:"adjective",def:"Recklessly extravagant or wasteful in the use of resources.",
etym:[{m:"PRO-",s:"forward"},{m:"FLIGERE",s:"to strike down"}],
origin:"Latin profligatus - 'shattered' or 'struck down.' A profligate person 'strikes down' their own wealth by throwing it away on things they don't need.",
hook:"The <strong>heir to the oil fortune was a <span class='hook-keyword'>profligate</span> spender</strong>. He bought a new golden car every week and threw parties that cost a million dollars a night. He was 'striking down' his own future with every check he signed."},

{g:16,w:"Reconcile",pos:"verb",def:"Restore friendly relations between; make consistent with each other.",
etym:[{m:"RE-",s:"back/again"},{m:"CONCILIARE",s:"to bring together"}],
origin:"Latin reconciliare - 'to bring back together.' It’s the act of taking two 'broken' things (like a friendship or two sets of numbers) and making them 'one' again.",
hook:"After ten years of not speaking, the <strong>two brothers decided to <span class='hook-keyword'>reconcile</span></strong>. They met for coffee, talked about their mistakes, and 'brought back together' the family bond that had been broken for a decade."},

{g:16,w:"Refine",pos:"verb",def:"Improve (something) by making small changes.",
etym:[{m:"RE-",s:"intensive"},{m:"FINER",s:"to make fine"}],
origin:"French raffiner - 'to make very fine.' To refine something is to take the 'rough' parts out until only the 'fine' and pure parts remain.",
hook:"The <strong>author spent six months <span class='hook-keyword'>refining</span> her novel</strong>. She didn't change the story; she just polished every sentence, took out the boring words, and made the 'fine' details shine until the book was perfect."},

{g:16,w:"Relinquish",pos:"verb",def:"Voluntarily cease to keep or claim; give up.",
etym:[{m:"RE-",s:"back"},{m:"LINQUERE",s:"to leave"}],
origin:"Latin relinquere - 'to leave behind.' To relinquish something is to 'leave it behind' by opening your hand and letting it go.",
hook:"The <strong>aging king decided to <span class='hook-keyword'>relinquish</span> his throne</strong>. He took off his crown, handed it to his daughter, and 'left behind' the power and the stress of the kingdom to live a quiet life in the countryside."},

{g:16,w:"Ruminate",pos:"verb",def:"Think deeply about something.",
etym:[{m:"RUMINARI",s:"to chew the cud"}],
origin:"Latin ruminare - originally described a cow 'chewing the cud' (swallowing and then bringing it back up to chew again). It’s the mental act of 'chewing' an idea over and over.",
hook:"I need a few days to <strong><span class='hook-keyword'>ruminate</span> on your job offer</strong>. I'm going to 'chew' on the salary, the hours, and the location, swallowing the facts and bringing them back up to think about them until I'm sure of my answer."},

{g:16,w:"Skittish",pos:"adjective",def:"Excitable or easily scared.",
etym:[{m:"SKEET",s:"swift/to shoot"}],
origin:"Middle English - related to the word 'shoot' or 'swift.' A skittish animal is one that 'shoots away' at the first sign of a strange sound.",
hook:"The <strong><span class='hook-keyword'>skittish</span> horse bolted</strong> the second a single dry leaf blew past its feet. It didn't wait to see if the leaf was a monster; its 'swift' instinct told it to 'shoot away' and find somewhere safe to hide."},

{g:16,w:"Superfluous",pos:"adjective",def:"Unnecessary, especially through being more than enough.",
etym:[{m:"SUPER-",s:"over"},{m:"FLUERE",s:"to flow"}],
origin:"Latin superfluus - 'overflowing.' It describes something that is so 'extra' that it’s just spilling out of the bucket and making a mess on the floor.",
hook:"Adding <strong>ten extra spoilers to a car that already has six</strong> is entirely <span class='hook-keyword'>superfluous</span>. The car is already 'overflowing' with parts; adding more doesn't make it faster-it just makes it look ridiculous and unnecessary."},

{g:16,w:"Synoptic",pos:"adjective",def:"Of or forming a general summary or synopsis.",
etym:[{m:"SYN-",s:"together"},{m:"OPSIS",s:"seeing"}],
origin:"Greek sunoptikos - 'seeing together.' A synoptic view is one where you 'see' all the main parts of a story 'together' in a single, short glance.",
hook:"The <strong>textbook provided a <span class='hook-keyword'>synoptic</span> chart</strong> of the entire American Revolution. Instead of 500 pages, you could 'see together' the main battles, the main leaders, and the main dates in just one single, easy page."},

{g:16,w:"Thorough",pos:"adjective",def:"Complete with regard to every detail; not superficial.",
etym:[{m:"THURH",s:"through"}],
origin:"Old English thuruh - 'from one side to the other.' To be thorough is to go all the way 'through' a subject until you reach the other side.",
hook:"The <strong>detective conducted a <span class='hook-keyword'>thorough</span> search</strong> of the crime scene. He didn't just look at the floor; he went 'through' every drawer, every closet, and every single pocket of the victim's clothes until he found the hidden key."},

{g:16,w:"Visionary",pos:"adjective",def:"Thinking about the future with imagination or wisdom.",
etym:[{m:"VISIO",s:"sight/vision"}],
origin:"Latin visio - 'the act of seeing.' A visionary is someone whose 'sight' isn't limited to the present; they can 'see' the world that hasn't been built yet.",
hook:"In 1900, a <strong><span class='hook-keyword'>visionary</span> engineer predicted a world</strong> where everyone would carry a small 'thinking machine' in their pocket. People laughed, but he 'saw' a future that was ninety years away, and he was exactly right."},

{g:16,w:"Vociferous",pos:"adjective",def:"(Especially of a person) vehement or clamorous.",
etym:[{m:"VOX",s:"voice"},{m:"FERRE",s:"to carry"}],
origin:"Latin vociferari - 'to carry the voice.' A vociferous person is one whose 'voice' is 'carried' with so much force that everyone in the room has to hear it.",
hook:"He was a <strong><span class='hook-keyword'>vociferous</span> opponent of the new law</strong>. He didn't just vote against it; he 'carried his voice' to the steps of the capital, shouting through a megaphone until everyone in the city knew exactly how he felt."},

{g:17,w:"Acclaim",pos:"verb",def:"Praise enthusiastically and publicly.",
etym:[{m:"AD-",s:"to"},{m:"CLAMARE",s:"to cry out"}],
origin:"Latin acclamare - 'to shout at.' Originally meant to shout at someone (either in anger or joy), but evolved to mean 'shouting at' someone because they are awesome.",
hook:"The <strong>audience rose to their feet to <span class='hook-keyword'>acclaim</span> the pianist's performance</strong>. They weren't just clapping; they were 'crying out' their praise, shouting 'Bravo!' until the walls of the theater shook with their excitement."},

{g:17,w:"Ascertain",pos:"verb",def:"Find (something) out for certain; make sure of.",
etym:[{m:"AD-",s:"to"},{m:"CERTUS",s:"settled/sure"}],
origin:"Old French acertener - 'to make sure.' It describes the act of taking an 'unsettled' rumor and 'settling' it with hard facts.",
hook:"Before we launch the rocket, we must <strong><span class='hook-keyword'>ascertain</span> that the weather is safe</strong>. We aren't going to guess; we are going to 'make sure' by checking the satellite data until the fact is 'settled' and we know for certain."},

{g:17,w:"Assertive",pos:"adjective",def:"Having or showing a confident and forceful personality.",
etym:[{m:"ASSERERE",s:"to claim/maintain"}],
origin:"Latin - 'to join or claim to oneself.' An assertive person 'claims' their own space and their own ideas without waiting for permission.",
hook:"Instead of waiting for the waiter to notice her, she walked <strong><span class='hook-keyword'>assertive</span>ly to the host</strong> and said, 'I need a table for four, and I need it now.' She 'claimed' her place in the room with confidence and force."},

{g:17,w:"Bogus",pos:"adjective",def:"Not genuine or true; fake.",
etym:[{m:"BOGUS",s:"unknown origin"}],
origin:"Likely 18th-century American slang for a machine that made counterfeit coins. A bogus thing is something that 'came out of the fake-coin machine'.",
hook:"The <strong>'antique' diamond ring turned out to be <span class='hook-keyword'>bogus</span></strong>. It wasn't a diamond at all; it was just a piece of 'fake' glass from a factory. The whole story about it belonging to a queen was just a 'counterfeit' lie."},

{g:17,w:"Cataclysmic",pos:"adjective",def:"Relating to or denoting a violent natural event.",
etym:[{m:"KATA-",s:"down"},{m:"KLYZEIN",s:"to wash"}],
origin:"Greek kataklysmos - 'a washing down' or 'a flood.' It describes an event so violent that it feels like the whole world is being 'washed away' into ruin.",
hook:"The <strong>asteroid impact was a <span class='hook-keyword'>cataclysmic</span> event</strong>. It didn't just make a hole; it 'washed down' the entire dinosaur era, causing fires and tsunamis that changed the history of the Earth forever. It was total destruction."},

{g:17,w:"Circumscribe",pos:"verb",def:"Restrict (something) within limits.",
etym:[{m:"CIRCUM-",s:"around"},{m:"SCRIBERE",s:"to write"}],
origin:"Latin circumscribere - 'to draw a circle around.' To circumscribe something is to 'write a circle' that it can't ever step outside of.",
hook:"The <strong>terms of the law <span class='hook-keyword'>circumscribe</span> what the president can do</strong>. He isn't all-powerful; the lawyers have 'written a circle' of rules around him, and if he tries to step outside that circle, he will be stopped immediately."},

{g:17,w:"Complementary",pos:"adjective",def:"Combining in such a way as to enhance or emphasize the qualities of each other.",
etym:[{m:"COMPLERE",s:"to fill up"}],
origin:"Latin complementum - 'that which fills up.' Two complementary things 'fill up' each other's empty spots until they become a perfect 'whole'.",
hook:"The <strong>peanut butter and jelly were perfectly <span class='hook-keyword'>complementary</span></strong>. The saltiness 'filled up' the sweetness, and the creaminess balanced the fruit. Together, they 'completed' the sandwich in a way neither could do alone."},

{g:17,w:"Contentious",pos:"adjective",def:"Causing or likely to cause an argument; controversial.",
etym:[{m:"CONTENDERE",s:"to strive/argue"}],
origin:"Latin contentiosus - 'full of strife.' It describes a topic that is so 'argument-filled' that you can't even mention it without a fight starting.",
hook:"The <strong>issue of gun control is highly <span class='hook-keyword'>contentious</span></strong>. You can't bring it up at a dinner party without the whole room 'striving' and 'arguing' within five minutes. It is a topic 'full of strife' that splits people in two."},

{g:17,w:"Disingenuous",pos:"adjective",def:"Not candid or sincere, typically by pretending that one knows less than one really does.",
etym:[{m:"DIS-",s:"not"},{m:"INGENUUS",s:"noble/frank"}],
origin:"Latin dis- (not) + ingenuus (born honest). It describes someone who acts like they are 'innocently honest' when they are actually being 'shady'.",
hook:"The <strong>politician claimed they 'had no idea' about the scandal</strong>, even though they signed all the paperwork for it. They were being <span class='hook-keyword'>disingenuous</span>-pretending to be an 'innocent' person who didn't know the truth."},

{g:17,w:"Divulge",pos:"verb",def:"Make known (private or sensitive information).",
etym:[{m:"DI-",s:"widely"},{m:"VULGARE",s:"to publish"}],
origin:"Latin divulgare - 'to publish among the common people.' To divulge is to take a secret and 'publish it widely' until it’s no longer a secret.",
hook:"The <strong>detective refused to <span class='hook-keyword'>divulge</span> the name of his source</strong>. If he 'published it widely' to the reporters, the source would be in danger. He had to keep the information locked away from the 'common people' to be safe."},

{g:17,w:"Dogmatic",pos:"adjective",def:"Inclined to lay down principles as incontrovertibly true.",
etym:[{m:"DOGMA",s:"opinion/belief"}],
origin:"Greek dogmatikos - 'pertaining to a belief.' A dogmatic person treats their own 'opinion' like a law of the universe that no one is allowed to question.",
hook:"The <strong>professor was so <span class='hook-keyword'>dogmatic</span> that he failed any student</strong> who disagreed with his theories. He didn't want a debate; he wanted everyone to accept his 'belief' as the absolute, unquestionable truth of the world."},

{g:17,w:"Fallacious",pos:"adjective",def:"Based on a mistaken belief; based on a fallacy.",
etym:[{m:"FALLERE",s:"to deceive"}],
origin:"Latin fallax - 'deceitful.' A fallacious argument 'deceives' you by looking like a fact when it is actually just a 'mistaken' lie.",
hook:"The <strong>idea that lightning never strikes twice in the same place</strong> is completely <span class='hook-keyword'>fallacious</span>. It’s a 'deceptive' belief that people repeat, even though scientific facts prove that skyscrapers are struck hundreds of times a year."},

{g:17,w:"Foolhardy",pos:"adjective",def:"Recklessly bold or rash.",
etym:[{m:"FOL",s:"fool"},{m:"HARDI",s:"bold/daring"}],
origin:"Old French folhardi - 'foolishly daring.' It describes the kind of 'boldness' that comes from not being smart enough to see the danger.",
hook:"It would be <strong><span class='hook-keyword'>foolhardy</span> to go sailing in a hurricane</strong>. You aren't being 'bold' or 'brave'; you are being a 'fool' who is 'daring' to fight a storm that will surely destroy you and your boat."},

{g:17,w:"Hinder",pos:"verb",def:"Create difficulties for someone, resulting in delay or obstruction.",
etym:[{m:"HINDRAN",s:"to keep back"}],
origin:"Old English - 'to keep back' or 'to push to the back.' To hinder is to 'keep' a person from moving forward by putting 'difficulty' in their path.",
hook:"The <strong>heavy snow began to <span class='hook-keyword'>hinder</span> the rescue team's progress</strong>. Every foot of snow 'kept them back,' making it impossible for them to reach the lost hiker before the sun went down. It was a cold, white 'obstruction'."},

{g:17,w:"Impair",pos:"verb",def:"Weaken or damage something.",
etym:[{m:"IN-",s:"into/worse"},{m:"PEIOR",s:"worse"}],
origin:"Old French empeirer - 'to make worse.' To impair is to 'push something into a worse state' so that it no longer works the way it should.",
hook:"Drinking <strong>too much coffee might <span class='hook-keyword'>impair</span> your ability to sleep</strong>. It 'makes your rest worse' by keeping your brain awake when it should be shut down. Your 'sleep machine' is damaged for the night."},

{g:17,w:"Impugn",pos:"verb",def:"Dispute the truth, validity, or honesty of (a statement or motive).",
etym:[{m:"IN-",s:"against"},{m:"PUGNARE",s:"to fight"}],
origin:"Latin impugnare - 'to fight against.' To impugn someone is to 'fight' their reputation by calling them a liar in public.",
hook:"The <strong>lawyer tried to <span class='hook-keyword'>impugn</span> the witness's honesty</strong>. He didn't just ask questions; he 'fought against' her character by showing the jury that she had lied five times in the past. He wanted everyone to doubt her soul."},

{g:17,w:"Incessant",pos:"adjective",def:"(Of something regarded as unpleasant) continuing without pause or interruption.",
etym:[{m:"IN-",s:"not"},{m:"CESSARE",s:"to cease/stop"}],
origin:"Latin incessant- - 'not stopping.' It describes a sound or an action that has 'no cease' and just grinds on your nerves forever.",
hook:"The <strong><span class='hook-keyword'>incessant</span> dripping of the kitchen faucet</strong> kept me awake all night. It didn't 'cease' for even a single second; it was just a 'not-stopping' rhythm of 'drip, drip, drip' that drove me crazy."},

{g:17,w:"Inclined",pos:"adjective",def:"Having a tendency to do something; leaning toward a particular opinion.",
etym:[{m:"IN-",s:"into/upon"},{m:"CLINARE",s:"to lean"}],
origin:"Latin inclinare - 'to lean toward.' It’s the mental act of 'leaning' toward a 'yes' or a 'no' before you have even made your final choice.",
hook:"After <strong>reading three bad reviews of the movie</strong>, I was <span class='hook-keyword'>inclined</span> to stay home. My mind was already 'leaning' away from the theater; the facts had pushed me 'into a lean' against going."},

{g:17,w:"Inveterate",pos:"adjective",def:"Having a particular habit that is long-established and unlikely to change.",
etym:[{m:"IN-",s:"into"},{m:"VETUS",s:"old"}],
origin:"Latin inveteratus - 'made old.' It describes a habit that has been 'made old' by decades of practice, until it’s 'grown into' your very soul.",
hook:"He was an <strong><span class='hook-keyword'>inveterate</span> gambler</strong>. He had been 'into the old' habit for fifty years, and even when he lost his house, he couldn't stop. The need to bet was 'grown into' him like an ancient tree root."},

{g:17,w:"Miserly",pos:"adjective",def:"Characteristic of a miser; ungenerous.",
etym:[{m:"MISER",s:"wretched"}],
origin:"Latin - 'wretched.' Originally described someone who was 'wretchedly poor,' but evolved to describe someone who is 'wretchedly stingy' despite being rich.",
hook:"The <strong>billionaire was so <span class='hook-keyword'>miserly</span> that he refused to buy new shoes</strong>, even when his old ones had holes. He lived a 'wretched' life in a cold house just to save a few pennies. He was 'richly' stingy and 'wretchedly' mean."},

{g:17,w:"Patent",pos:"adjective",def:"Easily recognizable; obvious.",
etym:[{m:"PATERE",s:"to lie open"}],
origin:"Latin patent- - 'lying open.' A patent lie is one that 'lies open' for everyone to see; it doesn't even try to hide the fact that it’s a lie.",
hook:"His <strong>claim that he had 'never seen a cookie before'</strong> while his face was covered in chocolate was a <span class='hook-keyword'>patent</span> lie. The truth 'lay open' on his cheeks for everyone to see; the lie was so 'obvious' it was ridiculous."},

{g:17,w:"Petulant",pos:"adjective",def:"(Of a person) childishly sulky or bad-tempered.",
etym:[{m:"PETERE",s:"to aim for/seek"}],
origin:"Latin petulant- - 'forward' or 'impudent.' It describes someone who is 'seeking' a fight or 'aiming' to be unhappy just because they didn't get their way.",
hook:"When his <strong>favorite toy was taken away for ten minutes</strong>, the child became <span class='hook-keyword'>petulant</span>. He didn't just cry; he 'sought' to be difficult by pouting, refusing to eat, and glaring at his mother like a 'bad-tempered' king."},

{g:17,w:"Pithy",pos:"adjective",def:"(Of language) concise and forcefully expressive.",
etym:[{m:"PITH",s:"essential part"}],
origin:"Old English pitha - 'the central core of a plant.' A pithy remark contains only the 'essential part' of the idea, with no 'fluff' around it.",
hook:"The <strong>general's speech was <span class='hook-keyword'>pithy</span></strong>: 'We fight, or we die.' He didn't use 1,000 words; he only used the 'essential core' of the situation to 'forcefully express' the reality of the war. Short, sharp, and true."},

{g:17,w:"Pliant",pos:"adjective",def:"Easily influenced; flexible.",
etym:[{m:"PLIER",s:"to bend"}],
origin:"Old French - 'to bend.' A pliant person is one who 'bends' their opinion to match whoever is speaking to them at the moment.",
hook:"The <strong>young assistant was so <span class='hook-keyword'>pliant</span> that he agreed with everything</strong> the boss said. If the boss said 'the sky is green,' the assistant would 'bend' his eyes until he believed it. He was 'flexibly' weak and easily led."},

{g:17,w:"Sanctimonious",pos:"adjective",def:"Making a show of being morally superior to other people.",
etym:[{m:"SANCTIMONIA",s:"holiness"}],
origin:"Latin sanctimonia - 'holiness.' It evolved to describe people who use 'holiness' as a weapon to look down on others.",
hook:"A coworker sees you eating a burger and spends twenty minutes <strong>lecturing you on the 'pure' lifestyle</strong> of their juice cleanse. They aren't trying to help; they are just enjoying the 'holier-than-thou' feeling of being better than you. That attitude is <span class='hook-keyword'>sanctimonious</span>."},

{g:17,w:"Sound",pos:"adjective",def:"Based on reason, sense, or judgment.",
etym:[{m:"SUND",s:"healthy"}],
origin:"Old English - 'healthy.' A sound argument is one that is 'mentally healthy'-it has no 'sickness' of logic and is built on a strong 'foundation'.",
hook:"Investing <strong>your savings in a boring index fund</strong> is a <span class='hook-keyword'>sound</span> financial plan. It isn't exciting, but it’s 'healthy' logic that will grow your money slowly and safely. It’s a decision built on a 'strong foundation' of facts."},

{g:17,w:"Tarnish",pos:"verb",def:"Lose or cause to lose luster; damage (a reputation).",
etym:[{m:"TERNIR",s:"to make dim"}],
origin:"Old French ternir - 'to make dim' or 'to darken.' To tarnish a reputation is to 'darken' the 'shining' opinion people have of you.",
hook:"The <strong>scandal will forever <span class='hook-keyword'>tarnish</span> his career</strong>. He used to be a 'shining' star, but the lies he told have 'made him dim' in the eyes of the public. The 'bright' trust he spent years building is now dark and damaged."},

{g:17,w:"Tepid",pos:"adjective",def:"(Especially of a liquid) only slightly warm; showing little enthusiasm.",
etym:[{m:"TEPERE",s:"to be warm"}],
origin:"Latin tepidus - 'lukewarm.' It describes a state that is 'neither hot nor cold'-the absolute middle-ground of boredom.",
hook:"The <strong>audience gave the boring speaker a <span class='hook-keyword'>tepid</span> round of applause</strong>. It wasn't 'hot' with joy and it wasn't 'cold' with anger; it was just 'lukewarm' and 'unenthusiastic.' They clapped only because they felt they had to."},

{g:17,w:"Upbraid",pos:"verb",def:"Find fault with someone; scold.",
etym:[{m:"UP-",s:"up"},{m:"BREGDAN",s:"to pull/braid"}],
origin:"Old English upbregdan - 'to pull up.' To upbraid is to 'pull someone up' on their mistakes and 'braid' them with a harsh scolding.",
hook:"The <strong>coach proceeded to <span class='hook-keyword'>upbraid</span> the players</strong> for their lazy performance. He 'pulled them up' on every missed tackle and 'scolded' them until they were ashamed. He was 'finding fault' at the top of his lungs."},
