function updateThemeIcon() {
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.innerHTML = theme === 'dark' ? ICONS.moon : ICONS.sun;
}

function shuffleArray(array) {
  const newArr = [...array];
  for (let i = newArr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

function toggleFlashcardMode() {
  stopPracticeTimer();
  flashcardMode = !flashcardMode;
  practiceMode = false; // Disable practice mode when enabling flashcards
  isFlipped = false;
  
  document.getElementById('practice-toggle').classList.remove('active');
  
  const btn = document.getElementById('mode-toggle');
  const text = document.getElementById('mode-text');
  const icon = document.getElementById('mode-icon');
  if (flashcardMode) {
    btn.classList.add('active');
    text.textContent = 'Immersive Mode';
    icon.innerHTML = ICONS.immersive;
  } else {
    btn.classList.remove('active');
    text.textContent = 'Flashcard Mode';
    icon.innerHTML = ICONS.flashcard;
  }
  renderCard();
}

function togglePracticeMode() {
  practiceMode = !practiceMode;
  flashcardMode = false; // Disable flashcards when enabling practice
  hintRevealed = false;
  
  document.getElementById('mode-toggle').classList.remove('active');
  document.getElementById('mode-text').textContent = 'Flashcard Mode';
  document.getElementById('mode-icon').innerHTML = ICONS.flashcard;
  
  const btn = document.getElementById('practice-toggle');
  if (practiceMode) {
    btn.classList.add('active');
    practiceWords = shuffleArray(filteredWords);
    if (practiceWords.length > 0) {
      currentIdx = WORDS.indexOf(practiceWords[0]);
    }
  } else {
    btn.classList.remove('active');
  }
  
  if (practiceMode) {
    showPractice();
  } else {
    showCard();
  }
}

function saveState() {
  localStorage.setItem('grep-mastered', JSON.stringify([...mastered]));
  localStorage.setItem('grep-hitlist', JSON.stringify([...hitlist]));
}

function speakWord(word) {
  if (!('speechSynthesis' in window)) {
    showToast('Speech synthesis not supported', false);
    return;
  }

  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(word);

  // Natural sounding settings
  utterance.rate = 0.85; 
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  const voices = window.speechSynthesis.getVoices();

  // Priority list for "natural" sounding voices across platforms
  const preferredVoice = voices.find(v => v.name.includes('Natural') || v.name.includes('Neural')) ||
                        voices.find(v => v.name.includes('Google US English')) ||
                        voices.find(v => v.name.includes('Microsoft Aria') || v.name.includes('Microsoft Jenny')) ||
                        voices.find(v => v.name.includes('Samantha') || v.name.includes('Alex')) ||
                        voices.find(v => v.lang.startsWith('en-US')) ||
                        voices.find(v => v.lang.startsWith('en'));

  if (preferredVoice) utterance.voice = preferredVoice;

  window.speechSynthesis.speak(utterance);
}

// Ensure voices are loaded (required for some browsers)
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();// ─── INIT ───
let practiceTimerActive = false;
let practiceTimer = null;
let timeLeft = 30;

function startPracticeTimer() {
  stopPracticeTimer();
  if (!practiceTimerActive) return;
  
  timeLeft = 30;
  updateTimerUI();
  
  practiceTimer = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    
    if (timeLeft <= 0) {
      handlePracticeTimeout();
    }
  }, 1000);
}

function stopPracticeTimer() {
  if (practiceTimer) {
    clearInterval(practiceTimer);
    practiceTimer = null;
  }
}

function updateTimerUI() {
  const display = document.getElementById('timer-display');
  if (!display) return;
  
  display.textContent = `Time left: ${timeLeft}s`;
  if (timeLeft <= 10) {
    display.classList.add('warning');
  } else {
    display.classList.remove('warning');
  }
}

function togglePracticeTimer() {
  practiceTimerActive = !practiceTimerActive;
  const btn = document.getElementById('timer-toggle-btn');
  if (btn) {
    if (practiceTimerActive) {
      btn.classList.add('active');
      btn.textContent = 'Timer: ON';
      startPracticeTimer();
    } else {
      btn.classList.remove('active');
      btn.textContent = 'Timer: OFF';
      stopPracticeTimer();
      const display = document.getElementById('timer-display');
      if (display) display.textContent = '';
    }
  }
}

function handlePracticeTimeout() {
  stopPracticeTimer();
  const feedback = document.getElementById('practice-feedback');
  const input = document.getElementById('practice-input');
  const w = WORDS[currentIdx];
  
  if (feedback) {
    feedback.innerHTML = `<span style="display:flex; align-items:center; gap:8px;">${ICONS.error} Time's up! Added to Hitlist.</span>`;
    feedback.className = "practice-feedback wrong";
  }
  
  if (input) {
    input.value = w.w; // Show the answer
    input.disabled = true;
    input.style.borderBottomColor = "#e74c3c";
  }
  
  // Add to hitlist
  if (!hitlist.has(currentIdx)) {
    hitlist.add(currentIdx);
    mastered.delete(currentIdx);
    updateProgress();
    saveState();
  }
  
  setTimeout(() => {
    if (practiceMode) navigate(1);
  }, 2000);
}

function init() {
  updateThemeIcon();
  buildGroupTabs();
  buildSidebar();
  updateProgress();
  
  // Global Keyboard Shortcuts
  document.addEventListener('keydown', (e) => {
    // Ignore if user is typing in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.key === 'ArrowLeft') {
      navigate(-1);
    } else if (e.key === 'ArrowRight') {
      navigate(1);
    } else if (e.key === 'ArrowUp' && flashcardMode) {
      if (!isFlipped) {
        e.preventDefault();
        flipCard();
      }
    } else if (e.key === 'ArrowDown' && flashcardMode) {
      if (isFlipped) {
        e.preventDefault();
        flipCard();
      }
    } else if ((e.key === 'm' || e.key === 'M') && flashcardMode) {
      toggleMastered();
    } else if ((e.key === 'h' || e.key === 'H') && flashcardMode) {
      toggleHitlist();
    } else if (e.key === ' ' && flashcardMode) {
      e.preventDefault(); // Prevent scrolling
      flipCard();
    } else if (e.key === 'v' || e.key === 'V' || e.key === 'a' || e.key === 'A') {
      const w = filteredWords[currentIdx];
      if (w) speakWord(w.w);
    }
  });
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  if (sidebar && backdrop) {
    sidebar.classList.toggle('open');
    backdrop.classList.toggle('active');
  }
}

function buildGroupTabs() {
  const topContainer = document.getElementById('top-controls');
  const scrollContainer = document.getElementById('group-tabs');
  
  const uniqueGroups = [...new Set(WORDS.map(w => w.g))].sort((a, b) => a - b);
  
  // Top Fixed Controls
  const topGroups = ['all', 'hitlist', 'synonyms'];
  topContainer.innerHTML = topGroups.map(g => {
    let label = g === 'all' ? 'All' : (g === 'hitlist' ? 'Hitlist' : 'Synonyms');
    let activeClass = g === activeGroup ? (g === 'hitlist' ? ' hit-active' : ' active') : '';
    return `<button class="gtab${activeClass}" onclick='setGroup(${JSON.stringify(g)})'>${label}</button>`;
  }).join('');

  // Scrollable Group List
  scrollContainer.innerHTML = uniqueGroups.map(g => {
    let activeClass = g === activeGroup ? ' active' : '';
    return `<button class="gtab${activeClass}" onclick='setGroup(${g})'>G${g}</button>`;
  }).join('');
}

function setGroup(g) {
  activeGroup = g;
  buildGroupTabs();
  filterWords();
  
  if (g === 'synonyms' && !searchTerm) {
    showSynonymClusters();
    return;
  }
  
  if (practiceMode) {
    practiceWords = shuffleArray(filteredWords);
    if (practiceWords.length > 0) {
      currentIdx = WORDS.indexOf(practiceWords[0]);
      showPractice();
    }
  } else {
    showCard();
  }
}

function showSynonymClusters() {
  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('practice-view').style.display = 'none';
  document.getElementById('card-view').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'none';
  
  let html = `<div class="synonym-cluster-view" style="max-width:800px; margin:0 auto; padding:40px 20px;">
    <div class="word-hero" style="text-align:center; margin-bottom:60px;">
      <div class="word-group-tag" style="justify-content:center;">Synonym Clusters</div>
      <div class="word-main">Meaning → Words</div>
      <div style="color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase;">Master words by shared concept</div>
    </div>
    
    <div class="synonym-accordion">`;
    
  SYNONYM_CLUSTERS.forEach((cluster, idx) => {
    const clusterWords = WORDS.filter(w => cluster.words.includes(w.w));
    if (clusterWords.length > 0) {
      const firstDef = clusterWords[0].def;
      const imgPath = `Images/${cluster.img}`;
      
      html += `
        <div class="accordion-item" id="cluster-${idx}">
          <div class="accordion-header" onclick="toggleAccordion(${idx})">
            <span class="accordion-title">${cluster.name}</span>
            <span class="accordion-icon">${ICONS.chevronDown}</span>
          </div>
          <div class="accordion-content">
            <div class="cluster-image-wrap">
              <img src="${imgPath}" class="cluster-image" alt="${cluster.name}" onerror="this.style.display='none'">
            </div>
            <div class="cluster-details">
              <div class="cluster-meaning-label">Core Meaning</div>
              <div class="cluster-meaning-body">${firstDef}</div>
              
              <div class="cluster-meaning-label">Synonym Words</div>
              <div class="cluster-word-list">
                ${clusterWords.map(w => `
                  <div class="cluster-word-tag" onclick="event.stopPropagation(); goToWord(${WORDS.indexOf(w)})">
                    ${w.w}
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }
  });
  
  html += `</div></div>`;
  document.getElementById('card-view').innerHTML = html;
  buildSidebar();
}

function toggleAccordion(index) {
  const items = document.querySelectorAll('.accordion-item');
  const target = document.getElementById(`cluster-${index}`);
  const isActive = target.classList.contains('active');

  // Close all others
  items.forEach(item => item.classList.remove('active'));

  // Toggle target
  if (!isActive) {
    target.classList.add('active');
    // Smooth scroll into view after animation starts
    setTimeout(() => {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }
}
function filterWords() {
  searchTerm = document.getElementById('sidebar-search').value.toLowerCase();
  filteredWords = WORDS.filter(w => {
    let groupMatch;
    if (activeGroup === 'all') groupMatch = true;
    else if (activeGroup === 'hitlist') groupMatch = hitlist.has(WORDS.indexOf(w));
    else if (activeGroup === 'synonyms') {
      // For synonyms tab, we want to show words that are in at least one cluster
      groupMatch = SYNONYM_CLUSTERS.some(c => c.words.includes(w.w));
    }
    else groupMatch = w.g === activeGroup;
    
    const searchMatch = !searchTerm || w.w.toLowerCase().includes(searchTerm);
    return groupMatch && searchMatch;
  });
  buildSidebar();
}

function buildSidebar() {
  const list = document.getElementById('word-list');
  
  if (activeGroup === 'synonyms' && !searchTerm) {
    let html = '';
    SYNONYM_CLUSTERS.forEach(cluster => {
      const clusterWords = WORDS.filter(w => cluster.words.includes(w.w));
      if (clusterWords.length > 0) {
        html += `<div class="cluster-header">${cluster.name}</div>`;
        clusterWords.forEach(w => {
          const globalIdx = WORDS.indexOf(w);
          html += renderWordItem(w, globalIdx);
        });
      }
    });
    list.innerHTML = html;
  } else {
    list.innerHTML = filteredWords.map((w, i) => {
      const globalIdx = WORDS.indexOf(w);
      return renderWordItem(w, globalIdx);
    }).join('');
  }
}

function renderWordItem(w, globalIdx) {
  const isCurrent = globalIdx === currentIdx;
  const isMastered = mastered.has(globalIdx);
  const inHitlist = hitlist.has(globalIdx);
  return `<div class="word-item${isCurrent ? ' active' : ''}${isMastered ? ' mastered' : ''}${inHitlist ? ' in-hitlist' : ''}" onclick="goToWord(${globalIdx})">
    <span class="wi-name">${w.w}</span>
    <div style="display:flex; gap:4px; align-items:center;">
      ${inHitlist ? '<span style="color:#e74c3c; font-size:10px;">★</span>' : ''}
      <span class="wi-dot"></span>
    </div>
  </div>`;
}

function goToWord(idx) {
  currentIdx = idx;
  if (practiceMode) {
    showPractice();
  } else {
    showCard();
  }
  buildSidebar();
}

function updateProgress() {
  const pct = Math.round(mastered.size / WORDS.length * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('mastered-count').textContent = mastered.size;
  document.getElementById('total-count').textContent = WORDS.length;
  saveState();
}

// ─── CARD RENDER ───
function showCard() {
  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('practice-view').style.display = 'none';
  document.getElementById('card-view').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  
  if (practiceMode) {
    showPractice();
  } else {
    isFlipped = false;
    renderCard();
  }
}

function navigate(dir) {
  stopPracticeTimer();
  const listToUse = (practiceMode && practiceWords.length > 0) ? practiceWords : filteredWords;
  const currentInList = listToUse.findIndex(w => w === WORDS[currentIdx]);
  
  if (currentInList !== -1) {
    const nextInList = currentInList + dir;
    if (nextInList >= 0 && nextInList < listToUse.length) {
      currentIdx = WORDS.indexOf(listToUse[nextInList]);
      if (practiceMode) showPractice(); else showCard();
    }
  } else if (listToUse.length > 0) {
    currentIdx = WORDS.indexOf(listToUse[0]);
    if (practiceMode) showPractice(); else showCard();
  }
}

function showPractice() {
  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('card-view').style.display = 'none';
  document.getElementById('practice-view').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  hintRevealed = false;
  renderPractice();
}

function renderPractice() {
  stopPracticeTimer();
  const w = WORDS[currentIdx];
  const listToUse = practiceWords.length > 0 ? practiceWords : filteredWords;
  const currentInList = listToUse.findIndex(f => f === w);
  const totalInList = listToUse.length;

  // Bottom nav
  document.getElementById('bottom-word-name').textContent = "PRACTICE MODE";
  document.getElementById('bottom-group').textContent = `GROUP ${w.g} · ${w.pos}`;
  document.getElementById('prev-btn').disabled = currentInList <= 0;
  document.getElementById('next-btn').innerHTML = currentInList < totalInList - 1 ? `Next ${ICONS.arrowRight}` : `Done ${ICONS.confirm}`;
  document.getElementById('next-btn').disabled = currentInList >= totalInList - 1;

  const hintContent = hintRevealed ? `<span class="hint-reveal">${w.w.substring(0, 2)}...</span>` : ICONS.hint;

  document.getElementById('practice-view').innerHTML = `
    <div class="practice-container">
      <div class="card-nav">
        <div class="card-nav-left">
          <button class="nav-btn" onclick="navigate(-1)">${ICONS.arrowLeft}</button>
          <span class="card-counter">${currentInList + 1} / ${totalInList}</span>
          <button class="nav-btn" onclick="navigate(1)">${ICONS.arrowRight}</button>
        </div>
        <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--gold); letter-spacing:1px; text-transform:uppercase;">Practice Mode</div>
      </div>

      <div class="timer-wrap">
        <div id="timer-display" class="timer-display">${practiceTimerActive ? `Time left: ${timeLeft}s` : ''}</div>
        <button id="timer-toggle-btn" class="toggle-btn ${practiceTimerActive ? 'active' : ''}" onclick="togglePracticeTimer()">
          Timer: ${practiceTimerActive ? 'ON' : 'OFF'}
        </button>
      </div>

      <div class="practice-def-label">Definition</div>
      <div class="practice-def">${w.def}</div>

      <div class="practice-input-wrap">
        <input type="text" class="practice-input" id="practice-input" placeholder="Type the word..." autocomplete="off" onkeyup="if(event.key==='Enter') checkPracticeAnswer()">
        <button class="hint-trigger" onclick="showPracticeHint()" title="Reveal Hint">
          ${hintContent}
        </button>
      </div>

      <div id="practice-feedback" class="practice-feedback"></div>
    </div>
  `;

  setTimeout(() => {
    const input = document.getElementById('practice-input');
    if(input) input.focus();
    if(practiceTimerActive) startPracticeTimer();
  }, 100);
}
function showPracticeHint() {
  hintRevealed = true;
  renderPractice();
}

function checkPracticeAnswer() {
  const input = document.getElementById('practice-input');
  const feedback = document.getElementById('practice-feedback');
  if(!input || !feedback) return;

  const userVal = input.value.trim().toLowerCase();
  const correctVal = WORDS[currentIdx].w.toLowerCase();
  
  if (userVal === correctVal) {
    stopPracticeTimer();
    feedback.innerHTML = `<span style="display:flex; align-items:center; gap:8px;">${ICONS.confirm} Correct! Well done.</span>`;
    feedback.className = "practice-feedback correct";
    input.style.borderBottomColor = "var(--teal)";
    
    if (!mastered.has(currentIdx)) {
      mastered.add(currentIdx);
      updateProgress();
    }
    
    setTimeout(() => navigate(1), 1500);
  } else {
    feedback.innerHTML = `<span style="display:flex; align-items:center; gap:8px;">${ICONS.error} Not quite. Try again!</span>`;
    feedback.className = "practice-feedback wrong";
    input.style.borderBottomColor = "#e74c3c";
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 500);
  }
}

function flipCard() {
  if (!flashcardMode) return;
  isFlipped = !isFlipped;
  const container = document.querySelector('.flashcard-container');
  if (container) {
    if (isFlipped) container.classList.add('flipped');
    else container.classList.remove('flipped');
  }
}

function renderCard() {
  const w = WORDS[currentIdx];
  const isMastered = mastered.has(currentIdx);
  const inHitlist = hitlist.has(currentIdx);
  const ans = answered[currentIdx];

  // Filter context
  const currentInFiltered = filteredWords.findIndex(f => f === w);
  const totalFiltered = filteredWords.length;
  const isFirst = currentInFiltered <= 0;
  const isLast = currentInFiltered === -1 || currentInFiltered === totalFiltered - 1;

  // Bottom nav
  document.getElementById('bottom-word-name').textContent = w.w;
  document.getElementById('bottom-group').textContent = `GROUP ${w.g} · ${w.pos}`;
  document.getElementById('prev-btn').disabled = isFirst;
  document.getElementById('next-btn').textContent = !isLast ? 'Next →' : 'Done ✓';
  document.getElementById('next-btn').disabled = isLast;
  
  document.getElementById('new-sentence-btn').onclick = () => {
    if (window.sendPrompt) sendPrompt(`Give me a new sentence using the word "${w.w}" in a context I have not seen before`);
  };

  // Etymology rendering
  const etymHTML = w.etym.map((part, i) => {
    const isPlus = i < w.etym.length - 1;
    return `<div class="etym-part">
      <div class="etym-morph">${part.m}</div>
      <div class="etym-meaning">${part.s}</div>
    </div>${isPlus ? '<span class="etym-plus">+</span>' : ''}`;
  }).join('');

  // Quiz
  const quiz = getQuiz(w);
  const quizHTML = quiz ? renderQuiz(w, quiz, ans) : '';

    document.getElementById('card-view').innerHTML = `
      <div class="card-view">
        <div class="card-nav">
          <div class="card-nav-left">
            <button class="nav-btn" onclick="navigate(-1)" ${isFirst ? 'disabled' : ''}>←</button>
            <span class="card-counter">${currentInFiltered + 1} / ${totalFiltered}</span>
            <button class="nav-btn" onclick="navigate(1)" ${isLast ? 'disabled' : ''}>→</button>
          </div>
          <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--gold); letter-spacing:1px; text-transform:uppercase;">Flashcard Mode</div>
        </div>

        <div class="flashcard-container ${isFlipped ? 'flipped' : ''}" onclick="flipCard()">
          <div class="flashcard-inner">
            <div class="flashcard-front">
              <div class="flashcard-word">${w.w}</div>
              <button class="nav-btn" onclick="event.stopPropagation(); speakWord('${w.w}')" style="margin-top:12px; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; background:var(--gold-dim); border:1px solid var(--gold); color:var(--gold);">
                ${ICONS.audio}
              </button>
              <div class="flashcard-hint">Click to flip</div>
            </div>
            <div class="flashcard-back">
              <div class="word-group-tag" style="margin-bottom:12px">GROUP ${w.g} · ${w.pos}</div>
              
              <div class="definition-text" style="font-size:20px; margin-bottom:24px;">${w.def}</div>
              
              <div class="section-label" style="margin-top:0"><span class="section-title">Etymology</span></div>
              <div class="etym-breakdown" style="margin-bottom:8px">${etymHTML}</div>
              
              <div class="section-label"><span class="section-title">Memory Hook</span></div>
              <div class="hook-scene" style="font-size:14px; line-height:1.5">${w.hook}</div>

              ${quizHTML ? `<div style="margin-top:20px; width:100%">${quizHTML}</div>` : ''}
              
              <div class="flashcard-hint" style="align-self:center; margin-top:auto; padding-top:20px;">Click to flip back</div>
            </div>
          </div>
        </div>

        <div class="flashcard-actions-fixed">
          <button class="action-btn${inHitlist ? ' hit' : ''}" onclick="event.stopPropagation(); toggleHitlist()">
            ${inHitlist ? '★ In Hitlist' : 'Add to Hitlist'}
          </button>
          <button class="action-btn${isMastered ? ' master' : ''}" onclick="event.stopPropagation(); toggleMastered()">
            ${isMastered ? '✓ Mastered' : 'Mark Mastered'}
          </button>
        </div>
      </div>
    `;
  } else {
    document.getElementById('card-view').innerHTML = `
      <div class="card-view">
        <div class="card-nav">
          <div class="card-nav-left">
            <button class="nav-btn" onclick="navigate(-1)" ${isFirst ? 'disabled' : ''}>←</button>
            <span class="card-counter">${currentInFiltered + 1} / ${totalFiltered}</span>
            <button class="nav-btn" onclick="navigate(1)" ${isLast ? 'disabled' : ''}>→</button>
          </div>
          <div class="card-actions">
            <button class="action-btn${inHitlist ? ' hit' : ''}" onclick="toggleHitlist()">
              ${inHitlist ? '★ In Hitlist' : 'Add to Hitlist'}
            </button>
            <button class="action-btn${isMastered ? ' master' : ''}" onclick="toggleMastered()">
              ${isMastered ? '✓ Mastered' : 'Mark Mastered'}
            </button>
          </div>
        </div>

        <div class="word-hero">
          <div class="word-group-tag">GROUP ${w.g}</div>
          <div class="word-main" style="display:flex; align-items:center; gap:16px;">
            ${w.w}

              ${ICONS.audio}
            </button>
          </div>
          <div class="word-pos-row">
            <span class="word-pos">${w.pos}</span>

        <div class="sections">
          <div class="section">
            <div class="section-label">
              <span class="section-num">01</span>
              <span class="section-title">Core Definition</span>
              <div class="section-bar"></div>
            </div>
            <div class="definition-text">${w.def}</div>
          </div>

          <div class="section">
            <div class="section-label">
              <span class="section-num">02</span>
              <span class="section-title">Etymology Breakdown</span>
              <div class="section-bar"></div>
            </div>
            <div class="etym-breakdown">${etymHTML}</div>
            <div class="etym-origin">${w.origin}</div>
          </div>

          <div class="section">
            <div class="section-label">
              <span class="section-num">03</span>
              <span class="section-title">Memory Hook - The Scene</span>
              <div class="section-bar"></div>
            </div>
            <div class="hook-card">
              <div class="hook-scene">${w.hook}</div>
            </div>
          </div>

          ${quizHTML}
        </div>
      </div>
    `;
  }

  buildSidebar();
  if (!flashcardMode) window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getQuiz(w) {
  const quizzes = {
    "Egregious": {q:"Which sentence uses 'egregious' correctly?", opts:["The egregious kindness of the nurse moved everyone","The egregious error cost the company millions and shocked the industry","The egregious sunset painted the sky orange","The egregious student studied carefully for the exam"], ans:1},
    "Sanguine": {q:"'Sanguine' most nearly means:", opts:["Bloodthirsty and violent","Optimistic and confidently positive","Deeply melancholic","Indifferent and detached"], ans:1},
    "Palpable": {q:"'The tension was palpable' means:", opts:["The tension was completely absent","The tension was mild and manageable","The tension was so intense it seemed physically tangible","The tension was imaginary"], ans:2},
    "Perfidy": {q:"Perfidy requires:", opts:["A prior relationship of trust that is then betrayed","Simple dishonesty between strangers","A legal contract that is breached","Any form of deception"], ans:0},
    "Laconic": {q:"A laconic response is:", opts:["Extremely long and detailed","Brief and to the point","Emotional and passionate","Formally structured"], ans:1},
    "Verisimilitude": {q:"Something with verisimilitude:", opts:["Is factually documented as true","Seems convincingly real even if invented","Has been proven false","Defies all logical explanation"], ans:1},
    "Vitiate": {q:"To vitiate a study means to:", opts:["Improve its methodology","Expand its sample size","Introduce a fundamental flaw that compromises its validity","Summarize its conclusions"], ans:2},
    "Sanction": {q:"'The board sanctioned the plan' most likely means:", opts:["The board penalized the plan","The board officially approved the plan","The board investigated the plan","The board ignored the plan"], ans:1},
    "Esoteric": {q:"Esoteric knowledge is:", opts:["Common knowledge anyone can access","Specialized knowledge for a small initiated group","Recently discovered but widely shared","Outdated and no longer relevant"], ans:1},
    "Stoic": {q:"A stoic reaction to devastating news would be:", opts:["Immediate emotional breakdown","Denial and anger","Calm acceptance without visible distress","Loud vocal grieving"], ans:2},
  };
  return quizzes[w.w] || null;
}

function renderQuiz(w, quiz, ans) {
  const isAnswered = ans !== undefined;
  const optHTML = quiz.opts.map((opt, i) => {
    let cls = 'qopt';
    if (isAnswered) {
      if (i === quiz.ans) cls += ' correct';
      else if (ans === i && i !== quiz.ans) cls += ' wrong';
    }
    return `<button class="${cls}" ${isAnswered ? 'disabled' : ''} onclick="answerQuiz(${i})">${opt}</button>`;
  }).join('');

  const fb = isAnswered
    ? (ans === quiz.ans ? '✓ Correct - this one is locked in.' : `✗ Correct answer: option ${quiz.ans + 1}.`)
    : 'Select the best answer.';

  return `
    <div class="quiz-section">
      <div class="section-label">
        <span class="section-num">04</span>
        <span class="section-title">Quick Check</span>
        <div class="section-bar"></div>
      </div>
      <div class="quiz-q" style="display:flex; align-items:center; gap:8px;">
        ${quiz.q}
        <button class="nav-btn" onclick="speakWord('${w.w}')" style="width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; background:var(--gold-dim); border:1px solid var(--gold); color:var(--gold); flex-shrink:0;">
          ${ICONS.audio}
        </button>
      </div>
      <div class="quiz-opts">${optHTML}</div>
      <div class="quiz-feedback${isAnswered ? (ans === quiz.ans ? ' ok' : ' bad') : ''}">${fb}</div>
    </div>
  `;
}

function answerQuiz(i) {
  const w = WORDS[currentIdx];
  const quiz = getQuiz(w);
  if (!quiz || answered[currentIdx] !== undefined) return;
  answered[currentIdx] = i;
  if (i === quiz.ans) {
    mastered.add(currentIdx);
    hitlist.delete(currentIdx); // Cannot be in both
    updateProgress();
    showToast('✓ Correct - marked as mastered', true);
  }
  renderCard();
  buildSidebar();
}

function toggleMastered() {
  if (mastered.has(currentIdx)) {
    mastered.delete(currentIdx);
    showToast('Removed from mastered');
  } else {
    mastered.add(currentIdx);
    hitlist.delete(currentIdx); // Cannot be in both
    showToast('✓ Added to mastered', true);
  }
  updateProgress();
  renderCard();
  filterWords(); // Refresh the list in case filters are active
}

function toggleHitlist() {
  if (hitlist.has(currentIdx)) {
    hitlist.delete(currentIdx);
    showToast('Removed from Hitlist');
  } else {
    hitlist.add(currentIdx);
    mastered.delete(currentIdx); // Cannot be in both
    showToast('★ Added to Hitlist', true);
  }
  updateProgress(); // Sync progress in case mastered was removed
  saveState();
  renderCard();
  filterWords(); // Refresh the list in case filters are active
}

// ─── INPUT SCREEN ───
function loadWordFromInput() {
  const val = document.getElementById('word-input').value.trim().toLowerCase();
  if (!val) return;
  
  const idx = WORDS.findIndex(w => w.w.toLowerCase() === val);
  if (idx !== -1) {
    currentIdx = idx;
    showCard();
    return;
  }

  // Word not found - show generating UI and call Claude
  const genText = document.getElementById('gen-text');
  genText.style.display = 'flex';
  generateWordCard(val);
}

function quickLoad(word) {
  document.getElementById('word-input').value = word;
  loadWordFromInput();
}

async function generateWordCard(word) {
  try {
    const systemPrompt = `You are a GRE vocabulary expert. Generate structured content for a GRE word. Return ONLY valid JSON, no markdown, no explanation.`;
    
    const userPrompt = `Generate GRE learning content for the word: "${word}"

Return this exact JSON structure:
{
  "w": "${word}",
  "pos": "noun/verb/adjective/adverb",
  "def": "GRE-level definition, concise and precise",
  "etym": [{"m": "PREFIX/ROOT", "s": "meaning"}, {"m": "ROOT", "s": "meaning"}],
  "origin": "Etymology explanation in 1-2 engaging sentences",
  "hook": "A vivid, bizarre, emotionally memorable mental image or story (2-4 sentences) that makes the meaning impossible to forget. Use <strong>bold</strong> for key images and <em>italics</em> for emphasis. Include a <span class='hook-keyword'>keyword</span> styled span for the target word.",
  "quiz": {
    "q": "A multiple choice question testing understanding",
    "opts": ["Option A", "Option B", "Option C", "Option D"],
    "ans": 0
  }
}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    const data = await response.json();
    let text = data.content.map(c => c.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    
    // Add group
    parsed.g = 0; // custom
    
    // Add to WORDS and navigate
    WORDS.push(parsed);
    currentIdx = WORDS.length - 1;
    document.getElementById('total-count').textContent = WORDS.length;
    showCard();
    buildSidebar();
    document.getElementById('gen-text').style.display = 'none';
    showToast(`✓ "${parsed.w}" loaded`, true);

  } catch(err) {
    document.getElementById('gen-text').style.display = 'none';
    showToast('Error generating card. Try a different word.');
    console.error(err);
  }
}

// ─── TOAST ───
function showToast(msg, success = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (success ? ' success' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// ─── RUN ───
init();
</script>
