<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREP - Master Every Word</title>
<link rel="icon" type="image/png" href="graduation-cap.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0908;
  --surface: #111010;
  --surface2: #181614;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-glow: rgba(201,168,76,0.35);
  --cream: #f5f0e8;
  --muted: rgba(245,240,232,0.45);
  --dim: rgba(245,240,232,0.25);
  --red: #c0392b;
  --teal: #1a7c6e;
  --teal-light: #5ecfbe;
  --purple: #7c5cbf;
  --purple-light: #b39ddb;
}

[data-theme="light"] {
  --bg: #faf7f2;
  --surface: #ffffff;
  --surface2: #f2ece4;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.12);
  --gold: #9a7b2c;
  --gold-dim: rgba(154,123,44,0.1);
  --gold-glow: rgba(154,123,44,0.25);
  --cream: #1a1918;
  --muted: rgba(26,25,24,0.65);
  --dim: rgba(26,25,24,0.4);
  --red: #a93226;
  --teal: #117a65;
  --teal-light: #117a65;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-color 0.3s ease, color 0.3s ease;
}

.sidebar, .main, .card-nav, .flashcard-front, .flashcard-back, .practice-container, .bottom-nav, .search-input, .gtab, .action-btn, .nav-btn {
  transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* ── LAYOUT ── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--gold);
  line-height: 1;
}

.logo img {
  width: 32px;
  height: 32px;
  object-fit: contain;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo span {
  display: block;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

.search-wrap {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px 9px 32px;
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  position: relative;
}

.search-input::placeholder { color: var(--dim); }
.search-input:focus { border-color: var(--gold); }

.search-icon {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dim);
  font-size: 13px;
  pointer-events: none;
}

.search-box { position: relative; }

/* ── SIDEBAR NAVIGATION REFACTOR ── */
.sidebar-nav-container {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  max-height: 40vh; /* Adjust based on preference */
}

.top-controls {
  padding: 12px 16px 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  z-index: 5;
}

.group-scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px 16px;
  position: relative;
}

.group-scroll-area::-webkit-scrollbar {
  width: 4px;
}

.group-scroll-area::-webkit-scrollbar-track {
  background: transparent;
}

.group-scroll-area::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 4px;
}

.group-scroll-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--dim);
  margin-bottom: 10px;
  margin-top: 4px;
}

.group-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: none; /* Removed from refactor */
  padding: 0;
}

.sidebar-nav-container {
  position: relative;
}

/* Subtle fade effect at the bottom of scroll area */
.sidebar-nav-container::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 20px;
  background: linear-gradient(to top, var(--surface), transparent);
  pointer-events: none;
  z-index: 2;
}

.gtab {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.gtab.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.gtab.hit-active {
  background: rgba(231, 76, 60, 0.15);
  border-color: #e74c3c;
  color: #e74c3c;
}

.action-btn.hit {
  background: rgba(231, 76, 60, 0.1);
  border-color: #e74c3c;
  color: #e74c3c;
}

.action-btn.hit:hover {
  background: rgba(231, 76, 60, 0.2);
}

.word-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.word-list::-webkit-scrollbar { width: 3px; }
.word-list::-webkit-scrollbar-track { background: transparent; }
.word-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.word-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  gap: 8px;
}

.word-item:hover { background: rgba(255,255,255,0.03); }

.word-item.active {
  background: var(--gold-dim);
  border-left-color: var(--gold);
}

.word-item.mastered .wi-name { color: #4ade80 !important; font-weight: 500; }
.word-item.mastered .wi-dot { background: #4ade80 !important; box-shadow: 0 0 8px rgba(74,222,128,0.4); }

.word-item.in-hitlist .wi-name { color: #ff4d4d !important; font-weight: 500; }
.word-item.in-hitlist .wi-dot { background: #ff4d4d !important; box-shadow: 0 0 8px rgba(255,77,77,0.4); }

.wi-name {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
  transition: all 0.2s;
}

.word-item.active .wi-name,
.word-item:hover .wi-name {
  color: var(--cream);
}

.wi-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
  transition: background 0.2s;
}

.word-item.active .wi-dot { background: var(--gold); }

.progress-bar-outer {
  height: 2px;
  background: var(--border);
  margin: 0 20px;
  border-radius: 1px;
  margin-bottom: 12px;
}

.progress-bar-inner {
  height: 2px;
  background: var(--gold);
  border-radius: 1px;
  transition: width 0.4s;
}

.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
}

.cluster-header {
  padding: 24px 20px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}

/* Synonym Accordion Styles */
.synonym-accordion {
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: fadeUp 0.4s ease-out;
}

.accordion-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.accordion-item:hover {
  border-color: var(--border2);
}

.accordion-item.active {
  border-color: var(--gold);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transform: translateY(-2px);
}

.accordion-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
  background: var(--surface2);
}

.accordion-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
}

.accordion-icon {
  transition: transform 0.3s ease;
  color: var(--dim);
}

.accordion-item.active .accordion-icon {
  transform: rotate(180deg);
  color: var(--gold);
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  background: var(--surface);
}

.accordion-item.active .accordion-content {
  max-height: 1200px;
}

.cluster-image-wrap {
  width: 100%;
  height: 320px;
  overflow: hidden;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
}

.cluster-image {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  opacity: 0.9;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.accordion-item.active .cluster-image {
  transform: scale(1.02);
  opacity: 1;
}

@media (max-width: 600px) {
  .cluster-image-wrap {
    height: 200px;
  }
}

.cluster-details {
  padding: 24px;
}

.cluster-meaning-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.cluster-meaning-body {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  line-height: 1.4;
  color: var(--cream);
  margin-bottom: 24px;
  font-style: italic;
}

.cluster-word-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.cluster-word-tag {
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold);
  padding: 6px 14px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.cluster-word-tag:hover {
  background: var(--gold);
  color: var(--bg);
  transform: translateY(-1px);
}

.progress-label span { color: var(--gold); }

/* ── MAIN ── */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: relative;
}

.main-inner {
  flex: 1;
  padding: 48px 56px;
  max-width: 900px;
}

/* ── WELCOME SCREEN ── */
.welcome {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 80vh;
}

.welcome-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}

.welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -2px;
  margin-bottom: 20px;
  color: var(--cream);
}

.welcome-title em {
  font-style: italic;
  color: var(--gold);
}

.welcome-body {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 480px;
  margin-bottom: 36px;
}

.welcome-stats {
  display: flex;
  gap: 32px;
  margin-bottom: 40px;
}

.stat {
  text-align: left;
}

.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  margin-top: 4px;
}

.welcome-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.2s;
}

.welcome-btn:hover {
  background: var(--cream);
  transform: translateY(-1px);
}

/* ── WORD CARD ── */
.card-view {
  animation: fadeUp 0.4s ease forwards;
}

/* ── FLASHCARD MODE ── */
.flashcard-container {
  perspective: 1200px;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  min-height: 400px;
  cursor: pointer;
}

.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
  min-height: 400px;
}

.flashcard-container.flipped .flashcard-inner {
  transform: rotateY(180deg);
}

.flashcard-front, .flashcard-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.flashcard-back {
  transform: rotateY(180deg);
  justify-content: flex-start;
  overflow-y: auto;
  text-align: left;
  align-items: flex-start;
}

.flashcard-word {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  font-weight: 900;
  color: var(--gold);
}

.flashcard-hint {
  margin-top: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.flashcard-actions-fixed {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
}

.mode-toggle-wrap {
  padding: 0 16px 16px;
  border-bottom: 1px solid var(--border);
}

.mode-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--muted);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.mode-btn:hover {
  background: var(--border2);
  color: var(--cream);
}

.mode-btn.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

/* ── PRACTICE MODE ── */
.practice-container {
  max-width: 650px;
  margin: 60px auto;
  padding: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  animation: fadeUp 0.4s ease forwards;
}

.practice-def-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.practice-def {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  line-height: 1.4;
  color: var(--cream);
  margin-bottom: 48px;
}

.practice-input-wrap {
  position: relative;
  width: 100%;
}

.practice-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border2);
  padding: 12px 48px 12px 0;
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: var(--gold);
  outline: none;
  transition: border-color 0.3s;
}

.practice-input:focus {
  border-bottom-color: var(--gold);
}

.hint-trigger {
  position: absolute;
  right: 0;
  bottom: 12px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 20px;
  opacity: 0.5;
  transition: opacity 0.2s;
  padding: 8px;
}

.hint-trigger:hover {
  opacity: 1;
}

.practice-feedback {
  margin-top: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  min-height: 20px;
}

.practice-feedback.correct { color: var(--teal-light); }
.practice-feedback.wrong { color: #e74c3c; }

.timer-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding: 10px 15px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1px solid var(--border);
}

.timer-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--gold);
  font-weight: 500;
}

.timer-display.warning {
  color: #e74c3c;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.5; }
  100% { opacity: 1; }
}

.toggle-btn {
  background: var(--border2);
  border: none;
  padding: 4px 8px;
  border-radius: 4px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}

.toggle-btn.active {
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--gold);
}

.hint-reveal {
  color: var(--gold);
  font-weight: bold;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.shake {
  animation: shake 0.2s ease-in-out 0s 2;
}

.card-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
}

.card-nav-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.15s;
}

.nav-btn:hover:not(:disabled) {
  border-color: var(--gold);
  color: var(--gold);
}

.nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.card-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 1px;
}

.card-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.action-btn {
  padding: 7px 16px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.action-btn:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }

.action-btn.hit {
  background: transparent;

.hook-card::before {

const WORDS = [

// ─── GROUP 1 ──────────────────────────────────────────────────────────────────
{g:1,w:"Abound",pos:"verb",def:"To exist in large numbers or amounts.",etym:[{m:"AB-",s:"off"},{m:"UNDA",s:"wave"}],
origin:"Latin abundare - to overflow, to surge away like a wave. The Romans imagined abundance as water that refuses to be contained, spilling over every bank.",
hook:"You arrive at a berry farm in peak season. Every bush is bending under the weight of fruit. The ground is stained red. The owner shrugs: 'Takes three people to harvest before they fall.' This is what <span class='hook-keyword'>abound</span> looks like - not just 'enough,' but so much it overflows like a wave you can't stop."},

{g:1,w:"Amorphous",pos:"adjective",def:"Without a clearly defined shape or form.",etym:[{m:"A-",s:"without"},{m:"MORPH",s:"form"}],
origin:"Greek amorphos - without shape. The same root gives us morphology (study of forms) and metamorphosis (change of form). Amorphous = the state before form arrives.",
hook:"You squeeze a fistful of wet clay. In your palm it becomes every shape and no shape - a lump, a blob, a formless potential. Nobody can say what it 'is' yet. This is <span class='hook-keyword'>amorphous</span>: not broken, not wrong, just without definition. The GRE loves this word for describing vague plans, unclear organizations, and anything that resists categorization."},

{g:1,w:"Austere",pos:"adjective",def:"Severe or strict in manner, attitude, or appearance.",etym:[{m:"AUSTEROS",s:"bitter, harsh"}],
origin:"Greek austeros - harsh, bitter, like an unripe grape that makes your mouth pucker. The Romans borrowed it to describe people who offered no softness, no ornament, nothing unnecessary.",
hook:"A monastery cell: one cot, one candle, bare stone walls. No decoration. No comfort beyond necessity. The monk chose every empty space deliberately - luxury, he decided, is noise that drowns the spirit. That is <span class='hook-keyword'>austere</span>: not accidental plainness, but deliberate severity that signals a value system. It applies to people, rooms, budgets, and writing styles equally."},

{g:1,w:"Belie",pos:"verb",def:"Fail to give a true notion or impression of; disguise.",etym:[{m:"BE-",s:"about"},{m:"LEOGAN",s:"to lie"}],
origin:"Old English beleogan - to lie about something. The be- prefix means 'thoroughly,' so to belie = to thoroughly lie about. But the modern sense is subtler: not an active lie, but a contradiction between appearance and reality.",
hook:"GRE TRAP: <span class='hook-keyword'>Belie</span> means to CONTRADICT or MISREPRESENT - NOT to confirm. 'His calm voice belied his terror' = his calm voice CONTRADICTED his actual terror - the inside and outside didn't match. Students sometimes read it as 'reveal.' It's the opposite. The calm doesn't reveal the terror; it HIDES it. <strong>Belie = the surface lies about what's underneath.</strong>"},

{g:1,w:"Capricious",pos:"adjective",def:"Given to sudden and unaccountable changes of mood or behavior.",etym:[{m:"CAPRICCIO",s:"sudden start"}],
origin:"Italian capriccio - a sudden start, a shiver, thought to resemble a hedgehog (capro) raising its quills. The image: a creature that, without warning, bristles and changes direction entirely.",
hook:"A <strong>spring afternoon that can't decide what it is</strong>. Sunshine. Then clouds. Then rain. Then brilliant sunshine again - all in forty minutes. You've packed an umbrella and sunscreen and still aren't sure. The weather is <span class='hook-keyword'>capricious</span>: its changes follow no discernible logic, governed only by impulse. Apply the same word to bosses, stock markets, and temperamental artists."},

{g:1,w:"Cerebral",pos:"adjective",def:"Intellectual rather than emotional or physical.",etym:[{m:"CEREBRUM",s:"brain"}],
origin:"Latin cerebrum - brain. The same root gives us cerebellum (little brain). Cerebral = of or relating to the brain, eventually meaning 'residing in the intellect rather than the gut or the heart.'",
hook:"Two people watch the same film. One is moved to tears by the love story. The other spends the entire runtime analyzing the cinematography's debt to Bergman and the Jungian archetypes in the villain. The second person's experience is <span class='hook-keyword'>cerebral</span> - filtered through analysis, not felt in the chest. Neither is wrong. But one lives in the head; the other in the body."},

{g:1,w:"Congenial",pos:"adjective",def:"Pleasant because of a personality, qualities, or interests similar to one's own.",etym:[{m:"CON-",s:"with"},{m:"GENIALIS",s:"festive"}],
origin:"Latin genialis - of or belonging to the genius (one's personal spirit/nature). Con-genial = sharing the same spirit or nature. People who are congenial feel like they were made from the same material.",
hook:"You meet someone at a dinner party and within ten minutes you've discovered: same obscure hobby, same unusual opinion on something most people don't care about, same habit of reading footnotes before main text. The conversation requires no maintenance - it runs on its own. This is <span class='hook-keyword'>congenial</span> company: the rare ease of people whose natures happen to rhyme."},

{g:1,w:"Conspicuous",pos:"adjective",def:"Standing out so as to be clearly visible.",etym:[{m:"CON-",s:"together"},{m:"SPECERE",s:"to look"}],
origin:"Latin conspicuus - from conspicere, to look at together. Something conspicuous is what everyone's gaze converges on simultaneously. The spectacle that can't be ignored.",
hook:"A <strong>peacock walks into a library</strong>. Nobody continues reading. Every head turns. The peacock did nothing to attract attention - it simply arrived in the wrong context, and its wrongness for the context made it impossible to ignore. That is <span class='hook-keyword'>conspicuous</span>: not necessarily loud, but inescapably visible. The word implies that others notice - conspicuous without an audience is just unusual."},

{g:1,w:"Cursory",pos:"adjective",def:"Hasty and therefore not thorough or detailed.",etym:[{m:"CURSOR",s:"runner"}],
origin:"Latin cursorius - of a runner, hasty. A cursor was a runner carrying messages. Cursory examination = the kind done at running pace, not walking pace. Speed at the cost of depth.",
hook:"You have three minutes before the meeting. You scan the 40-page report. You catch the executive summary, the first bullet under each section, and the conclusion. You have technically read it. This is a <span class='hook-keyword'>cursory</span> reading - fast enough to have a conversation, too fast to catch the landmine in footnote 23 that will come up in the meeting. Speed vs depth. Cursory always sacrifices depth."},

{g:1,w:"Daunting",pos:"adjective",def:"Seeming difficult to deal with in anticipation; intimidating.",etym:[{m:"DOMITARE",s:"to tame"}],
origin:"Latin domitare - to tame, to subdue. Something daunting has not yet been tamed - it still has the power to subdue you. The word captures the moment of confrontation with something not yet conquered.",
hook:"You stand at the base of a mountain trail. The map says '14 miles, 4,800 ft elevation gain.' It's 6 AM. You haven't trained enough. You look up at what you're about to begin. The task hasn't started yet - but it's already working on you, already trying to talk you out of it. This pre-encounter intimidation, the weight of the not-yet-begun, is exactly what <span class='hook-keyword'>daunting</span> means."},

{g:1,w:"Deify",pos:"verb",def:"Worship, regard, or treat (someone or something) as a god.",etym:[{m:"DEUS",s:"god"},{m:"FACERE",s:"to make"}],
origin:"Latin deificare - to make into a god. Deus (god) + facere (to make). The Romans literally had a process for this: the Senate voted to declare dead emperors divine. Deification was bureaucratic.",
hook:"The tech magazine puts the founder on the cover. The profile describes his 'reality distortion field,' his 'prophetic vision,' his ability to perceive what others cannot. His employees attribute their career meaning to working in his orbit. No one examines his failures. They have <span class='hook-keyword'>deified</span> him - made him into a god through collective belief. The word carries an implicit critique: the deified person is still human, whether their worshippers know it or not."},

{g:1,w:"Didactic",pos:"adjective",def:"Intended to teach, particularly in having moral instruction as an ulterior motive.",etym:[{m:"DIDASKEIN",s:"teach"}],
origin:"Greek didaskalikos - skilled in teaching. From didaskalos (teacher). Didactic became slightly pejorative over time - the word now often implies that the teaching is heavy-handed, that the lesson is being delivered with a hammer rather than a feather.",
hook:"GRE NUANCE: <span class='hook-keyword'>Didactic</span> is not always negative. In a neutral context it means 'instructive.' But in a critical context, it implies the moral lesson is too obvious, too insistent - the story stops being a story and becomes a sermon. 'A didactic fable' is neutral. 'The novel is tediously didactic' is criticism. <strong>Watch the tone of the sentence around it.</strong>"},

{g:1,w:"Disseminate",pos:"verb",def:"Spread (something, especially information) widely.",etym:[{m:"DIS-",s:"abroad"},{m:"SEMEN",s:"seed"}],
origin:"Latin disseminare - to scatter seed. The image is a farmer walking a field, reaching into a bag, scattering seeds with a wide arc of the arm. One becomes many. The metaphor applied to ideas, diseases, and news.",
hook:"<strong>One person tells two friends</strong>. Each tells two more. Within a week, the original rumor has reached 10,000 people across four cities. Nobody organized it. Nobody planned the spread. The information disseminated itself through networks of conversation, like seeds carried by wind. This biological metaphor - seeding knowledge across a landscape - is exactly what <span class='hook-keyword'>disseminate</span> implies."},

{g:1,w:"Feasible",pos:"adjective",def:"Possible to do easily or conveniently.",etym:[{m:"FACERE",s:"do, make"}],
origin:"Old French faisible - doable, from faire (to do, to make), from Latin facere. The question feasible answers is not 'Is it theoretically possible?' but 'Can it actually be done given real constraints?'",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Feasible</span> vs Possible. Possible = can exist in theory. Feasible = can be done in practice, with available resources, within real constraints. Flying to Mars is possible. It is not currently feasible for most organizations. Flying to New York is both possible and feasible. The GRE uses feasible when real-world limitations matter. <strong>Feasible asks: can we actually do this? Not just: could this exist?</strong>"},

{g:1,w:"Flout",pos:"verb",def:"Openly disregard (a rule, law or convention).",etym:[{m:"FLOUTEN",s:"to mock"}],
origin:"Middle English flouten - to mock, to play the flute (derisively). To flout a rule is to mock it openly - not to quietly break it, but to break it with a performance of contempt for its existence.",
hook:"GRE SPELLING TRAP: <span class='hook-keyword'>Flout</span> (openly disregard/mock) vs <span class='hook-keyword'>Flaunt</span> (show off ostentatiously). They sound similar. 'She flouted the dress code' = she disregarded it, probably conspicuously. 'She flaunted her new watch' = she showed it off. You can flaunt your disregard of a rule - which would combine both words in one action. <strong>Flout = mock the rule. Flaunt = show off something.</strong>"},

{g:1,w:"Homogeneous",pos:"adjective",def:"Of the same kind; alike.",etym:[{m:"HOMOS",s:"same"},{m:"GENOS",s:"kind"}],
origin:"Greek homogenes - of the same race or kind. Homos (same) + genos (kind, birth, race). The same root gives us genocide, genealogy, and genre. Homogeneous = everything coming from the same kind.",
hook:"A bowl of pure white sugar. Every grain: identical size, identical composition, identical behavior in water. Nothing stands out. Nothing introduces variation. Compare this to a trail mix - every handful is different. The sugar bowl is <span class='hook-keyword'>homogeneous</span>. GRE uses this word often to describe populations, mixtures, and cultures. When homogeneity is disrupted, you get diversity; when it's enforced, you get conformity."},

{g:1,w:"Humdrum",pos:"adjective",def:"Lacking excitement or variety; dull; monotonous.",etym:[{m:"HUM",s:"buzzing sound"}],
origin:"Formed by reduplication of 'hum' - the sound of droning, buzzing monotony. English occasionally creates words by doubling a sound to intensify it: humdrum, dilly-dally, wishy-washy. The word itself sounds like what it means.",
hook:"<strong>Tuesday, 9 AM to 5 PM</strong>. The same inbox. The same reports. The same lunch from the same spot on the same corner. The commute home is the reverse of the commute in. Nothing bad happens. Nothing good happens. Nothing happens that will be remembered. This is <span class='hook-keyword'>humdrum</span> existence - not suffering, just the low hum of days that are indistinguishable from each other."},

{g:1,w:"Insipid",pos:"adjective",def:"Lacking flavor; lacking vigor or interest.",etym:[{m:"IN-",s:"not"},{m:"SAPERE",s:"taste"}],
origin:"Latin insipidus - without taste. Sapere means both 'to taste' and 'to be wise' (hence 'sapient'). Insipid originally meant tasteless (food), then migrated to mean intellectually flavorless (ideas, people, prose).",
hook:"You order the 'chef's special soup' at a new restaurant. You taste it. Warm water arrives on your palate. Nothing offensive. Nothing interesting. No herbs assert themselves, no depth reveals itself. It exists. It is soup. Technically. But it is profoundly, committedly <span class='hook-keyword'>insipid</span> - without taste, without point, without anything your memory will bother to retain."},

{g:1,w:"Loquacious",pos:"adjective",def:"Tending to talk a great deal; talkative.",etym:[{m:"LOQUI",s:"to speak"}],
origin:"Latin loquax - talkative, from loqui (to speak). The same root gives us eloquent (speaking out well), soliloquy (speaking alone), and ventriloquist (belly-speaker). Loquacious = constitutionally inclined to speak.",
hook:"GRE PAIR: <span class='hook-keyword'>Loquacious</span> (talkative) vs <span class='hook-keyword'>Garrulous</span> (group 4 - excessively talkative about trivial things) vs <span class='hook-keyword'>Verbose</span> (group 3 - using too many words in writing or speech). Loquacious is the mildest - just talks a lot. Garrulous adds the dimension of triviality. Verbose emphasizes word count over content. <strong>A loquacious person fills the room. A garrulous one fills it with chatter. A verbose one fills the page with padding.</strong>"},

{g:1,w:"Misanthropic",pos:"adjective",def:"Disliking humankind and avoiding human society.",etym:[{m:"MISEIN",s:"to hate"},{m:"ANTHROPOS",s:"man"}],
origin:"Greek misanthropos - hater of humanity. Misein (to hate) + anthropos (human being). The same anthropos root gives us anthropology, philanthropy, and misanthropy's opposite: philanthropy (love of humanity).",
hook:"The philosopher has studied human history for forty years. Wars, betrayals, genocides, the same mistakes made generation after generation. He stops attending parties. He stops replying to invitations. He moves to the edge of town. He is not depressed - he has simply concluded, from evidence, that humanity is not worth his time. This is <span class='hook-keyword'>misanthropic</span>: not sadness about people, but a considered, principled withdrawal from them."},

{g:1,w:"Misnomer",pos:"noun",def:"A wrong or inaccurate name or designation.",etym:[{m:"MES-",s:"wrong"},{m:"NOMMER",s:"to name"}],
origin:"Old French mesnomer - to name wrongly. The word describes the gap between what something is called and what it actually is. Sometimes the misnomer is harmless; sometimes it causes real confusion.",
hook:"'Koala bear.' Koalas are marsupials, not bears - genetically closer to wombats than to anything ursine. The name stuck because early European settlers saw a fuzzy climbing animal and reached for a familiar category. Calling it a bear is a <span class='hook-keyword'>misnomer</span>: the name is wrong, and the wrongness matters to a zoologist, even if nobody else cares. The GRE uses this word to flag when the label misrepresents the thing."},

{g:1,w:"Negligent",pos:"adjective",def:"Failing to take proper care in doing something.",etym:[{m:"NEG-",s:"not"},{m:"LEGERE",s:"pick up"}],
origin:"Latin negligere - not to pick up, not to gather carefully. The opposite of diligent (carefully gathering). Negligent implies a duty existed, was known, and was not fulfilled.",
hook:"The bridge inspector files a report: 'Minor rust observed on load-bearing joint. Recommend monitoring.' He does not escalate. He does not flag it as urgent. He moves on. Eighteen months later, a section fails. The inspector was not malicious - he was <span class='hook-keyword'>negligent</span>. The distinction matters legally: negligence is the failure to exercise the care that the situation required, not the intention to harm."},

{g:1,w:"Obsequious",pos:"adjective",def:"Obedient or attentive to an excessive or servile degree.",etym:[{m:"OB-",s:"toward"},{m:"SEQUI",s:"follow"}],
origin:"Latin obsequiosus - compliant, from obsequi (to comply with). To follow toward someone excessively - to be so compliant that you have dissolved your own judgment in their service.",
hook:"The junior employee in the meeting. Every idea the boss offers: 'That's brilliant.' Every suggestion: 'Exactly what I was thinking.' He laughs longest at the boss's jokes. He refills the coffee unprompted. He has no opinions of his own - only reflections of the boss's opinions, amplified and returned. He is <span class='hook-keyword'>obsequious</span>: not respectful, but servile. Obsequiousness is respect taken past dignity into self-erasure."},

{g:1,w:"Placate",pos:"verb",def:"Make (someone) less angry or hostile.",etym:[{m:"PLACARE",s:"appease"}],
origin:"Latin placatus - to appease, to soothe, to make calm (placid and please share this root). Placate implies the anger is real and the effort to calm it is tactical, not necessarily sincere.",
hook:"The flight is delayed four hours. The gate agent faces 200 frustrated passengers. She cannot fix the delay. What she can do: hand out meal vouchers, speak in a calm tone, give specific updates every 30 minutes, acknowledge the frustration directly. None of this solves the problem - but it <span class='hook-keyword'>placates</span> the crowd. To placate is to manage anger without necessarily removing its cause."},

{g:1,w:"Proclivity",pos:"noun",def:"A tendency to choose or do something regularly.",etym:[{m:"PRO-",s:"forward"},{m:"CLIVUS",s:"slope"}],
origin:"Latin proclivitas - a slope forward. The image: a ball placed on a hill naturally rolls in a particular direction. A proclivity is a natural slope of character - the direction you roll when left to yourself.",
hook:"Every time he enters a bookstore, he goes straight to the history section. Not science, not fiction - history. It requires no decision. His feet carry him there without consultation. This is his <span class='hook-keyword'>proclivity</span>: a habitual lean, a pre-existing slope in his nature. The word implies the tendency is built in, not learned. You discover your proclivities; you don't usually choose them."},

{g:1,w:"Puerile",pos:"adjective",def:"Childishly silly and trivial.",etym:[{m:"PUER",s:"boy"}],
origin:"Latin puerilis - of or belonging to a boy (puer). The word implies that the behavior is not just immature but specifically below one's expected age - someone who should know better acting like they don't.",
hook:"<strong>A serious board meeting</strong>. One member keeps making jokes about the competitor's name. Everyone smiles politely the first time. He does it again. Then again. The CFO stops taking notes. The CEO checks her watch. His attempts at humor are <span class='hook-keyword'>puerile</span> - not funny in the clever way adults can be funny, but silly in the way that makes everyone in the room privately reconsider their opinion of him."},

{g:1,w:"Quixotic",pos:"adjective",def:"Exceedingly idealistic; unrealistic and impractical.",etym:[{m:"QUIXOTE",s:"character"}],
origin:"From Don Quixote, Cervantes' novel (1605), in which a man reads too many chivalric romances, goes mad, and rides out to fight windmills believing them to be giants. His name became the adjective.",
hook:"The activist announces he will singlehandedly stop the construction of a highway through his town - against a state government with unlimited budget and legal authority. His friends admire his passion and quietly fear for his sanity. His plan is <span class='hook-keyword'>quixotic</span>: noble, passionate, and magnificently impractical. The word always carries this double tone - admiration for the ideal, resignation about the odds."},

{g:1,w:"Spendthrift",pos:"noun",def:"A person who spends money in an extravagant, irresponsible way.",etym:[{m:"SPEND",s:"pay out"},{m:"THRIFT",s:"savings"}],
origin:"English compound: spend + thrift (the practice of thriving through saving). A spendthrift is one who spends their thrift - someone who uses their savings capacity as fast as it accumulates, defeating the purpose.",
hook:"<strong>Lottery winner, year one</strong>: sports car, vacation home, a boat he can't operate. <strong>Year two</strong>: second vacation home, jewelry, a restaurant investment that fails. <strong>Year four</strong>: bankruptcy proceedings. Studies show that a significant portion of lottery winners are broke within five years. They were <span class='hook-keyword'>spendthrifts</span> - not poor earners, but people whose spending capacity always outran their income, regardless of how high that income climbed."},

{g:1,w:"Taciturn",pos:"adjective",def:"Reserved or uncommunicative in speech; saying little.",etym:[{m:"TACITUS",s:"silent"}],
origin:"Latin taciturnus - habitually silent. From tacere (to be silent). Tacit (implied without words) shares this root. Taciturn describes not a single moment of silence but a constitutive disposition toward it.",
hook:"GRE PAIR: <span class='hook-keyword'>Taciturn</span> (habitually quiet, says little) vs <span class='hook-keyword'>Reticent</span> (group 14 - reluctant to reveal thoughts or feelings) vs <span class='hook-keyword'>Reserved</span> (general restraint). Taciturn is the strongest - a taciturn person is constitutionally quiet, not just private. A reticent person might talk plenty; they just won't tell you anything personal. <strong>Taciturn = few words total. Reticent = few personal disclosures.</strong>"},

{g:1,w:"Wary",pos:"adjective",def:"Feeling or showing caution about possible dangers or problems.",etym:[{m:"WAER",s:"aware, cautious"}],
origin:"Old English wær - aware, cautious. The same root as 'beware' (be-wær) and 'aware.' To be wary is to have activated your awareness in the presence of potential threat - to have turned up the gain on your detection system.",
hook:"<strong>The experienced traveler in an unfamiliar city</strong>. She doesn't walk with her phone out. She chose her seat at the café with her back to the wall. She noted the exits. She isn't frightened - she's <span class='hook-keyword'>wary</span>: alert, observant, and ready to respond if something goes wrong. Wary is vigilance without paranoia. It's the calibrated alertness of someone who has learned that the world occasionally requires it."},

// ─── GROUP 2 ──────────────────────────────────────────────────────────────────
{g:2,w:"Adulterate",pos:"verb",def:"Render something poorer in quality by adding another substance.",etym:[{m:"AD-",s:"to"},{m:"ALTER",s:"other"}],
origin:"Latin adulterare - to falsify, to make 'other.' The same root as 'adultery' - both involve introducing something foreign that corrupts the original integrity of a relationship or substance.",
hook:"<strong>A spice trader in a medieval market</strong> mixes expensive saffron with cheaper turmeric to increase volume. The color is right. The smell is almost right. The buyer cannot tell without a laboratory. The trader has <span class='hook-keyword'>adulterated</span> the saffron - introduced something foreign that degrades its purity and value while disguising the degradation. The word applies equally to food, medicine, data, and any substance whose value depends on purity."},

{g:2,w:"Advocate",pos:"verb",def:"Publicly recommend or support.",etym:[{m:"AD-",s:"to"},{m:"VOCARE",s:"to call"}],
origin:"Latin advocare - to call toward, to summon to one's side. An advocate was originally a person summoned to speak on another's behalf in court. The verb now means to speak for any cause or person.",
hook:"GRE NUANCE: <span class='hook-keyword'>Advocate</span> (verb) means to publicly support something. <span class='hook-keyword'>Advocate</span> (noun) means a person who does this. They're the same word in two roles - common in GRE reading comprehension. 'She advocates for better school funding' (verb). 'She is a tireless advocate for children' (noun). <strong>Context reveals the part of speech. The meaning stays the same: active, public support.</strong>"},

{g:2,w:"Aggrandize",pos:"verb",def:"Increase the power, status, or wealth of.",etym:[{m:"AD-",s:"to"},{m:"GRANDIS",s:"large"}],
origin:"French aggrandir - to make larger. The prefix ad- intensifies 'grandis' (great, large). Aggrandize usually carries a negative connotation - the enlargement is self-serving, at the expense of accuracy or fairness.",
hook:"The CEO's annual report describes the modest market stabilization as 'a transformative, industry-defining breakthrough of historic proportions.' The results were fine. The language has <span class='hook-keyword'>aggrandized</span> them beyond recognition - inflated their scale and significance to make the speaker seem larger. Self-aggrandizement is the habitual use of this inflation for personal benefit."},

{g:2,w:"Alacrity",pos:"noun",def:"Brisk and cheerful readiness.",etym:[{m:"ALACER",s:"brisk"}],
origin:"Latin alacritas - liveliness, briskness. From alacer (lively, eager). Alacrity captures a specific quality of willingness - not grudging compliance, but eager, energetic, cheerful readiness.",
hook:"You ask for a volunteer to take on the most tedious task on the team. Before you finish the sentence, one hand shoots up. The volunteer is already reaching for the materials. Their face is bright. They want to do this. This response - fast, cheerful, energetic - is <span class='hook-keyword'>alacrity</span>. The word is almost always used positively and implies the readiness has an emotional warmth that mere speed doesn't capture."},

{g:2,w:"Ambivalent",pos:"adjective",def:"Having mixed feelings or contradictory ideas about something.",etym:[{m:"AMBI-",s:"both"},{m:"VALERE",s:"be worth"}],
origin:"German Ambivalenz - coined by Eugen Bleuler in psychiatry (1910). Ambi (both) + valere (to be worth). Originally described having two equally valued but opposing emotional pulls. Now broader.",
hook:"The job offer: double the salary, but in a city you've always wanted to live in, away from everyone you love. You want to say yes. You want to say no. Both feelings are genuine and of approximately equal weight. You sit with the letter for a week. This is <span class='hook-keyword'>ambivalent</span>: not indifference (not caring either way) but its opposite - caring so much in two directions simultaneously that the needle won't settle."},

{g:2,w:"Ameliorate",pos:"verb",def:"Make (something bad or unsatisfactory) better.",etym:[{m:"MELIOR",s:"better"}],
origin:"French améliorer - to improve. Latin melior - better (comparative of bonus). The same root as 'meliorate.' Ameliorate implies making something bad less bad - not solving it, but reducing its severity.",
hook:"GRE PRECISION: <span class='hook-keyword'>Ameliorate</span> means to make BETTER, not to make PERFECT. You ameliorate a difficult situation - you don't resolve it. The word implies the problem remains but is less severe. This matters in GRE reading: 'The policy ameliorated poverty' does NOT mean it eliminated poverty. It means poverty became less severe. <strong>Ameliorate = partial improvement of a negative state.</strong>"},

{g:2,w:"Amenable",pos:"adjective",def:"Open and responsive to suggestion; easily persuaded or controlled.",etym:[{m:"AD-",s:"to"},{m:"MENER",s:"bring"}],
origin:"French amener - to bring to, to lead. Old French mener from Latin minare (to drive animals). Amenable = capable of being brought or led. The image is of something that can be guided rather than forced.",
hook:"You present the new schedule to your team, braced for resistance. Instead: 'That works for me.' 'I can make that work.' 'No problem.' The team is remarkably <span class='hook-keyword'>amenable</span> - not just passive, but actively cooperative, willing to be guided by the plan. Note: amenable is neutral to positive. Calling someone 'amenable to reason' is a compliment. Calling them 'suspiciously amenable' raises the question of whether they're thinking for themselves."},

{g:2,w:"Anachronistic",pos:"adjective",def:"Belonging to a period other than that being portrayed.",etym:[{m:"ANA-",s:"backward"},{m:"CHRONOS",s:"time"}],
origin:"Greek anakhronismos - from ana (backward, against) + khronos (time). Something anachronistic has been placed against the flow of time - where it doesn't belong chronologically.",
hook:"<strong>The medieval blacksmith with a wristwatch</strong>. Every detail of the historical film is perfect - except for two seconds when you can see the actor's digital watch under his sleeve. This is <span class='hook-keyword'>anachronistic</span>: a thing from one era intruding into another where it has no business being. But anachronism applies beyond film: an executive who still insists on fax machines in 2024 is anachronistic. Ideas, practices, and assumptions can all be stranded in the wrong century."},

{g:2,w:"Audacious",pos:"adjective",def:"Showing a willingness to take surprisingly bold risks.",etym:[{m:"AUDAC-",s:"bold"}],
origin:"Latin audacia - boldness, from audere (to dare). The root gives us 'audacity.' Audacious captures boldness that surprises - the move that makes observers hold their breath because it shouldn't work, and then sometimes does.",
hook:"The startup announces they're going after the world's largest company in their sector - with twelve employees and six months of runway. Industry analysts laugh. Two years later, they have 15% market share. Was the original plan crazy? Yes. Was it also <span class='hook-keyword'>audacious</span>? Absolutely. Audacious implies the boldness itself is part of the strategy - that the sheer scale of the bet creates the credibility to make it work."},

{g:2,w:"Avaricious",pos:"adjective",def:"Having or showing an extreme greed for wealth or material gain.",etym:[{m:"AVARUS",s:"greedy"}],
origin:"Latin avaritia - greed, from avarus (greedy). From avere (to crave). The Romans considered avarice one of the fundamental vices. Dante placed the avaricious in the fourth circle of hell, pushing weights forever.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Avaricious</span> (extreme greed for wealth) vs <span class='hook-keyword'>Rapacious</span> (group 11 - aggressively seizing everything) vs <span class='hook-keyword'>Parsimonious</span> (group 12 - stingy, unwilling to spend). Avaricious = wants to accumulate more. Rapacious = actively takes with force. Parsimonious = won't let go of what they have. <strong>Avaricious is the wanting. Rapacious is the taking. Parsimonious is the hoarding.</strong>"},

{g:2,w:"Banal",pos:"adjective",def:"So lacking in originality as to be obvious and boring.",etym:[{m:"BAN",s:"proclamation"}],
origin:"French banal - 'open to everyone,' from Old French ban (proclamation of common use). The lord's mill was 'banal' - common property everyone used. What everyone uses becomes commonplace; commonplace becomes boring.",
hook:"The proposal for the company's 30th anniversary celebration: 'Maybe a dinner? With a slideshow? And a speech about how far we've come?' Every suggestion is the first thing anyone would think of. Nothing has been chosen - everything has been defaulted to. This is <span class='hook-keyword'>banal</span>: not just familiar, but drearily, unimaginatively familiar, the creative residue left when no one has bothered to think past the obvious."},

{g:2,w:"Benign",pos:"adjective",def:"Gentle; kindly; not harmful in effect.",etym:[{m:"BENE",s:"well"},{m:"GIGNERE",s:"bear, beget"}],
origin:"Latin benignus - well-born, good-natured. Bene (well) + gignere (to beget). Something benign was 'born well' - favorably constituted by nature. The medical usage (benign tumor = not malignant) came later.",
hook:"GRE DOUBLE CONTEXT: In everyday use, <span class='hook-keyword'>benign</span> = gentle and kind. In medical use, benign = not cancerous, not dangerous. Both derive from the same root idea: harmless by nature. The GRE tests whether you understand this in context. 'A benign dictator' is oxymoronic but means 'a gentle one.' 'A benign tumor' means 'a non-threatening one.' <strong>Both meanings: the thing's nature is constitutionally harmless.</strong>"},

{g:2,w:"Brazen",pos:"adjective",def:"Bold and without shame.",etym:[{m:"BRAES",s:"brass"}],
origin:"Old English bræsen - made of brass. Brass was associated with hardness, durability, and a particular kind of bold luster. To be brazen originally meant 'brass-faced' - having a face as hard and unyielding as brass, immune to shame.",
hook:"The student is caught copying on the exam. The teacher approaches. Instead of hiding, the student says, calmly, looking directly at the teacher: 'I was just checking my notes.' The notes are open on the desk. There is no shame. No apology. No lowering of the eyes. This is <span class='hook-keyword'>brazen</span>: not just bold, but bold specifically in the face of something you should be ashamed of - the brass face that refuses the blush."},

{g:2,w:"Calumny",pos:"noun",def:"The making of false and defamatory statements to damage someone's reputation.",etym:[{m:"CALVI",s:"to deceive"}],
origin:"Latin calumnia - false accusation, trickery. From calvi (to deceive). The Romans had legal procedures for punishing calumnia - false accusations brought to court to harm an innocent person.",
hook:"GRE PAIR: <span class='hook-keyword'>Calumny</span> (false statements that damage reputation) vs <span class='hook-keyword'>Slander</span> (group 20 - spoken defamation) vs <span class='hook-keyword'>Libel</span> (written defamation). Calumny is the broadest term - false, damaging statements in any form, with malicious intent. It's more formal and literary than slander. In a GRE passage, calumny often appears when describing political attacks or historical reputation-destruction. <strong>The key element: deliberate falseness aimed at destroying.</strong>"},

{g:2,w:"Candid",pos:"adjective",def:"Truthful and straightforward; frank.",etym:[{m:"CANDIDUS",s:"white"}],
origin:"Latin candidus - glistening white, pure. Roman candidates for office wore white togas (toga candida) to signal purity and transparency. Candid = having the white clarity of someone with nothing to hide.",
hook:"'I'll be candid with you: this proposal has serious problems.' The colleague then lists them - specifically, without diplomatic softening. It's uncomfortable. It's also the most useful thing anyone has said in the meeting. <span class='hook-keyword'>Candid</span> feedback is the kind that tells you what you need to know rather than what you want to hear. The word implies not just honesty but a kind of brave transparency."},

{g:2,w:"Castigate",pos:"verb",def:"Reprimand (someone) severely.",etym:[{m:"CASTUS",s:"pure"},{m:"AGERE",s:"to do"}],
origin:"Latin castigare - to purify, to correct by punishment. Castus (pure) + agere (to do/drive). The Romans believed punishment purified the offender. Castigation was corrective, not merely punitive.",
hook:"The surgeon reviews the resident's procedure. <strong>In front of the full team</strong>, she details every error, every moment of insufficient care, every missed protocol step. Her voice is controlled but devastating. The resident doesn't move. This is <span class='hook-keyword'>castigate</span>: not just to scold, but to reprimand with systematic thoroughness - to correct with force. The severity distinguishes it from a gentle correction."},

{g:2,w:"Caustic",pos:"adjective",def:"Able to burn or corrode; sarcastic in a scathing and bitter way.",etym:[{m:"KAIEIN",s:"to burn"}],
origin:"Greek kaustikos - capable of burning. The same root gives us 'caustic soda' (NaOH, which burns on contact). The word migrated from chemistry to rhetoric: a caustic wit burns the way acid does - it dissolves what it touches.",
hook:"<strong>The critic's review, one sentence</strong>: 'The author has achieved the rare distinction of writing a debut novel that will serve as an effective argument against literacy.' Nobody who reads it forgets it. It burns. It destroys not just the book but the author's confidence, the publisher's afternoon, and possibly the reader's appetite for lunch. This is <span class='hook-keyword'>caustic</span> wit - not funny so much as corrosive, the sentence designed to eat through surfaces."},

{g:2,w:"Construe",pos:"verb",def:"Interpret (a word or action) in a particular way.",etym:[{m:"CON-",s:"together"},{m:"STRUERE",s:"build"}],
origin:"Latin construere - to build together. Originally referred to grammatical construction: how words are 'built together' to make meaning. Extended to interpretation: how you 'build' understanding from ambiguous inputs.",
hook:"The email reads: 'That's one way to approach this.' <strong>Three people read it</strong>. The first construes it as polite agreement. The second construes it as passive-aggressive dismissal. The third construes it as genuine open-mindedness. Same seven words; three different buildings constructed from the same materials. <span class='hook-keyword'>Construe</span> is the act of construction - the choosing of what to build from ambiguous raw material."},

{g:2,w:"Contrite",pos:"adjective",def:"Feeling or expressing remorse or penitence; affected by guilt.",etym:[{m:"CON-",s:"together"},{m:"TERERE",s:"rub, grind"}],
origin:"Latin contritus - ground to pieces, thoroughly rubbed down. From conterere (to grind completely). The image: guilt as grinding - not a light feeling but something that works on you continuously until it wears you down.",
hook:"Three days after the argument, he appears at her door. He doesn't start with excuses. He starts with silence, then: 'I've been thinking about what I said. It was wrong. I'm sorry.' He looks worn. He is <span class='hook-keyword'>contrite</span>: not performing remorse for social purposes, but showing the ground-down quality of someone who has genuinely been worked on by guilt. Contrition implies the regret has done some internal work."},

{g:2,w:"Convoluted",pos:"adjective",def:"Extremely complex and difficult to follow.",etym:[{m:"CON-",s:"together"},{m:"VOLVERE",s:"roll"}],
origin:"Latin convolutus - rolled together, from convolvere (to roll together). The same root as 'involve,' 'revolve,' 'evolve.' Something convoluted has been rolled together until the strands are impossible to separate.",
hook:"The instructions for assembling the bookshelf. Step 3 refers to Part C, which is described in Appendix 2, which requires you to complete Step 7 before returning to Step 3, but Step 7 cannot be done until Step 5 is finished, which has an exception if you have the optional stabilizer bar from Step 11... You've read it six times. The logic is <span class='hook-keyword'>convoluted</span>: not wrong, but so thoroughly rolled together that extracting meaning requires more effort than the object is worth."},

{g:2,w:"Covet",pos:"verb",def:"Yearn to possess or have (something).",etym:[{m:"CUPIDUS",s:"desirous"}],
origin:"Old French coveitier - to desire, from Latin cupiditas (desire). The same root as Cupid and cupidity (greed). To covet is to desire what belongs to another - a desire that watches the other person's possession and wants it.",
hook:"The Tenth Commandment forbids coveting your neighbor's house, ox, donkey, spouse, and servants. The ancient Israelites apparently needed specific guidance about all of them. <span class='hook-keyword'>Covet</span> implies not just wanting but wanting specifically what someone else has - the desire activated by possession, not by intrinsic value. You might not want a Ferrari until your colleague gets one."},

{g:2,w:"Craven",pos:"adjective",def:"Contemptibly lacking in courage; cowardly.",etym:[{m:"CRAVANT",s:"defeated"}],
origin:"Middle English cravant - defeated, overcome. The craven is someone who has been defeated by their own fear before the battle even begins. The contempt the word carries is crucial: it's not just cowardly, it's contemptibly cowardly.",
hook:"When it comes time to defend the unpopular colleague, the manager suddenly has nothing to say. He knows the colleague is right. He knows the attack is unfair. But saying so might cost him socially, so he says nothing. This silence is <span class='hook-keyword'>craven</span> - not just cowardly, but contemptible cowardice. The distinction from ordinary timidity: craven implies you should have spoken, knew you should, and chose not to."},

{g:2,w:"Decorum",pos:"noun",def:"Behavior in keeping with good taste and propriety.",etym:[{m:"DECORUS",s:"seemly"}],
origin:"Latin decorum - what is fitting, proper, seemly. From decet (it is fitting). The Romans believed that decorum was not artificial constraint but the natural behavior of someone who understood their role in society.",
hook:"<strong>At the state funeral</strong>, no one checks their phone during the ceremony. Voices, when necessary, are lowered. Dress is somber. Nobody laughs, even when someone trips. This collective restraint - everyone performing their role within the situation's demands - is <span class='hook-keyword'>decorum</span>. The word implies social awareness: knowing what the moment requires and delivering it. Its opposite (indecorum) is usually not evil, just socially oblivious."},

{g:2,w:"Deft",pos:"adjective",def:"Neatly skillful and quick in one's movements.",etym:[{m:"DAEFTE",s:"gentle, meek"}],
origin:"Middle English defte - originally meant 'gentle, fitting.' Evolved to mean skillful, precise. The modern word carries the sense of efficiency within grace - skill that doesn't draw attention to itself because it wastes no motion.",
hook:"Watch an experienced surgeon make an incision. The hand moves once, decisively, and stops in exactly the right place. No second attempt, no correction, no wasted motion. The skill is invisible because it's so complete. This is <span class='hook-keyword'>deft</span>: a quality of action in which precision and economy meet - you can see what was done but not the effort it took."},

{g:2,w:"Demur",pos:"verb",def:"Raise doubts or objections or show reluctance.",etym:[{m:"DE-",s:"away"},{m:"MORARI",s:"delay"}],
origin:"Latin demorari - to linger, to delay. Old French demorer. To demur is to pause, to hold back - to introduce the friction of hesitation before agreeing or proceeding.",
hook:"GRE NUANCE: <span class='hook-keyword'>Demur</span> is mild. It doesn't mean to refuse or to protest loudly. It means to hesitate, to express gentle reluctance or mild objection. 'She demurred when asked to chair the committee' = she expressed reluctance, probably politely. Compare to 'she refused' (final) or 'she objected' (active). Demur is the pause before the answer, the 'I'm not sure about this' rather than the 'absolutely not.' <strong>It's resistance in a soft register.</strong>"},

{g:2,w:"Derivative",pos:"adjective",def:"Imitative of the work of another person.",etym:[{m:"DE-",s:"down"},{m:"RIVUS",s:"stream"}],
origin:"Latin derivativus - flowing down from (a stream). Something derivative flows from an original source rather than springing from its own source. The metaphor: an original work is a spring; a derivative work is a stream that flows from it.",
hook:"The new band sounds exactly like a mid-period Beatles album - same chord progressions, same production choices, similar lyrical themes. They're skilled musicians. But everything they do references something that already existed, adding nothing to it. Their work is <span class='hook-keyword'>derivative</span>: technically accomplished, but flowing from someone else's spring rather than their own. The word is critical without being cruel - it identifies absence of originality, not presence of failure."},

{g:2,w:"Desiccate",pos:"verb",def:"Remove the moisture from (something); cause to become completely dry.",etym:[{m:"DE-",s:"thoroughly"},{m:"SICCAUS",s:"dry"}],
origin:"Latin desiccatus - thoroughly dried. From desiccare (to dry out). Used in both literal (food preservation, chemistry) and figurative contexts (a desiccated prose style = one stripped of life and moisture).",
hook:"<strong>The laboratory stores its specimens</strong> in sealed desiccating chambers - environments of total dryness that preserve by removing what allows decay: moisture. What emerges is unchanged in form but drained of everything that made it alive. A writer whose style has become <span class='hook-keyword'>desiccated</span> has undergone the same process: the words are there, the structure is intact, but whatever kept it alive has been removed."},

{g:2,w:"Diatribe",pos:"noun",def:"A forceful and bitter verbal attack against someone or something.",etym:[{m:"DIA-",s:"through"},{m:"TRIBEIN",s:"to rub"}],
origin:"Greek diatribe - a wearing away through friction. Originally meant a philosophical discourse - intensive study that 'wore through' a subject. The connotation shifted to the sustained verbal wearing-down of an opponent.",
hook:"<strong>Twelve minutes of email</strong>. Single-spaced. No paragraph breaks. It covers, in escalating intensity: the original offense, every related offense going back three years, the systemic organizational problems that allow such offenses to occur, the character deficiencies of those responsible, and a list of demands. This is a <span class='hook-keyword'>diatribe</span>: not just criticism, but sustained, bitter, comprehensive verbal assault - the wearing-through kind."},

{g:2,w:"Incredulous",pos:"adjective",def:"Unwilling or unable to believe something.",etym:[{m:"IN-",s:"not"},{m:"CREDERE",s:"believe"}],
origin:"Latin incredulus - not believing. Same root as credible, credit, creed. Incredulous describes the state of suspended disbelief - the mind confronted with something that contradicts its model of how things should be.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Incredulous</span> (the person who doesn't believe) vs <span class='hook-keyword'>Incredible</span> (the thing that is hard to believe). 'She was incredulous at the incredible claim.' She = incredulous (the feeling). The claim = incredible (the quality). Both words come from the same root. <strong>Incredulous = your reaction. Incredible = the thing causing the reaction. Don't swap them.</strong>"},

{g:2,w:"Ingenuous",pos:"adjective",def:"Innocent and unsuspecting.",etym:[{m:"IN-",s:"in"},{m:"GIGNERE",s:"beget"}],
origin:"Latin ingenuus - native, freeborn, frank. Originally meant 'born free' (as opposed to enslaved) and therefore unguarded, open, without the concealment that servitude requires. Evolved to mean innocent and unsuspecting.",
hook:"GRE SPELLING TRAP: <span class='hook-keyword'>Ingenuous</span> (innocent, unsuspecting, naively open) vs <span class='hook-keyword'>Disingenuous</span> (group 17 - not candid, pretending to know less than you do) vs <span class='hook-keyword'>Ingenious</span> (clever, inventive). Three similar-sounding words with completely different meanings. Ingenuous = the open, trusting person who doesn't suspect deception. Disingenuous = the person who pretends to be that person while not being it. <strong>Ingenuous is the innocent. Disingenuous wears innocence as a mask.</strong>"},

// ─── GROUP 3 ──────────────────────────────────────────────────────────────────
{g:3,w:"Abate",pos:"verb",def:"Become less intense or widespread.",etym:[{m:"AD-",s:"to"},{m:"BATTERE",s:"to beat"}],
origin:"Old French abatre - to beat down. The image: a force that was beating intensely gradually reducing its blows until it stops. Applied to storms, pain, anger, noise - anything that can intensify and then lessen.",
hook:"The hurricane has been at Category 4 for eighteen hours. The meteorologists watch the instruments. Slowly - almost imperceptibly - the wind speed drops from 140 mph to 135, then 128. The worst is passing. Over the next six hours, the storm <span class='hook-keyword'>abates</span>: not gone, still significant, but no longer at full force. <span class='hook-keyword'>Abate</span> implies a gradient - the thing is still present but has lost its peak intensity."},

{g:3,w:"Abjure",pos:"verb",def:"Solemnly renounce a belief, cause, or claim.",etym:[{m:"AB-",s:"away"},{m:"JURARE",s:"swear"}],
origin:"Latin abjurare - to swear away from. A formal, oath-bound renunciation. The solemnity is built into the word: to abjure is not to casually change your mind but to publicly swear that you no longer hold a position.",
hook:"Galileo, 1633. The Inquisition. He has spent his career building evidence for heliocentrism. Now, threatened with torture, he kneels before the court and formally <span class='hook-keyword'>abjures</span> his findings - swears them away, publicly declares them wrong. Legend says he muttered afterward: 'And yet it moves.' He abjured the conclusion. The evidence remained. <span class='hook-keyword'>Abjure</span> always carries this tension: the oath does not change the underlying truth."},

{g:3,w:"Anomalous",pos:"adjective",def:"Deviating from what is standard, normal, or expected.",etym:[{m:"AN-",s:"not"},{m:"HOMALOS",s:"even"}],
origin:"Greek anomalos - uneven, irregular. From an- (not) + homalos (even, level). Something anomalous disrupts the even pattern - it introduces unevenness where evenness was expected.",
hook:"<strong>The dataset shows the same pattern for 847 entries</strong>. Then entry 848: a completely different shape. Every analyst looking at the chart notices it immediately. It stands out not because it's dramatic in isolation, but because everything around it established a pattern it violates. This data point is <span class='hook-keyword'>anomalous</span>. The word always implies a baseline - something can only be anomalous relative to an established norm."},

{g:3,w:"Antipathy",pos:"noun",def:"A deep-seated feeling of dislike; aversion.",etym:[{m:"ANTI-",s:"against"},{m:"PATHOS",s:"feeling"}],
origin:"Greek antipatheia - feeling against, from anti (against) + pathos (feeling). The same root gives us sympathy (feeling with) and empathy (feeling into). Antipathy = feeling that runs directly against.",
hook:"GRE PAIR: <span class='hook-keyword'>Antipathy</span> (deep dislike, feeling against) vs <span class='hook-keyword'>Animosity</span> (group 21 - strong hostility) vs <span class='hook-keyword'>Animus</span> (group 14 - hostility or ill feeling). Antipathy is the most visceral - it's in the gut, automatic, deep-seated. Animosity implies active hostility. Animus is slightly more intellectual, often used for editorial criticism. <strong>Antipathy = the gut recoil. Animosity = the active hostility. Animus = the underlying ill will.</strong>"},

{g:3,w:"Arcane",pos:"adjective",def:"Understood by few; mysterious or secret.",etym:[{m:"ARCA",s:"chest"}],
origin:"Latin arcanus - hidden, secret. From arca (a chest, a coffer - a locked box). What is arcane was kept locked away, accessible only to those with the key. The image: knowledge stored in a locked box, not available to the general public.",
hook:"The actuary explains the mortality tables. For the insurance executives, who have spent thirty years with this data, the numbers are obvious and routine. For everyone else in the room, it is completely <span class='hook-keyword'>arcane</span> - specialized knowledge that requires years of immersion to decode. Arcane knowledge isn't secret because someone is hiding it; it's secret because the box has a complex lock that takes time to learn to open."},

{g:3,w:"Arduous",pos:"adjective",def:"Involving or requiring strenuous effort; difficult and tiring.",etym:[{m:"ARDUUS",s:"steep"}],
origin:"Latin arduus - steep, high, difficult. The image is literal: a steep climb that costs more effort per step than flat ground. Something arduous is not just hard but cumulatively exhausting - the steepness doesn't end.",
hook:"Day three of the research expedition. The team has been walking eleven hours through dense vegetation, carrying 60-pound packs, in 95-degree humidity. They're still three days from the site. Nobody complains - this was anticipated. But the effort required is genuine and total. This is <span class='hook-keyword'>arduous</span>: not a single moment of difficulty but a sustained, steep, unrelenting demand on physical and mental resources."},

{g:3,w:"Artless",pos:"adjective",def:"Without guile or deception; natural and simple.",etym:[{m:"ART",s:"skill"},{m:"-LESS",s:"without"}],
origin:"English formation: without the 'art' of deception or strategic presentation. Artless doesn't mean 'unskilled' - it means without the art of concealment or performance. Natural transparency.",
hook:"GRE NUANCE: <span class='hook-keyword'>Artless</span> is almost always POSITIVE in literary usage. It doesn't mean 'clumsy' or 'incompetent.' It means without guile - naturally transparent, free of performance. An artless child says exactly what they think, without calculating impact. An artless answer to a complex question is refreshingly honest rather than strategically framed. <strong>Artless = the quality of someone who hasn't learned to be strategic about how they present themselves.</strong>"},

{g:3,w:"Ascetic",pos:"adjective",def:"Characterized by or suggesting the practice of severe self-discipline.",etym:[{m:"ASKEIN",s:"to exercise"}],
origin:"Greek asketikos - of or given to exercise. Asketes was an athlete - someone who trained with discipline. The early Christian monks adopted the word for their spiritual training: the same rigor that athletes apply to the body, applied to the soul.",
hook:"The training regimen: wake at 4 AM, cold water, no sugar, no alcohol, no entertainment, ten hours of practice, early sleep. Not punishment - preparation. The athlete treats every comfort as a potential distraction from the goal. This is <span class='hook-keyword'>ascetic</span> living: the disciplined rejection of pleasure and comfort in service of a higher aim. The rejection is deliberate, principled, and often admired even by those who wouldn't choose it."},

{g:3,w:"Assuage",pos:"verb",def:"Make (an unpleasant feeling) less intense.",etym:[{m:"AD-",s:"to"},{m:"SUAVIS",s:"sweet"}],
origin:"Latin assuaviare - to sweeten toward. From suavis (sweet, pleasant). To assuage is to introduce sweetness into something bitter - to reduce the intensity of pain, grief, or hunger by adding something that counterbalances it.",
hook:"The grieving parent cannot be consoled - the loss is too recent, too total. But someone sits next to her, says nothing, and stays. Three hours later, without any words having solved anything, she looks slightly less destroyed. The presence has <span class='hook-keyword'>assuaged</span> something. Not healed it - that word would be wrong. Just sweetened the bitterness slightly. Assuage implies partial relief, not resolution."},

{g:3,w:"Betray",pos:"verb",def:"To be unfaithful in guarding, maintaining, or fulfilling.",etym:[{m:"BE-",s:"thoroughly"},{m:"TRADERE",s:"hand over"}],
origin:"Middle English betraien - to thoroughly hand over. Latin tradere (to hand over, to betray). The same root gives us 'traitor' and 'tradition' (handing down). Betray has both the obvious meaning (treachery) and the GRE meaning: to reveal inadvertently.",
hook:"GRE SECONDARY MEANING: <span class='hook-keyword'>Betray</span> in a GRE reading context often means to REVEAL INADVERTENTLY - not to commit treachery. 'Her voice betrayed her anxiety' = her voice revealed her anxiety against her intentions. The voice didn't lie - it accidentally told the truth. 'His hands betrayed his fear.' <strong>When betray appears in a literary or analytical context, look for the 'unintentional revelation' meaning before assuming 'treachery.'</strong>"},

{g:3,w:"Bucolic",pos:"adjective",def:"Relating to the pleasant aspects of the countryside and country life.",etym:[{m:"BOUS",s:"ox"}],
origin:"Greek boukolikos - of a herdsman, from boukolos (cowherd). The Greek poet Theocritus wrote 'Bucolics' - idealized poems about shepherds in peaceful rural settings. The word carries this literary idealization.",
hook:"<strong>The painting that hangs in the city apartment</strong>: rolling green hills, a stream, sheep grazing in soft morning light, a stone farmhouse with smoke from the chimney. Nobody who lives there has ever been near a working farm. But on days when the city is too much, they stand in front of it for a few minutes. The painting is <span class='hook-keyword'>bucolic</span> - an idealized countryside, curated for the pleasure of the urban imagination."},

{g:3,w:"Burgeon",pos:"verb",def:"Begin to grow or increase rapidly; flourish.",etym:[{m:"BURRION",s:"a bud"}],
origin:"Old French borjoner - to bud. A bourgeon was a bud just breaking open. Burgeon captures that specific moment: not yet fully grown, but clearly beginning to grow rapidly, visibly gathering momentum.",
hook:"<strong>In 1994, there were fewer than 3,000 websites</strong>. By 1996: 100,000. By 1998: over 2 million. The internet was <span class='hook-keyword'>burgeoning</span> - not just growing but accelerating, the bud cracking open faster with each season. The word implies early-stage explosive growth: what distinguishes burgeon from mature growth is this sense of the initial momentum, the sudden opening of potential."},

{g:3,w:"Cacophonous",pos:"adjective",def:"Involving or producing a harsh, discordant mixture of sounds.",etym:[{m:"KAKOS",s:"bad"},{m:"PHONE",s:"sound"}],
origin:"Greek kakophonos - of bad sound. Kakos (bad) + phone (voice, sound). The opposite is euphonious (well-sounding). Cacophonous is often used critically in literary analysis to describe the intentional or unintentional harshness of a sound environment.",
hook:"The construction site directly outside the recording studio. Jackhammers, backup beeping, a saw, a compressor, workers shouting over each other - all in different rhythms and pitches, none in harmony with any other. The sound engineer closes his eyes in despair. This is <span class='hook-keyword'>cacophonous</span>: not loud but discordant, a collision of sounds that refuse to organize into anything the ear can process pleasurably."},

{g:3,w:"Canonize",pos:"verb",def:"Declare (a dead person) to be a saint; treat as sacred.",etym:[{m:"KANON",s:"rule"}],
origin:"Latin canonizare - to place in the canon. A canon was originally a rule or standard; then a list of accepted books of the Bible; then a list of recognized saints. To canonize = to officially place in the authoritative list.",
hook:"The literary critic writes the definitive essay that places the previously obscure novelist alongside Dickens and Tolstoy. Within a decade, his books are on every university syllabus. He is taught to undergraduates as essential. The critic has effectively <span class='hook-keyword'>canonized</span> him - moved him from the margins into the authorized list of what must be read. Canonization happens in religion, literature, music, and film. The mechanism is always the same: official recognition that creates obligation."},

{g:3,w:"Censure",pos:"verb",def:"Express severe disapproval of (someone or something), especially in a formal statement.",etym:[{m:"CENSERE",s:"assess"}],
origin:"Latin censura - judgment, from censere (to assess, appraise). Roman censors assessed both property and character. A censure was originally an official assessment of moral standing. Now: formal, severe expression of disapproval.",
hook:"GRE SPELLING TRAP: <span class='hook-keyword'>Censure</span> (formal severe disapproval) vs <span class='hook-keyword'>Censor</span> (suppress or remove content). They look and sound similar but mean different things. 'The Senate censured the member' = officially reprimanded him. 'The government censored the newspaper' = suppressed its content. <strong>Censure = punish with words. Censor = suppress words altogether.</strong>"},

{g:3,w:"Chicanery",pos:"noun",def:"The use of trickery to achieve a political, financial, or legal purpose.",etym:[{m:"CHICANER",s:"to quibble"}],
