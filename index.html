hook:"A <strong>single sentence</strong> in the critic's review: 'The director has achieved something rare: a film that makes silence feel loud.' Everyone who reads it gets the joke two seconds later. Then they feel guilty for laughing. That delayed sting - the wit that cuts and exits before you realize you're bleeding - that's <span class='hook-keyword'>mordant</span>. It bites and is already gone.",
img:"https://googleusercontent.com/image_collection/image_retrieval/15436391115138852005_0"},

{g:9,w:"Outstrip",pos:"verb",def:"To move faster than and surpass someone or something; to exceed in achievement, growth, or speed.",
etym:[{m:"OUT-",s:"beyond"},{m:"STRIP",s:"move swiftly"}],
origin:"Strip originally meant to move at speed (related to stride). To outstrip = to stride beyond, to leave behind in your wake.",
hook:"Two runners. Same start line. For the first mile: together. Then - <strong>one runner finds another gear</strong>. Slowly, they pull ahead. Then they're gone - not just ahead but visibly, humiliatingly ahead. The other runner is still running, but they've been <span class='hook-keyword'>outstripped</span>. They're competing with a memory now. The other person is in a different race entirely.",
img:"https://googleusercontent.com/image_collection/image_retrieval/6994885218820836113_0"},

{g:9,w:"Precarious",pos:"adjective",def:"Dependent on chance; dangerously unstable and liable to collapse; held in a fragile, uncertain state.",
etym:[{m:"PRECAR",s:"prayer/entreaty (prex)"},{m:"-IOUS",s:"full of"}],
origin:"Latin precarius - obtained by prayer, uncertain. Something so unstable that continued existence requires prayer. You hold it not by right but by hope.",
hook:"A <strong>glass tower of champagne flutes</strong>. Six high. The table is slightly uneven. A server walks past two feet away. The top glass shivers. Every person in the room stops talking. Nobody breathes. One more vibration and everything comes down. That tower is <span class='hook-keyword'>precarious</span> - standing entirely by the mercy of an unconcerned universe.",
img:"https://googleusercontent.com/image_collection/image_retrieval/15959990087257122719_0"},

{g:9,w:"Quirky",pos:"adjective",def:"Having or characterized by peculiar traits or mannerisms that are unexpected and distinctive.",
etym:[{m:"QUIRK",s:"twist/oddity"},{m:"-Y",s:"having quality of"}],
origin:"Quirk = an unexpected twist or turn. Quirky = full of unexpected turns. A path that refuses to go straight.",
hook:"Your colleague <strong>keeps a collection of door handles on her desk</strong>. Not for any project - just because she finds them beautiful. She categorizes them by tactile weight. She has opinions about knob vs lever. Nobody asked. She volunteered this information on day three. She is <span class='hook-keyword'>quirky</span> - and the door handle collection, somehow, makes her more interesting, not less.",
img:"https://googleusercontent.com/image_collection/image_retrieval/1971869582001360631_0"},

{g:9,w:"Repudiate",pos:"verb",def:"To formally and publicly refuse to accept, be associated with, or acknowledge as valid; to disown completely.",
etym:[{m:"RE-",s:"against"},{m:"PUDIAT",s:"divorce/reject (repudium)"},{m:"-E",s:""}],
origin:"Latin repudiare - originally specific to formal divorce (the legal rejection of a spouse). Extended to any formal, final rejection of association.",
hook:"The politician <strong>stands at the podium and reads the statement slowly</strong>. The words from three years ago are shown on screen behind her. She says: 'I repudiate these remarks entirely. They do not represent who I am or what I believe.' The crowd doesn't know whether to trust it. But the repudiation is on record. The old self has been formally divorced.",
img:"https://googleusercontent.com/image_collection/image_retrieval/2234083193824086082_0"},

{g:9,w:"Tact",pos:"noun",def:"Skill in dealing with delicate situations without giving offense; the social grace to know what to say and what not to say.",
etym:[{m:"TACT",s:"touch (tactus)"},{m:"",s:""}],
origin:"Latin tactus - sense of touch. Tact = the delicate social touch. A person with tact handles fragile situations the way a surgeon handles fragile tissue - with practiced, precise, gentle contact.",
hook:"You have <strong>spinach on your front tooth</strong>. Your colleague notices during your 40-minute presentation. She could have shouted: 'SPINACH!' She didn't. She passed you a napkin with a subtle gesture to your own tooth. You understood. You excused yourself. This is <span class='hook-keyword'>tact</span> - the lightest possible touch that delivers the necessary information with the minimum possible embarrassment.",
img:"https://googleusercontent.com/image_collection/image_retrieval/12476182974893629222_0"},

{g:9,w:"Trifling",pos:"adjective",def:"Not serious or significant; treating important matters as if they are trivially unimportant.",
etym:[{m:"TRIFLE",s:"mockery (trufle)"},{m:"-ING",s:""}],
origin:"Old French trufle - mockery, deceit. A trifle was something you mocked. To trifle with something was to treat it as a joke. Trifling = the quality of that dismissive mockery.",
hook:"A <strong>patient tells her doctor about a persistent pain</strong>. The doctor glances up from his phone: 'Probably nothing, take some paracetamol.' She goes home. The pain continues for three months. What he offered as medical advice was a <span class='hook-keyword'>trifling</span> response to a serious concern - dismissive, minimal, treating the meaningful as if it were nothing.",
img:"https://googleusercontent.com/image_collection/image_retrieval/3341060419419231083_0"},

{g:9,w:"Turbulent",pos:"adjective",def:"Characterized by conflict, disorder, and rapid change; violently agitated and unstable.",
etym:[{m:"TURB",s:"stir/disorder (turba)"},{m:"-ULENT",s:"full of"}],
origin:"Latin turba - a crowd, a disturbance. Turbulent = full of crowds and disturbance. A turbine stirs by spinning. A turbulent situation stirs by constant, chaotic movement.",
hook:"You're on a flight over the <strong>Himalayan thermals</strong>. The plane drops six feet in an instant. The seatbelt sign blazes. Someone's coffee becomes a temporary sculpture. The plane shudders, finds air, drops again. This is physical turbulence. Now put that same shuddering energy into a decade of politics, a company's leadership, a family's finances. <span class='hook-keyword'>Turbulent</span> - nothing is stable long enough to trust.",
img:"https://googleusercontent.com/image_collection/image_retrieval/10244081791711370470_0"},

// GROUP 10
{g:10,w:"Acumen",pos:"noun",def:"The ability to make quick, accurate judgments and insightful decisions in a particular domain.",
etym:[{m:"ACU",s:"sharp (acuere)"},{m:"-MEN",s:"quality/result"}],
origin:"Latin acumen - sharpness, a point. Same root as acute (sharp angle), acuity (sharpness of perception). Mental acumen = a sharpened mind.",
hook:"A <strong>master sushi chef touches a piece of fish for two seconds</strong> and knows - without a thermometer, without a scale - exactly how long it's been aged and whether it will be used today or discarded. Twenty years of touching fish has given him sensory acumen that instruments can only approximate. <span class='hook-keyword'>Acumen</span> is the knife-edge sharpness of domain expertise."},

{g:10,w:"Antithesis",pos:"noun",def:"The direct opposite of something; a person or thing that is the complete contrary of another.",
etym:[{m:"ANTI-",s:"against"},{m:"THESIS",s:"placing/proposition"}],
origin:"Greek antithesis - placing against. The opposite proposition. In rhetoric: two contrasting ideas in parallel structure. Dickens: 'It was the best of times, it was the worst of times.'",
hook:"Good cop / <strong>bad cop</strong>. Light / dark. Silence / noise. The antithesis isn't just 'different' - it's the sharpest possible opposite. If generosity is your thesis, greed is your antithesis. Not 'less generous' - the complete other pole. <span class='hook-keyword'>Antithesis</span> is the other end of the magnet. Same scale, completely opposite charge."},

{g:10,w:"Ascribe",pos:"verb",def:"To attribute something to a particular cause, source, or person; to credit or assign origin.",
etym:[{m:"A-",s:"to"},{m:"SCRIBE",s:"write (scribere)"}],
origin:"Latin ascribere - to write to someone's account. Like adding an item to a bill under someone's name. You're assigning ownership in writing.",
hook:"The art historian <strong>stares at the painting for a long time</strong>. Brushstroke pattern. Pigment composition. The particular way shadows fall on fabric. She nods: 'This is Caravaggio.' She <span class='hook-keyword'>ascribes</span> the work to him - writes his name in the ledger of this painting's existence. Attribution is ascription. The arrow from effect to cause."},

{g:10,w:"Befuddled",pos:"adjective",def:"Confused and unable to think clearly; thoroughly bewildered and mentally muddled.",
etym:[{m:"BE-",s:"thoroughly"},{m:"FUDDLE",s:"confuse (stupefy)"}],
origin:"Fuddle meant to stupefy with drink. Befuddle = thoroughly stupefy the mind. To be befuddled is to have your thoughts scrambled the way alcohol scrambles a brain.",
hook:"You land in a city where <strong>every sign is in a script you cannot read</strong>, every person speaks a language you don't recognize, the transit system makes no sense, and your phone has no signal. You stand in the middle of a train station holding your bag. You are not angry. You are not sad. You are <span class='hook-keyword'>befuddled</span> - the thoughts that normally organize reality have been thoroughly scrambled."},

{g:10,w:"Eschew",pos:"verb",def:"To deliberately and consciously abstain from something as a matter of principle or preference.",
etym:[{m:"ES-",s:"away"},{m:"CHEW",s:"avoid/shrink (skiuhan)"}],
origin:"Old French eschiver - to avoid, from Germanic skiuhan (to dread, shrink from). Related to shy - drawing back from something.",
hook:"A <strong>lifelong vegetarian at a barbecue</strong>. The ribs smell incredible. Everyone is offering. She declines - not with disgust, not with lecture, just with quiet, consistent, principled: 'No, thank you.' She eschews meat. Not because she can't - because she has decided not to. <span class='hook-keyword'>Eschew</span> is principled abstention, not inability."},

{g:10,w:"Esoteric",pos:"adjective",def:"Intended for or understood by only a small group with specialized knowledge; obscure to the uninitiated.",
etym:[{m:"ESO-",s:"inner (eso)"},{m:"-TERIC",s:"relating to"}],
origin:"Greek esoterikos - inner. The ancient mystery schools had two kinds of teaching: exoteric (public, for everyone) and esoteric (inner, for initiates only). The inner circle's knowledge.",
hook:"The cult's <strong>outer temple teaches general virtues</strong> - kindness, discipline, charity. Anyone can attend. But the inner sanctum? Only the twelve who have passed seven years of tests. In there: ancient texts, symbols only they understand, knowledge that makes no sense without the preceding years. That knowledge is <span class='hook-keyword'>esoteric</span> - true inner-circle understanding."},

{g:10,w:"Evasive",pos:"adjective",def:"Tending to avoid giving direct answers; deliberately unclear and non-committal to prevent disclosure.",
etym:[{m:"E-",s:"out"},{m:"VADE",s:"go (vadere)"},{m:"-IVE",s:"tending to"}],
origin:"Latin evadere - to go out of the way, to escape. Same root as invade (go in) and pervade (go through). Evasive = consistently going out of the way of direct answers.",
hook:"The politician is asked: 'Did you meet with the lobbyist?' She says: <strong>'I meet with many stakeholders to understand diverse perspectives on the legislative landscape.'</strong> The journalist asks again. She says: 'My office maintains a rigorous calendar of constituent engagement.' A third time. 'Good governance requires broad consultation.' She never answered. That's <span class='hook-keyword'>evasive</span> - the art of moving constantly so the direct question never lands."},

{g:10,w:"Exculpate",pos:"verb",def:"To clear someone of blame or fault; to provide evidence that someone is not guilty of wrongdoing.",
etym:[{m:"EX-",s:"out of"},{m:"CULPA",s:"fault/blame"},{m:"-TE",s:""}],
origin:"Latin exculpare - to remove from fault. Culpa = fault (mea culpa = my fault). Exculpate = taken out of the culpa.",
hook:"Three years in prison. <strong>A DNA sample finally tested</strong>. The result comes back. The prosecutor reads it. The warden opens the cell. The wrongly convicted man walks out into sunlight. Science has done what justice failed to do: it has exculpated him. Removed him from the fault. Taken him out of culpa entirely. The word means: the evidence says they didn't do it."},

{g:10,w:"Expedite",pos:"verb",def:"To speed up the progress of something by removing obstacles; to cause something to happen more quickly.",
etym:[{m:"EX-",s:"out"},{m:"PEDITE",s:"free the feet (pes/pedis)"}],
origin:"Latin expedire - to free the feet from a snare. Impede tangled the feet; expedite freed them for fast movement. An expedition was literally 'freeing the feet' to travel.",
hook:"Red tape. <strong>Six-month approval process.</strong> Then the minister picks up the phone. One call. The six months becomes three weeks. The obstacles haven't been fixed - they've been stepped over by someone with enough authority to step. This is <span class='hook-keyword'>expedite</span> - not solving the problem, but freeing the feet from the snare so movement can continue."},

{g:10,w:"Fastidious",pos:"adjective",def:"Excessively attentive to detail and accuracy; having very high and often demanding standards.",
etym:[{m:"FASTIDIUM",s:"loathing/disgust"},{m:"-OUS",s:"full of"}],
origin:"Latin fastidiosus - disdainful, squeamish with disgust. Originally meant someone who recoiled from anything below their standard. That recoil became precision.",
hook:"The restaurant critic <strong>sends the soup back</strong>. Not because it's terrible. Because the salt is off by a fraction. The waiter thinks she's impossible. The chef thinks she's a gift. Fastidious people make everything they touch either miserable or excellent depending on whether you're the waiter or the diner. Their standards are weapons that cut both ways."},

{g:10,w:"Feign",pos:"verb",def:"To deliberately pretend to feel or be affected by something; to simulate a false emotional state.",
etym:[{m:"FEIGN",s:"shape/pretend (fingere)"},{m:"",s:""}],
origin:"Latin fingere - to shape, mold, form. The same root as fiction (shaped story), figment (shaped nothing), effigy (shaped likeness). To feign = to shape a false impression.",
hook:"The poker player gets <strong>the best hand of her life</strong>. Four aces. She feigns disappointment - a small sigh, a glance at her cards that suggests struggle. She feigns hesitation before calling. Every movement is performance. The other players read the feigned disappointment as weakness and raise. She wins everything. <span class='hook-keyword'>Feign</span> = the art of the shaped falsehood."},

{g:10,w:"Furtive",pos:"adjective",def:"Attempting to avoid notice; secretive and stealthy in manner; behaving as a thief behaves.",
etym:[{m:"FURT",s:"theft (furtum)"},{m:"-IVE",s:"tending to"}],
origin:"Latin furtivus - of or like a thief. Fur = thief. A furtive person moves the way a thief moves: quick sideways glances, hunched posture, hyperaware of being observed.",
hook:"The person who took the last cookie from the office kitchen <strong>and is now walking past the meeting room</strong>. The cookie is in their pocket. They haven't eaten it yet. They're walking slightly faster than normal. They're not making eye contact. They glance sideways at the room. This is <span class='hook-keyword'>furtive</span> - every body tells the story of the concealed cookie."},

{g:10,w:"Hamper",pos:"verb",def:"To hinder or impede the movement or progress of something; to burden and obstruct without completely stopping.",
etym:[{m:"HAMPER",s:"obstruct/weigh down"},{m:"",s:""}],
origin:"Middle English hamperen - to impede. Possibly from packing a hamper (basket) - adding weight that slows movement.",
hook:"A <strong>marathon runner carrying a laundry hamper full of wet clothes</strong>. She's still running. She hasn't stopped. But every step costs three times the energy. The hamper doesn't trip her - it just makes every movement a battle. Her time will be terrible. The hamper <span class='hook-keyword'>hampers</span> her. The burden is real, the running continues, the result suffers."},

{g:10,w:"Indispensable",pos:"adjective",def:"Absolutely necessary; so important that operations cannot function or continue without it.",
etym:[{m:"IN-",s:"not"},{m:"DISPENS",s:"do without (dispensare)"},{m:"-ABLE",s:""}],
origin:"Medieval Latin - not able to be dispensed with. Dispensed = managed without, distributed. Indispensable = the one thing you cannot manage without, ever.",
hook:"The server goes down at 2 AM. <strong>Only one engineer knows this system</strong> - the one who built it six years ago, who took seven months off, who just came back last week. The CTO is on the phone with her at 2:07 AM. She is <span class='hook-keyword'>indispensable</span>: the single point of failure that the organization built into itself, the person whose absence would mean collapse."},

{g:10,w:"Lament",pos:"verb/noun",def:"To feel or express deep sorrow, regret, or mourning; a passionate expression of grief.",
etym:[{m:"LAMENT",s:"wailing cry (lamentum)"},{m:"",s:""}],
origin:"Latin lamentum - a wailing, mourning cry. Not silent grief. Active, expressed, vocal sorrow - the kind that needs to go somewhere.",
hook:"The <strong>last day at a place you've loved</strong>. You know this is the last time you'll walk this corridor, sit at this desk, see these people every day. You don't cry. But something inside - some part of you that knew before you did that this was significant - is lamenting already. <span class='hook-keyword'>Lament</span> is sorrow that knows it's sorrow and says so."},

{g:10,w:"Myopic",pos:"adjective",def:"Lacking foresight or discernment; unable or unwilling to consider long-term consequences.",
etym:[{m:"MYO-",s:"close/shut (myein)"},{m:"PIC",s:"eye (ops)"}],
origin:"Greek myops - closing the eye to distant things. Medical nearsightedness = can see near, not far. Metaphorical myopia = can see now, not later.",
hook:"A company <strong>eliminates its R&D department</strong> to hit this quarter's earnings. The stock pops 4%. The engineers leave. Three years later, a competitor releases the product that the eliminated team was building. The company's market share halves. The decision that saved Q3 destroyed the decade. Textbook <span class='hook-keyword'>myopic</span> thinking: perfect near vision, no distance vision at all."},

{g:10,w:"Nonchalant",pos:"adjective",def:"Appearing casually calm and relaxed; showing a studied indifference to what might excite or concern others.",
etym:[{m:"NON-",s:"not"},{m:"CHALANT",s:"warm/concerned (chaloir)"},{m:"",s:""}],
origin:"French - not warmed by concern. Literally: not feeling the heat of the situation. The studied cool of someone who will not allow visible anxiety.",
hook:"The <strong>jazz musician finishes a technically extraordinary improvisation</strong> - things no human hand should do - and walks off stage while people are still standing. Someone backstage says 'that was incredible.' He shrugs, reaches for a glass of water, and says: 'Yeah.' This is <span class='hook-keyword'>nonchalant</span>. Not false modesty. Genuine refusal to be warmed by the situation."},

{g:10,w:"Partial",pos:"adjective",def:"Favoring one side over another; biased. Also: incomplete or not total.",
etym:[{m:"PART",s:"part (pars)"},{m:"-IAL",s:"relating to"}],
origin:"Latin partialis - relating to a part rather than the whole. Both meanings derive from this: biased = seeing only your part; incomplete = only part of the whole.",
hook:"GRE DOUBLE MEANING TRAP: <span class='hook-keyword'>Partial</span> = BIASED or INCOMPLETE. 'A partial account' could mean: an account that favors one side, OR an account that isn't finished. 'The judge was partial' = the judge was biased. 'A partial solution' = an incomplete solution. <strong>Context is everything. Read the sentence twice.</strong>"},

{g:10,w:"Pensive",pos:"adjective",def:"Engaged in deep, reflective thought; thoughtfully serious, often with a quality of gentle melancholy.",
etym:[{m:"PENS",s:"weigh (pensare)"},{m:"-IVE",s:"tending to"}],
origin:"Old French pensif - weighing thoughts. Latin pensare - to weigh. A pensive person is weighing something internal, turning it over in the mind.",
hook:"It's raining. <strong>You're at the window</strong>. No particular thought - or rather, too many thoughts, all running together without urgency. Something about last week. Something about next year. Nothing acute enough to demand attention but everything present enough to color the room. You are <span class='hook-keyword'>pensive</span>: the mind weighing quietly without any particular outcome required."},

{g:10,w:"Portend",pos:"verb",def:"To be a sign or warning of something about to happen; to serve as an omen of a future event.",
etym:[{m:"POR-",s:"forth"},{m:"TEND",s:"stretch (tendere)"}],
origin:"Latin portendere - to stretch forth as a sign. An omen stretches from the present into the future, pointing at what is coming.",
hook:"The <strong>birds stop singing</strong>. The dogs go inside. The wind drops completely. Old people look at the sky and say nothing. Fifteen minutes later: the storm. The silence portended the storm - it wasn't the storm itself, just the sign stretching forward from present to future saying: <em>prepare.</em> <span class='hook-keyword'>Portend</span> = what the world does before the thing happens."},

{g:10,w:"Provincial",pos:"adjective",def:"Relating to or characteristic of a province; unsophisticated and narrow-minded due to limited exposure.",
etym:[{m:"PROVINCE",s:"territory under Roman rule"},{m:"-AL",s:""}],
origin:"Latin provincialis - of the province. The province was the periphery, not Rome. Provincial attitudes = the attitudes of someone who has never been to Rome.",
hook:"A <strong>first-time visitor to any major city</strong> who has lived in one small town their whole life. They're amazed by the food variety. Overwhelmed by the crowds. Confused by the subway. Uncomfortable with the unfamiliar. This discomfort isn't stupidity - it's the direct product of limited exposure. Their worldview was shaped by one place. They are <span class='hook-keyword'>provincial</span>: not wrong, just small in scope."},

{g:10,w:"Rudimentary",pos:"adjective",def:"Involving or limited to the most basic elements; undeveloped; at the very beginning stage.",
etym:[{m:"RUDIMENT",s:"beginning/rough (rudis)"},{m:"-ARY",s:""}],
origin:"Latin rudimentum - first experience, rough beginning. Rudis = rough, untrained. Rudimentary = at the rough, unpolished beginning stage.",
hook:"The <strong>first sentence a child writes</strong>: 'I lIKe DoGs.' Uneven letters. Random capitalization. One idea. This is <span class='hook-keyword'>rudimentary</span> writing - not bad, just at the beginning, the rough stage before the smoothing starts. The rudiment is the rock before the sculptor touches it. Essential. Complete as a beginning. Entirely unfinished as everything else."},

{g:10,w:"Salutary",pos:"adjective",def:"Producing a good effect; beneficial especially in a corrective or improving way, even if unpleasant.",
etym:[{m:"SALUT",s:"health (salus)"},{m:"-ARY",s:""}],
origin:"Latin salutaris - producing health. Same root as salute (wishing health) and salvation (health of the soul). A salutary experience improves you - even if you didn't enjoy it.",
hook:"You publicly <strong>defend a wrong answer with total confidence</strong> and get corrected in front of thirty people. It's humiliating. You go home. You research the topic thoroughly. You never make that mistake again. The humiliation was a <span class='hook-keyword'>salutary</span> lesson - not pleasant to receive, but genuinely, verifiably good for you in the long run."},

{g:10,w:"Sever",pos:"verb",def:"To cut off or divide completely; to put a definitive end to a relationship or connection.",
etym:[{m:"SEVER",s:"separate (separare)"},{m:"",s:""}],
origin:"Old French sevrer - to separate. From Latin separare. The severance is complete, clean, and definitive. Not a gradual drift - a cut.",
hook:"A <strong>surgeon cuts a nerve</strong>. Not partially. Completely. Clean through. After that, no signal passes. The connection is gone. You don't gradually sever a nerve. You either sever it or you don't. This is what <span class='hook-keyword'>sever</span> implies: the clean finality of a cut. When countries sever diplomatic ties, it's not a fade - it's a scalpel."},

{g:10,w:"Slight",pos:"verb/noun",def:"To deliberately insult or offend someone by treating them as unimportant; a snub or insult by dismissal.",
etym:[{m:"SLIGHT",s:"smooth/flat/of little value (slettr)"},{m:"",s:""}],
origin:"Old Norse slettr - smooth, flat, of little worth. To slight someone = to treat them as flat, as nothing of value.",
hook:"GRE ROLE SHIFT TRAP: You know <span class='hook-keyword'>slight</span> as an adjective (slight chance, slight problem). Here it's a VERB and NOUN. 'She slighted him at the event' = she snubbed him, treated him as beneath notice. 'He felt the slight for weeks' = the snub. <strong>Slight as adjective = small. Slight as verb = to treat someone AS IF they're small.</strong>"},

{g:10,w:"Somnolent",pos:"adjective",def:"Sleepy and drowsy; inclined to fall asleep; causing or characterized by sleepiness.",
etym:[{m:"SOMN",s:"sleep (somnus)"},{m:"-OLENT",s:"having quality of"}],
origin:"Latin somnus - sleep. The same root gives us insomnia (no sleep) and somnambulism (sleep-walking). Somnolent = full of sleep.",
hook:"GRE PAIR: <span class='hook-keyword'>Somnolent</span> (feeling sleepy - the STATE) vs <span class='hook-keyword'>Soporific</span> (causing sleep - the CAUSE). The lecture is soporific. The students are somnolent. The cause is the boring lecture; the effect is the drowsy students. <strong>Remember: somnolent = SOMNUS = the sleep itself. Soporific = the thing that puts you there.</strong>"},

{g:10,w:"Stoic",pos:"adjective",def:"Enduring pain, hardship, or difficulty without complaining or showing one's feelings; impassive.",
etym:[{m:"STOIC",s:"of the Stoa (porch)"},{m:"",s:""}],
origin:"The Stoic philosophers met at the Painted Porch (Stoa) in Athens, teaching that external events cannot harm you if you control your response. The philosophy became the word.",
hook:"The news arrives. <strong>Everything he's worked for is gone.</strong> He reads the email twice. He closes his laptop. He makes tea. He sits at the table. Later that evening, he calls his team to plan next steps. He does not scream. He does not cry (in public). He processes internally and continues. This is <span class='hook-keyword'>stoic</span> - not the absence of feeling, but the mastery of its expression."},

{g:10,w:"Supersede",pos:"verb",def:"To take the place of something previously in authority or use; to replace and render obsolete.",
etym:[{m:"SUPER-",s:"above"},{m:"SEDE",s:"sit (sedere)"}],
origin:"Latin supersedere - to sit above something, displacing it from its seat. When a new king sits on the throne, the old king no longer sits there.",
hook:"Digital cameras <strong>superseded film cameras</strong>. Not gradually. Irreversibly. The film camera didn't retire gracefully - the digital camera climbed into its chair and refused to move. The film camera still exists, but in the way a dethroned king 'exists.' <span class='hook-keyword'>Supersede</span> = to take the seat of authority from something that previously held it."},

{g:10,w:"Tout",pos:"verb",def:"To promote or advertise something loudly and enthusiastically; to publicize something with boastful praise.",
etym:[{m:"TOUT",s:"look out for customers (tuten)"},{m:"",s:""}],
origin:"Middle English tuten - to peep or look out for customers. The tout was the person who stood at the entrance looking for potential buyers and enthusiastically pulling them in.",
hook:"The <strong>carnival barker</strong>: 'Step right up! Greatest show on Earth! Never been seen before! You will tell your grandchildren!' His entire job is enthusiasm as a product. He touts the show before anyone's seen it. Touting = the performance of belief in something, amplified to maximum volume and deployed on strangers."},

{g:10,w:"Wane",pos:"verb",def:"To decrease in vigor, power, or extent; to decline gradually from a previously full or strong state.",
etym:[{m:"WANE",s:"lessen (wanian)"},{m:"",s:""}],
origin:"Old English wanian - to lessen. Related to want (originally: lacking). The moon wanes = the missing part grows. The lessen and the lack share a root.",
hook:"The full moon - <strong>night after night - slowly shrinks</strong>. Not suddenly. Night one: barely noticeable. Night five: clearly a crescent. Night fourteen: a sliver. Night twenty-nine: gone. Nothing dramatic happened. The moon didn't break. Its power simply waned - the gradual, natural diminishment of what was full. <span class='hook-keyword'>Wane</span> is the slow shrinking of something that was once complete."},

// GROUP 11
{g:11,w:"Abhor",pos:"verb",def:"To regard with intense disgust and hatred; to detest utterly with a quality of moral revulsion.",
etym:[{m:"AB-",s:"away from"},{m:"HOR",s:"shudder (horrere)"}],
origin:"Latin abhorrere - to shudder away from something in horror. The physical recoil of disgust that preceded all thought.",
hook:"The <strong>physical sensation of encountering something morally repugnant</strong>: the stomach turns, the body pulls back before the mind has processed why. This involuntary recoil - the shuddering away - is abhorrence. You can dislike things intellectually. You <span class='hook-keyword'>abhor</span> things with your whole body, the revulsion arriving before the reasoning."},

{g:11,w:"Boisterous",pos:"adjective",def:"Noisy, energetic, and cheerfully rowdy; exuberantly and unrestainedly lively.",
etym:[{m:"BOISTEROUS",s:"rough/wild (boistous)"},{m:"",s:""}],
origin:"Middle English boistous - rough, violent, wild. Evolved from wild roughness to energetic festive noise. The energy remained; the violence softened into exuberance.",
hook:"<strong>Final whistle. The underdog wins.</strong> The dressing room explodes: forty minutes of everyone shouting at once, music, water bottles flying, someone doing a completely unnecessary backflip. Pure noise, pure energy, pure collective joy that doesn't know what to do with itself. This is <span class='hook-keyword'>boisterous</span> - festive pandemonium that nobody wants to contain."},

{g:11,w:"Chivalrous",pos:"adjective",def:"Courteous, gallant, and honorable in conduct, especially toward those in weaker positions.",
etym:[{m:"CHEVAL",s:"horse (cheval)"},{m:"-ROUS",s:"having quality of"}],
origin:"Old French cheval - horse. A chevalier was a knight on horseback. The horse gave him power; the code of chivalry governed how that power was used. The code became the word.",
hook:"The knight has the <strong>power to take everything</strong> - land, goods, submission. That's what power means. But the code says: protect the weak, defend the helpless, honor your word even to your enemy. The power is the same; the conduct transforms it. That gap between what you could do and what you choose to do - that's <span class='hook-keyword'>chivalrous</span>."},

{g:11,w:"Churlish",pos:"adjective",def:"Rude in a mean-spirited and ungracious way; sulkily uncooperative or difficult.",
etym:[{m:"CHURL",s:"lowest-rank peasant (ceorl)"},{m:"-ISH",s:"having quality of"}],
origin:"Old English ceorl - a free peasant of the lowest social rank. The manners (or lack thereof) associated with this rank: rough, ungracious, and unaware of social obligation.",
hook:"Someone <strong>bakes you a cake for your birthday</strong>. It's not the flavor you'd have chosen. A churlish person says: 'I don't really like lemon.' A generous person says nothing and eats it with evident pleasure. The churlish response isn't just honest - it's ungracious. It fails to meet the social obligation that a gift creates. <span class='hook-keyword'>Churlish</span> = sour where warmth was called for."},

{g:11,w:"Clandestine",pos:"adjective",def:"Kept secret or done secretly, especially because it involves something illicit or politically sensitive.",
etym:[{m:"CLAM",s:"secretly (clam)"},{m:"-DESTINE",s:"hidden"}],
origin:"Latin clandestinus - from clam (secretly). The root of conceal shares this family. Something clandestine is designed to stay in the dark.",
hook:"A <strong>photograph taken through a long lens</strong> of two people who should not be meeting, shaking hands in an underground parking garage. Both wearing hats. Neither's car visible. No phones. They've been careful. They have been conducting a <span class='hook-keyword'>clandestine</span> meeting - not secret because it's merely private, but secret because what they're doing shouldn't be seen."},

{g:11,w:"Complacent",pos:"adjective",def:"Smugly self-satisfied and uncritical; dangerously satisfied with one's current state to the point of negligence.",
etym:[{m:"COM-",s:"completely"},{m:"PLACENT",s:"please (placere)"}],
origin:"Latin complacere - to be completely pleased with oneself. The danger isn't the satisfaction itself - it's the uncritical quality that lets threats go unnoticed.",
hook:"The <strong>champion goes into the match expecting to win</strong>. She doesn't watch the footage of her opponent. She doesn't adjust her training. She's won this tournament four times. She loses in straight sets. In the post-match interview she looks genuinely surprised. She was <span class='hook-keyword'>complacent</span> - so pleased with herself that she stopped preparing for a world that was catching up."},

{g:11,w:"Cumbersome",pos:"adjective",def:"Large, heavy, or complex in a way that makes movement or use difficult; burdensome in operation.",
etym:[{m:"CUMBER",s:"hinder/obstruct"},{m:"-SOME",s:"characterized by"}],
origin:"Cumber - to obstruct or burden, from Old French combrer. Something cumbersome doesn't just weigh physically - it impedes by its sheer awkward bulk.",
hook:"You're moving apartments. You have a <strong>sofa that doesn't fit in the elevator</strong>. Doesn't fit on the stairs properly either. Requires three people, two rests, one wall re-paint, and a vocabulary of profanity. The sofa functions perfectly as a sofa. As something being moved, it is magnificently <span class='hook-keyword'>cumbersome</span> - its size and weight make every operation a trial."},

{g:11,w:"Debilitating",pos:"adjective",def:"Causing severe weakening of strength or ability; making normal functioning extremely difficult or impossible.",
etym:[{m:"DE-",s:"remove"},{m:"BILIT",s:"able (habilis)"},{m:"-ATING",s:""}],
origin:"Latin debilitare - to make incapable. Habilis = able, capable. De-habilis = unable. Debilitate = strip someone of their ability.",
hook:"It starts as a <strong>headache</strong>. Then nausea. Then the light is too bright. Then standing is too much. You lie in the dark. You cannot answer emails. You cannot have a conversation. You cannot make decisions. Everything has been removed: concentration, energy, capacity for thought. The migraine is <span class='hook-keyword'>debilitating</span> - not just painful, but functionally incapacitating."},

{g:11,w:"Deliberate",pos:"adjective/verb",def:"Done consciously and intentionally (adj); to engage in careful consideration before deciding (verb).",
etym:[{m:"DELIBER",s:"weigh (librare)"},{m:"-ATE",s:""}],
origin:"Latin deliberare - to weigh carefully. Libra = the scales. Deliberate = putting decisions on the scales and examining each side before choosing.",
hook:"GRE DOUBLE FUNCTION: <span class='hook-keyword'>Deliberate</span> is both ADJECTIVE and VERB. 'A <em>deliberate</em> choice' = an intentional choice (adjective). 'The jury will <em>deliberate</em>' = the jury will carefully weigh the evidence (verb). <strong>Deliberate-ADJ: she chose this on purpose. Deliberate-VERB: she put it on the scales and measured.</strong>"},

{g:11,w:"Droll",pos:"adjective",def:"Curious or unusual in a way that provokes quiet, dry amusement; wryly and subtly comical.",
etym:[{m:"DROLL",s:"odd little fellow (drol)"},{m:"",s:""}],
origin:"Dutch drol - an odd little person who amused by their strangeness. The word carries the image of something funny in a way that takes a moment to register.",
hook:"The <strong>obituary of a notoriously stern official reads</strong>: 'He is survived by his collection of ceramic owls and a deep, unironic love of polka music.' Nobody laughs immediately. Then - two seconds later - a suppressed smile. This is <span class='hook-keyword'>droll</span>: the kind of funny that takes the slow route, arrives quietly, and sits in the corner of your face rather than demanding a full laugh."},

{g:11,w:"Eccentric",pos:"adjective",def:"Unconventional and slightly strange in behavior or appearance; departing significantly from normal patterns.",
etym:[{m:"EC-",s:"out of"},{m:"CENTRIC",s:"center (kentron)"}],
origin:"Greek ekkentros - off center. Originally mathematical/astronomical: an orbit not centered on the expected point. An eccentric person's orbit just doesn't circle the same center as everyone else's.",
hook:"Imagine a <strong>solar system where one planet orbits at a completely different angle</strong> from all the others. Not wrong, not broken - just operating on a different axis than anyone expected. An eccentric person is that planet: everything works, but the orbit is distinctly their own. They are not broken. They are just not centered on the usual point."},

{g:11,w:"Fractious",pos:"adjective",def:"Easily irritated and difficult to control; tending to cause trouble and quarrels; unruly.",
etym:[{m:"FRACT",s:"break (frangere)"},{m:"-IOUS",s:"full of"}],
origin:"Latin fractio - a breaking. Same root as fracture, infraction, fragile. Fractious things break control - they fracture the expected order.",
hook:"A <strong>coalition government with seven parties</strong>. Three want to cut taxes. Two want to raise them. One won't discuss taxes. One has conditions. Every vote is a negotiation. Every committee becomes a conflict. Nothing holds. The whole structure keeps nearly breaking. This is <span class='hook-keyword'>fractious</span> - full of internal fractures, constantly breaking apart and barely being held together."},

{g:11,w:"Limpid",pos:"adjective",def:"Completely clear and transparent; free from turbidity; lucidly clear in expression.",
etym:[{m:"LIMPID",s:"clear/transparent (limpidus)"},{m:"",s:""}],
origin:"Latin limpidus - clear, transparent. Possibly from lympha - clear water. The image of pure water you can see through completely.",
hook:"You're standing on a <strong>dock over still water in the early morning</strong>. Not just clear - absolutely transparent. You can see the individual stones on the bottom eight feet down. You can count them. Not a particle of sediment disturbs the view. This is <span class='hook-keyword'>limpid</span>. When applied to writing: prose so clear you can see all the way through it to the idea beneath, with no turbidity of jargon or confusion."},

{g:11,w:"Mawkish",pos:"adjective",def:"Sentimental in a sickly, exaggerated, or false way; cloying to the point of revulsion.",
etym:[{m:"MAWK",s:"maggot (mathkr)"},{m:"-ISH",s:"having quality of"}],
origin:"Old Norse mathkr - a maggot. Something mawk originally produced nausea. Mawkish sentiment = sentimentality so overdone it becomes nauseating.",
hook:"The charity advertisement: <strong>slow piano, a child's voice, soft focus, a celebrity's tear</strong>. The suffering is real. But the packaging is so engineered, so precisely calibrated for maximum emotional extraction, that it tips over - not into compassion but into something nauseating. Like eating pure frosting. The sentiment has curdled. It's <span class='hook-keyword'>mawkish</span> - sentimental past the point of sincerity, into the territory of manipulation."},

{g:11,w:"Obeisance",pos:"noun",def:"A gesture of deference or respect such as a bow or curtsy; the attitude of deep submission.",
etym:[{m:"OBEI",s:"obey (obeir)"},{m:"-SANCE",s:"act/quality of"}],
origin:"Old French obeissance - the act of obeying. The physical enactment of subordination - a bow that says 'I recognize your greater status.'",
hook:"The <strong>courtier enters the throne room</strong>. He does not walk normally. He bows deeply at the door. He approaches at an angle. He bows again. Every movement is a choreographed declaration of the distance between his station and the king's. This elaborate physical language of submission is <span class='hook-keyword'>obeisance</span>: not just respect, but the performance of one's own smallness."},

{g:11,w:"Ostentatious",pos:"adjective",def:"Characterized by a conspicuous display of wealth or knowledge designed to impress others.",
etym:[{m:"OSTENT",s:"show (ostendere)"},{m:"-ATIOUS",s:"inclined to"}],
origin:"Latin ostentare - to show off. From ob + tendere (to stretch before someone's eyes). To put something in front of people's faces so they must look.",
hook:"The <strong>watch is positioned precisely on the wrist</strong> to be visible in every Zoom call. The car is parked facing outward. The designer logo is the right size to be recognized but not tacky enough to be called out. Everything is calibrated for maximum display with minimum accusation of trying. This is <span class='hook-keyword'>ostentatious</span> - the elaborate performance of not-performing while performing constantly."},

{g:11,w:"Panacea",pos:"noun",def:"A solution or remedy believed to cure all problems or difficulties; a supposed universal cure.",
etym:[{m:"PAN-",s:"all"},{m:"ACEA",s:"remedy (akos)"}],
origin:"Greek panakeia - all-remedy. Panacea was a goddess of universal healing, daughter of Asclepius. The GRE almost always uses panacea skeptically - 'X is no panacea.'",
hook:"GRE USAGE: <span class='hook-keyword'>Panacea</span> almost always appears to be REJECTED. 'Technology is no panacea.' 'The policy, while helpful, is not a panacea for urban poverty.' The word exists in GRE passages mostly to set up the argument that there is NO single solution to a complex problem. If you see panacea, prepare for 'but...'"},

{g:11,w:"Perfunctory",pos:"adjective",def:"Carried out with minimal effort or thought; done as routine duty without real care or engagement.",
etym:[{m:"PER-",s:"through/completely"},{m:"FUNCT",s:"perform (fungi)"},{m:"-ORY",s:""}],
origin:"Latin perfunctorius - going through the function without engaging with it. Like an actor who has said the lines ten thousand times and no longer means any of them.",
hook:"<strong>The safety briefing on a flight</strong>. The flight attendant has performed this 300 times this month. She points at the exits. She holds up the seatbelt. She recites the words. Her voice has exactly the intonation of someone who is technically present but completely absent. This is <span class='hook-keyword'>perfunctory</span> - the form of an action without the substance. The motions, perfectly executed, meaning nothing."},

{g:11,w:"Perilous",pos:"adjective",def:"Full of danger or risk; hazardous in a way that involves genuine threat to well-being or existence.",
etym:[{m:"PERIL",s:"danger (periculum)"},{m:"-OUS",s:"full of"}],
origin:"Latin periculum - danger, risk, trial. From periri - to try one's luck against something. Perilous = full of risks that try your luck against real danger.",
hook:"The <strong>rope bridge over the gorge</strong>. Three hundred feet down. The ropes are old. The planks are uneven. Three have fallen through already. Every step requires judgment. Every wind gust is a calculation. You can make it across - but the margin for error is small and the consequence of error is permanent. This is <span class='hook-keyword'>perilous</span>: danger that is real, not imagined, with genuine stakes at every step."},

{g:11,w:"Pervasive",pos:"adjective",def:"Spreading through every part of something; present and apparent throughout a system or environment.",
etym:[{m:"PER-",s:"through"},{m:"VADE",s:"go (vadere)"},{m:"-IVE",s:""}],
origin:"Latin pervadere - to go through everything. The same root as invade (go in), evade (go out), pervade (go through). Pervasive = constantly going through.",
hook:"The smell of smoke <strong>after a kitchen fire</strong>. The fire is out. But the smell is in the curtains, the cushions, the carpet, the clothing in the closet three rooms away. You wash things. You open windows. Still there. The smell has gone through everything. It is <span class='hook-keyword'>pervasive</span> - not localized, not contained, but distributed through the entire environment."},

{g:11,w:"Preclude",pos:"verb",def:"To prevent something from happening by making it impossible in advance; to rule out entirely.",
etym:[{m:"PRE-",s:"before"},{m:"CLUDE",s:"shut/close (claudere)"}],
origin:"Latin praecludere - to shut the way before something can pass through. Same root as include (shut in), exclude (shut out), conclude (shut completely).",
hook:"You arrive at the concert venue. <strong>The door is locked. Bolted. Signed: SOLD OUT - NO ENTRY.</strong> You didn't even get to buy a ticket. The sold-out status <span class='hook-keyword'>precludes</span> your entry - it shuts the door before you arrive, before the possibility can materialize. You cannot be refused because you're not even in the queue. The door was closed on a future that was canceled in advance."},

{g:11,w:"Predilection",pos:"noun",def:"A pre-existing preference or liking for something; a habitual bias toward a particular thing.",
etym:[{m:"PRE-",s:"before"},{m:"DILECT",s:"love/prefer (diligere)"},{m:"-ION",s:""}],
origin:"Latin praediligere - to love in advance. A preference that exists before the encounter. You arrive already liking it.",
hook:"Before the sommelier has finished describing the wine, <strong>you already know you'll like it</strong>. Red, Italian, aged: you have an established preference. It's not this specific bottle - it's a habitual tendency toward a type. You arrive with your liking pre-installed. This is <span class='hook-keyword'>predilection</span>: a love that was there before the object showed up."},

{g:11,w:"Rapacious",pos:"adjective",def:"Aggressively greedy; taking everything possible without restraint; predatorily acquisitive.",
etym:[{m:"RAP",s:"seize (rapere)"},{m:"-ACIOUS",s:"inclined to"}],
origin:"Latin rapere - to seize, snatch. Same root as raptor (bird that seizes), rapture (seized by joy), rape (seized forcibly). Rapacious = inclined to seize everything.",
hook:"A <strong>hawk spots a field mouse from 200 feet</strong>. It doesn't take what it needs. It takes everything in its field of vision and comes back for more. This is the raptor's nature: total acquisition, no restraint. The <span class='hook-keyword'>rapacious</span> corporation is this hawk at industrial scale: acquiring companies, markets, talent, resources - not because it needs them, but because its nature is to seize."},

{g:11,w:"Relish",pos:"verb",def:"To enjoy something greatly with keen, active pleasure; to savor and take delight in an experience.",
etym:[{m:"RELISH",s:"aftertaste (relas)"},{m:"",s:""}],
origin:"Old French relas - what remains after, the lingering aftertaste. What you relish is what you savor even after it's over. The pleasure that lingers.",
hook:"The <strong>final out in the championship game</strong>. The coach doesn't rush to the celebration. He stands at the dugout for one extra moment, watching the players pile on each other, and he lets the moment land. He tastes it completely. He <span class='hook-keyword'>relishes</span> this - not passively enjoying it, but actively savoring every second, the way you hold good wine in your mouth before swallowing."},

{g:11,w:"Satirical",pos:"adjective",def:"Using humor, irony, or exaggeration to expose and criticize foolishness, vice, or social hypocrisy.",
etym:[{m:"SATIR",s:"mixed dish/medley (satira)"},{m:"-ICAL",s:""}],
origin:"Latin satira - a mixed dish of verse, a medley of criticism. A 'full' dish of critique. Satire was the buffet of Roman criticism.",
hook:"The <strong>political cartoon shows the senator as a puppet</strong>, strings clearly visible, being worked by a tiny figure labeled 'LOBBY.' Below it: the senator's own quote about 'unwavering independence.' Nobody claims the cartoon is factual. Everyone understands what it's saying. This is <span class='hook-keyword'>satirical</span> - using exaggeration and image to say what a factual account cannot."},

{g:11,w:"Sham",pos:"noun/adjective",def:"Something that is not what it purports to be; a fraud or counterfeit presented as genuine.",
etym:[{m:"SHAM",s:"possibly from shame"},{m:"",s:""}],
origin:"Possibly dialectal pronunciation of shame. A sham is something that should be ashamed of what it pretends to be - the pretense of legitimacy without its substance.",
hook:"The <strong>election results are announced</strong>. International observers note: no real opposition was permitted. Ballots were pre-counted. The winner won with 97.3% of the vote. This election has all the trappings of democracy - ballot boxes, voting cards, results announced - and none of the substance. It's a <span class='hook-keyword'>sham</span>: the form of legitimacy concealing its complete absence."},

{g:11,w:"Skirt",pos:"verb",def:"To go around or along the edge of something; to avoid dealing with something directly; to evade.",
etym:[{m:"SKIRT",s:"go around the edge (skyrta)"},{m:"",s:""}],
origin:"Old Norse skyrta - a garment that goes around the body. The garment inspired the verb: to go around the periphery of something rather than through it.",
hook:"A <strong>skilled politician answers 47 minutes of questions</strong> about the scandal. He mentions the scandal's topic. He mentions the timeline. He mentions other scandals, larger scandals, and his own commitment to transparency. He never once directly addresses the specific allegation. He has <span class='hook-keyword'>skirted</span> it - stayed on the perimeter, touched every edge, and never once entered the center."},

{g:11,w:"Sluggish",pos:"adjective",def:"Slow-moving and lacking energy or alertness; below normal speed or responsiveness.",
etym:[{m:"SLUG",s:"slow creature"},{m:"-ISH",s:"having quality of"}],
origin:"From slug - a famously slow creature. Sluggish = having the qualities of a slug's movement. The animal gave the language one of its most evocative adjectives.",
hook:"A <strong>slug moves at 0.03 miles per hour</strong>. It arrives. It just takes a while. Everything around it has moved on by the time it completes a journey of twelve inches. A <span class='hook-keyword'>sluggish</span> economy, a sluggish metabolism, a sluggish bureaucracy - all technically in motion, but at slug speed. Functional. Technically. But don't hold your breath."},

{g:11,w:"Spartan",pos:"adjective",def:"Deliberately austere and simple; showing indifference to comfort or luxury; severely functional.",
etym:[{m:"SPARTAN",s:"of Sparta"},{m:"",s:""}],
origin:"The ancient Spartan society deliberately rejected comfort, decoration, and luxury as signs of weakness. Their city had no walls - their soldiers were the walls. Their lifestyle became a word.",
hook:"The <strong>Spartan boy was given one cloak</strong> for winter. No second one. Not because they couldn't afford it - but because cold builds character. Hunger builds discipline. Discomfort builds soldiers. The deliberate rejection of ease was a value system. A <span class='hook-keyword'>spartan</span> lifestyle isn't poverty - it's the principled choice of the minimum, in the belief that the minimum makes you strong."},

{g:11,w:"Truculent",pos:"adjective",def:"Eager to argue or fight; aggressively defiant and hostile; deliberately contentious.",
etym:[{m:"TRUC",s:"fierce/savage (trux)"},{m:"-ULENT",s:"full of"}],
origin:"Latin truculentus - from trux (savage, fierce). Related to atrocious. An inherent ferocity that spills into every interaction.",
hook:"The defendant, instead of remaining quiet as advised, <strong>challenges the judge to a debate</strong> about the validity of the entire legal system, twice accuses the prosecutor of perjury, and corrects the court stenographer's spelling. He has been warned four times. He becomes louder. This is <span class='hook-keyword'>truculent</span>: not just pugnacious (looking for a fight) but aggressively, theatrically defiant of every authority in the room."},

// GROUP 12
{g:12,w:"Acrimonious",pos:"adjective",def:"Angry and bitter in manner or spirit; caustic and sharp in tone especially regarding disagreements.",
etym:[{m:"ACRI",s:"sharp/bitter (acer)"},{m:"MON",s:"quality"},{m:"-IOUS",s:""}],
origin:"Latin acrimonia - sharpness, bitterness. Same root as acrid (sharp smell), acerbic (sharp taste), acumen (mental sharpness). The sharpness of bitterness.",
hook:"Two siblings <strong>haven't spoken in seven years</strong>. They meet at a family event. Every word exchanged has weight. The pleasantries are tiny explosions. The congratulations contain venom. The smile is a performance hiding seven years of grievance. This is <span class='hook-keyword'>acrimonious</span>: not anger that burns hot and fades, but anger that has aged into something sharper - bitterness with an edge."},

{g:12,w:"Belligerent",pos:"adjective",def:"Hostile and aggressive; inclined to conflict; waging war or displaying war-like aggression.",
etym:[{m:"BELLI",s:"war (bellum)"},{m:"GERENT",s:"waging (gerere)"}],
origin:"Latin belligerans - waging war. Bellum = war. The same root gives us bellicose (prone to war) and antebellum (before the war). A belligerent party wants to fight.",
hook:"At the negotiating table, one side <strong>arrives with demands rather than proposals</strong>. They reject every counteroffertwo syllables in. They threaten to walk out by the second hour. Their lawyer issues a press release before the meeting ends. They are not negotiating. They are conducting warfare through different instruments. <span class='hook-keyword'>Belligerent</span>: carrying the war posture into every interaction."},

{g:12,w:"Beneficent",pos:"adjective",def:"Resulting in good; actively doing good through charitable and generous actions.",
etym:[{m:"BENE-",s:"well/good"},{m:"FICENT",s:"doing/making (facere)"}],
origin:"Latin bene + facere - doing well. Same root as benefit, benevolent, benefactor. Beneficent = actively making good things happen.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Beneficent</span> (DOING good) vs <span class='hook-keyword'>Benevolent</span> (MEANING well). The road to hell is paved with benevolent intentions. Beneficent = the actual road of good outcomes. You can be benevolent and ineffective. Beneficent means the good actually happened - the intention became result."},

{g:12,w:"Canny",pos:"adjective",def:"Shrewd and astute in one's practical dealings; displaying sharp practical intelligence and clever judgment.",
etym:[{m:"CAN",s:"know/be able (kennen)"},{m:"-NY",s:"having quality of"}],
origin:"Scottish and Northern English - from 'can' in the sense of 'know.' A canny person knows what they're doing in a practical, street-smart way.",
hook:"In the negotiation, everyone is focused on the price. The <strong>canny buyer says nothing about price for 40 minutes</strong>. He asks questions. He learns that the seller needs to close by month end. He asks what other offers are on the table. He learns there are none. Now he knows: he has leverage. He has been <span class='hook-keyword'>canny</span> - gathering intelligence before revealing his position, seeing angles no one was defending."},

{g:12,w:"Cavalier",pos:"adjective",def:"Showing a dismissive lack of proper concern for serious matters; treating important things as trivially unimportant.",
etym:[{m:"CAVALIER",s:"knight on horseback"},{m:"",s:""}],
origin:"French cavalier - a mounted knight. The easy confidence of someone on horseback looking down. That breezy superiority became the word for dismissive unconcern.",
hook:"The safety officer presents the report: <strong>17 documented near-misses in three months</strong>. The director glances at it, says 'We've always done it this way, it'll be fine,' and changes the subject to lunch reservations. His attitude is <span class='hook-keyword'>cavalier</span> - mounted on the horse of his own assumption, looking down at the report, too breezy to be worried about what's beneath him."},

{g:12,w:"Distressed",pos:"adjective",def:"Suffering acute anxiety, sorrow, or pain; in a state of extreme emotional or physical suffering.",
etym:[{m:"DIS-",s:"extremely"},{m:"STRESS",s:"bind tight (stringere)"}],
origin:"Old French destresse - from Latin distringere (to bind extremely tightly). Beyond stressed. The binding has gone too tight - past discomfort into suffering.",
hook:"The <strong>call comes at 2 AM</strong>. Something has gone wrong that cannot be fixed by morning. The person receiving the call sits at the kitchen table in the dark afterward. Not crying. Not moving. Just the weight of something that is too much - pressing down from every direction at once. This is <span class='hook-keyword'>distressed</span>: not just sad, but bound tightly by something that has exceeded the capacity to manage normally."},

{g:12,w:"Dwindling",pos:"adjective",def:"Gradually diminishing in size, amount, or strength; steadily shrinking toward eventual exhaustion.",
etym:[{m:"DWINDLE",s:"waste away (dwinan)"},{m:"-ING",s:""}],
origin:"Old English dwinan - to waste away. The gradual, continuous process of diminishment over time.",
hook:"Watch a <strong>candle burn over three hours</strong>. You don't see it moving. But look away and look back: it's shorter. Look away again: shorter still. The wax is just... going. Not fast enough to notice moment to moment. Just consistently, inevitably going. This is <span class='hook-keyword'>dwindling</span>: the slow, continuous subtraction that you only notice when you look away and look back."},

{g:12,w:"Eclipse",pos:"verb",def:"To deprive of significance by surpassing; to overshadow so completely as to render invisible or irrelevant.",
etym:[{m:"EC-",s:"out"},{m:"LIPSE",s:"leave/abandon (leipein)"}],
origin:"Greek ekleipsis - abandonment of position. The sun 'abandons' its light during an eclipse. When you eclipse someone, you block their light so completely they become invisible.",
hook:"The daughter's debut novel wins every prize her celebrated father won - <strong>in her first year</strong>. The father is now introduced at events as 'the father of.' He still writes. His work is still good. But the light has shifted. She hasn't pushed him out - she has simply become brighter. He has been <span class='hook-keyword'>eclipsed</span>: the light blocked by someone who rose between him and the world's attention."},

{g:12,w:"Encyclopedic",pos:"adjective",def:"Covering a wide range of subjects comprehensively; possessing information across an extremely broad spectrum.",
etym:[{m:"ENKYKLIOS",s:"circular/complete"},{m:"PAIDEIA",s:"education"}],
origin:"Greek enkyklios paideia - a complete circuit of education. An encyclopedia was the full circle of knowledge. Encyclopedic = spanning that full circle.",
hook:"The <strong>dinner guest who knows something about everything</strong>: geology, early Flemish painting, fermentation chemistry, the specific failure modes of the 1997 Asian financial crisis, the mating habits of the wandering albatross. You mention something obscure. He already knows something about it. His knowledge is <span class='hook-keyword'>encyclopedic</span> - covering the full circle, not deep in any single point but spanning everything."},

{g:12,w:"Exacerbate",pos:"verb",def:"To make an already bad situation worse; to intensify the severity or degree of something negative.",
etym:[{m:"EX-",s:"intensifier"},{m:"ACERB",s:"bitter/sharp (acerbus)"},{m:"-ATE",s:""}],
origin:"Latin exacerbare - to make more bitter/harsh. From acer (sharp). Same root as acrimonious, acrid. Exacerbate = to sharpen a bad thing into something worse.",
hook:"The house is already on fire. Someone <strong>opens all the windows</strong>. The oxygen feeds the flames. What was a kitchen fire is now the entire ground floor. The action didn't cause the fire - it exacerbated it. Made the bad thing dramatically worse. <span class='hook-keyword'>Exacerbate</span>: the word for when you add sharpness to something that was already cutting."},

{g:12,w:"Exasperated",pos:"adjective",def:"Intensely irritated and frustrated; at the absolute end of one's patience through repeated provocation.",
etym:[{m:"EX-",s:"intensifier"},{m:"ASPER",s:"rough (asper)"},{m:"-ATED",s:""}],
origin:"Latin exasperare - to make thoroughly rough. Asper = rough. To be exasperated = to have been roughed up to the limit of endurance.",
hook:"You have explained this concept <strong>four times</strong>. Different approaches. Different examples. The fifth question arrives and it's the same misunderstanding. Something behind your eye twitches. Your voice, involuntarily, drops into a particular register. You don't yell. You explain again. But you are <span class='hook-keyword'>exasperated</span> - not angry at this moment, but worn rough by the accumulation of moments."},

{g:12,w:"Fungible",pos:"adjective",def:"Able to be replaced by an identical item; mutually interchangeable; perfectly equivalent in all relevant respects.",
etym:[{m:"FUNGI",s:"perform (fungi)"},{m:"-BLE",s:"capable of"}],
origin:"Medieval Latin fungibilis - from fungi (to perform, discharge). Something fungible can discharge the same function as another. One unit performs the same function as any other unit.",
hook:"A <strong>₹500 note</strong>. Not this particular note - just any ₹500 note. They are all the same. You don't keep track of which note you received and which you spent. Any note performs the same function as any other. Money is the canonical fungible good. When your skills become <span class='hook-keyword'>fungible</span> - replaceable by any other person performing the same function - your leverage disappears."},

{g:12,w:"Hackneyed",pos:"adjective",def:"Made meaningless through overuse; worn out by excessive repetition; lacking originality from being clichéd.",
etym:[{m:"HACKNEY",s:"horse hired out (London district)"},{m:"-ED",s:""}],
origin:"From Hackney in London - where horses were bred for hire. An overused hired horse became worn-out and common. The word migrated from worn horses to worn expressions.",
hook:"The <strong>horse is so tired it's moving on muscle memory alone</strong>. It no longer responds to the reins. It doesn't need to - it's taken this route ten thousand times. The hoofbeats have no feeling. This is a hackney horse. A <span class='hook-keyword'>hackneyed</span> phrase is the same: 'Think outside the box.' 'Move the needle.' 'Circle back.' Said so many times the meaning has dissolved. Pure hoofbeat. No horse left."},

{g:12,w:"Incongruous",pos:"adjective",def:"Out of place; inconsistent with its surroundings; creating a jarring mismatch with the context.",
etym:[{m:"IN-",s:"not"},{m:"CONGRU",s:"fit together (congruere)"},{m:"-OUS",s:""}],
origin:"Latin congruere - to come together, fit. Congruent (geometry) = fitting perfectly. Incongruent = not fitting. Incongruous = creating an obvious mismatch.",
hook:"A <strong>gourmet food truck parked in front of a dilapidated warehouse</strong> in an industrial zone. Chrome finish, truffle menu, $18 sandwiches. Around it: fork lifts, oil stains, workers in overalls. The truck is not wrong to exist. It's just magnificently out of place. Every element of its context says one thing; it says another. <span class='hook-keyword'>Incongruous</span>: the beautiful truck in the oily dock."},

{g:12,w:"Interchangeable",pos:"adjective",def:"Able to be exchanged for one another without any meaningful difference; functionally identical.",
etym:[{m:"INTER-",s:"between"},{m:"CHANGE",s:"exchange"},{m:"-ABLE",s:""}],
origin:"Inter + change - able to be changed between. When two things are interchangeable, swapping them produces no discernible difference.",
hook:"GRE PAIR: <span class='hook-keyword'>Interchangeable</span> vs <span class='hook-keyword'>Fungible</span>. Interchangeable is broader - two people, two processes, two parts can be swapped freely. Fungible is more technical/economic - implies perfect equivalence, especially of commodity units. <strong>Interchangeable: these two fit each other's roles. Fungible: these two are literally the same thing economically.</strong>"},

{g:12,w:"Laconic",pos:"adjective",def:"Using very few words to express something; remarkably brief and to the point.",
etym:[{m:"LACONIC",s:"of Laconia (Sparta)"},{m:"",s:""}],
origin:"Greek lakonikos - of the Spartans (Laconians). When Philip of Macedon threatened to destroy Sparta, they replied with one word: 'If.' Philip did not invade.",
hook:"Philip of Macedon sends a letter: <strong>'If I enter Laconia, I will raze your city to the ground.'</strong> The Spartans write back. One word: 'If.' This single syllable contains everything: we've read your threat, we've assessed it, we find it conditional, we're unconvinced, we await the outcome. No wasted words. This is <span class='hook-keyword'>laconic</span>. When one word contains a hundred, use one word."},

{g:12,w:"Lucrative",pos:"adjective",def:"Producing a great deal of profit; highly financially rewarding.",
etym:[{m:"LUCR",s:"gain/profit (lucrum)"},{m:"-ATIVE",s:"tending to"}],
origin:"Latin lucrum - profit. Same root as lucre (money, often in 'filthy lucre'). The word carries the specific gravity of financial yield.",
hook:"The <strong>cold storage facility on highway-touch land</strong> - built for ₹8 crore, generating ₹1.2 crore annually after debt service, appreciating with every food-processing plant that opens nearby. Not exciting. Not glamorous. Magnificently <span class='hook-keyword'>lucrative</span>. Lucrative things don't have to be interesting. They just have to keep producing money while you do other things."},

{g:12,w:"Magisterial",pos:"adjective",def:"Having or showing great authority; masterfully authoritative in a way that commands respect and deference.",
etym:[{m:"MAGISTR",s:"master/chief (magister)"},{m:"-IAL",s:""}],
origin:"Latin magister - master, chief. From magnus (great). The master with authority. Same root as master, magistrate, and originally magazine (a storehouse of great knowledge).",
hook:"The <strong>two-volume definitive history</strong> appears. Other historians stop writing on the topic. Not because they're told to - but because this book has said it. Comprehensively. With such authority that adding to it feels presumptuous. The work is <span class='hook-keyword'>magisterial</span>: it has taken its seat at the head of the table, and everyone else has moved to make room."},

{g:12,w:"Onerous",pos:"adjective",def:"Involving a great amount of effort and difficulty; burdensome and oppressively demanding.",
etym:[{m:"ONUS",s:"burden (onus)"},{m:"-EROUS",s:"full of"}],
origin:"Latin onerosus - loaded with burden. Onus = the burden/responsibility. Onerous = the quality of being loaded down. The onus is heavy enough to feel oppressive.",
hook:"The <strong>compliance requirement</strong>: submit daily activity logs, weekly audits, monthly financial reports, quarterly external reviews, annual certification re-tests - all in specific formats, all with different deadlines, all requiring different signatories. The company exists to build products, but 60% of its energy feeds this machinery. The regulatory burden is <span class='hook-keyword'>onerous</span>: not just heavy, but disproportionately, oppressively heavy."},

{g:12,w:"Opprobrium",pos:"noun",def:"Harsh criticism and public disgrace arising from conduct considered scandalous; severe public condemnation.",
etym:[{m:"OB-",s:"against"},{m:"PROBRUM",s:"shameful act"},{m:"",s:""}],
origin:"Latin opprobrium - the disgrace of a shameful act made public. Not private shame - public condemnation, the weight of collective moral judgment.",
hook:"The CEO announces a <strong>record bonus on the same day as mass layoffs</strong>. The next morning: every newspaper cover, every social media trending topic, every employee town hall. The condemnation is not just strong - it is total. From every direction simultaneously. The full weight of public moral judgment pressing down. This is <span class='hook-keyword'>opprobrium</span>: not criticism, but social disgrace."},

{g:12,w:"Parsimonious",pos:"adjective",def:"Extremely unwilling to spend money or use resources; stingy to an excessive and counterproductive degree.",
etym:[{m:"PARSIMONI",s:"extreme frugality (parcere)"},{m:"-OUS",s:""}],
origin:"Latin parsimonia - from parcere (to spare). To spare everything, excessively. Past frugality into its damaging extreme.",
hook:"The investor <strong>refuses to pay for due diligence on a ₹5 crore deal</strong>. The due diligence would cost ₹50,000. He says it's unnecessary. The deal collapses eight months later due to a liability that ₹50,000 of due diligence would have revealed. His parsimoniousness cost him 100 times what it saved. <span class='hook-keyword'>Parsimonious</span> is when frugality defeats itself."},

{g:12,w:"Peripheral",pos:"adjective",def:"At the edge or periphery; relating to or situated outside the main central area; of secondary importance.",
etym:[{m:"PERI-",s:"around"},{m:"PHER",s:"carry (pherein)"},{m:"-AL",s:""}],
origin:"Greek periphereia - carrying around the edge. The periphery is the outer circle. Peripheral = existing at the outer edge rather than the center.",
hook:"A painter stands back from the canvas. <strong>Directly ahead: the face she's painting.</strong> In her peripheral vision: the doorway, the lamp, the shadow on the wall. She can see them - they register - but they're not what she's focusing on. They're peripheral: present, visible, not central. In GRE passages, peripheral concerns are the doorways and lamps: real, but not what the argument is about."},

{g:12,w:"Provocative",pos:"adjective",def:"Deliberately causing strong reactions, either by stimulating thought or by inflaming emotion; designed to evoke response.",
etym:[{m:"PRO-",s:"forth"},{m:"VOCAT",s:"call (vocare)"},{m:"-IVE",s:""}],
origin:"Latin provocare - to call forth. A provocative thing calls a strong response out of you. It summons the reaction.",
hook:"The <strong>philosopher opens the lecture with</strong>: 'Free will is an illusion, and your feeling that you chose to be here today is indistinguishable from determinism.' Half the room wants to argue immediately. A third wants to think about it. Two people leave. Nobody is indifferent. The statement has called everyone's reaction forth. This is <span class='hook-keyword'>provocative</span> - designed to summon strong response, whether the response is intellectual or emotional."},

{g:12,w:"Renounce",pos:"verb",def:"To formally and publicly declare the abandonment of a claim, right, or belief; to disown or give up officially.",
etym:[{m:"RE-",s:"against"},{m:"NOUNCE",s:"announce (nuntiare)"}],
origin:"Latin renuntiare - to announce against. To formally declare rejection. The same root as pronounce (declare), denounce (declare against publicly), announce.",
hook:"The prince <strong>stands at the microphone before the world's press</strong>. He reads from a prepared statement. He renounces his claim to the throne, his title, his rights to succession. Every word is deliberate. The announcement is irrevocable. He has not quietly stepped aside - he has publicly declared the abandonment. <span class='hook-keyword'>Renounce</span> = announce that you are against your former claim."},

{g:12,w:"Tempestuous",pos:"adjective",def:"Characterized by strong and turbulent emotions; violently stormy in nature or character.",
etym:[{m:"TEMPEST",s:"violent storm"},{m:"-UOUS",s:"full of"}],
origin:"Latin tempestas - storm, from tempus (time/season). The stormy season became the storm. Tempestuous = full of storm, the weather system internalized.",
hook:"Their partnership produced <strong>three masterpieces and four HR complaints in four years</strong>. They were brilliant together and combustible always. The best meeting became the worst argument became a breakthrough became a conflict. The company kept them separated when possible. Their collaboration was <span class='hook-keyword'>tempestuous</span>: not just difficult, but storm-force - alternating lightning and thunder, occasionally producing rainbows."},

{g:12,w:"Tenable",pos:"adjective",def:"Able to be maintained or defended against objection; rationally justifiable; holding up under scrutiny.",
etym:[{m:"TEN",s:"hold (tenere)"},{m:"-ABLE",s:"capable of"}],
origin:"French tenir - to hold. Latin tenere - to hold. Same root as tenacious (holding fast), tenant (one who holds a lease), tenure (the holding of a position). Tenable = able to be held.",
hook:"In a debate, you stake out a position. Your opponent attacks it. You defend it. They attack again. You defend again. If the position survives the assault - if you can hold it - it's <span class='hook-keyword'>tenable</span>. If it crumbles at first contact, it wasn't. Think of tenable as a castle: it doesn't have to be impregnable. It just has to not fall when tested."},

{g:12,w:"Transgression",pos:"noun",def:"An act that violates a rule, moral code, or established limit; a breach of what is considered acceptable.",
etym:[{m:"TRANS-",s:"across"},{m:"GRESS",s:"step (gradi)"},{m:"-ION",s:""}],
origin:"Latin transgressio - stepping across. The same root as aggression (stepping toward), regression (stepping back), digress (stepping away). To transgress = to step across the line.",
hook:"There is a line. <strong>You knew it was there.</strong> You stepped across it anyway. The transgression is not that you accidentally wandered past. It's that you crossed knowingly - stepped over what shouldn't be stepped over. The word requires awareness. You can make a mistake. A <span class='hook-keyword'>transgression</span> requires a line and the knowledge that crossing it matters."},

{g:12,w:"Urbane",pos:"adjective",def:"Suave, courteous, and refined in manner; sophisticated and elegant in social interaction.",
etym:[{m:"URBAN",s:"of the city (urbs)"},{m:"-E",s:""}],
origin:"Latin urbanus - of the city. City sophistication vs rural roughness. The city produced a particular kind of polish, and urbane captured it.",
hook:"The diplomat enters the difficult dinner and <strong>within four minutes everyone is at ease</strong>. He has said nothing particularly interesting. But his ease has made everyone else easier. His questions are perfect. His listening is visible. He takes the most difficult conversational moment - a painful silence - and turns it into something relaxed without anyone quite noticing how. This is <span class='hook-keyword'>urbane</span>: the city's social gift, applied.",
},

{g:12,w:"Verisimilitude",pos:"noun",def:"The appearance of being true or real; believability; the quality of seeming authentic.",
etym:[{m:"VERI",s:"truth (verus)"},{m:"SIMIL",s:"like/similar"},{m:"-ITUDE",s:"quality"}],
origin:"Latin verisimilitudo - similar to truth. The quality of resembling truth. Not being true - seeming true. The difference matters.",
hook:"<strong>A historical novel set in 1857 Lucknow.</strong> The food is accurate. The architecture is accurate. The way characters speak about the annexation - their specific anger, their particular vocabulary - is accurate. You forget you're reading fiction. Not because it is history - but because it has achieved the quality of resembling history. This is <span class='hook-keyword'>verisimilitude</span>: the art of seeming true."},

{g:12,w:"Vitiate",pos:"verb",def:"To impair or weaken the quality of something; to introduce a fundamental flaw that invalidates or corrupts.",
etym:[{m:"VITIUM",s:"fault/vice"},{m:"-ATE",s:"to cause"}],
origin:"Latin vitiare - from vitium (fault, defect, vice). The root of vicious (full of vice). To vitiate = to introduce a vice - a fundamental flaw - into something that corrupts its entire validity.",
hook:"One bad apple in the barrel. <strong>But not just any bad apple - a specific one that releases a gas</strong> which accelerates the ripening of every other apple. They all go bad faster. The barrel's value is destroyed not by the removal of the bad apple but by what it did before you noticed. A conflict of interest in a study <span class='hook-keyword'>vitiates</span> its findings: not just weakens them, but introduces a flaw that contaminates everything."},

{g:13,w:"Affinity",pos:"noun",def:"A spontaneous or natural liking or sympathy for someone or something.",
etym:[{m:"AD-",s:"to"},{m:"FINIS",s:"border/boundary"}],
origin:"Latin affinitas - 'bordering on.' Originally described the relationship of neighbors or in-laws (those whose 'borders' touch), later evolving into a metaphor for natural attraction.",
hook:"You meet a stranger and discover you both collect <strong>19th-century mechanical clocks</strong> and share an obsession with obscure jazz. You don't need to 'work' on the friendship; it’s just there. That effortless pull is an <span class='hook-keyword'>affinity</span>."},

{g:13,w:"Altruistic",pos:"adjective",def:"Showing a disinterested and selfless concern for the well-being of others.",
etym:[{m:"ALTER",s:"other"}],
origin:"French altruisme - from the Italian 'altrui' (somebody else). It represents the philosophical practice of putting the 'other' before the 'self'.",
hook:"Imagine someone jumping into a <strong>freezing river to save a stranger's dog</strong>, then walking away without even giving their name to the reporters. No fame, no money-just the pure desire to help. That is an <span class='hook-keyword'>altruistic</span> act."},

{g:13,w:"Baroque",pos:"adjective",def:"Highly ornate and extravagant in style; complex and flamboyant.",
etym:[{m:"BARROCO",s:"misshapen pearl"}],
origin:"Portuguese barroco - a jeweler's term for a pearl that isn't perfectly round. It came to describe art so over-the-top that it felt 'irregularly' decorated.",
hook:"Think of a <strong>royal palace dripping in gold leaf</strong>, with marble statues in every corner and ceilings painted with hundreds of chubby angels. It’s too much, yet it’s magnificent. When a style is so decorated it feels like it’s vibrating, it is <span class='hook-keyword'>baroque</span>."},

{g:13,w:"Byzantine",pos:"adjective",def:"Excessively complicated, and typically involving a great deal of administrative detail; devious.",
etym:[{m:"BYZANTIUM",s:"ancient city"}],
origin:"Reference to the Byzantine Empire, which was famous for its insanely complex bureaucracy and endless secret political schemes.",
hook:"You try to cancel a <strong>gym membership</strong>, but they require a notarized letter, a blood sample, and a meeting with a man named 'The Archivist' who only works on Tuesdays. When a system is so complex it feels like a trap, it is <span class='hook-keyword'>byzantine</span>."},

{g:13,w:"Compromise",pos:"noun",def:"An agreement or settlement of a dispute that is reached by each side making concessions.",
etym:[{m:"COM-",s:"together"},{m:"PROMITTERE",s:"to promise"}],
