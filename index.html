hook:"GRE HIGH-VALUE WORD: <span class='hook-keyword'>Probity</span> appears frequently in GRE passages about law, governance, and character. It means not just being good but being demonstrably, tested good - integrity that has been proven through circumstances. 'Financial probity' = documented honesty in financial matters, not just claimed honesty. 'Unquestioned probity' = integrity so well-established that no one doubts it. <strong>Probity = tested and confirmed moral uprightness.</strong>"},

{g:6,w:"Proliferate",pos:"verb",def:"Increase rapidly in numbers; multiply.",etym:[{m:"PROLES",s:"offspring"},{m:"FERRE",s:"bear"}],
origin:"Latin proles (offspring) + ferre (to bear). Proliferate = to bear offspring rapidly - to multiply through rapid reproduction. The biological metaphor extends to any rapid multiplication: ideas, technologies, problems.",
hook:"<strong>The invasive species arrives: two individuals</span>. By year two: forty. By year five: four thousand. By year ten: they have displaced three native species and altered the ecosystem. Their population has <span class='hook-keyword'>proliferated</span>: not just grown, but multiplied through rapid reproduction to the point where the scale of the original problem is barely recognizable in what it has become."},

{g:6,w:"Specious",pos:"adjective",def:"Superficially plausible, but actually wrong.",etym:[{m:"SPECIES",s:"appearance"}],
origin:"Latin speciosus - beautiful, plausible-looking, from species (appearance, look). Something specious looks good on the surface but doesn't hold up under scrutiny. The appearance is the deception.",
hook:"GRE HIGH-VALUE TRAP: <span class='hook-keyword'>Specious</span> does NOT mean 'special' or 'specific.' It means APPEARING sound but being unsound upon examination. A specious argument is dangerous precisely because it SOUNDS convincing - it passes the first inspection. The GRE tests this constantly because students confuse it with 'speculative' or 'suspicious.' <strong>Specious = the argument that wins the room and loses the courtroom. Good-looking, but actually wrong.</strong>"},

{g:6,w:"Spurious",pos:"adjective",def:"Not being what it purports to be; false or fake.",etym:[{m:"SPURIUS",s:"false"}],
origin:"Latin spurius - false, of illegitimate birth. Originally described a child of unknown or illegitimate parentage. Extended to mean anything that is not genuinely what it claims to be - false in origin or nature.",
hook:"GRE PAIR: <span class='hook-keyword'>Spurious</span> (not what it claims to be; false) vs <span class='hook-keyword'>Specious</span> (appears true but is actually wrong). Both involve deception. Spurious = the thing IS false (a spurious document = a forged document). Specious = the argument SEEMS true (a specious argument = one that sounds convincing but is wrong). <strong>Spurious is about the identity - what the thing IS. Specious is about the appearance - what the argument SEEMS.</strong>"},

{g:6,w:"Subjective",pos:"adjective",def:"Based on or influenced by personal feelings, tastes, or opinions.",etym:[{m:"SUBICERE",s:"bring under"}],
origin:"Latin subicere - to throw under, to subject to. Medieval philosophy: subjective = of the subject (the person experiencing), as opposed to objective (of the object, the external world). Subjective = arising from the experiencing person, not the external thing.",
hook:"GRE CORE PAIR: <span class='hook-keyword'>Subjective</span> (based on personal experience/opinion; varies by individual) vs <span class='hook-keyword'>Objective</span> (based on facts independent of individual perception). 'Beauty is subjective' = different people have different experiences of it, and none is more 'correct' than another. 'Weight is objective' = the scale reads the same regardless of who looks at it. GRE passages frequently test whether students understand this distinction when discussing evidence. <strong>Subjective = varies by subject. Objective = independent of subject.</strong>"},

{g:6,w:"Subvert",pos:"verb",def:"Undermine the power and authority of (an established system or institution).",etym:[{m:"SUB-",s:"from below"},{m:"VERTERE",s:"turn"}],
origin:"Latin subvertere - to turn from below, to overturn from underneath. From sub (from below) + vertere (to turn). To subvert = to turn something over by working underneath it - undermining rather than attacking directly.",
hook:"GRE LITERARY USAGE: <span class='hook-keyword'>Subvert</span> in literary criticism often means to undermine a genre's or text's conventional expectations - to work within a form while turning its conventions inside out. 'The novel subverts the romance genre' = it uses romance conventions while undermining what those conventions normally mean. This positive-neutral use appears often in GRE literature passages. <strong>Subvert can mean political undermining (negative) or artistic renovation (neutral/positive).</strong>"},

{g:6,w:"Timorous",pos:"adjective",def:"Showing or suffering from nervousness, fear, or a lack of confidence.",etym:[{m:"TIMOR",s:"fear"}],
origin:"Latin timor - fear. The same root gives us 'timid.' Timorous = full of fear - specifically the kind that manifests as hesitancy, nervousness, and lack of boldness in action.",
hook:"GRE PAIR: <span class='hook-keyword'>Timorous</span> (full of fear, nervously hesitant) vs <span class='hook-keyword'>Diffident</span> (group 3 - modest and shy from lack of self-confidence) vs <span class='hook-keyword'>Pusillanimous</span> (cowardly, lacking courage, even stronger than timorous). Timorous emphasizes the fear itself. Diffident emphasizes the lack of self-trust. Pusillanimous is the strongest condemnation. <strong>Timorous = frightened. Diffident = self-doubting. Pusillanimous = contemptibly cowardly.</strong>"},

{g:6,w:"Tortuous",pos:"adjective",def:"Full of twists and turns; excessively lengthy and complex.",etym:[{m:"TORQUERE",s:"to twist"}],
origin:"Latin tortuosus - full of twists, from torquere (to twist). The same root gives us 'torture' (twisting the body) and 'extort' (twisting out money). Tortuous = twisted, specifically in a way that makes progress difficult.",
hook:"GRE SPELLING TRAP: <span class='hook-keyword'>Tortuous</span> (full of twists and turns; complex) vs <span class='hook-keyword'>Torturous</span> (causing torture; extremely painful). One letter. Completely different. 'A tortuous argument' = an argument that winds through many complex twists. 'A torturous experience' = an extremely painful experience. You can have a tortuous explanation that is also torturous to read - but they're describing different things. <strong>Tortuous = twisted path. Torturous = causing suffering. The route to remembering: TORTUOUS has TWIST.</strong>"},

{g:6,w:"Tractable",pos:"adjective",def:"Easy to control or influence.",etym:[{m:"TRACTARE",s:"to handle"}],
origin:"Latin tractabilis - manageable, from tractare (to handle, manage). Something tractable can be handled - it yields to handling rather than resisting it. The metaphor is material: tractable clay shapes easily under the potter's hands.",
hook:"GRE ANTONYM: <span class='hook-keyword'>Tractable</span> (easily managed, yielding to guidance) vs <span class='hook-keyword'>Intractable</span> (impossible to manage or solve). 'A tractable problem' = one that yields to systematic effort. 'An intractable conflict' = one that resists all resolution attempts. GRE passages about policy, management, and science frequently use both. <strong>Tractable = can be handled. Intractable = resists all handling. The prefix in- = not, as always.</strong>"},

{g:6,w:"Transient",pos:"adjective",def:"Lasting only for a short time; impermanent.",etym:[{m:"TRANS-",s:"across"},{m:"IRE",s:"go"}],
origin:"Latin transiens - going across, passing through. From trans (across) + ire (to go). Something transient goes across your experience - it passes through rather than staying. The word carries the image of something in motion that doesn't stop.",
hook:"GRE CLUSTER: <span class='hook-keyword'>Transient</span> (passing through; brief) vs <span class='hook-keyword'>Ephemeral</span> (group 4 - lasting only a day/very brief) vs <span class='hook-keyword'>Transitory</span> (group 19 - not permanent) vs <span class='hook-keyword'>Evanescent</span> (group 8 - fading quickly away). All four describe brevity. Transient emphasizes the passing-through (movement). Ephemeral emphasizes the single-day quality. Transitory emphasizes impermanence as a state. Evanescent emphasizes the fading quality of disappearance. <strong>Same family, different lenses on brevity.</strong>"},

{g:6,w:"Ubiquitous",pos:"adjective",def:"Present, appearing, or found everywhere.",etym:[{m:"UBIQUE",s:"everywhere"}],
origin:"Latin ubique - everywhere, at all places. From ubi (where) + -que (and, ever). Ubique = wherever you are, also there. Something ubiquitous follows you everywhere - you cannot be in a place where it isn't present.",
hook:"GRE HIGH-FREQUENCY WORD: <span class='hook-keyword'>Ubiquitous</span> is one of the GRE's most-tested vocabulary words. It means everywhere simultaneously. The key test: 'The smartphone is ubiquitous' does not mean 'many people have smartphones.' It means you cannot be in a social environment without encountering them. <strong>Ubiquitous = omnipresent in a human environment, inescapable. Not just 'common' but 'impossible to avoid.'</strong>"},

{g:6,w:"Underscore",pos:"verb",def:"Emphasize (something) or show that it is important.",etym:[{m:"UNDER-",s:"below"},{m:"SCORE",s:"line"}],
origin:"From the typographic practice of drawing a line under text to emphasize it (underlining). To underscore = to draw the line under - to signal 'this matters, pay attention to this.'",
hook:"GRE USAGE: In academic writing (which GRE passages are full of), <span class='hook-keyword'>underscore</span> is a formal synonym for 'emphasize' or 'highlight.' 'The data underscores the importance of early intervention.' = The data emphasizes how important early intervention is. It's not used for physical underlining in GRE contexts - always figurative. <strong>When you see underscore in a GRE passage, translate it immediately as 'emphasize.' The analytical function is: the author is calling your attention to something that matters.</strong>"},

{g:6,w:"Venal",pos:"adjective",def:"Showing or motivated by susceptibility to bribery.",etym:[{m:"VENUM",s:"sale"}],
origin:"Latin venalis - for sale. From venum (sale). A venal person is, metaphorically, for sale - their decisions, loyalty, and judgment are available to whoever pays the right price. The Roman word for a corrupt politician was exactly this.",
hook:"GRE SPELLING TRAP: <span class='hook-keyword'>Venal</span> (corrupt, susceptible to bribery; 'for sale') vs <span class='hook-keyword'>Venial</span> (a minor, pardonable sin - from Latin venia, forgiveness). One letter. Venal and venial are near-opposites in seriousness. A venal politician is deeply corrupt. A venial sin is trivially minor. <strong>VENAL has the A for Avarice - selling your integrity. VENIAL has the I for forgIvable - pardonable minor offense.</strong>"},

{g:6,w:"Venerate",pos:"verb",def:"Regard with great respect; revere.",etym:[{m:"VENUS",s:"love"}],
origin:"Latin venerari - to revere, worship. From Venus (the goddess of love). To venerate = to regard with the reverence one might show a deity. The feeling has both love and awe in it.",
hook:"GRE PAIR: <span class='hook-keyword'>Venerate</span> (regard with reverence and love, treat as almost sacred) vs <span class='hook-keyword'>Revere</span> (regard with deep respect and awe) vs <span class='hook-keyword'>Esteem</span> (hold in high regard, more intellectual respect). Venerate is the strongest: it implies a near-sacred quality in the respect. Revere is deep respect with awe. Esteem is high regard without necessarily the emotional warmth. <strong>Venerate = almost worship. Revere = deep respect with awe. Esteem = high intellectual regard.</strong>"},

// ─── GROUP 7 ──────────────────────────────────────────────────────────────────
{g:7,w:"Appease",pos:"verb",def:"Pacify or placate someone by acceding to their demands.",etym:[{m:"A-",s:"to"},{m:"PAIS",s:"peace"}],
origin:"Old French apaisier - to bring to peace. From pais (peace), from Latin pax. Appease = to bring peace by giving the other party what they want - even if doing so is unwise.",
hook:"<strong>Munich, 1938. Britain and France allow Germany to annex Czechoslovakia</span>, hoping that giving Hitler what he wants will prevent war. It does not. This is the defining historical example of <span class='hook-keyword'>appeasement</span> as failed strategy: sacrificing something of value to satisfy an aggressor, hoping the appetite is finite. The word now carries this historical weight - to appease is to give in, and in its worst form, to give in while knowing it won't be enough."},

{g:7,w:"Arbitrary",pos:"adjective",def:"Based on random choice or personal whim, rather than any reason or system.",etym:[{m:"ARBITER",s:"judge"}],
origin:"Latin arbiter - a judge, especially one who decides according to personal discretion rather than established law. An arbitrator has discretion. Something arbitrary is based on that kind of personal discretion rather than systematic rule.",
hook:"GRE USAGE: <span class='hook-keyword'>Arbitrary</span> in GRE passages often criticizes a decision or rule for lacking principled justification. 'The policy is arbitrary' = it has no consistent rationale; different cases are treated differently for no discernible reason. Contrast with 'principled' (based on a consistent rule) or 'systematic' (following a system). <strong>The GRE test question: 'Is there a good reason for this rule?' If no, the rule is arbitrary.</strong>"},

{g:7,w:"Archaic",pos:"adjective",def:"Very old or old-fashioned.",etym:[{m:"ARKHAIOS",s:"ancient"}],
origin:"Greek arkhaios - ancient, old. From arkhe (beginning). Something archaic comes from the earliest times - or behaves as if it does. In language, an archaism is a word or usage that was once standard but has been displaced by time.",
hook:"GRE PAIR: <span class='hook-keyword'>Archaic</span> (ancient, belonging to an earlier period; often used of language or practices) vs <span class='hook-keyword'>Antiquated</span> (old and outdated, usually pejorative) vs <span class='hook-keyword'>Anachronistic</span> (group 2 - belonging to the wrong time period). Archaic is neutral to slightly admiring: an archaic word can be beautifully old. Antiquated is more clearly pejorative: an antiquated system is one that needs updating. <strong>Archaic = old, possibly interestingly old. Antiquated = old and no longer fit for purpose.</strong>"},

{g:7,w:"Clamorous",pos:"adjective",def:"Making a loud and confused noise.",etym:[{m:"CLAMARE",s:"cry out"}],
origin:"Latin clamor - a shout, an outcry. From clamare (to call out, shout). The same root gives us 'exclaim,' 'proclaim,' and 'reclaim.' Clamorous = filled with shouting, with the confusion of many voices demanding attention simultaneously.",
hook:"<strong>The legislative chamber when the controversial vote is announced</span>. Not one clear voice, not organized protest - but the cacophony of hundreds of simultaneous reactions, all competing for the same space. People shouting from different directions, at different volumes, about different things. The chamber is <span class='hook-keyword'>clamorous</span>: the loudness and the confusion are inseparable. This is not angry speech; it's the breakdown of speech into undifferentiated demand."},

{g:7,w:"Dearth",pos:"noun",def:"A scarcity or lack of something.",etym:[{m:"DEAR",s:"expensive"}],
origin:"Middle English derthe - scarcity (of food, etc.), from deore (expensive, precious). What is scarce becomes expensive; what is expensive signals scarcity. Dearth = shortage so significant that what remains becomes 'dear' (costly).",
hook:"GRE USAGE: <span class='hook-keyword'>Dearth</span> often appears in GRE passages to mean not just 'lack' but a notable, significant shortage - usually of something that should be present. 'A dearth of evidence' = not just some missing evidence but a striking shortage that undermines the argument. 'A dearth of qualified candidates' = far fewer than needed. <strong>The scarcity is notable, not just partial. Dearth signals that the shortage matters to the argument being made.</strong>"},

{g:7,w:"Explicable",pos:"adjective",def:"Able to be accounted for or understood.",etym:[{m:"EX-",s:"out"},{m:"PLICARE",s:"fold"}],
origin:"Latin explicare - to unfold, to explain. Ex- (out) + plicare (to fold). To explain = to unfold what was folded up. Explicable = capable of being unfolded and understood. The same root gives us 'explicit' (unfolded completely) and 'implicit' (folded in).",
hook:"GRE FAMILY: <span class='hook-keyword'>Explicable</span> (able to be explained) vs <span class='hook-keyword'>Inexplicable</span> (cannot be explained) vs <span class='hook-keyword'>Explicit</span> (fully unfolded, clearly stated) vs <span class='hook-keyword'>Implicit</span> (folded inside, not stated directly). All from the same Latin root. The GRE uses inexplicable often - it describes phenomena that the passage's theory cannot account for. <strong>If explicable = foldable-out, inexplicable = permanently folded, resisting unfolding.</strong>"},

{g:7,w:"Hyperbole",pos:"noun",def:"Exaggerated statements or claims not meant to be taken literally.",etym:[{m:"HYPER-",s:"above"},{m:"BALLEIN",s:"throw"}],
origin:"Greek hyperbole - excess, exaggeration. Hyper (over, above) + ballein (to throw). To throw over the target - to exceed it. A rhetorical figure that throws the description well past what is literally true for effect.",
hook:"GRE CORE CONCEPT: <span class='hook-keyword'>Hyperbole</span> (deliberate exaggeration for effect) vs <span class='hook-keyword'>Litotes</span> (deliberate understatement). Both are figures of speech that say something other than the literal truth. Hyperbole overstates: 'I've told you a million times.' Litotes understates: 'Not bad' meaning 'very good.' GRE reading passages may require you to identify which technique a writer is using. <strong>Hyperbole throws past the truth to make a point. Litotes stays below it for the same reason.</strong>"},

{g:7,w:"Immutable",pos:"adjective",def:"Unchanging over time or unable to be changed.",etym:[{m:"IN-",s:"not"},{m:"MUTARE",s:"change"}],
origin:"Latin immutabilis - not changeable. In- (not) + mutare (to change). The same root gives us 'mutate,' 'mutation,' and 'permutation.' Immutable = constitutionally resistant to change, either by nature or by decree.",
hook:"GRE USAGE: <span class='hook-keyword'>Immutable</span> appears in GRE passages about science (physical laws), philosophy (metaphysical truths), and law (constitutional principles). The word claims maximum fixedness. 'The laws of thermodynamics are immutable' = not just stable, but constitutionally impossible to change. When a GRE passage challenges something presented as immutable, it is making a strong argument. <strong>If someone calls something immutable, and the passage then shows it changed - that's the key argumentative move to identify.</strong>"},

{g:7,w:"Indefatigable",pos:"adjective",def:"Persisting tirelessly.",etym:[{m:"IN-",s:"not"},{m:"DEFATIGARE",s:"wear out"}],
origin:"Latin indefatigabilis - not able to be wearied. In- (not) + defatigare (to tire out completely). Something indefatigable cannot be made tired - it persists through all the conditions that would exhaust everything else.",
hook:"<strong>The civil rights attorney who has been filing cases for 40 years</span>. Hundreds of losses, some wins, constant resistance. She is 71 years old. She filed three cases this month. Her assistants have burned out and been replaced twice. She has not. She is <span class='hook-keyword'>indefatigable</span>: not superhuman, but constitutionally unable to be worn down by the same conditions that wear everyone else down. The word is always admiring."},

{g:7,w:"Indolent",pos:"adjective",def:"Wanting to avoid activity or exertion; lazy.",etym:[{m:"IN-",s:"not"},{m:"DOLERE",s:"suffer pain"}],
origin:"Latin indolens - not feeling pain, from in- (not) + dolere (to feel pain). Paradoxically, someone indolent feels no pain from their laziness - they don't suffer the discomfort of idleness that drives other people to action. The absence of the pain that motivates effort.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Indolent</span> (lazy through absence of the discomfort that motivates effort) vs <span class='hook-keyword'>Lethargic</span> (group 13 - sluggish, often due to illness or depression) vs <span class='hook-keyword'>Slothful</span> (lazy as a habitual moral failure). Indolent has a specific etymological flavor: the person doesn't feel the pain of idleness that should drive them. <strong>Indolent = immune to the discomfort of not doing. Lethargic = slowed by illness or depression. Slothful = lazy as a character defect.</strong>"},

{g:7,w:"Insular",pos:"adjective",def:"Ignorant of or uninterested in cultures, ideas, or peoples outside one's own experience.",etym:[{m:"INSULA",s:"island"}],
origin:"Latin insula - island. Literally: island-like. An island is cut off by water from the mainland - it exists in isolation. Insular = having the mental geography of an island: cut off from the wider world, existing in isolation.",
hook:"GRE ANALOGY: <span class='hook-keyword'>Insular</span> (cut off, narrow in experience) vs <span class='hook-keyword'>Cosmopolitan</span> (group 3 - citizen of the world, at ease everywhere) vs <span class='hook-keyword'>Parochial</span> (group 19 - narrow, limited to one's local area). All three describe the scope of one's engagement with the world. Insular = island mentality. Parochial = parish mentality. Cosmopolitan = world mentality. <strong>They are degrees of the same spectrum: from island (insular) to parish (parochial) to the whole world (cosmopolitan).</strong>"},

{g:7,w:"Intransigent",pos:"adjective",def:"Unwilling or refusing to change one's views or to agree about something.",etym:[{m:"IN-",s:"not"},{m:"TRANSIGERE",s:"come to an understanding"}],
origin:"Latin intransigentis - not compromising. In- (not) + transigere (to carry across, come to terms with). Transigere is what you do to settle a dispute - you carry the matter across to a resolution. Intransigent = blocking that carrying-across.",
hook:"<strong>Six rounds of negotiation over four months</span>. The other side proposes compromise after compromise. Each time: rejection, without counter-proposal, without movement. They are not evaluating the proposals - they have already decided not to compromise. They are <span class='hook-keyword'>intransigent</span>: constitutionally opposed to any adjustment of their position. The negotiations will fail not because agreement is impossible but because one side is committed to disagreement."},

{g:7,w:"Intrepid",pos:"adjective",def:"Fearless; adventurous.",etym:[{m:"IN-",s:"not"},{m:"TREPIDUS",s:"alarmed"}],
origin:"Latin intrepidus - not alarmed, not frightened. In- (not) + trepidus (alarmed, agitated, trembling). Intrepid = free from trepidation. The GRE uses this word for explorers, reformers, and anyone who acts without fear in genuinely dangerous situations.",
hook:"GRE CLUSTER: <span class='hook-keyword'>Intrepid</span> (fearless, not alarmed by danger) vs <span class='hook-keyword'>Dauntless</span> (not daunted by difficulty) vs <span class='hook-keyword'>Audacious</span> (group 2 - bold, willing to take surprising risks). Intrepid and dauntless are close synonyms - both describe the absence of fear in dangerous situations. Audacious adds the element of bold risk-taking. <strong>Intrepid = not afraid. Dauntless = not intimidated. Audacious = takes bold risks that others wouldn't dare.</strong>"},

{g:7,w:"Irreverent",pos:"adjective",def:"Showing a lack of respect for people or things that are generally taken seriously.",etym:[{m:"IN-",s:"not"},{m:"REVERERI",s:"revere"}],
origin:"Latin irreverens - not reverent. In- (not) + revereri (to revere, stand in awe of). To be irreverent = to refuse to stand in awe of what is conventionally treated as awe-inspiring.",
hook:"GRE NUANCE: <span class='hook-keyword'>Irreverent</span> can be positive or negative depending on context. In GRE passages about comedy, satire, and cultural criticism, irreverent humor is often praised for challenging false authority and exposing pretension. In passages about social norms or religion, irreverence may be treated as problematic. <strong>The word describes the act (refusing to revere); the moral evaluation depends on whether the target deserves reverence. Irreverence toward pomposity = refreshing. Irreverence toward genuine suffering = cruel.</strong>"},

{g:7,w:"Loathe",pos:"verb",def:"Feel intense dislike or disgust for.",etym:[{m:"LATH",s:"hostile"}],
origin:"Old English lathian - to hate. Related to 'loath' (unwilling, reluctant). Loathe = to feel strong hostility toward - intense dislike that has a physical quality, a recoiling from the object.",
hook:"GRE SPELLING PAIR: <span class='hook-keyword'>Loathe</span> (verb: to feel intense disgust/hatred for) vs <span class='hook-keyword'>Loath</span> (adjective: reluctant, unwilling). 'She loathes rainy days' = she intensely dislikes them (verb). 'She is loath to complain' = she is reluctant to complain (adjective). The e makes all the difference - and GRE passages do use both. <strong>Loathe = verb, intense dislike. Loath = adjective, reluctance. No 'e' = reluctance. With 'e' = disgust.</strong>"},

{g:7,w:"Malign",pos:"verb",def:"Speak about (someone) in a spitefully critical manner.",etym:[{m:"MALIGNUS",s:"wicked"}],
origin:"Latin malignus - of evil nature. From male (badly) + gignere (to beget). Malign = to beget badly, to speak of someone as if they were badly made. Also an adjective: malign influence = evil influence.",
hook:"GRE DOUBLE ROLE: <span class='hook-keyword'>Malign</span> as a VERB = to speak critically and spitefully about someone. 'She maligned her colleague's reputation' = she made negative, damaging claims about him. As an ADJECTIVE = harmful, evil. 'A malign influence' = an evil influence. The GRE uses both. <strong>Malign-VERB: doing the speaking. Malign-ADJECTIVE: describing the harmful quality. Both come from the same root of badness.</strong>"},

{g:7,w:"Malleable",pos:"adjective",def:"Easily influenced; pliable.",etym:[{m:"MALLEUS",s:"hammer"}],
origin:"Latin malleare - to hammer. From malleus (a hammer). Malleable = capable of being shaped by a hammer - yielding to the hammer's blows rather than breaking. Gold is physically malleable; young minds are metaphorically malleable.",
hook:"GRE ANALOGY: <span class='hook-keyword'>Malleable</span> (yielding to influence, able to be shaped) vs <span class='hook-keyword'>Tractable</span> (group 6 - manageable, yields to guidance) vs <span class='hook-keyword'>Pliant</span> (group 17 - bending easily, compliant). All three describe yielding. Malleable emphasizes the shapability - you can mold it. Tractable emphasizes manageability - it can be handled. Pliant emphasizes flexibility - it bends without breaking. <strong>Malleable = can be shaped (permanent change possible). Pliant = bends but returns. Tractable = can be directed.</strong>"},

{g:7,w:"Neophyte",pos:"noun",def:"A person who is new to a subject, skill, or belief.",etym:[{m:"NEOS",s:"new"},{m:"PHYTON",s:"plant"}],
origin:"Greek neophytos - newly planted. Neos (new) + phyton (plant). The early Church used this for a newly baptized convert - someone newly planted in the faith. Extended to any beginner.",
hook:"GRE CLUSTER: <span class='hook-keyword'>Neophyte</span> (someone newly planted, just beginning) vs <span class='hook-keyword'>Novice</span> (someone new to a skill or practice) vs <span class='hook-keyword'>Tyro</span> (a beginner, raw recruit). All mean beginner. Neophyte often implies a certain eagerness or enthusiasm that comes from newness. Novice is neutral. Tyro carries a slight connotation of rawness or inexperience that needs correction. <strong>All three can appear in GRE passages. Neophyte is the most literary and formal.</strong>"},

{g:7,w:"Plastic",pos:"adjective",def:"Easily shaped or molded.",etym:[{m:"PLASSEIN",s:"to mold"}],
origin:"Greek plastikos - of or relating to molding. From plassein (to mold, shape). The material plastic was named for this quality. In biology and neuroscience, 'neural plasticity' = the brain's capacity to reshape itself in response to experience.",
hook:"GRE SECONDARY MEANING: You know <span class='hook-keyword'>plastic</span> as a material. In GRE contexts, it means CAPABLE OF BEING MOLDED - easily shaped. 'The plastic minds of young children' = their minds that can be easily shaped by experience. 'Neural plasticity' = the brain's capacity to reshape itself. This is a technical-vocabulary test: the GRE expects you to recognize 'plastic' in its original meaning: moldable, not the material. <strong>When plastic appears as an adjective in a GRE passage, it means shapeable, not the polymer.</strong>"},

{g:7,w:"Platitude",pos:"noun",def:"A remark or statement, especially one with a moral content, that has been used too often to be interesting or thoughtful.",etym:[{m:"PLAT",s:"flat"}],
origin:"French platitude - flatness. From plat (flat, level). A platitude has had all its depth worn away by overuse until it is perfectly flat - a surface with no more substance than a coin rubbed smooth by a million hands.",
hook:"<strong>At the funeral, the eulogy is being given by someone who didn't know the deceased well</span>. 'He was a good man.' 'He touched many lives.' 'Heaven gained an angel today.' Each statement is technically kind. None is specific. None could be refuted. None could be applied uniquely to this particular person. These are <span class='hook-keyword'>platitudes</span>: words worn flat by universal application, which say nothing specific precisely because they were designed to apply to everyone."},

{g:7,w:"Prescient",pos:"adjective",def:"Having or showing knowledge of events before they take place.",etym:[{m:"PRAE-",s:"before"},{m:"SCIRE",s:"know"}],
origin:"Latin praesciens - knowing before. Prae (before) + scire (to know). The same root gives us 'science' (organized knowing) and 'conscience' (knowing with yourself). Prescient = having the knowledge before the events that would give it.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Prescient</span> (knowing the future; accurately predicting) vs <span class='hook-keyword'>Prophetic</span> (group 4 - accurately predicting the future, with a mystical/inspired connotation) vs <span class='hook-keyword'>Clairvoyant</span> (seeing clearly what is hidden, often supernatural). Prescient is the most secular of the three - it implies foresight through analysis and insight, not mystical access. A prescient investor, a prescient analyst. <strong>Prescient = analytical foresight. Prophetic = inspired foresight. Clairvoyant = supernatural perception.</strong>"},

{g:7,w:"Pristine",pos:"adjective",def:"In its original condition; unspoiled.",etym:[{m:"PRISTINUS",s:"former"}],
origin:"Latin pristinus - former, earlier. The original meaning was 'of an earlier time' - now the word captures the idea of something that remains exactly as it was in its earlier state: untouched, unspoiled, unchanged.",
hook:"GRE USAGE: <span class='hook-keyword'>Pristine</span> means perfectly clean AND in original condition - both simultaneously. A pristine environment is both unspoiled and clean. A pristine copy of a book is both undamaged and unread. The word collapses two qualities into one. <strong>In GRE passages about nature, art, and preservation, pristine signals: nothing has changed or degraded from the original state. It's the ideal of perfect preservation.</strong>"},

{g:7,w:"Reproach",pos:"verb",def:"Address (someone) in such a way as to express disapproval or disappointment.",etym:[{m:"RE-",s:"opposite"},{m:"PROPIUS",s:"nearer"}],
origin:"Old French reprochier - to bring back close (to someone's face). The idea: to bring an offense back close to the person - to hold it up to their face as evidence of their failure. This is more intimate than censure.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Reproach</span> (express disappointment to someone personally, with an emotional quality) vs <span class='hook-keyword'>Reprove</span> (correct firmly, officially) vs <span class='hook-keyword'>Censure</span> (group 3 - formally condemn). Reproach is the most personal - it expresses how the action made you feel, not just that it was wrong. 'Beyond reproach' = so good that no one could find fault with it. <strong>Reproach = personal disappointment brought close to the offender's face. Censure = institutional condemnation from a distance.</strong>"},

{g:7,w:"Robust",pos:"adjective",def:"Strong and healthy; vigorous.",etym:[{m:"ROBUR",s:"oak/strength"}],
origin:"Latin robustus - made of oak, strong. From robur (oak, the hardest and strongest wood). Something robust has the quality of oak: hard, strong, reliable, resistant to damage.",
hook:"GRE USAGE: <span class='hook-keyword'>Robust</span> appears in GRE passages describing methodology, evidence, and conclusions. A 'robust methodology' = one that gives reliable results under a variety of conditions. A 'robust finding' = one that holds up across different studies and analytical approaches. The oak metaphor is apt: robust evidence doesn't splinter when pressed. <strong>In science contexts: robust = reliable under stress-testing. In common contexts: vigorous and healthy. Both mean: hard to break down.</strong>"},

{g:7,w:"Salubrious",pos:"adjective",def:"Health-giving; healthy.",etym:[{m:"SALUS",s:"health"}],
origin:"Latin saluber - healthful. From salus (health, welfare, salvation). The same root gives us 'salute' (a wish for health), 'salutation' (a health-wishing greeting), and 'salvation' (spiritual health). Salubrious = promoting health.",
hook:"GRE PAIR: <span class='hook-keyword'>Salubrious</span> (health-promoting; wholesome) vs <span class='hook-keyword'>Salutary</span> (group 10 - producing a good effect, often through an unpleasant corrective experience). Both come from salus (health). Salubrious = inherently healthy (clean air, good food). Salutary = good for you even if unpleasant (the salutary shock of a painful lesson). <strong>Salubrious = healthy by nature. Salutary = good for you, possibly despite being unpleasant.</strong>"},

{g:7,w:"Sanction",pos:"verb",def:"Give official permission or approval for (an action).",etym:[{m:"SANCIO",s:"decree"}],
origin:"Latin sancire - to make sacred, to decree. From sanctus (holy, decreed). A sanction is both an official approval AND an official punishment - the word is its own antonym. What is sanctioned = what is officially permitted; what sanctions are imposed = penalties for what is not permitted.",
hook:"GRE ANTONYM TRAP: <span class='hook-keyword'>Sanction</span> is one of English's most famous contranyms - a word that is its own opposite. As a VERB: 'The committee sanctioned the plan' = approved it. As a NOUN: 'The country faced economic sanctions' = penalties and restrictions. The GRE tests this split personality. <strong>Sanction-VERB = official approval. Sanction-NOUN = official penalty. Context determines which meaning applies. Read carefully.</strong>"},

{g:7,w:"Sedulous",pos:"adjective",def:"Showing dedication and diligence.",etym:[{m:"SE-",s:"without"},{m:"DOLUS",s:"deceit"}],
origin:"Latin sedulus - careful, diligent. From se- (without) + dolus (deceit, trickery). Originally: without trickery - honest, thorough. Evolved to mean diligent, careful, showing dedicated attention to one's work.",
hook:"GRE ETYMOLOGY INSIGHT: <span class='hook-keyword'>Sedulous</span> comes from 'without deceit' - implying that diligence is, at root, an honest quality: no shortcuts, no tricks, just genuine sustained effort. A sedulous student doesn't game the system; they actually do the work. 'Sedulous attention to detail' = honest, un-tricked attention - the real thing, not its performance. <strong>Sedulous = the diligence that comes from being constitutionally incapable of taking shortcuts.</strong>"},

{g:7,w:"Soporific",pos:"adjective",def:"Tending to induce drowsiness or sleep.",etym:[{m:"SOPOR",s:"sleep"}],
origin:"Latin sopor - deep sleep. From sopire (to put to sleep). The same root gives us 'somnolent' (group 10, drowsy). Soporific = having the quality of inducing deep sleep. The word is often used critically of lectures, meetings, and prose styles.",
hook:"GRE PAIR: <span class='hook-keyword'>Soporific</span> (CAUSING sleep; the thing that puts you to sleep) vs <span class='hook-keyword'>Somnolent</span> (group 10 - FEELING sleepy; the state of drowsiness). The lecture is soporific. The students become somnolent. The cause and the effect. <strong>Soporific = the sleep-inducing thing (the cause). Somnolent = the drowsy state (the effect). The lecture creates the somnolent students.</strong>"},

{g:7,w:"Stern",pos:"adjective",def:"Strict and severe; using extreme measures or terms.",etym:[{m:"STYRNE",s:"severe"}],
origin:"Old English styrne - severe, strict, hard. One of the oldest words in English for sternness. The word carries the image of an unyielding face - not cruel, but refusing to be moved by softness or sentiment.",
hook:"GRE PRECISION: <span class='hook-keyword'>Stern</span> (strict, severe, unyielding - but not cruel) vs <span class='hook-keyword'>Harsh</span> (severe to the point of cruelty) vs <span class='hook-keyword'>Austere</span> (group 1 - severe in manner or appearance). A stern teacher is strict and demanding but fair. A harsh one may be unjustly severe. An austere one is stripped of warmth and decoration. <strong>Stern = severe but just. Harsh = severe past the point of fairness. Austere = stripped of all softness.</strong>"},

{g:7,w:"Tendentious",pos:"adjective",def:"Expressing or intending to promote a particular cause or point of view, especially a controversial one.",etym:[{m:"TENDERE",s:"stretch"}],
origin:"Medieval Latin tendentiosus - from tendere (to stretch, to incline toward). A tendentious piece of writing stretches (leans) toward a predetermined conclusion rather than following evidence wherever it goes.",
hook:"GRE HIGH-FREQUENCY WORD: <span class='hook-keyword'>Tendentious</span> is one of the GRE's most-tested critical vocabulary words. It appears in passages where the author evaluates another writer's bias. 'The account is tendentious' = the account is slanted toward a particular conclusion, compromising its objectivity. It's a criticism of method, not necessarily of the conclusion. <strong>Tendentious = already leaning before the investigation starts. The conclusion preceded the evidence.</strong>"},
// GROUP 8
{g:8,w:"Accentuate",pos:"verb",def:"To make a feature or quality more prominent or noticeable; to emphasize deliberately.",
etym:[{m:"AC-",s:"to, toward"},{m:"CENT",s:"song/tone (cantus)"},{m:"-ATE",s:"to act"}],
origin:"Latin accentus - placing musical pitch ON a syllable. The Romans literally 'sang toward' the emphasized part.",
hook:"Imagine a museum curator pointing a <strong>spotlight</strong> at one specific crack in a painting. Every visitor ignores the masterpiece and stares at that crack. The curator has <span class='hook-keyword'>accentuated</span> a flaw. Whatever the light hits - becomes everything."},

{g:8,w:"Conjectural",pos:"adjective",def:"Based on conjecture rather than verified facts; speculative and unproven.",
etym:[{m:"CON-",s:"together"},{m:"JECTUR",s:"throw (jacere)"},{m:"-AL",s:"relating to"}],
origin:"Latin conjicere - throwing ideas together. Before the experiment, you're just throwing guesses at the wall.",
hook:"Picture a <strong>blindfolded detective</strong> throwing darts at a crime board. He hits 'butler,' then 'candlestick,' then 'kitchen.' None of it is from evidence - it's all a throw of imagination. Everything on that board is <span class='hook-keyword'>conjectural</span> until he takes the blindfold off."},

{g:8,w:"Convivial",pos:"adjective",def:"Friendly, lively, and enjoyable; promoting a festive and sociable atmosphere.",
etym:[{m:"CON-",s:"together"},{m:"VIV",s:"life (vivere)"},{m:"-IAL",s:"relating to"}],
origin:"Latin convivium - 'living together at a feast.' The Romans literally invented a word for the joy of sharing life around a table.",
hook:"A Roman banquet. <strong>Fifty people reclining on couches</strong>, wine flowing, someone reciting terrible poetry everyone politely praises. The olives are mediocre but nobody cares. That collective <em>aliveness</em> - everyone making everyone else more joyful just by being present - that's <span class='hook-keyword'>convivial</span>. The word itself sounds warm."},

{g:8,w:"Decadent",pos:"adjective",def:"Characterized by excessive self-indulgence and moral deterioration; luxuriously overindulgent.",
etym:[{m:"DE-",s:"down"},{m:"CAD",s:"fall (cadere)"},{m:"-ENT",s:"state of"}],
origin:"Latin decadere - to fall downward. Rome didn't collapse in a day. It feasted its way there.",
hook:"Imagine the <strong>last emperor of Rome</strong>: silk robes, gold-leafed grapes, six servants fanning him while the barbarians knock at the gate. He waves them off - 'more wine.' His entire civilization is <em>falling</em> and he's requesting a better cushion. That's <span class='hook-keyword'>decadent</span> - the luxury of ignoring the collapse you're causing."},

{g:8,w:"Egregious",pos:"adjective",def:"Outstandingly bad; shockingly offensive in a way that stands conspicuously apart from everything else.",
etym:[{m:"E-",s:"out of"},{m:"GREG",s:"flock (grex)"},{m:"-IOUS",s:"full of"}],
origin:"Latin egregius - originally meant 'distinguished from the herd' POSITIVELY. By irony, it flipped completely. Now the one standing out is the worst one.",
hook:"Picture a <strong>school of perfect white swans</strong> on a lake. Then one swan shows up wearing a tiny tuxedo, honking aggressively, and stealing everyone's bread. This swan is NOT elegant. It stands out from every other swan in the worst possible way. That swan's behavior is <span class='hook-keyword'>egregious</span>."},

{g:8,w:"Evanescent",pos:"adjective",def:"Soon passing out of sight, memory, or existence; delicately and quickly fading.",
etym:[{m:"E-",s:"out"},{m:"VAN",s:"vanish/empty (vanus)"},{m:"-ESCENT",s:"becoming"}],
origin:"Latin evanescere - to vanish into emptiness. Like steam from a morning cup: you can see it, then you can't, and you're not sure when it stopped.",
hook:"You wake from the <strong>most vivid dream of your life</strong>. There was a city made of glass, someone you loved, a color that doesn't exist in waking life. You try to describe it to someone. By the second sentence, the glass city is gone. By the third, the person's face. By the fourth, even the feeling. <em>That</em> process - that elegant dissolving - is <span class='hook-keyword'>evanescent</span>."},

{g:8,w:"Flamboyant",pos:"adjective",def:"Attracting strong attention through confident, showy, and exuberantly vivid behavior or appearance.",
etym:[{m:"FLAMB",s:"flame (flamboyer)"},{m:"-OYA",s:"burning"},{m:"-NT",s:"present state"}],
origin:"French - originally described the flame-shaped, wavy tracery of Gothic cathedral windows. Then it described anyone who walked like they were their own cathedral.",
hook:"Imagine a <strong>peacock who somehow got a job as a maitre d'</strong> at a fine dining restaurant. He doesn't walk - he arrives. Every table turns. His feathers are out. He recommends the tasting menu by name, with feeling. He is more interesting than anything on the menu. That peacock is <span class='hook-keyword'>flamboyant</span>, and he knows it."},

{g:8,w:"Forestall",pos:"verb",def:"To prevent or obstruct an anticipated event by taking preemptive action before it can occur.",
etym:[{m:"FORE-",s:"before"},{m:"STALL",s:"stop/position"}],
origin:"Old English - originally meant ambushing someone before they arrived at a market to buy up goods. You got there first and shut them out.",
hook:"A chess grandmaster sees - <strong>12 moves before it happens</strong> - that you're going to trap her queen. So she moves a pawn now. An innocuous pawn. You don't know why. Six moves later, your trap is impossible. She <span class='hook-keyword'>forestalled</span> your attack before you even knew you were attacking. The door was closed before you reached it."},

{g:8,w:"Gainsay",pos:"verb",def:"To deny, contradict, or speak in opposition to a statement or claim.",
etym:[{m:"GAIN-",s:"against (Old Norse gegn)"},{m:"SAY",s:"to speak"}],
origin:"Middle English - literally 'to say against.' One of the oldest compound words in English. Simple, blunt, old.",
hook:"Picture a <strong>stubborn medieval town crier</strong> whose job is to contradict everything the king announces. The king says 'It is Tuesday!' The crier shouts 'NAAAAY.' The king says 'We have won the war!' The crier shouts 'I GAINSAY THIS.' He cannot help himself. To gainsay is to be that crier - the one who must say the opposite."},

{g:8,w:"Galvanize",pos:"verb",def:"To shock or excite someone into sudden, urgent action; to act as an energizing catalyst.",
etym:[{m:"GALVAN",s:"Galvani (scientist)"},{m:"-IZE",s:"to make/cause"}],
origin:"Luigi Galvani discovered in 1771 that electric current made dead frog legs twitch. His name became the word for any sudden jolt that makes something move.",
hook:"A dead frog's leg <strong>kicks violently</strong> when a current hits it. The frog has no choice - the electricity makes it move. Now replace the frog with a passive social movement. Replace the current with one viral video. Suddenly - everyone is marching, calling, donating. That video <span class='hook-keyword'>galvanized</span> them. They were the frog's leg. They had no choice."},

{g:8,w:"Indiscriminate",pos:"adjective",def:"Done without careful judgment or distinction; randomly applied without differentiation between cases.",
etym:[{m:"IN-",s:"not"},{m:"DISCRIMINAT",s:"distinguish (discriminare)"},{m:"-E",s:""}],
origin:"Latin discriminare - to separate, sift, make distinctions. Indiscriminate = not sifting. Dumping everything together.",
hook:"Imagine a <strong>food critic who gives every restaurant five stars</strong> - the Michelin three-star and the roadside dhaba with questionable hygiene both get identical praise. Meaningless. No distinction. Now imagine an <em>indiscriminate</em> bombing - hitting military targets and hospitals with equal force. The horror is the same: the <em>absence</em> of distinction."},

{g:8,w:"Innocuous",pos:"adjective",def:"Not harmful or offensive; producing no ill effect; deceptively harmless in appearance.",
etym:[{m:"IN-",s:"not"},{m:"NOC",s:"harm (nocere)"},{m:"-UOUS",s:"full of"}],
origin:"Latin innocuus - not harmful. Same root as noxious (harmful) and innocent. The GRE loves innocuous as a setup word for reversals.",
hook:"A <strong>tiny beige mushroom</strong> sits in the forest. A hiker walks past. 'Oh, innocuous little thing.' He picks it. He eats it. It was the <em>destroying angel</em> mushroom - the most lethal fungus in the world. It had no bright colors, no warning smell. It looked <span class='hook-keyword'>innocuous</span>. The danger was the deception."},

{g:8,w:"Momentary",pos:"adjective",def:"Lasting for only a very short time; existing or persisting for just a brief instant.",
etym:[{m:"MOMENT",s:"movement/instant"},{m:"-ARY",s:"relating to"}],
origin:"Latin momentum - the smallest unit of movement. A moment was originally the tiniest possible increment of time.",
hook:"A <strong>soap bubble lands on your hand</strong>. For exactly one second, you see your face reflected in its surface - distorted, beautiful, complete. Then it's gone. No trace. Just the dampness on your palm. The joy of that bubble was <span class='hook-keyword'>momentary</span>. The memory of it isn't."},

{g:8,w:"Mundane",pos:"adjective",def:"Lacking excitement or interest; relating to ordinary, everyday existence rather than the remarkable.",
etym:[{m:"MUND",s:"world (mundus)"},{m:"-ANE",s:"relating to"}],
origin:"Latin mundanus - 'of this world,' as opposed to the heavenly realm. The irony: 'the world' became synonymous with 'boring.'",
hook:"Imagine a <strong>returning astronaut</strong> who has floated in silence above the Earth for six months. She lands. Someone hands her a parking ticket. She must fill out a form in triplicate. The form asks her to specify her middle initial. This is <span class='hook-keyword'>mundane</span> - the world, stripped of wonder, demanding your middle initial."},

{g:8,w:"Nettlesome",pos:"adjective",def:"Causing persistent irritation or annoyance; troublesome in a way that keeps recurring.",
etym:[{m:"NETTLE",s:"stinging plant"},{m:"-SOME",s:"characterized by"}],
origin:"The stinging nettle plant burns on contact. Not severely - just enough to keep reminding you it exists. Nettlesome = that plant, as a personality trait.",
hook:"You're in an important presentation. Someone's phone buzzes. You keep going. It buzzes again. Then their chair squeaks. Then they clear their throat - repeatedly. No single thing is devastating. But the <em>accumulation</em>... your eye twitches. This is a <span class='hook-keyword'>nettlesome</span> colleague - a persistent, low-grade sting that never quite stops."},

{g:8,w:"Nullify",pos:"verb",def:"To make legally void or invalid; to cancel out the force or effectiveness of something completely.",
etym:[{m:"NULL",s:"nothing (nullus)"},{m:"-IFY",s:"to make"}],
origin:"Latin nullus - none, nothing. To nullify = to make into nothing. The legal system's version of the delete key.",
hook:"A <strong>judge slams her gavel</strong>. The entire three-year contract - negotiations, signatures, celebrations - becomes nothing. Not 'less valid.' Not 'debatable.' <em>Nothing.</em> As if it were never signed. The gavel didn't hurt it. It <span class='hook-keyword'>nullified</span> it - reduced the whole thing to a number: zero."},

{g:8,w:"Obviate",pos:"verb",def:"To remove a problem or need by anticipating and addressing it before it can arise.",
etym:[{m:"OB-",s:"against/in the way"},{m:"VIA",s:"road/way"},{m:"-TE",s:""}],
origin:"Latin obviare - to block the road before something reaches you. You stand in the path of a problem and prevent it from existing.",
hook:"Before the dam breaks, an engineer <strong>reinforces it</strong>. There is no flood, no emergency, no dramatic rescue. The crisis that everyone feared never materialized - because she <span class='hook-keyword'>obviated</span> it. The tragedy that didn't happen is the best kind. Obviate doesn't fix problems - it prevents them from needing to exist."},

{g:8,w:"Omnipresent",pos:"adjective",def:"Present everywhere simultaneously; existing in all places at all times; pervasive throughout.",
etym:[{m:"OMNI-",s:"all"},{m:"PRESENT",s:"being here/now"}],
origin:"Latin omni (all) + praesens (present). Originally theological - describing God's simultaneous presence everywhere. Now applied to surveillance, algorithms, and branding.",
hook:"You open your laptop - an ad. You walk outside - a billboard. Your friend mentions the brand. Your phone suggests it. You dream about the logo. You wake up and there's a coupon under your door. <strong>Nowhere is safe.</strong> The brand is <span class='hook-keyword'>omnipresent</span> - it has achieved what only gods were supposed to manage."},

{g:8,w:"Oust",pos:"verb",def:"To forcibly remove someone from a position of power or authority against their will.",
etym:[{m:"OUST",s:"remove (oster → obstare)"},{m:"",s:""}],
origin:"Old French oster - to remove, from Latin obstare (to stand against). The image: standing in someone's way until they are displaced.",
hook:"The <strong>palace doors open</strong>. Two guards enter. The minister looks up from his paperwork. He does not resign. He does not negotiate. He is simply walked out - his nameplate removed before he's reached the stairs. His successor is already seated. He was <span class='hook-keyword'>ousted</span>. There was no goodbye."},

{g:8,w:"Palpable",pos:"adjective",def:"Able to be touched or felt; so intense or obvious as to seem almost physically tangible.",
etym:[{m:"PALP",s:"touch/feel (palpare)"},{m:"-ABLE",s:"capable of"}],
origin:"Latin palpare - to feel, stroke, touch. Palpate is what doctors do to your abdomen. Palpable = touchable. Then: so real you could almost reach out and touch it.",
hook:"You walk into a room after a <strong>massive argument happened five minutes ago</strong>. Nobody tells you. But the air is different. You can <em>feel</em> the tension the way you feel humidity before a storm. It presses against you. You consider leaving. The anger is <span class='hook-keyword'>palpable</span> - not metaphorically. Physically. You reached out and it pushed back."},

{g:8,w:"Perfidy",pos:"noun",def:"The quality of being deceitful and untrustworthy; deliberate betrayal of a solemn bond of trust.",
etym:[{m:"PER-",s:"through/against"},{m:"FIDE",s:"faith/trust (fides)"},{m:"-Y",s:"quality of"}],
origin:"Latin perfidia - breaking through faith. Not ordinary dishonesty - specifically the betrayal of someone who trusted you completely.",
hook:"Benedict Arnold. A celebrated general. A war hero. His men loved him. And then - in the dead of night - he <strong>handed the plans for West Point</strong> to the British. His perfidy wasn't that he lied. It was that his men had given him their lives first. <span class='hook-keyword'>Perfidy</span> requires trust to destroy. That's what makes it different from ordinary betrayal."},

{g:8,w:"Profuse",pos:"adjective",def:"Present in overwhelming abundance; given or occurring in exceptionally large quantities; overflowing.",
etym:[{m:"PRO-",s:"forth"},{m:"FUSE",s:"pour (fundere)"}],
origin:"Latin profundere - to pour forth. Related to transfuse, infuse, effusive. All involve liquid flowing generously.",
hook:"A <strong>fire hydrant gets hit by a car</strong>. Water doesn't trickle out. It erupts - a column twenty feet high, flooding the entire intersection in seconds. Nobody asked for this much water. Nobody could contain it. That's <span class='hook-keyword'>profuse</span>: not 'enough,' not 'plenty' - but <em>overflowing</em>, unstoppable abundance."},

{g:8,w:"Pugnacious",pos:"adjective",def:"Eager or quick to argue, quarrel, or fight; combative and confrontational by disposition.",
etym:[{m:"PUGN",s:"fist (pugnus)"},{m:"-ACIOUS",s:"inclined to"}],
origin:"Latin pugnus - fist. A pugilist fights with fists. A pugnacious person fights with words, posture, and the constant, searching look for a confrontation.",
hook:"Imagine a <strong>very small but extremely confident rooster</strong> who challenges every animal on the farm, including the horse. He loses every fight. He challenges them again the next morning. He will never stop. He was born in a fighting posture. This is <span class='hook-keyword'>pugnacious</span>: not fighting because you're winning, but because fighting is your natural state of being."},

{g:8,w:"Sagacious",pos:"adjective",def:"Having or showing keen mental discernment, sound judgment, and the wisdom of deep experience.",
etym:[{m:"SAG",s:"perceive keenly (sagire)"},{m:"-ACIOUS",s:"full of"},{m:"",s:""}],
origin:"Latin sagax - of sharp perception. The sage herb was associated with wisdom in antiquity. A sagacious person perceives what others miss and judges what others get wrong.",
hook:"The <strong>old investor sits silent</strong> in a room full of excited analysts. They show charts, projections, growth curves. Everyone is buying. He sells. Three months later, the market collapses. They ask: how did you know? He says: 'I've seen this room before.' That's <span class='hook-keyword'>sagacious</span> - wisdom not from data, but from pattern recognition that only decades of experience builds."},

{g:8,w:"Sanguine",pos:"adjective",def:"Optimistic, especially in a difficult situation; confidently positive about outcomes.",
etym:[{m:"SANGUIN",s:"blood (sanguis)"},{m:"-E",s:""}],
origin:"Medieval medicine: blood-dominant people were warm, cheerful, optimistic. The rosy cheeks of health. Sanguine literally means 'blood-colored' and became shorthand for the temperament that blood supposedly created.",
hook:"TRAP: <span class='hook-keyword'>Sanguine</span> = OPTIMISTIC. <span class='hook-keyword'>Sanguinary</span> = BLOODTHIRSTY. Same root. Opposite vibes. Picture someone with rosy red cheeks and a huge smile saying 'everything will be fine!' vs a literal battlefield. The GRE will try to make you think 'sanguine' sounds dark. It doesn't. <strong>Rosy cheeks. Big smile. Sanguine.</strong>"},

{g:8,w:"Scant",pos:"adjective",def:"Barely sufficient; barely amounting to the stated measure; present only in minimal quantity.",
etym:[{m:"SCANT",s:"short/insufficient (skamt)"},{m:"",s:""}],
origin:"Old Norse skamt - short, brief. Something cut so short it barely qualifies as existing.",
hook:"Imagine trying to <strong>buy bread with a handful of crumbs</strong>. Not coins - crumbs. The baker looks at you. You look at the baker. There is scant currency here. The crumbs don't cover even a slice. <span class='hook-keyword'>Scant</span> is the word for when what you have barely registers - it's technically there, but you'd need a magnifying glass to call it 'enough.'"},

{g:8,w:"Skullduggery",pos:"noun",def:"Underhand, dishonest, or unscrupulous behavior; elaborate trickery and scheming done in secret.",
etym:[{m:"SKULL",s:"skulk (lurk)"},{m:"DUGGERY",s:"trickery"},{m:"",s:""}],
origin:"19th century. Probably from Scottish 'sculduddery' or skulk + duggery. The word itself sounds like what it means - dark, secretive, theatrical villainy.",
hook:"Picture <strong>two men in a basement, candlelight, a map spread between them</strong>. One is forging a signature. The other is stuffing cash into a bag labeled 'Charitable Donation.' Neither looks up. This is not a small lie. This is a <em>system</em> - years of offshore accounts, shell companies, elaborate cover stories. This is <span class='hook-keyword'>skullduggery</span>: villainous scheming with a theatrical flair."},

{g:8,w:"Trivial",pos:"adjective",def:"Of little value or importance; failing to rise above the level of the commonplace and ordinary.",
etym:[{m:"TRI-",s:"three"},{m:"VIA",s:"road (via)"},{m:"-AL",s:""}],
origin:"Latin trivium - the junction of three roads. Public crossroads where anyone gathered, gossiped, and chatted about nothing important. Trivia = crossroads gossip = unimportant talk.",
hook:"The entire GRE is at stake. You've studied for months. You sit down - and all you can think about is <strong>whether you left the gas on</strong>. You aren't thinking about the war in your passage. You're thinking about your stove. This is your brain choosing the trivial. It always does. <span class='hook-keyword'>Trivial</span> thoughts are just the crossroads gossip your brain prefers."},

{g:8,w:"Utilitarian",pos:"adjective",def:"Designed purely for practical use rather than beauty; prioritizing function and efficiency over aesthetics.",
etym:[{m:"UTILIT",s:"useful (utilis)"},{m:"-ARIAN",s:"relating to/advocate of"}],
origin:"Latin utilis - useful. The philosophical doctrine (Bentham, Mill) that the right action is whatever produces the greatest utility (benefit) for the greatest number.",
hook:"A military ration bar: <strong>zero flavor, high calories, indestructible packaging</strong>. Nobody eats it for pleasure. Nobody frames it on their wall. It exists for exactly one purpose: to keep you alive and functioning. It is magnificently ugly. It is completely <span class='hook-keyword'>utilitarian</span>. Function is everything. Beauty is an optional extra that didn't make the budget."},

{g:8,w:"Vapid",pos:"adjective",def:"Offering nothing that is stimulating, challenging, or intellectually engaging; insipidly dull.",
etym:[{m:"VAP",s:"vapor/steam"},{m:"-ID",s:"quality of"}],
origin:"Latin vapidus - flat wine that had lost its spirit and flavor. The wine was still liquid but all the interesting part had evaporated.",
hook:"Uncork a <strong>bottle of wine that's been open for a week</strong>. Smell it. There's nothing there. Taste it. There's nothing there. It's technically wine. It has color. But the thing that made it wine - the complexity, the character - has evaporated into the air. That's <span class='hook-keyword'>vapid</span>: technically there, but all the interesting bits are gone."},

// GROUP 9
{g:9,w:"Boorish",pos:"adjective",def:"Rough, bad-mannered, and unrefined in behavior; coarsely rude in a way that seems oblivious to social norms.",
etym:[{m:"BOOR",s:"peasant (boer)"},{m:"-ISH",s:"having quality of"}],
origin:"Dutch boer - a peasant farmer. The stereotype of the peasant as rough, unrefined, and unaware of polite convention.",
hook:"Imagine a <strong>Viking at a black-tie gala</strong>. He arrives with mud on his boots. He grabs the champagne flute off a stranger's tray. He tells a loud story about livestock. He laughs and spills. He does not notice anyone's expressions. He is not malicious - he is magnificently unaware. <span class='hook-keyword'>Boorish</span> people aren't cruel. They're just Vikings at galas.",
img:"https://googleusercontent.com/image_collection/image_retrieval/11432140187061934719_0"},

{g:9,w:"Brook",pos:"verb",def:"To tolerate or allow something; to endure or put up with (almost always used in negative constructions).",
etym:[{m:"BROOK",s:"endure/use (brucan)"},{m:"",s:""}],
origin:"Old English brucan - to use, enjoy, endure. Related to German brauchen (to need). Evolved from 'endure' to 'allow' to always-negative 'will not allow.'",
hook:"GRE TRAP: <span class='hook-keyword'>Brook</span> looks like a small stream. It IS a small stream (noun). But here it's a VERB meaning to TOLERATE. The trick: 'She would brook no opposition.' = She would NOT tolerate opposition. The stream is peaceful. The verb is iron. <strong>A steel door shaped like a babbling brook.</strong>",
img:"https://googleusercontent.com/image_collection/image_retrieval/6730807474081718938_0"},

{g:9,w:"Circumspect",pos:"adjective",def:"Wary and cautious, thinking carefully about all circumstances and possible consequences before acting.",
etym:[{m:"CIRCUM-",s:"around"},{m:"SPECT",s:"look (specere)"}],
origin:"Latin circumspectus - looking all around before proceeding. Like checking every mirror before changing lanes, but in life.",
hook:"A <strong>jewel thief casing a museum</strong>. She does not run in. She stands at the entrance for 20 minutes. She notes the guard rotation, the camera angles, the position of the emergency exits, the distance to the door from the case. Only then does she make her decision. She is <span class='hook-keyword'>circumspect</span> - looking all around before a single step is taken.",
img:"https://googleusercontent.com/image_collection/image_retrieval/15753365015569069727_0"},

{g:9,w:"Comity",pos:"noun",def:"Courtesy and considerate behavior toward others; the mutual recognition of each other's laws and norms.",
etym:[{m:"COMIT",s:"courteous (comis)"},{m:"-Y",s:"quality of"}],
origin:"Latin comitas - courtesy, friendliness. Comes = companion. The quality that makes being together pleasant rather than abrasive.",
hook:"Two neighboring kingdoms share a river. Each could dam it. Each could poison it. Instead, by <strong>unspoken agreement</strong>, neither does anything aggressive. No treaty. No punishment. Just mutual recognition that both kingdoms need to exist and both benefit from courtesy. This unspoken, civilized consideration is <span class='hook-keyword'>comity</span> - the social glue that makes nations (and colleagues) coexist.",
img:"https://googleusercontent.com/image_collection/image_retrieval/14820917633718114103_0"},

{g:9,w:"Commensurate",pos:"adjective",def:"Corresponding in size, degree, or extent; in correct proportion to something else.",
etym:[{m:"COM-",s:"together"},{m:"MENSUR",s:"measure (mensura)"},{m:"-ATE",s:""}],
origin:"Latin commensurare - to measure together. Two things measured against each other to ensure they match in scale.",
hook:"A <strong>contractor builds you a magnificent mansion</strong> and bills you for a garden shed. The bill is not commensurate with the work. Your joy is enormous; the invoice is tiny. They don't match in scale. <span class='hook-keyword'>Commensurate</span> means the two measures - work and payment, crime and punishment, achievement and reward - must sit on the same scale and not embarrass each other.",
img:"https://googleusercontent.com/image_collection/image_retrieval/4639983321899043049_0"},

{g:9,w:"Cordial",pos:"adjective",def:"Warm, friendly, and genuinely pleasant in manner; coming from the heart; heartfelt.",
etym:[{m:"CORD",s:"heart (cor/cordis)"},{m:"-IAL",s:"relating to"}],
origin:"Latin cor - heart. Cordial = from the heart. The same root gives us courage (taking heart), accord (hearts aligned), discord (hearts apart).",
hook:"<strong>Two rival diplomats meet after a decade of tensions.</strong> There's no hug, no explosion of warmth. But the handshake is real. The question about the other's family is genuine. The smile - small, private - comes from somewhere underneath the diplomacy. That's <span class='hook-keyword'>cordial</span>: warmth that is real, measured, and comes from the heart rather than performance.",
img:"https://googleusercontent.com/image_collection/image_retrieval/16190571709406480410_0"},

{g:9,w:"Deleterious",pos:"adjective",def:"Causing harm or damage, especially to health or well-being; injurious in effect.",
etym:[{m:"DELETE",s:"destroy (deleisthai)"},{m:"-RIOUS",s:"relating to"}],
origin:"Greek deleterios - destructive, harmful. Literally from 'to destroy.' The clinical term for harm that actively removes something good.",
hook:"You don't notice at first. But after <strong>six months of working in the building with the bad ventilation</strong>, you start coughing. Then everyone starts coughing. The air itself is doing something - quietly, continuously, removing something from your lungs. The environment is <span class='hook-keyword'>deleterious</span>. It deletes your health, bit by bit.",
img:"https://googleusercontent.com/image_collection/image_retrieval/12109527633815554546_0"},

{g:9,w:"Dichotomy",pos:"noun",def:"A division or sharp contrast between two things presented as opposed or entirely different from each other.",
etym:[{m:"DICHO-",s:"in two (dicha)"},{m:"TOMY",s:"cut (temnein)"}],
origin:"Greek dichotomia - cutting in two. The same root gives us anatomy (cutting up), atom (uncuttable). A dichotomy is the most fundamental kind of cut.",
hook:"A <strong>surgeon's scalpel divides tissue</strong> cleanly: this side and that side. Not three sides. Not a spectrum. Two. The false dichotomy in an argument works the same way: someone cuts the world into exactly two options and pretends the middle doesn't exist. 'You're either with us or against us.' That's a <span class='hook-keyword'>dichotomy</span> - sometimes real, often falsely constructed.",
img:"https://googleusercontent.com/image_collection/image_retrieval/9031648234728838114_0"},

{g:9,w:"Edify",pos:"verb",def:"To instruct or improve someone morally or intellectually; to enlighten and uplift through teaching.",
etym:[{m:"EDI",s:"building (aedes)"},{m:"-FY",s:"to make"}],
origin:"Latin aedificare - to build. The same word means both 'to construct a building' and 'to build up a person's mind.' An enlightened person is a building under construction.",
hook:"Imagine a <strong>master potter shaping a lump of clay</strong> - pulling up the walls, centering the form, transforming nothing into something that can hold water. That's what an edifying mentor does to a mind: pulls it upward, centers it, gives it structure. The student at the end can hold more than they could before. They've been <span class='hook-keyword'>edified</span>.",
img:"https://googleusercontent.com/image_collection/image_retrieval/2135541584979557143_0"},

{g:9,w:"Elicit",pos:"verb",def:"To draw out or evoke a response, answer, or reaction from someone; to bring forth what is latent.",
etym:[{m:"E-",s:"out"},{m:"LICIT",s:"entice/lure (lacere)"}],
origin:"Latin elicere - to lure or draw out. The same family as illicit (lured into wrong). Elicit = luring something out that was already inside.",
hook:"GRE SPELLING TRAP: <strong>ELICIT (verb: to draw out) vs ILLICIT (adjective: illegal).</strong> One letter separates them. One is what a great therapist does - gently draws out a hidden truth. The other is what you're not supposed to do. 'She <em>elicited</em> his confession' vs 'He engaged in <em>illicit</em> activities.' Elicit = the therapist. Illicit = the defendant.",
img:"https://googleusercontent.com/image_collection/image_retrieval/11066716732109188656_0"},

{g:9,w:"Erudite",pos:"adjective",def:"Having or showing extensive knowledge or learning; deeply and broadly educated.",
etym:[{m:"E-",s:"out of"},{m:"RUD",s:"rough/untrained (rudis)"},{m:"-ITE",s:""}],
origin:"Latin erudire - to take the roughness out. Education was literally conceived as a polishing process: you sand away the rough edges until something refined emerges.",
hook:"A sculptor finds a rough stone and <strong>spends years removing what doesn't belong</strong>. The roughness is ignorance. Each learned year removes more of it. An erudite person has been worked on for decades - by books, teachers, languages, disciplines. They are the finished sculpture. You can tell immediately by the texture: no rough edges left. <span class='hook-keyword'>Erudite</span>.",
img:"https://googleusercontent.com/image_collection/image_retrieval/6727184172616700094_0"},

{g:9,w:"Fecund",pos:"adjective",def:"Producing or capable of producing an abundance of new growth, offspring, or ideas; prolifically creative.",
etym:[{m:"FECUND",s:"fruitful (fecundus)"},{m:"",s:""}],
origin:"Latin fecundus - fruitful, fertile. Same family as fetus (offspring). The root idea: producing abundantly.",
hook:"A <strong>fig tree in full season</strong>: every branch bowing under the weight of fruit. Below it: seeds already in the soil. Next year: three trees where one was. This is <span class='hook-keyword'>fecund</span> - not just productive but overflowingly, almost embarrassingly productive. A fecund imagination doesn't produce one idea. It produces twenty before lunch and forgets twelve of them by dinner.",
img:"https://googleusercontent.com/image_collection/image_retrieval/2170922138915794692_0"},

{g:9,w:"Feeble",pos:"adjective",def:"Lacking strength, power, or conviction; too weak to produce a notable effect or impression.",
etym:[{m:"FEEBLE",s:"lamentable (flebilis)"},{m:"",s:""}],
origin:"Old French feble, from Latin flebilis - deserving tears, pitiable. Something so weak it provokes pity rather than respect.",
hook:"The <strong>CEO stands at the podium after the scandal</strong>. He says: 'Mistakes were made.' That's it. Three words. Passive voice. No names. No ownership. No plan. The crowd waits for more. There is no more. It is a <span class='hook-keyword'>feeble</span> response - not because it's short, but because it has no weight, no strength, no conviction. It flutters and falls.",
img:"https://googleusercontent.com/image_collection/image_retrieval/12121292691730421756_0"},

{g:9,w:"Felicitous",pos:"adjective",def:"Well-chosen or suited to the circumstances; pleasingly apt and perfectly appropriate.",
etym:[{m:"FELICIT",s:"happiness (felix)"},{m:"-OUS",s:"full of"}],
origin:"Latin felix - happy, fruitful, lucky. The same root as felicity (perfect happiness). A felicitous thing is so perfectly suited that it creates a small happiness in whoever encounters it.",
hook:"You're searching for the <strong>exact right word</strong> for something you've been trying to say for years. Then someone says it. And it lands like a key in a lock - click. That word, that phrase, that choice - it's <span class='hook-keyword'>felicitous</span>. Not just correct. <em>Perfectly</em> chosen. The rightness of it produces a small joy.",
img:"https://googleusercontent.com/image_collection/image_retrieval/7621171766552430133_0"},

{g:9,w:"Forbear",pos:"verb",def:"To deliberately refrain from doing something; to exercise self-restraint despite the impulse to act.",
etym:[{m:"FOR-",s:"completely"},{m:"BEAR",s:"endure (beran)"}],
origin:"Old English forberan - to completely bear with something. Enduring the impulse to act, holding it at bay.",
hook:"SPELLING TRAP: <strong>FORBEAR (verb: to refrain) vs FOREBEAR (noun: an ancestor)</strong>. One E. Completely different. Forbear = I will <em>forbear</em> from shouting. Forebear = my <em>forebears</em> came from Punjab. Remember: forBEAR the urge - you're BEARING the burden of restraint. forEBEAR your ancestors - they went BEFORE you.",
img:"https://googleusercontent.com/image_collection/image_retrieval/5001933967853952287_0"},

{g:9,w:"Haphazard",pos:"adjective",def:"Lacking any obvious principle of organization or planning; randomly and carelessly arranged.",
etym:[{m:"HAP",s:"luck/chance"},{m:"HAZARD",s:"risk/dice"}],
origin:"Double randomness: hap = luck (from Old Norse) + hazard = dice game (from Arabic). When you combine luck and dice, you get pure chaos.",
hook:"A <strong>five-year-old 'organizes' the spice rack</strong>. Cardamom next to dish soap. Turmeric between the cereal boxes. Cumin on the floor. She is not following a system. She is not following anything. The result is <span class='hook-keyword'>haphazard</span> - arranged by whatever her arm reached next. Completely ungoverned by logic.",
img:"https://googleusercontent.com/image_collection/image_retrieval/5957254103365937825_0"},

{g:9,w:"Hodgepodge",pos:"noun",def:"A confused mixture of dissimilar things; a jumbled assortment with no coherent organizing principle.",
etym:[{m:"HODGE",s:"mix/shake (hocher)"},{m:"POT",s:"container"},{m:"",s:""}],
origin:"Old French hochepot - a pot you shake everything into. Medieval peasant cooking: whatever's left from the week goes in the pot together.",
hook:"The city planner's report arrives: <strong>500 pages, written by eight departments that never spoke to each other</strong>. One section says build housing. The next says demolish housing. One recommends buses. Another recommends banning buses. The glossary contradicts the introduction. This document is a <span class='hook-keyword'>hodgepodge</span> - a pot that everything was shaken into without any regard for whether it should coexist.",
img:"https://googleusercontent.com/image_collection/image_retrieval/2815689178814993594_0"},

{g:9,w:"Impede",pos:"verb",def:"To delay, obstruct, or block the progress or movement of something; to hinder advancement.",
etym:[{m:"IM-",s:"in"},{m:"PEDE",s:"foot (pes/pedis)"}],
origin:"Latin impedire - to entangle the feet. Expedition freed the feet for travel. Impediment tangled them. Your progress is your feet; what stops them is an impediment.",
hook:"Imagine a <strong>marathon runner wearing ankle weights, trying to sprint through knee-deep sand, uphill, into a headwind</strong>. She hasn't stopped. She's running. But everything is working against her feet - every step costs twice what it should. These are <span class='hook-keyword'>impediments</span>. Progress is happening. It's just being <span class='hook-keyword'>impeded</span> - entangled at the foot level.",
img:"https://googleusercontent.com/image_collection/image_retrieval/13737501316193915614_0"},

{g:9,w:"Impetuous",pos:"adjective",def:"Acting or done quickly and without careful thought; impulsively rushing into action driven by force of feeling.",
etym:[{m:"IMPETU",s:"force/attack (impetus)"},{m:"-OUS",s:"full of"}],
origin:"Latin impetuosus - full of force, rushing at. Impetus = the force of a rushing attack. Impetuous = being so full of force that it bypasses deliberation.",
hook:"A <strong>knight charges the castle gates</strong>. The drawbridge is still up. He's already at full gallop. The squire shouts 'THE BRIDGE!' The knight shouts 'CHAAARGE!' <em>Crash.</em> He is <span class='hook-keyword'>impetuous</span> - so full of forward force that the very existence of obstacles failed to register before he committed entirely.",
img:"https://googleusercontent.com/image_collection/image_retrieval/8243476770391665995_0"},

{g:9,w:"Irascible",pos:"adjective",def:"Having a temperament that is quickly and easily angered; hot-tempered and irritable by nature.",
etym:[{m:"IRA",s:"anger"},{m:"-SCIBLE",s:"capable of/prone to"}],
origin:"Latin ira - anger. Irascible = prone to being filled with ira. Irate is currently angry; irascible is constitutionally ready to be angry at any moment.",
hook:"The <strong>fire is never out</strong>. It doesn't need wood - it generates its own fuel. A waiter brings the wrong fork: kindling. A colleague interrupts: more kindling. A slow elevator: the blaze. An irascible person has a furnace inside them that requires almost nothing to go from 'warm' to 'inferno.' <span class='hook-keyword'>Irascible</span> - permanently pre-ignited.",
img:"https://googleusercontent.com/image_collection/image_retrieval/487079084435763308_0"},

{g:9,w:"Mercenary",pos:"adjective",def:"Motivated primarily or entirely by financial gain; working solely for money with no loyalty to a cause.",
etym:[{m:"MERCES",s:"wages/payment"},{m:"-ARY",s:"relating to"}],
origin:"Latin merces - wages. The same root as merchant, commerce. A mercenary soldier fights for whoever pays - the cause is irrelevant; only the contract matters.",
hook:"A <strong>soldier of fortune opens the bidding</strong>. Yesterday he fought for the general. Today someone offered more. Tomorrow - who knows. He has no flag. He has a rate card. His loyalty has a price, and whoever pays it owns him until someone outbids them. This is <span class='hook-keyword'>mercenary</span> - not just a job, but the complete absence of principle beyond payment.",
img:"https://googleusercontent.com/image_collection/image_retrieval/906765457251634786_0"},

{g:9,w:"Meticulous",pos:"adjective",def:"Showing extreme care and precision about every detail; painstakingly thorough and exact.",
etym:[{m:"METUS",s:"fear"},{m:"-CULOUS",s:"diminutive + quality"}],
origin:"Latin meticulosus - originally 'fearful, timid.' The fear of getting anything wrong evolved into obsessive precision. Anxiety about error became excellence in practice.",
hook:"A watchmaker in <strong>18th-century Geneva adjusts a gear 1/1000th of a millimeter</strong>. With tweezers. Under a loupe. For the third hour. The watch could function without this adjustment. He cannot move on. Every component must be exactly right before the next one is touched. This is <span class='hook-keyword'>meticulous</span> - the obsessive care that turns anxiety into precision.",
img:"https://googleusercontent.com/image_collection/image_retrieval/16611330717071159361_0"},

{g:9,w:"Mordant",pos:"adjective",def:"Having or showing a sharply critical and biting quality; darkly incisive and cutting in wit.",
etym:[{m:"MORD",s:"bite (mordre)"},{m:"-ANT",s:"present participle"}],
origin:"French mordant - biting. Latin mordere - to bite. Same root as remorse (biting yourself again). Mordant humor bites the audience. Remorse bites you.",
