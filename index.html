{g:17,w:"Vexation",pos:"noun",def:"The state of being annoyed, frustrated, or worried.",
etym:[{m:"VEXARE",s:"to shake/disturb"}],
origin:"Latin vexatio - 'a shaking' or 'a disturbance.' Vexation is the feeling of your peace being 'shaken' by a persistent problem.",
hook:"He <strong>slammed his laptop shut in pure <span class='hook-keyword'>vexation</span></strong> when the software crashed for the fifth time. His mind was 'shaken' by the frustration; the tiny problem had 'disturbed' his whole day until he couldn't think straight."},

// GROUP 18
// ─────────────────────────────────────────────

{g:18,w:"Abet",pos:"verb",def:"To encourage or assist someone in doing wrong.",etym:[{m:"A-",s:"to"},{m:"BETER",s:"to bait, incite"}],
origin:"Old French abeter - to bait with a lure, to incite. The hunting image is literal: you set the hounds on the quarry. Always appears in legal contexts ('aid and abet') and always means helping with something wrong - never neutral.",
hook:"The getaway driver didn't rob the bank himself, but by driving the car he chose to <span class='hook-keyword'>abet</span> the crime - and was sentenced just as harshly as the robbers."},

{g:18,w:"Accessible",pos:"adjective",def:"Able to be reached or obtained; easy to understand or appreciate.",etym:[{m:"AD-",s:"to"},{m:"CEDERE",s:"to go"}],
origin:"Latin accedere - to go to, to approach. Both physical and intellectual senses come from the same image: removing barriers so someone can reach what's on the other side. In academic writing, 'accessible' is high praise - it means even a non-expert can follow you.",
hook:"The professor's book on quantum physics was surprisingly <span class='hook-keyword'>accessible</span> - she explained every concept so clearly that even her non-scientist friends read it cover to cover."},

{g:18,w:"Acquisitive",pos:"adjective",def:"Excessively interested in acquiring money or material things.",etym:[{m:"ACQUIRERE",s:"to seek in addition, acquire"}],
origin:"Latin acquirere - to add to one's possessions, from quaerere (to seek). The excess is the point: an acquisitive person doesn't just want things, they want more than is reasonable, always adding to what they already have.",
hook:"He was so <span class='hook-keyword'>acquisitive</span> that even after buying his fourth sports car, he was already browsing listings for a fifth."},

{g:18,w:"Amalgamate",pos:"verb",def:"To combine or unite to form one organization or structure.",etym:[{m:"AMALGAMA",s:"alloy of mercury with another metal"}],
origin:"From amalgam - the alchemist's word for mercury fused with another metal. Two metals blended together create something with properties neither had alone. Extended to organizations, ideas, and cultures: amalgamating them creates something new, not just a sum of parts.",
hook:"After years of fierce rivalry, the two small airlines decided to <span class='hook-keyword'>amalgamate</span> into a single carrier - pooling their routes, staff, and planes into one new company."},

{g:18,w:"Attenuate",pos:"verb",def:"To reduce the force, effect, or value of; to make thin or slender.",etym:[{m:"AD-",s:"to"},{m:"TENUIS",s:"thin"}],
origin:"Latin attenuare - to make thin. Think of the word 'tenuous' - both come from the same root meaning thin. To attenuate a signal, an argument, or a pain is to thin it out until it loses its original force.",
hook:"The thick concrete walls of the bunker were designed to <span class='hook-keyword'>attenuate</span> the blast - not stop it entirely, but reduce it to something survivable."},

{g:18,w:"Augment",pos:"verb",def:"To make something greater by adding to it; to supplement.",etym:[{m:"AUGERE",s:"to increase"}],
origin:"Latin augere - to increase, the same root as 'august' (greatness), 'auction' (prices that increase), and even the month August (named for the greatness of Augustus Caesar). To augment is always to add to something already existing - you can't augment nothing.",
hook:"She took evening coding classes to <span class='hook-keyword'>augment</span> her design skills - adding technical knowledge to what she already knew so she could build the products herself."},

{g:18,w:"Aversion",pos:"noun",def:"A strong dislike or disinclination.",etym:[{m:"A-",s:"away"},{m:"VERTERE",s:"to turn"}],
origin:"Latin aversio - a turning away. The physical image is vivid: when something repulses you, your body turns away from it. An aversion isn't just a preference - it's a deep, often visceral impulse to turn in the opposite direction.",
hook:"She had such a powerful <span class='hook-keyword'>aversion</span> to the smell of hospitals that she would physically tense up the moment she walked through the front doors."},

{g:18,w:"Blithe",pos:"adjective",def:"Showing a casual and cheerful indifference; carefree and happy.",etym:[{m:"BLITHE",s:"joyous, gentle"}],
origin:"Old English blithe - joyful. Originally a purely positive word: a blithe spirit was a joyfully free one. Over centuries it gained an ironic edge - now a 'blithe disregard' is a cheerfulness about something you really shouldn't be cheerful about. The happiness is the problem.",
hook:"He drove through the school zone at forty miles an hour with <span class='hook-keyword'>blithe</span> disregard for the speed limit - humming along to the radio, completely unbothered by the danger he was creating."},

{g:18,w:"Contempt",pos:"noun",def:"The feeling that someone or something is beneath consideration or worthy of scorn.",etym:[{m:"CONTEMNERE",s:"to despise"}],
origin:"Latin contemnere - to despise, to treat as worthless. Contempt is colder and more dismissive than hatred: hatred gives the hated object importance, contempt takes it away entirely. To hold something in contempt is to refuse to count it as worth your attention.",
hook:"She didn't argue with his insults - she just looked at him with quiet <span class='hook-keyword'>contempt</span>, as if his opinion were so beneath her that responding would be a waste of breath."},

{g:18,w:"Dawdle",pos:"verb",def:"To waste time; to move slowly and aimlessly.",etym:[{m:"DAWDLE",s:"origin uncertain, possibly dialectal"}],
origin:"Origin uncertain, possibly from British dialect. To dawdle is to let time slip away through aimless slowness - not strategic delay (procrastination) but purposeless wandering through time. A dawdler doesn't know where they're going and isn't in any hurry to find out.",
hook:"We had a flight to catch, but my brother kept <span class='hook-keyword'>dawdling</span> in every duty-free shop we passed, picking things up and putting them back down until I had to physically drag him to the gate."},

{g:18,w:"Deflect",pos:"verb",def:"To cause to change direction; to turn aside and refuse to deal with something directly.",etym:[{m:"DE-",s:"away"},{m:"FLECTERE",s:"to bend"}],
origin:"Latin deflectere - to bend away. The same root gives us 'reflect' (bend back), 'inflect' (bend inward), and 'flex.' In conversation or argument, to deflect is to bend an accusation or question away from yourself - redirecting it so it doesn't land where it was aimed.",
hook:"Every time the journalist asked about the missing funds, the politician would <span class='hook-keyword'>deflect</span> by praising the charity's other work - never once answering the actual question."},

{g:18,w:"Discount",pos:"verb",def:"To reduce the importance or value of; to disregard as unimportant or unreliable.",etym:[{m:"DIS-",s:"not"},{m:"COMPUTARE",s:"to count"}],
origin:"From dis- (not) + count. To discount something is to literally 'not count' it in your final reckoning. The shopping meaning came first, but the intellectual meaning - dismissing a theory or testimony as not worth counting - is the one that matters in formal writing.",
hook:"The scientists were careful not to <span class='hook-keyword'>discount</span> the contradictory data just because it complicated their theory - ignoring inconvenient evidence is how bad science happens."},

{g:18,w:"Dissident",pos:"noun",def:"A person who opposes official policy, especially in an authoritarian state.",etym:[{m:"DIS-",s:"apart"},{m:"SEDERE",s:"to sit"}],
origin:"Latin dissidere - to sit apart. In ancient assemblies, those who disagreed would literally sit apart from the majority. A dissident is not a casual critic - the word implies organized, principled opposition to power, often at serious personal risk.",
hook:"The novelist had her books banned and her passport confiscated for being a <span class='hook-keyword'>dissident</span> - her crime was simply writing fiction that questioned the government's official history."},

{g:18,w:"Efficacious",pos:"adjective",def:"Producing the desired or intended result; effective.",etym:[{m:"EFFICAX",s:"effective"},{m:"EFFICERE",s:"to accomplish"}],
origin:"Latin efficax - effective, from efficere (to bring about). Efficacious is the formal, clinical word for 'it works.' You'll see it most in medical and pharmaceutical writing - an efficacious treatment actually does what it was designed to do, under controlled conditions.",
hook:"After three failed treatments, they finally found an <span class='hook-keyword'>efficacious</span> drug - one that actually reduced the tumor in clinical trials instead of just managing symptoms."},

{g:18,w:"Equitable",pos:"adjective",def:"Fair and impartial; proportionate to the relevant circumstances.",etym:[{m:"AEQUUS",s:"equal, fair"}],
origin:"Latin aequitas - fairness, from aequus (level, equal). Crucially, equitable does not mean equal. An equitable distribution gives people what is fair given their circumstances - which may mean giving more to those who have less. Equal gives everyone the same; equitable gives everyone what they need.",
hook:"Splitting the restaurant bill <span class='hook-keyword'>equitably</span> meant the three people who ordered steak and wine paid more than the one who had only a salad and water - fair, not equal."},

{g:18,w:"Erratic",pos:"adjective",def:"Not even or regular in pattern or movement; unpredictable.",etym:[{m:"ERRARE",s:"to wander"}],
origin:"Latin errare - to wander, to stray. The same root gives us 'err,' 'error,' and 'errant.' An erratic person or pattern wanders without a fixed course - you can't predict when or how it will move next. The randomness is the defining feature.",
hook:"His attendance was completely <span class='hook-keyword'>erratic</span> - some weeks he showed up every day, other weeks he vanished entirely, and no one could ever figure out the pattern."},

{g:18,w:"Industrious",pos:"adjective",def:"Diligent and hardworking.",etym:[{m:"INDUSTRIA",s:"diligence, activity"}],
origin:"Latin industria - diligence. The same root that gave us the Industrial Revolution: the sense of sustained, productive effort applied consistently over time. An industrious person doesn't just work hard occasionally - they build steadily, day after day.",
hook:"She was the most <span class='hook-keyword'>industrious</span> student in the program - always the first to arrive in the lab and the last to leave, chipping away at her research with quiet, relentless focus."},

{g:18,w:"Inform",pos:"verb",def:"To give essential character or quality to; to permeate and shape something from within.",etym:[{m:"IN-",s:"into"},{m:"FORMA",s:"form, shape"}],
origin:"Latin informare - to give form to. The everyday meaning (to tell someone) is secondary to this original sense: to pour form into something, to shape it from the inside. When a writer's childhood 'informs' their prose, it means their early life shaped the very character of how they write.",
hook:"His decade of working in refugee camps deeply <span class='hook-keyword'>informs</span> his photography - every image he takes carries the weight of what he saw during those years, even when the subject is something ordinary."},

{g:18,w:"Irksome",pos:"adjective",def:"Irritating; persistently annoying.",etym:[{m:"IRKEN",s:"to disgust, annoy"}],
origin:"Middle English irken - to weary and irritate. Irksome is the word for low-grade, chronic annoyance - not explosive anger, but the accumulated exhaustion of something that just keeps being mildly aggravating, day after day.",
hook:"The constant sound of his neighbor's leaf blower at seven in the morning was deeply <span class='hook-keyword'>irksome</span> - not enough to cause a confrontation, but enough to ruin the start of every single day."},

{g:18,w:"Manacle",pos:"verb",def:"To restrain or severely limit the freedom of action of.",etym:[{m:"MANICULA",s:"little hand"}],
origin:"Latin manicula - a little hand, from manus (hand). Manacles are wrist-restraints - devices that control the hands. The figurative use keeps this physical vividness: to be manacled by debt or regulations is to be as constrained as if your wrists were literally chained.",
hook:"The startup had brilliant ideas but was <span class='hook-keyword'>manacled</span> by the terms of its original investment deal - every major decision required approval from investors who understood nothing about the industry."},

{g:18,w:"Modest",pos:"adjective",def:"Unassuming about one's abilities; limited or moderate in size or scope.",etym:[{m:"MODUS",s:"measure, manner"}],
origin:"Latin modestus - keeping due measure. Two GRE senses live in this word: (1) humble about one's own abilities, and (2) limited or small in scale ('a modest improvement'). Both come from the same image of staying within proper measure - not too much, not too little.",
hook:"The study's results were promising but <span class='hook-keyword'>modest</span> - a twelve percent improvement in outcomes is worth noting, but it's hardly the breakthrough the press release suggested."},

{g:18,w:"Noxious",pos:"adjective",def:"Harmful, poisonous, or very unpleasant.",etym:[{m:"NOXA",s:"harm, injury"}],
origin:"Latin noxius - hurtful, from noxa (harm). The same root gives us 'innocent' (in + nocens = not harmful) and 'obnoxious' (originally: exposed to harm, now: offensively unpleasant). Noxious means actively harmful - the substance or influence doesn't just bother you, it damages you.",
hook:"The factory had been releasing <span class='hook-keyword'>noxious</span> chemicals into the river for years - the water was so contaminated that fish had disappeared entirely from a three-mile stretch downstream."},

{g:18,w:"Pernicious",pos:"adjective",def:"Having a harmful effect, especially in a gradual or subtle way.",etym:[{m:"PER-",s:"completely"},{m:"NECS",s:"death, harm"}],
origin:"Latin perniciosus - destructive, from per- (thoroughly) + nex (violent death). The key feature of pernicious harm is that it's slow and hidden. A pernicious influence doesn't announce itself - it corrupts gradually, doing damage that only becomes visible when it's too late.",
hook:"The most <span class='hook-keyword'>pernicious</span> effect of the misinformation campaign wasn't any single false story - it was the gradual erosion of trust in all media, which took years to even measure, let alone repair."},

{g:18,w:"Predicament",pos:"noun",def:"A difficult, unpleasant, or entangled situation with no easy way out.",etym:[{m:"PRAEDICAMENTUM",s:"category, condition"}],
origin:"Medieval Latin praedicamentum - a category, a condition one finds oneself in. A predicament is more entangled than a 'problem' - it implies you are stuck in a complex situation, often of your own making, where every available path has a catch.",
hook:"He was in a genuine <span class='hook-keyword'>predicament</span>: telling the truth would cost him his job, but staying silent meant someone innocent would take the blame - and there was no path that avoided both consequences."},

{g:18,w:"Proficient",pos:"adjective",def:"Competent and skilled; having advanced to a reliable level of ability.",etym:[{m:"PRO-",s:"forward"},{m:"FACERE",s:"to make"}],
origin:"Latin proficere - to advance, make progress. Proficient sits between 'competent' (adequate) and 'expert' (supreme). A proficient person has advanced through practice to a level where they can be trusted to do the work well and reliably - not brilliantly, but consistently.",
hook:"After six months of daily practice, she was <span class='hook-keyword'>proficient</span> enough in Spanish to handle most everyday conversations - not fluent by any means, but no longer dependent on a phrasebook."},

{g:18,w:"Prolix",pos:"adjective",def:"Using or containing too many words; tediously and unnecessarily lengthy.",etym:[{m:"PRO-",s:"forward"},{m:"LIQUERE",s:"to flow"}],
origin:"Latin prolixus - extended, from liquere (to flow). Prolix writing flows forward past where it should have stopped. The length itself is the problem - not bad word choice, but sheer volume. A prolix introduction buries the argument; a prolix speaker loses the room.",
hook:"The report's conclusions were sound, but the writing was so <span class='hook-keyword'>prolix</span> that the executive team stopped reading after page four - by the time the recommendation appeared on page twelve, no one had made it that far."},

{g:18,w:"Scorn",pos:"noun",def:"Open contempt and dismissal; the active expression of disdain.",etym:[{m:"ESCARN",s:"mockery"}],
origin:"Old French escarn - mockery, derision. Scorn is contempt made visible: not just a private feeling of dismissal, but the outward expression of it - a curled lip, a dismissive laugh, a publicly delivered insult. You can feel contempt silently; scorn is always performed.",
hook:"When the young researcher suggested her theory at the conference, the senior professor didn't argue with her - he simply laughed, and his <span class='hook-keyword'>scorn</span> was more silencing than any counter-argument could have been."},

{g:18,w:"Subordinate",pos:"verb",def:"To make less important than something else; to place below in priority or rank.",etym:[{m:"SUB-",s:"under"},{m:"ORDINARE",s:"to arrange, order"}],
origin:"Latin subordinare - to arrange under. As a verb (the GRE's preferred use), to subordinate X to Y is to deliberately place X below Y in priority - to make X serve Y rather than the other way around. This is a choice about what matters more.",
hook:"A great director knows how to <span class='hook-keyword'>subordinate</span> their own ego to the needs of the story - the film gets made better when personal style serves the material, not the other way around."},

{g:18,w:"Unseemly",pos:"adjective",def:"Not fitting or appropriate; violating social propriety in a visible way.",etym:[{m:"UN-",s:"not"},{m:"SEEM",s:"to be fitting"}],
origin:"Old Norse sœma - to conform to, be fitting. Unseemly behavior is conspicuously out of place - it doesn't just break a rule privately, it creates visible social awkwardness. The emphasis is on inappropriateness for the specific context.",
hook:"Launching into a loud argument about politics during your cousin's wedding reception is precisely the kind of <span class='hook-keyword'>unseemly</span> behavior that gets you quietly uninvited to the next family gathering."},

{g:18,w:"Veritable",pos:"adjective",def:"Used to confirm that a comparison or metaphor is genuinely and completely accurate.",etym:[{m:"VERUS",s:"true"}],
origin:"Latin veritabilis - genuine, from veritas (truth). Veritable doesn't mean 'real' in a simple sense - it means the metaphor being used is truly and precisely apt. 'A veritable mountain of paperwork' asserts that the comparison is not casual hyperbole but a genuinely accurate description of the scale.",
hook:"After the grant was approved, the research team faced a <span class='hook-keyword'>veritable</span> avalanche of applications - over three thousand in the first week alone, each one requiring individual review."},


// ─────────────────────────────────────────────
// GROUP 19
// ─────────────────────────────────────────────

{g:19,w:"Acolyte",pos:"noun",def:"A devoted follower or assistant; one who serves a cause or person.",etym:[{m:"AKOLOUTHOS",s:"following"}],
origin:"Greek akolouthos - a follower, from a- (together with) + keleuthos (road). An acolyte walks the same road as the person they follow. Originally a religious assistant; extended to any devoted follower who does the practical work of a movement or ideology.",
hook:"The senator's <span class='hook-keyword'>acolytes</span> handled everything - scheduling, messaging, fundraising - so that she never had to deal with the mundane machinery of running a campaign and could focus entirely on the public role."},

{g:19,w:"Anoint",pos:"verb",def:"To officially designate or choose as a successor; to mark as specially selected.",etym:[{m:"IN-",s:"on"},{m:"UNGERE",s:"to smear"}],
origin:"Latin inungere - to smear with oil. The religious ritual of anointing kings and priests gave the word its sense of divine, top-down selection. When someone is 'anointed' as a successor today, the word carries the implication that the choice was made by one person in authority, not by a democratic process.",
hook:"The retiring CEO effectively <span class='hook-keyword'>anointed</span> her deputy as the next leader - presenting him to the board as the obvious choice before any formal process had even begun."},

{g:19,w:"Base",pos:"adjective",def:"Without moral principles; ignoble; morally low.",etym:[{m:"BASSUS",s:"low"}],
origin:"Late Latin bassus - low. Just as something physically low is beneath something high, a base action is morally beneath what a person of character would do. The metaphor is vertical: noble is at the top of the moral scale; base is at the very bottom.",
hook:"Spreading false rumors about a colleague to get ahead is about as <span class='hook-keyword'>base</span> as workplace behavior gets - using someone else's reputation as a stepping stone while smiling at their face."},

{g:19,w:"Coercion",pos:"noun",def:"Compliance achieved through force or threats rather than genuine consent.",etym:[{m:"CO-",s:"together"},{m:"ARCERE",s:"to enclose, restrain"}],
origin:"Latin coercere - to restrain together, to confine. Coercion physically closes off a person's options until they comply. What makes it distinct from persuasion is the absence of genuine choice: the coerced person agrees not because they are convinced, but because refusing is too dangerous.",
hook:"The confession was thrown out by the judge because it had been obtained through <span class='hook-keyword'>coercion</span> - the suspect had been kept awake for thirty-six hours before he finally signed whatever they put in front of him."},

{g:19,w:"Coin",pos:"verb",def:"To invent or create a new word or phrase for the first time.",etym:[{m:"CUNEUS",s:"wedge - the die used to stamp coins"}],
origin:"Latin cuneus - the metal die used to stamp coins into existence. To coin a word is to stamp it into the language - to bring something into being that wasn't there before. You can only coin something new; coining an existing term is a contradiction.",
hook:"The tech industry has <span class='hook-keyword'>coined</span> dozens of terms that didn't exist twenty years ago - 'podcast,' 'crowdsource,' 'selfie' - words invented to name things that had never existed before."},

{g:19,w:"Cunning",pos:"adjective",def:"Clever in a deceptive or manipulative way; skilled at achieving goals through trickery.",etym:[{m:"CUNNAN",s:"to know, to be skilled"}],
origin:"Old English cunnan - to know, to be able. The same root as 'can.' Originally meant simply knowledgeable or skillful - neutral or positive. Over centuries it narrowed to mean clever specifically in a deceptive direction: intelligence deployed in service of manipulation rather than honesty.",
hook:"The <span class='hook-keyword'>cunning</span> negotiator never lied outright - she simply arranged facts in the order most favorable to her position, letting the other side draw the wrong conclusions entirely on their own."},

{g:19,w:"Discomfit",pos:"verb",def:"To make someone feel uneasy, embarrassed, or unsettled.",etym:[{m:"DIS-",s:"apart"},{m:"CONFIT",s:"prepared, made ready"}],
origin:"Old French desconfire - to undo, to rout. Originally meant military defeat; softened over time to mean throwing someone off their composure. To discomfit someone is to undo their settled ease - to leave them flustered or embarrassed, not physically harmed.",
hook:"The interviewer's final question clearly <span class='hook-keyword'>discomfited</span> the candidate - he paused for a long, visible moment, adjusted his collar, and gave an answer that rambled into unrelated territory."},

{g:19,w:"Dissent",pos:"noun",def:"Principled disagreement with an official or majority position, formally expressed.",etym:[{m:"DIS-",s:"apart"},{m:"SENTIRE",s:"to feel"}],
origin:"Latin dissentire - to feel apart. To dissent is not just to privately disagree - it is to formally hold and express a different position. In law, a dissenting judge writes their objection for the record. In politics, dissent is the organized counterweight to official consensus.",
hook:"One scientist's <span class='hook-keyword'>dissent</span> from the study's conclusions - a single footnote in the final report - turned out to be the most important part of the paper, because she was the only one who had noticed the methodological flaw."},

{g:19,w:"Distill",pos:"verb",def:"To extract the pure, essential meaning from a larger or messier whole.",etym:[{m:"DE-",s:"down"},{m:"STILLARE",s:"to drip"}],
origin:"Latin destillare - to drip down. Distillation: you heat a substance so the essence rises, then collect the pure drops that fall. To distill an argument or a book is to apply the same process intellectually - removing everything impure until only the concentrated essence remains.",
hook:"A good editor's job is to <span class='hook-keyword'>distill</span> a writer's first draft - to remove the digressions, the redundancies, and the throat-clearing until what's left is only what actually needed to be said."},

{g:19,w:"Dubious",pos:"adjective",def:"Hesitating or uncertain; of questionable reliability or trustworthiness.",etym:[{m:"DUBIUS",s:"wavering, uncertain"}],
origin:"Latin dubius - wavering, from duo (two) - pulled in two directions at once. Dubious can describe a person (someone who is uncertain) or a thing (something that deserves uncertainty). A dubious claim raises enough flags to make you hesitate before trusting it.",
hook:"She was <span class='hook-keyword'>dubious</span> about the contractor's estimate - it was suspiciously low compared to every other quote she'd received, and 'too good to be true' had burned her before."},

{g:19,w:"Ebullient",pos:"adjective",def:"Cheerful and full of energy; enthusiasm that boils over and can't be contained.",etym:[{m:"E-",s:"out"},{m:"BULLIRE",s:"to bubble"}],
origin:"Latin ebullire - to bubble out. The image is a pot boiling over: so much energy inside that it spills outward whether it wants to or not. Ebullient enthusiasm isn't quiet contentment - it's visible, infectious, overflowing.",
hook:"The coach was so <span class='hook-keyword'>ebullient</span> after the win that he practically bounced through the press conference, finishing every answer with a grin that none of the reporters could help returning."},

{g:19,w:"Facetious",pos:"adjective",def:"Treating something serious with deliberately inappropriate humor; flippant at the wrong moment.",etym:[{m:"FACETIA",s:"joke, wit"}],
origin:"Latin facetia - a witty saying, jest. Originally meant pleasantly witty. Now means witty at the wrong time - the person knows the moment calls for seriousness but can't resist the joke anyway. A facetious comment isn't wrong because it's unfunny; it's wrong because of when and where it's deployed.",
hook:"'At least the plane crash gave you frequent flyer miles,' he said - then immediately added, 'I'm being <span class='hook-keyword'>facetious</span>, obviously - I know that was a terrible experience.'"},

{g:19,w:"Fallible",pos:"adjective",def:"Capable of making mistakes or being wrong; not infallible.",etym:[{m:"FALLERE",s:"to deceive, disappoint"}],
origin:"Latin fallibilis - liable to err, from fallere (to deceive, to fail). Fallible doesn't mean currently wrong - it means capable of error. Recognizing that human judgment is fallible is the beginning of good reasoning: it's what makes someone check their work, seek second opinions, and stay open to revision.",
hook:"Even the most experienced surgeons are <span class='hook-keyword'>fallible</span> - which is exactly why the best hospitals have built checklists, double-checks, and team protocols into every procedure rather than relying on any individual's judgment alone."},

{g:19,w:"Florid",pos:"adjective",def:"Elaborately ornate; excessively decorated in style.",etym:[{m:"FLOS",s:"flower"}],
origin:"Latin floridus - full of flowers. A florid complexion is flower-red and flushed; florid prose is overgrown with ornament. In literary criticism, florid is a mild rebuke: the writing is so busy with decorative flourishes that the meaning gets buried underneath.",
hook:"The nineteenth-century novelist's style was unapologetically <span class='hook-keyword'>florid</span> - every simple observation dressed up in three metaphors and two subordinate clauses before it was allowed to end."},

{g:19,w:"Gawky",pos:"adjective",def:"Nervously awkward and physically ungainly.",etym:[{m:"GAWK",s:"a simpleton, fool"}],
origin:"Possibly from dialectal English gawk - a clumsy person. Gawky captures the specific awkwardness of someone who hasn't grown into their own body yet - limbs that seem too long, movements that overshoot their targets, a social discomfort written into every gesture.",
hook:"At fourteen she was hopelessly <span class='hook-keyword'>gawky</span> - all elbows and height, constantly apologizing for knocking things over - but by her senior year she'd become one of the most graceful players on the basketball team."},

{g:19,w:"Inveigle",pos:"verb",def:"To persuade someone to do something through flattery or deception; to blind them to their own interests.",etym:[{m:"AVEUGLER",s:"to blind"}],
origin:"French aveugler - to blind, from aveugle (blind). To inveigle someone is to flatter them so skillfully that they can no longer see clearly - their better judgment is blinded by charm or deception, and they agree to something they otherwise wouldn't.",
hook:"The salesman <span class='hook-keyword'>inveigled</span> the retired couple into the extended warranty by praising their 'wisdom in protecting their investment' until they signed without ever asking how much it actually cost."},

{g:19,w:"Jettison",pos:"verb",def:"To deliberately discard something that has become a burden.",etym:[{m:"JETER",s:"to throw"},{m:"JET",s:"to cast"}],
origin:"Old French jetter - to throw, from Latin jactare. The nautical original: in a storm, cargo is thrown overboard to keep the ship afloat. The figurative extension is exact: you jettison something when keeping it would sink you - a deliberate, survival-driven abandonment.",
hook:"When the evidence turned against their original hypothesis, the research team had the scientific integrity to <span class='hook-keyword'>jettison</span> three years of work rather than try to make the data fit a conclusion they could no longer defend."},

{g:19,w:"Mendacity",pos:"noun",def:"Habitual untruthfulness; a pattern of systematic deception.",etym:[{m:"MENDAX",s:"lying, false"}],
origin:"Latin mendacium - a lie, from mendax (lying). Mendacity is not a single lie - it is a character trait, a habit of systematic untruthfulness. The word implies that the person has made deception their default mode of operating in the world.",
hook:"The memoir documented the politician's <span class='hook-keyword'>mendacity</span> with meticulous footnotes - cross-referencing his public statements against the private documents that proved he had known the truth and chosen to say the opposite every single time."},

{g:19,w:"Munificent",pos:"adjective",def:"Generosity that exceeds what is expected or necessary; lavishly giving.",etym:[{m:"MUNUS",s:"gift"},{m:"FACERE",s:"to make"}],
origin:"Latin munificens - generous, from munus (gift) + facere (to make). A munificent gift doesn't just meet a need - it surpasses expectation. The word has an aristocratic flavor: the generous patron, the royal benefactor, giving in a way that takes your breath away.",
hook:"The anonymous donor's gift was so <span class='hook-keyword'>munificent</span> that the hospital director had to read the number twice - fifty million dollars, with no strings attached and no naming rights requested."},

{g:19,w:"Naive",pos:"adjective",def:"Lacking worldly experience or judgment; taking things at face value without critical awareness.",etym:[{m:"NAÏF",s:"natural, native"}],
origin:"French naïf - natural, native, untouched by the world. Originally positive: a naive person was natural and artless, uncorrupted by sophistication. Now it implies inexperience that leaves someone vulnerable - not stupidity, but the kind of trusting simplicity that the world tends to exploit.",
hook:"It wasn't that she was unintelligent - it was that she was genuinely <span class='hook-keyword'>naive</span> about how the industry worked, trusting handshake agreements and verbal promises in a business where nothing matters until it's in writing."},

{g:19,w:"Noble",pos:"adjective",def:"Morally elevated; showing high principles and selfless character.",etym:[{m:"GNOBILIS",s:"well-known, distinguished"}],
origin:"Latin nobilis - the well-known, the famous. Originally about social class: noble families were the ones everyone recognized. Over time it shifted from social status to moral character - a noble action is one elevated above self-interest, one that most people would admire but few would actually do.",
hook:"Donating the kidney was the most <span class='hook-keyword'>noble</span> thing she'd ever witnessed - he hadn't even met the recipient, just answered an ad and spent six months being tested so a stranger could live."},

{g:19,w:"Parochial",pos:"adjective",def:"Narrow in outlook; limited to local or immediate concerns, unable to see the bigger picture.",etym:[{m:"PARA-",s:"beside"},{m:"OIKOS",s:"house - parish"}],
origin:"Medieval Latin parochialis - of a parish. A parish is a small, geographically bounded unit of a church - the smallest local division. Parochial thinking is trapped inside this small boundary, unable to see or care about what lies beyond the immediate local world.",
hook:"The committee's thinking was deeply <span class='hook-keyword'>parochial</span> - they kept asking how the new regulation would affect their specific district, and couldn't seem to engage with the question of what it would mean for the country as a whole."},

{g:19,w:"Pedestrian",pos:"adjective",def:"Unimaginatively ordinary; lacking any elevation or inspiration.",etym:[{m:"PEDESTER",s:"going on foot"}],
origin:"Latin pedester - of a foot soldier, from pes (foot). Walking is the slowest, most ordinary mode of travel. A pedestrian argument or style never rises above the literal, the expected, the obvious - it plods along the ground when the material deserved to fly.",
hook:"His analysis of the poem was technically correct but utterly <span class='hook-keyword'>pedestrian</span> - he identified every metaphor and scanned every line, but produced nothing that would make anyone want to read the poem again."},

{g:19,w:"Prevaricate",pos:"verb",def:"To evade the truth by giving misleading or evasive answers; to straddle rather than state.",etym:[{m:"PRE-",s:"before"},{m:"VARICARE",s:"to straddle"}],
origin:"Latin praevaricari - to walk crookedly, to straddle. The image: a person walking with feet spread wide, straddling two paths without committing to either. To prevaricate is to dodge the straight truth - not lying outright, but answering sideways, never quite going where the question pointed.",
hook:"When asked directly whether he had seen the document, he <span class='hook-keyword'>prevaricated</span> for three full minutes - talking about the general process, the filing system, the people involved - without once saying yes or no."},

{g:19,w:"Prime",pos:"adjective",def:"Of the highest quality or greatest importance; first in rank.",etym:[{m:"PRIMUS",s:"first"}],
origin:"Latin primus - first. Prime means first in quality, first in importance, at the peak of its best state. 'In his prime' means at the height of his powers. A 'prime example' is the best, most representative one. 'Prime condition' is the very best state a thing can be in.",
hook:"The waterfront location was <span class='hook-keyword'>prime</span> real estate - central, scenic, and rare - and three developers had already made offers before the listing had been public for a week."},

{g:19,w:"Radical",pos:"adjective",def:"Going to the root; fundamental and far-reaching rather than surface-level.",etym:[{m:"RADIX",s:"root"}],
origin:"Latin radicalis - having roots, from radix (root). The same root gives us 'radish' (a root vegetable) and 'eradicate' (to pull up by the roots). A radical change doesn't trim branches - it pulls up the entire foundation and replants from scratch.",
hook:"The new CEO didn't just reorganize the departments - she proposed a <span class='hook-keyword'>radical</span> restructuring that questioned the company's core purpose, its business model, and whether half its products should exist at all."},

{g:19,w:"Recrudescent",pos:"adjective",def:"Breaking out again after a period of apparent suppression or healing.",etym:[{m:"RE-",s:"again"},{m:"CRUDESCERE",s:"to become raw again"}],
origin:"Latin recrudescere - to become raw again, from crudus (raw). Originally medical: a wound that seemed healed but reopened, rawer than before. Extended to anything that returns after it appeared to be over - a conflict, a disease, an ideology - always with the sense of unwelcome return.",
hook:"The <span class='hook-keyword'>recrudescent</span> violence in the region shocked international observers who had declared peace three years earlier - the old grievances had never been resolved, only temporarily suppressed."},

{g:19,w:"Temporal",pos:"adjective",def:"Relating to worldly rather than spiritual affairs; or relating to time.",etym:[{m:"TEMPUS",s:"time"}],
origin:"Latin temporalis - of time, from tempus. Two senses: (1) worldly/secular - temporal authority belongs to governments, not churches; (2) time-related - a temporal sequence is organized by when things happened. Context determines which is meant.",
hook:"The monks were required to renounce all <span class='hook-keyword'>temporal</span> possessions upon entering the order - no property, no money, no ownership of any earthly thing - keeping only what the monastery itself provided."},

{g:19,w:"Transitory",pos:"adjective",def:"Passing through without staying; lasting only a short time.",etym:[{m:"TRANSIRE",s:"to go across"}],
origin:"Latin transitorius - serving as a passage, from transire (to go across). Something transitory passes through like a traveler - it doesn't make a home here. The emphasis is on motion: transitory things are always in the process of leaving.",
hook:"Fame, at least in the world of internet virality, is completely <span class='hook-keyword'>transitory</span> - the video that gets ten million views this week will be entirely forgotten by the time next week's sensation arrives."},

{g:19,w:"Viable",pos:"adjective",def:"Capable of working successfully; having enough internal resources to survive and function.",etym:[{m:"VIA",s:"way, road"},{m:"VITA",s:"life"}],
origin:"French viable - capable of life, from Latin vita (life). Originally biological: a viable fetus is one capable of independent life. Extended to any plan, idea, or organization: viable means not just theoretically possible, but having what it takes to actually survive and function on its own.",
hook:"After two years of losses, the investors had to honestly ask themselves whether the business model was ever going to be <span class='hook-keyword'>viable</span> - or whether they were just delaying the inevitable by continuing to fund it."},

// GROUP 20
// ─────────────────────────────────────────────

{g:20,w:"Abreast",pos:"adverb",def:"Side by side; keeping current with the latest developments.",etym:[{m:"A-",s:"on"},{m:"BREAST",s:"the front"}],
origin:"Originally nautical: ships sailing abreast move side by side, their fronts level with each other. 'Keep abreast of' extends this image: staying level with progress as it moves forward, not falling behind it.",
hook:"She set aside thirty minutes each morning to read industry news, determined to stay <span class='hook-keyword'>abreast</span> of every regulatory change before it became a problem her competitors had already adapted to."},

{g:20,w:"Confound",pos:"verb",def:"To bewilder by acting against expectations; to prove wrong; to mix up so that things can't be distinguished.",etym:[{m:"COM-",s:"together"},{m:"FUNDERE",s:"to pour"}],
origin:"Latin confundere - to pour together, to mix until indistinguishable. Three uses matter: (1) to perplex ('confounded by the results'), (2) to defeat ('confound expectations'), (3) to blur together ('confounding correlation with causation'). In science, a 'confounding variable' pours two things together and makes it impossible to tell what caused what.",
hook:"The experimental results completely <span class='hook-keyword'>confounded</span> the research team - every prediction they had made based on previous studies turned out to be wrong in exactly the opposite direction they expected."},

{g:20,w:"Digression",pos:"noun",def:"A temporary departure from the main subject in speech or writing.",etym:[{m:"DI-",s:"apart"},{m:"GRADI",s:"to step, walk"}],
origin:"Latin digressio - a stepping aside, from gradi (to walk). A digression steps off the main path. In skilled writing, a deliberate digression can illuminate the main argument by approaching it from a different angle; an undisciplined one simply wanders and never comes back.",
hook:"The lecture's central argument was brilliant, but it was buried under so many entertaining <span class='hook-keyword'>digressions</span> about the professor's personal history that half the students left without being able to state what the lecture was actually about."},

{g:20,w:"Discrepancy",pos:"noun",def:"A difference between two things that should agree; an unexpected mismatch.",etym:[{m:"DIS-",s:"apart"},{m:"CREPARE",s:"to rattle, clash"}],
origin:"Latin discrepantia - disagreement, from discrepare (to rattle differently, to clash). A discrepancy is a clashing difference - two things that produce different sounds when they should produce the same one. When two accounts of the same event disagree on the facts, the gap between them is the discrepancy.",
hook:"The auditors flagged a <span class='hook-keyword'>discrepancy</span> between what the expense reports claimed and what the credit card statements showed - not a big one, but enough to warrant a closer look at everything else."},

{g:20,w:"Duplicitous",pos:"adjective",def:"Deceitful; presenting different faces to different audiences.",etym:[{m:"DUO",s:"two"},{m:"PLICARE",s:"to fold"}],
origin:"Latin duplicitas - doubleness, from duplex (twofold). A duplicitous person is literally double-folded - they maintain two different versions of themselves simultaneously. The dishonesty isn't a single lie but a systematic two-faced operation: one face for the public, another behind closed doors.",
hook:"He was deeply <span class='hook-keyword'>duplicitous</span> in his business dealings - warm and collaborative in meetings, then immediately working to undermine the same colleagues with the people above them."},

{g:20,w:"Expedient",pos:"adjective",def:"Convenient and practical, but possibly achieved by compromising principles.",etym:[{m:"EX-",s:"out"},{m:"PES",s:"foot"}],
origin:"Latin expedire - to free the feet, to make ready. Something expedient gets you moving - it removes the practical obstacle. But the word carries a moral shadow: the expedient solution works, but it may cut corners or sacrifice principle for convenience.",
hook:"Blaming the previous administration was politically <span class='hook-keyword'>expedient</span> - it shifted attention from the current government's own failures - but it was also dishonest, and the voters who looked closely could see the difference."},

{g:20,w:"Fabricate",pos:"verb",def:"To invent false information with the intention of deceiving.",etym:[{m:"FABRICARE",s:"to make, construct"}],
origin:"Latin fabricare - to craft, to construct, from faber (craftsman). The neutral manufacturing sense came first; the dishonest sense followed. To fabricate a story is to build it from nothing, crafting each false detail with the same deliberate care a craftsman brings to real work.",
hook:"The witness had apparently <span class='hook-keyword'>fabricated</span> his entire account - no one else at the scene remembered any of the details he described, and security footage proved he hadn't been there at all."},

{g:20,w:"Glum",pos:"adjective",def:"Looking or feeling quietly dejected; a settled gray low-mood.",etym:[{m:"GLOOM",s:"darkness"}],
origin:"Related to 'gloom' - the image of darkness settling. Glum is quieter than despair and more settled than disappointment. It's the look of someone who has lost something small but real - a cloudy day of the spirit rather than a full storm.",
hook:"The whole team was <span class='hook-keyword'>glum</span> at Monday's meeting - they'd lost the pitch on Friday, and the forced optimism the manager tried to inject just made everyone feel worse by comparison."},

{g:20,w:"Harbinger",pos:"noun",def:"A sign that signals the approach of something; a forerunner.",etym:[{m:"HERIBERGA",s:"army shelter, forerunner"}],
origin:"Old High German heriberga - one sent ahead of an army to arrange lodgings. A harbinger arrived first to announce what was coming. Extended to any sign that precedes and signals a larger event - usually significant, usually ominous.",
hook:"The first three layoffs were a <span class='hook-keyword'>harbinger</span> of what followed - within six months, the company had cut a third of its workforce, and those early departures had been the first unmistakable sign."},

{g:20,w:"Intrinsic",pos:"adjective",def:"Belonging to the essential nature of something; valuable or important in itself, not because of external factors.",etym:[{m:"INTRINSECUS",s:"inwardly"}],
origin:"Latin intrinsecus - inwardly, from within. Intrinsic value is value that lives inside the thing itself - it doesn't depend on what anyone else thinks or what the thing can be used for. An intrinsic property is built into what something fundamentally is.",
hook:"The philosopher argued that honesty has <span class='hook-keyword'>intrinsic</span> value - that it is good in itself, regardless of whether it produces better outcomes or earns social approval in any particular situation."},

{g:20,w:"Largesse",pos:"noun",def:"Generosity in giving, especially from a position of wealth or power.",etym:[{m:"LARGE",s:"generous"}],
origin:"Old French largesse - generosity, from large (generous), from Latin largus (abundant). Largesse is not ordinary generosity - it carries an aristocratic flavor, the great patron dispensing gifts to those below. The display of giving is almost as important as the gift itself.",
hook:"The tech billionaire's <span class='hook-keyword'>largesse</span> was real - he had donated more than two billion dollars to public health - but critics noted that the causes he chose still reflected his personal priorities rather than the communities' actual needs."},

{g:20,w:"Libertine",pos:"noun",def:"A person who rejects moral restraint as a matter of principle, especially in sexual behavior.",etym:[{m:"LIBERTINUS",s:"freedman - a freed slave"}],
origin:"Latin libertinus - a freed man, from liber (free). A freed slave who answers to no master became the image of someone unconstrained by any authority, including moral authority. The libertine has 'freed' themselves from conventional ethics - a position they hold not just in behavior but in principle.",
hook:"The biographer was careful to distinguish between his subject's genuine philosophical commitments and the <span class='hook-keyword'>libertine</span> lifestyle he used to perform them - the ideas were serious even when the behavior was reckless."},

{g:20,w:"Malfeasance",pos:"noun",def:"Wrongdoing by a person in a position of public trust or official authority.",etym:[{m:"MAL-",s:"bad"},{m:"FACERE",s:"to do"}],
origin:"French malfaisance - evil-doing, from mal- (bad) + faire (to do). The legal term for active wrongdoing by an official - not just making mistakes, but deliberately doing something wrong while entrusted with public authority.",
hook:"The investigation uncovered evidence of <span class='hook-keyword'>malfeasance</span> at the highest levels - contracts had been awarded to companies owned by the official's family members, and the paperwork had been backdated to cover the trail."},

{g:20,w:"Manifest",pos:"adjective",def:"Unmistakably clear and obvious to the eye or mind.",etym:[{m:"MANUS",s:"hand"},{m:"FESTUS",s:"struck"}],
origin:"Latin manifestus - caught in the act, from manus (hand) and festus (struck). The image: caught red-handed, so obvious it's as if physically seized. As an adjective, manifest means so clear that it requires no argument; as a verb, it means to make something visible or appear.",
hook:"The inequality was <span class='hook-keyword'>manifest</span> in every statistic they looked at - income, life expectancy, educational attainment - the pattern was so consistent across every measure that no one could reasonably dispute it."},

{g:20,w:"Minute",pos:"adjective",def:"Extremely small; or extremely precise and detailed.",etym:[{m:"MINUTUS",s:"made small"}],
origin:"Latin minutus - made small, from minuere (to lessen). As an adjective (pronounced my-NOOT), minute means tiny or meticulously precise - the opposite of broad or approximate. 'A minute examination' attends to the smallest possible details.",
hook:"The forgery was detectable only under magnification - the original painting had <span class='hook-keyword'>minute</span> irregularities in the brushwork that the forger had smoothed over, making the copy too perfect to be genuine."},

{g:20,w:"Modish",pos:"adjective",def:"Fashionable in a way that may date quickly; following current trends.",etym:[{m:"MODE",s:"fashion"}],
origin:"French mode - fashion, from Latin modus (measure, manner). Modish means stylishly current right now - but with an implicit irony: what is modish today will look dated tomorrow. The word subtly questions whether something fashionable is also sound.",
hook:"The management consultant's advice was <span class='hook-keyword'>modish</span> - all the language of agile methodology and design thinking - but it addressed none of the company's actual structural problems, which required less fashionable solutions."},

{g:20,w:"Nascent",pos:"adjective",def:"Just coming into existence; in the early stages of development, with implied future potential.",etym:[{m:"NASCI",s:"to be born"}],
origin:"Latin nascens - being born, from nasci. The same root gives us 'natal,' 'nation,' 'nature,' and 'renaissance.' Nascent doesn't just mean new - it means newly born with the sense that something important is beginning to emerge.",
hook:"In 1995, most executives dismissed the <span class='hook-keyword'>nascent</span> internet as a hobbyist curiosity - a technology still too primitive and too niche to be relevant to serious commercial enterprise."},

{g:20,w:"Perennial",pos:"adjective",def:"Enduring through many years; recurring reliably, year after year.",etym:[{m:"PER-",s:"through"},{m:"ANNUS",s:"year"}],
origin:"Latin perennis - lasting through the year, from per (through) + annus (year). Like a perennial plant that returns every season without being replanted, a perennial problem or question keeps coming back - it's part of the permanent landscape, not a temporary visitor.",
hook:"The question of how to fund public transportation is a <span class='hook-keyword'>perennial</span> challenge for the city council - it comes up every budget cycle, generates heated debate, and is never quite resolved before the next cycle begins."},

{g:20,w:"Pious",pos:"adjective",def:"Devoutly religious; or, in its ironic sense, performing virtue in a way that feels hollow.",etym:[{m:"PIUS",s:"dutiful, devout"}],
origin:"Latin pius - dutiful, devout (the name of the loyal Aeneas in Virgil's epic). Pious can be entirely sincere - genuine, deep religious devotion. But it also has an ironic register: 'pious pronouncements' from someone behaving hypocritically are not pious at all, just performance.",
hook:"His <span class='hook-keyword'>pious</span> speeches about corporate responsibility sounded increasingly hollow once the internal memos surfaced showing he had personally approved the accounting practices they were being sued for."},

{g:20,w:"Providential",pos:"adjective",def:"Occurring at a fortunate time, as if arranged by a higher power.",etym:[{m:"PROVIDENTIA",s:"foresight, divine care"}],
origin:"Latin providentia - foresight, from providere (to foresee). Providential is stronger than 'lucky' - it carries the sense that the timing was too perfect to be random, that something was seen and arranged in advance by a wise or divine hand.",
hook:"The rainstorm that stalled the army's advance seemed almost <span class='hook-keyword'>providential</span> to the defenders - they had run out of artillery shells the night before, and another day of attack would have been catastrophic."},

{g:20,w:"Prowess",pos:"noun",def:"Exceptional, demonstrated skill or bravery in a particular area.",etym:[{m:"PROU",s:"worthy, valiant"}],
origin:"Old French prouesse - valor, from prou (brave, worthy). Originally meant martial courage - the knight's prowess on the battlefield. Extended to any domain where exceptional ability is demonstrated, not just claimed: intellectual prowess, athletic prowess, technical prowess.",
hook:"Her <span class='hook-keyword'>prowess</span> as a negotiator was legendary in the firm - she had closed deals that everyone else had written off as impossible, and she had done it without ever raising her voice."},

{g:20,w:"Schism",pos:"noun",def:"A deep, formal split within an organization or movement that divides it into two opposing groups.",etym:[{m:"SCHIZEIN",s:"to split"}],
origin:"Greek schisma - a split, from schizein (to split). The same root as 'schizophrenia' (split mind). The Great Schism of 1054 permanently divided Christianity into Eastern and Western churches - the word is reserved for splits that serious, this permanent.",
hook:"The debate over the organization's political stance created an irreparable <span class='hook-keyword'>schism</span> - within a year, half the membership had left to form a separate group, and the two factions no longer spoke."},

{g:20,w:"Slander",pos:"noun",def:"False spoken statements made to damage someone's reputation.",etym:[{m:"ESCLANDRE",s:"scandal, shame"}],
origin:"Old French esclandre - scandal, from Latin scandalum. Slander is spoken defamation; libel is written defamation. Both are false statements designed to damage a reputation, but the medium matters legally: slander disappears with the sound; libel persists on the page.",
hook:"The celebrity's lawsuit distinguished carefully between the opinion pieces, which were protected expression, and the podcast episode that made specific false factual claims - that was <span class='hook-keyword'>slander</span>, and it was provably untrue."},

{g:20,w:"Stalwart",pos:"adjective",def:"Loyal, reliable, and hardworking; the kind of dependable person who holds their ground.",etym:[{m:"STALWART",s:"stoutly built"}],
origin:"Scottish stathwart - firmly placed, from Old English staeth (foundation) + weorth (worth). A stalwart is as dependable as a structural foundation - they hold their position under pressure and don't waver when things get difficult.",
hook:"Even when the scandal drove away most of his supporters, a core of <span class='hook-keyword'>stalwart</span> allies stayed - people who had known him for thirty years and were not going to abandon him based on a newspaper story."},

{g:20,w:"Supplicate",pos:"verb",def:"To ask or beg with extreme humility; to place oneself entirely beneath the person being asked.",etym:[{m:"SUB-",s:"under"},{m:"PLICARE",s:"to fold"}],
origin:"Latin supplicare - to kneel before, from sub (under) + plicare (to fold). The physical image: bending yourself completely under another person, going to your knees. Supplication is asking at its most abject - you have no leverage, no pride, only the hope that the other person will choose to help.",
hook:"After the fire destroyed their harvest, the farmers had no choice but to <span class='hook-keyword'>supplicate</span> the landlord for an extension on their rent - hats in hand, knowing the outcome depended entirely on his mood."},

{g:20,w:"Terse",pos:"adjective",def:"Sparing and direct with words; brief to the point of occasionally seeming curt.",etym:[{m:"TERSUS",s:"wiped clean, polished"}],
origin:"Latin tersus - polished clean, from tergere (to wipe). Terse writing has been wiped clean of everything unnecessary - only the essential remains. It can be positive (admirably efficient) or slightly negative (so brief it feels dismissive), depending on context.",
hook:"His reply to the long, emotional email was a single <span class='hook-keyword'>terse</span> line: 'Noted. Will discuss Friday.' - which told her nothing about how he felt and everything about the fact that he didn't want to."},

{g:20,w:"Tirade",pos:"noun",def:"A long, sustained, angry verbal attack.",etym:[{m:"TIRER",s:"to draw out, stretch"}],
origin:"French tirade - a long speech, from tirer (to draw out). A tirade draws anger out at length - it's not a brief outburst but a prolonged, sustained assault. The duration is part of the definition: it goes on past where a normal angry response would have stopped.",
hook:"What had started as a reasonable complaint about the noise turned into a fifteen-minute <span class='hook-keyword'>tirade</span> covering every grievance he'd stored up for the past two years, while his neighbor stood in the doorway trying to find a way to end it."},

{g:20,w:"Universal",pos:"adjective",def:"Applying to all cases, all people, or all things without exception.",etym:[{m:"UNIVERSUS",s:"all together, the whole"}],
origin:"Latin universus - turned into one, from unus (one) + versus (turned). Universal = turned toward the whole - applying to everything without exception. This makes it a logically absolute claim: a single counterexample is enough to disprove it entirely.",
hook:"The claim that the desire to protect one's children is a <span class='hook-keyword'>universal</span> human instinct is compelling - but the anthropologist spent her career documenting the cultures where it manifests so differently that 'universal' becomes hard to defend."},

{g:20,w:"Vanquish",pos:"verb",def:"To defeat completely and decisively, leaving no room for doubt.",etym:[{m:"VINCERE",s:"to conquer"}],
origin:"Old French vainquir - to conquer, from Latin vincere. The same root gives us 'convince' (conquer someone's doubt) and 'invincible' (unconquerable). To vanquish is not merely to win - it is to defeat so thoroughly that the opposition cannot regroup or question the outcome.",
hook:"She didn't just win the debate - she <span class='hook-keyword'>vanquished</span> her opponent so completely that even his own supporters were conceding points in the hallway afterward."},

{g:20,w:"Woeful",pos:"adjective",def:"Characterized by sorrow; or, more commonly, shockingly and deplorably bad.",etym:[{m:"WOE",s:"grief, suffering"}],
origin:"Old English wa - grief. Woeful means full of woe: either genuinely sorrowful (a woeful expression) or deplorable in quality (a woeful performance). The second sense is the one that appears most often in formal writing - 'woeful' is the polite way of saying something was embarrassingly, shockingly bad.",
hook:"The team's preparation for the audit was <span class='hook-keyword'>woeful</span> - basic records were missing, the filing system was chaotic, and nobody could agree on which version of the accounts was actually current."},
