origin:"French chicanerie - quibbling, trickery. From chicaner (to quibble, to use tricks in legal proceedings). The word originally referred specifically to legal trickery - exploiting technicalities to defeat just outcomes.",
hook:"<strong>The contract has been designed by a team of lawyers</strong> specifically to appear to offer one thing while actually delivering another. The clause that matters is buried in subsection 14(c)(ii), defined by a cross-reference to Appendix F, which modifies a term in section 3 that was never explained clearly. This is <span class='hook-keyword'>chicanery</span>: not fraud exactly, but the use of technical complexity as a weapon to obscure what is actually happening from the person who needs to understand it."},

{g:3,w:"Coalesce",pos:"verb",def:"Come together and form one mass or whole.",etym:[{m:"CO-",s:"together"},{m:"ALESCERE",s:"grow up"}],
origin:"Latin coalescere - to grow together. Co- (together) + alescere (to grow up, from alere, to nourish). The image: separate things growing until they touch, then merge, becoming a single organism.",
hook:"<strong>Five separate protest movements</strong>, each with a different specific grievance: housing costs, transit, environmental policy, workers' rights, education funding. For three years they march separately. Then a political crisis provides a unifying frame, and within six months they have <span class='hook-keyword'>coalesced</span> into a single coalition with a shared platform. The separate streams have merged into one river, and the river has more force."},

{g:3,w:"Cogent",pos:"adjective",def:"Clear, logical, and convincing.",etym:[{m:"CO-",s:"together"},{m:"AGERE",s:"to drive"}],
origin:"Latin cogere - to drive together, to compel. A cogent argument drives all its parts together toward an irresistible conclusion. The driving together is crucial: cogency is not just clarity but the structured force that pushes the reader to agreement.",
hook:"<strong>Three lawyers present at the appeal</strong>. The first is eloquent but rambling. The second has all the evidence but no framework. The third states her premise clearly in one sentence, lists three supporting facts in logical sequence, and arrives at a conclusion the court cannot easily avoid. Her argument is <span class='hook-keyword'>cogent</span>: each piece is driven together with the others, building a structure that holds its weight and compels agreement."},

{g:3,w:"Compelling",pos:"adjective",def:"Evoking interest, attention, or admiration in a powerfully irresistible way.",etym:[{m:"COM-",s:"together"},{m:"PELLERE",s:"to drive"}],
origin:"Latin compellere - to drive together, to force. A compelling thing drives your attention toward it whether you planned to pay attention or not. The force is the characteristic quality.",
hook:"You open the documentary meaning to watch fifteen minutes before bed. <strong>At 1 AM, three hours later, you're still watching</strong>. You didn't plan this. The film drove your attention through the night. It was <span class='hook-keyword'>compelling</span>: not just interesting, but exerting a force that made it difficult to look away. Compelling arguments, stories, and people share this quality - they do something to the attention that makes disengagement feel like a choice against your own interests."},

{g:3,w:"Contend",pos:"verb",def:"Struggle to surmount a difficulty or danger; assert something as a position in an argument.",etym:[{m:"CON-",s:"with"},{m:"TENDERE",s:"to stretch"}],
origin:"Latin contendere - to stretch against, to strive. Two meanings emerged: physical striving against difficulty, and intellectual striving for a position. Both involve the tension of stretching toward something with effort.",
hook:"GRE DOUBLE MEANING: <span class='hook-keyword'>Contend</span> = (1) to struggle with a difficulty ('she had to contend with three separate crises') or (2) to assert as an argument ('she contended that the evidence was insufficient'). Both are common in GRE passages. In the second meaning, contend is slightly stronger than 'claim' - it implies the assertion is being made in a context of opposition. <strong>Watch for context: contend-with = struggle. Contend-that = argue for a position.</strong>"},

{g:3,w:"Copious",pos:"adjective",def:"Abundant in supply or quantity.",etym:[{m:"COPIA",s:"abundance"}],
origin:"Latin copiosus - plentiful. From copia (abundance, plenty). The same root gives us 'copy' (a multiplied reproduction) and 'cornucopia' (horn of abundance). Copious = characterized by abundance.",
hook:"<strong>The researcher's desk</strong>: seven notebooks, printed articles with dense annotations in three colors, a laptop with 84 open tabs, sticky notes layered four deep on the monitor. She has taken <span class='hook-keyword'>copious</span> notes - not just adequate notes, not just thorough notes, but notes in such abundance that they nearly overwhelm the original source. The word implies the quantity itself is notable."},

{g:3,w:"Cosmopolitan",pos:"adjective",def:"Familiar with and at ease in many different countries and cultures.",etym:[{m:"KOSMOS",s:"world"},{m:"POLITES",s:"citizen"}],
origin:"Greek kosmopolites - citizen of the world. Coined by the Cynic philosopher Diogenes when asked where he was from. He rejected city-state loyalty entirely: 'I am a citizen of the world.' The word carries this original radical universalism.",
hook:"<strong>She speaks four languages without an accent</strong>, knows the correct etiquette for business meetings on three continents, has strong opinions about street food in Bangkok and Florence and Oaxaca from personal experience, and feels equally at home in all of them. She is not a tourist in any of these places - she belongs to all of them. This is <span class='hook-keyword'>cosmopolitan</span>: the person for whom 'home' is the world rather than a single place."},

{g:3,w:"Deference",pos:"noun",def:"Humble submission and respect.",etym:[{m:"DE-",s:"down"},{m:"FERRE",s:"bring"}],
origin:"Latin deferentia - carrying down, yielding. To defer was to carry one's judgment downward - to place it below another's. Deference is not servility but a chosen recognition of another's greater authority or wisdom.",
hook:"The young surgeon is in the operating room with the attending physician who has performed this procedure four hundred times. A question arises about technique. The young surgeon has an idea. She looks at the attending. He nods slightly. She proceeds. This exchange of deference - her pausing to acknowledge his authority before acting - is <span class='hook-keyword'>deference</span>: not weakness, but the social intelligence that recognizes when yielding serves the outcome."},

{g:3,w:"Desultory",pos:"adjective",def:"Lacking a plan, purpose, or enthusiasm.",etym:[{m:"DESILIRE",s:"leap down"}],
origin:"Latin desultorius - superficial, from desilire (to leap down). Roman circus riders jumped between running horses. A desultorius was a 'leaper' - someone who jumped from horse to horse without sticking to any. Desultory = moving without staying, without commitment.",
hook:"The meeting without an agenda. Someone mentions last quarter's numbers. This leads to a discussion of marketing. Marketing somehow becomes a conversation about the parking lot. The parking lot prompts a complaint about building management. An hour passes. Nothing has been decided. This is a <span class='hook-keyword'>desultory</span> meeting: jumping between topics with the energy of someone who has given up on arriving anywhere."},

{g:3,w:"Diffident",pos:"adjective",def:"Modest or shy because of a lack of self-confidence.",etym:[{m:"DIS-",s:"not"},{m:"FIDERE",s:"to trust"}],
origin:"Latin diffidere - not to trust, to lack confidence. Dis- (not) + fidere (to trust). Diffident = not trusting oneself. The shyness comes from distrust of one's own adequacy - not social anxiety, but specifically self-doubt.",
hook:"She knows the answer. She can see everyone else is wrong. She raises her hand halfway, puts it down, raises it again. By the time she's called on, she phrases the correct answer as a question: 'Maybe...it's X? I'm not sure...' The teacher confirms: it's exactly X. She was right all along. She is <span class='hook-keyword'>diffident</span>: the certainty existed inside; the self-trust to deliver it didn't."},

{g:3,w:"Dilatory",pos:"adjective",def:"Slow to act; intended to cause delay.",etym:[{m:"DILATOR",s:"delayer"}],
origin:"Latin dilatorius - from dilator (delayer). From dilatus, past participle of differre (to defer, put off). Dilatory tactics are deliberate - the delay is the strategy, not a side effect.",
hook:"The contract negotiation has been ongoing for seven months. The other side keeps requesting additional documentation, scheduling conflicts, procedural reviews, and 'further consultation with stakeholders.' Nothing moves forward. This is <span class='hook-keyword'>dilatory</span> strategy: using the machinery of process to prevent progress. The delay itself is the goal - to exhaust the other side, run out the clock, or wait for circumstances to change."},

{g:3,w:"Equivocate",pos:"verb",def:"Use ambiguous language so as to conceal the truth or avoid committing oneself.",etym:[{m:"AEQUUS",s:"equal"},{m:"VOCARE",s:"to call"}],
origin:"Latin aequivocus - equally called (by two different meanings). To equivocate is to choose words that can mean two things equally - words that satisfy both sides while committing to neither. The ambiguity is the point.",
hook:"'Did you take the money?' He says: 'Money has passed through many hands in this organization.' She presses. He says: 'I have always operated within appropriate guidelines.' She presses again. He says: 'This is a complex situation with many dimensions.' He has spoken for four minutes and answered nothing. This is <span class='hook-keyword'>equivocate</span>: the art of saying words that are technically true but designed to prevent understanding rather than enable it."},

{g:3,w:"Polarize",pos:"verb",def:"Divide or cause to divide into two sharply contrasting groups.",etym:[{m:"POLUS",s:"pole"}],
origin:"French polariser - from pole. A magnet has two poles; iron filings near it align either toward one pole or the other, with nothing in between. To polarize = to force everything into one of two opposite camps.",
hook:"Before the announcement, the community had moderate, varied opinions on the development project. After the announcement, conversations became binary: you're either for it or against it. The middle ground depopulated. People who held nuanced views found themselves pressured to choose a side. The issue had <span class='hook-keyword'>polarized</span> the town - not just divided it, but created two magnetic poles that pulled everyone to one extreme or the other."},

{g:3,w:"Prodigal",pos:"adjective",def:"Spending money or resources freely and recklessly.",etym:[{m:"PRO-",s:"forth"},{m:"AGERE",s:"to drive"}],
origin:"Latin prodigus - lavish, from prodigere (to drive forth, to squander). The Parable of the Prodigal Son (Luke 15) gave this word its most famous illustration: a son who demands his inheritance early and spends it all.",
hook:"GRE NUANCE: <span class='hook-keyword'>Prodigal</span> means recklessly wasteful with money/resources, NOT 'returning after a long absence.' The 'prodigal son' in the Biblical parable is the son who wasted his inheritance - not the son who came back. But because the parable is famous for the return, many people misremember the word as meaning 'one who returns.' <strong>The prodigal son was the one who spent everything. His return is what the parable is about - but that's not what the word means.</strong>"},

{g:3,w:"Verbose",pos:"adjective",def:"Using or expressed in more words than are needed.",etym:[{m:"VERBUM",s:"word"}],
origin:"Latin verbosus - wordy, from verbum (word). The same root gives us verbal, verb, verbatim. Verbose = having too many words - a surplus of the very thing (verbum) that should be used economically.",
hook:"<strong>The email that should be two sentences</strong>. Instead: three paragraphs of context, followed by the actual question, followed by two paragraphs explaining why the question is important, followed by a caveat, followed by a closing thought about the broader implications. By the time the reader reaches the question, they have forgotten the beginning. The email is <span class='hook-keyword'>verbose</span>: every word is there, but the forest has consumed the trees."},

// ─── GROUP 4 ──────────────────────────────────────────────────────────────────
{g:4,w:"Abstain",pos:"verb",def:"Restrain oneself from doing or enjoying something.",etym:[{m:"ABS-",s:"from"},{m:"TENERE",s:"to hold"}],
origin:"Latin abstinere - to hold back from. Ab- (from, away) + tenere (to hold). The same root gives us contain, obtain, retain. Abstain = to hold yourself away from something.",
hook:"<strong>The recovering alcoholic at the wedding reception</span>. The open bar, the champagne toast, everyone around her drinking. She holds a glass of sparkling water. Not because she can't. Not because she's required to. Because she has decided to. This is <span class='hook-keyword'>abstain</span>: the active exercise of holding yourself away from something available. It requires presence and intention - you can only abstain from things you could otherwise have."},

{g:4,w:"Approbation",pos:"noun",def:"Approval or praise.",etym:[{m:"AD-",s:"to"},{m:"PROBARE",s:"test or find good"}],
origin:"Latin approbatio - finding something good (after testing). From probare (to test, to prove good). Approbation implies approval that comes from assessment - not just liking something, but having evaluated it and found it worthy.",
hook:"GRE ANTONYM PAIR: <span class='hook-keyword'>Approbation</span> (approval, praise) vs <span class='hook-keyword'>Censure</span> (group 3 - formal disapproval) vs <span class='hook-keyword'>Opprobrium</span> (group 12 - public disgrace). These appear together often in GRE analogy and reading questions. Approbation is the positive pole; opprobrium is the extreme negative pole; censure is formal disapproval somewhere between them. <strong>Approbation = tested and found good. Censure = formally found unacceptable. Opprobrium = publicly disgraced.</strong>"},

{g:4,w:"Cherish",pos:"verb",def:"Protect and care for someone or something lovingly.",etym:[{m:"CARUS",s:"dear"}],
origin:"Old French cherir - to hold dear. Latin carus (dear, beloved). The same root gives us 'charity' (love for others) and 'caress.' To cherish = to hold something as dear - with protective, loving care.",
hook:"<strong>The photograph in the wallet</span>. Worn at the edges from years of handling. The image is slightly faded. There are newer, better photographs on his phone. But this one is the one that travels with him everywhere - taken at a moment that mattered, kept through every move and change. He <span class='hook-keyword'>cherishes</span> it: the act of holding dear includes both the love and the protection - keeping it safe because it represents something irreplaceable."},

{g:4,w:"Corroborate",pos:"verb",def:"Confirm or give support to (a statement, theory, or finding).",etym:[{m:"COM-",s:"together"},{m:"ROBUR",s:"strength"}],
origin:"Latin corroborare - to strengthen together. Robur = oak (the strongest wood), hence strength. To corroborate = to add strength to a claim by bringing additional support alongside it.",
hook:"<strong>The eyewitness says she saw the defendant at the location at 9 PM</span>. The defense challenges her memory. Then: security camera footage from 8:58 PM showing the defendant's car. Then: a toll record from the same road at 9:03 PM. Then: a receipt from a nearby gas station at 9:07 PM. Each piece of evidence <span class='hook-keyword'>corroborates</span> the eyewitness - independently adding strength to the same claim until the accumulated support becomes overwhelming."},

{g:4,w:"Disparate",pos:"adjective",def:"Essentially different in kind; not allowing comparison.",etym:[{m:"DIS-",s:"apart"},{m:"PARARE",s:"to prepare"}],
origin:"Latin disparatus - separated, unequal. From dis- (apart) + parare (to prepare, arrange). Disparate things have been prepared apart - they come from different origins, different categories, and resist being placed on the same scale.",
hook:"GRE PRECISION: <span class='hook-keyword'>Disparate</span> means essentially different in KIND, not just in degree. Two movies can be different (one good, one bad) but they're the same kind of thing. A movie and a symphony are disparate - they belong to different categories entirely. The word implies incomparability: you can't easily put them on the same scale because they aren't measuring the same thing. <strong>Disparate = apples and philosophy, not apples and oranges (which are at least both fruit).</strong>"},

{g:4,w:"Emulate",pos:"verb",def:"Match or surpass (a person or achievement), typically by imitation.",etym:[{m:"AEMULUS",s:"rival"}],
origin:"Latin aemulari - to rival, from aemulus (rival). The original sense was competitive: to strive to equal or surpass. Emulation was a noble ambition - using someone else's achievement as the target you aim to meet or exceed.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Emulate</span> (imitate in order to MATCH or SURPASS) vs <span class='hook-keyword'>Mimic</span> (group 13 - imitate, often mockingly or mechanically, without the ambition to surpass). Emulation is aspirational. A student emulates a mentor. A comedian mimics a celebrity. <strong>Emulate = imitation with the goal of reaching or exceeding the original. Mimic = imitation as reproduction, often without aspiration.</strong>"},

{g:4,w:"Enervate",pos:"verb",def:"Cause (someone) to feel drained of energy or vitality.",etym:[{m:"E-",s:"out of"},{m:"NERVUS",s:"sinew"}],
origin:"Latin enervare - to remove the sinews from. Nervus = sinew, tendon (the structural support of muscle). To enervate = to take out what gives you physical and mental structure - to leave you limp.",
hook:"GRE TRAP: <span class='hook-keyword'>Enervate</span> means to WEAKEN and DRAIN - it does NOT mean to energize. The 'en-' prefix looks like it should add energy (like 'energize'), but it means 'remove from' here. 'The speech enervated the audience' = it drained them, made them listless and tired - the opposite of energized. <strong>En-NERVE, not en-ENERGY. Removing the sinews leaves you structurally weak.</strong>"},

{g:4,w:"Ephemeral",pos:"adjective",def:"Lasting for a very short time.",etym:[{m:"EPI-",s:"on"},{m:"HEMERA",s:"day"}],
origin:"Greek ephemeros - lasting only a day. Epi (on) + hemera (day). Some insects live as adults for a single day. The mayfly was named for this quality. Ephemeral = lasting only one day, or by extension, any very brief existence.",
hook:"<strong>Cherry blossoms in Kyoto</span>. Peak bloom lasts exactly seven to ten days. People plan their visits a year in advance. They travel from every continent for this specific window. The blossoms are not rare in the way diamonds are rare - they come every year. They're rare in the way all <span class='hook-keyword'>ephemeral</span> beauty is rare: because of their brevity. The transience is inseparable from the beauty. You cannot have the blossoms without the falling."},

{g:4,w:"Fervid",pos:"adjective",def:"Intensely enthusiastic or passionate, especially to an excessive degree.",etym:[{m:"FERVERE",s:"to boil"}],
origin:"Latin fervidus - boiling, from fervere (to boil). The same root gives us fervor, feverish, and ferment. Fervid suggests passion that is boiling - overheated, intense to the point of excess.",
hook:"GRE PAIR: <span class='hook-keyword'>Fervid</span> (intensely passionate, almost excessively so) vs <span class='hook-keyword'>Fervent</span> (group 22 - deeply passionate but more controlled) vs <span class='hook-keyword'>Ardent</span> (group 26 - burning with passion). All three share the 'fire/heat' root. Fervid is the hottest - it implies the passion is at boiling point, possibly past the optimal temperature. Fervent is respectably passionate. Ardent is burning but contained. <strong>Fervid = boiling over. Fervent = properly heated. Ardent = steadily burning.</strong>"},

{g:4,w:"Garrulous",pos:"adjective",def:"Excessively talkative, especially on trivial matters.",etym:[{m:"GARRIRE",s:"to chatter"}],
origin:"Latin garrulus - chattering, from garrire (to chatter, prattle). The sound of the word itself is mimetic - the repeated 'r' sounds like continuous chatter. Garrulous implies not just talking but talking about nothing important.",
hook:"<strong>The four-hour drive with the person who doesn't stop talking</span>. By hour two, you know about their neighbor's divorce, their theory about parking lots, their sister's cat's personality, their opinion on every highway exit you pass, and their full analysis of the weather patterns of the last six weeks. You have learned nothing. You are exhausted. This is <span class='hook-keyword'>garrulous</span>: talking abundantly, persistently, and primarily about things that matter only to the speaker."},

{g:4,w:"Incendiary",pos:"adjective",def:"Designed to cause fires; tending to stir up conflict.",etym:[{m:"INCENDIUM",s:"fire"}],
origin:"Latin incendiarius - of or relating to fire. From incendium (a fire, conflagration). Both the literal (fire-causing) and figurative (conflict-causing) meanings share the same root logic: something that sets things alight.",
hook:"<strong>The speech was not inaccurate</span>. Every fact could be verified. But the selection of which facts, placed in which order, using which language, aimed at which audience - the whole was designed not to inform but to ignite. By the end, the room was already moving toward violence. This is an <span class='hook-keyword'>incendiary</span> speech: one whose purpose is to set things on fire, with the words themselves as the accelerant."},

{g:4,w:"Inimical",pos:"adjective",def:"Tending to obstruct or harm; unfriendly.",etym:[{m:"IN-",s:"not"},{m:"AMICUS",s:"friend"}],
origin:"Latin inimicus - enemy, from in- (not) + amicus (friend). The direct opposite of 'amicable.' Something inimical is not just neutral or indifferent - it actively works against, as an enemy would.",
hook:"The GRE uses <span class='hook-keyword'>inimical</span> almost always in the construction 'inimical to X' - meaning working against X, harmful to X. 'A sedentary lifestyle is inimical to cardiovascular health.' 'Constant interruption is inimical to deep work.' The word implies structural opposition: not just unhelpful, but actively counter to the interests of the thing it modifies. <strong>Inimical to X = the enemy of X, working against it by nature.</strong>"},

{g:4,w:"Intimate",pos:"verb",def:"Imply or hint.",etym:[{m:"INTIMARE",s:"impress, make familiar"}],
origin:"Latin intimare - to announce, put in, from intimus (innermost). To intimate is to put something in through the innermost channel - to deliver a message not directly but through implication, through the inner understanding rather than the stated word.",
hook:"GRE ROLE SHIFT: You know <span class='hook-keyword'>intimate</span> as an adjective (close, personal: 'an intimate relationship'). As a VERB, it means to HINT or IMPLY. 'She intimated that she was considering resigning' = she hinted at it, suggested it without saying it directly. 'He intimated displeasure through his tone' = he implied displeasure without stating it. <strong>Intimate-VERB = hint via the innermost channel, not through the surface of direct statement.</strong>"},

{g:4,w:"Invigorate",pos:"verb",def:"Give strength or energy to.",etym:[{m:"IN-",s:"into"},{m:"VIGOR",s:"vitality"}],
origin:"Latin vigorare - to make vigorous. From vigor (vitality, force, liveliness). To invigorate = to put vigor into something - to introduce the quality of lively force into what previously lacked it.",
hook:"<strong>The team has been working on the failing project for eight months</span>. Morale has drained away with each setback. Then: new leadership, new approach, one successful result. Immediately, the hallways sound different. People are staying late voluntarily. The energy that had leaked out has returned. The success has <span class='hook-keyword'>invigorated</span> the team - not just improved morale, but restored the vital force that makes work feel possible."},

{g:4,w:"Mitigate",pos:"verb",def:"Make less severe, serious, or painful.",etym:[{m:"MITIS",s:"mild"},{m:"AGERE",s:"do, make"}],
origin:"Latin mitigare - to make mild. Mitis (mild, soft) + agere (to make). To mitigate = to introduce mildness into something harsh. The severity remains - it is merely reduced, made more bearable.",
hook:"GRE PRECISION: <span class='hook-keyword'>Mitigate</span> means to make LESS SEVERE - not to eliminate. This distinction matters in reading comprehension. 'The policy mitigated the economic damage' does NOT mean the policy prevented damage. It means the damage was less severe than it would have been. This is often the exact distinction a GRE question tests. <strong>Mitigate = partial relief from something that continues. Compare to prevent (before) and remedy (after).</strong>"},

{g:4,w:"Obsolete",pos:"adjective",def:"No longer produced or used; out of date.",etym:[{m:"OBSOLETUS",s:"grown old"}],
origin:"Latin obsoletus - grown old, disused. From obsolere (to fall into disuse). Something obsolete was not destroyed - it simply aged past relevance, becoming disused through the natural process of replacement.",
hook:"<strong>The card catalog in the university library</span>. Hundreds of wooden drawers, thousands of index cards, a system that worked perfectly for a century. Now: one computer terminal serves the same function in two seconds. The card catalog is <span class='hook-keyword'>obsolete</span> - not broken, not wrong, simply displaced by something that does the same job better. The old system still exists; it just no longer has a function that justifies its existence."},

{g:4,w:"Opaque",pos:"adjective",def:"Not able to be seen through; not transparent.",etym:[{m:"OPACUS",s:"darkened"}],
origin:"Latin opacus - shady, dark, darkened. Something opaque blocks the passage of light - you cannot see through it to what's on the other side. The figurative extension: you cannot see through someone's intentions or through obscure writing to the meaning.",
hook:"GRE ANTONYM PAIR: <span class='hook-keyword'>Opaque</span> (cannot be seen through; obscure) vs <span class='hook-keyword'>Transparent</span> (completely clear; obvious) vs <span class='hook-keyword'>Pellucid</span> (group 13 - completely clear, especially of writing). The GRE loves using opaque metaphorically: 'opaque financial disclosures' = disclosures you can't see through to understand what's actually happening. <strong>Opaque writing blocks understanding. Pellucid writing lets understanding pass through without obstruction.</strong>"},

{g:4,w:"Paradigmatic",pos:"adjective",def:"Serving as a typical example of something.",etym:[{m:"PARA-",s:"beside"},{m:"DEIKNUNAI",s:"to show"}],
origin:"Greek paradeigma - model, pattern, from para (beside) + deiknunai (to show). To show beside: to place next to something as an illustration of what that thing is. A paradigm is the model; paradigmatic means serving as that model.",
hook:"<strong>When teaching students what a sonnet IS</span>, you don't define it in the abstract - you show them Shakespeare's Sonnet 18. That poem is the example you stand beside to point at and say: 'This. This is what a sonnet is.' The poem is <span class='hook-keyword'>paradigmatic</span>: it doesn't just exemplify the form, it defines it by illustration. The paradigmatic example is the one that becomes the standard against which all other examples are measured."},

{g:4,w:"Pedantic",pos:"adjective",def:"Excessively concerned with minor details or rules.",etym:[{m:"PAEDAGOGUS",s:"teacher"}],
origin:"French pédantesque - of or like a pedant. A pedant was originally just a schoolteacher - a person who managed the details of instruction. The word became negative as it came to describe teachers who prioritized the rules over the substance.",
hook:"<strong>You write 'the data shows' in your report</span>. Your colleague corrects you: 'data is a plural noun; it should be 'the data show.'' This is technically correct. Is it the most important thing about your report? No. Does it need to be corrected? Arguably. Does correcting it in front of the client while the substance of the analysis goes unaddressed make your colleague <span class='hook-keyword'>pedantic</span>? Yes. Pedantry is the elevation of the technical rule above the purpose it was meant to serve."},

{g:4,w:"Placid",pos:"adjective",def:"Not easily upset or excited; calm and peaceful.",etym:[{m:"PLACERE",s:"to please"}],
origin:"Latin placidus - calm, gentle, from placere (to please). Something placid is in a state of being pleased - content, undisturbed, without the friction that generates turbulence.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Placid</span> (constitutionally calm, rarely disturbed) vs <span class='hook-keyword'>Serene</span> (group 26 - peaceful and untroubled, often with a quality of active peacefulness) vs <span class='hook-keyword'>Tranquil</span> (group 4 - free from disturbance). All three mean calm. Placid emphasizes the temperament - the person is hard to disturb. Serene emphasizes the quality of the peace - it radiates something. Tranquil emphasizes the environment - it has been freed from disturbance. <strong>Placid = hard to ruffle. Serene = radiating peace. Tranquil = free from disturbance.</strong>"},

{g:4,w:"Polemical",pos:"adjective",def:"Relating to or involving strongly critical, controversial, or disputatious writing or speech.",etym:[{m:"POLEMOS",s:"war"}],
origin:"Greek polemikos - of or relating to war, from polemos (war). A polemic is written warfare - a strongly argued attack on a position, intended not to explore nuance but to defeat an opponent.",
hook:"<strong>The philosopher publishes a book</span> arguing that the entire school of thought her colleague built his career on is not just wrong but intellectually dishonest. She does not seek middle ground. She does not acknowledge the strengths of his position before noting weaknesses. She attacks. The book is <span class='hook-keyword'>polemical</span>: it is written warfare, designed to destroy a position rather than to engage it fairly. The GRE uses this word when describing aggressive, one-sided argumentation."},

{g:4,w:"Precipitate",pos:"verb",def:"Cause (an event or situation, typically one that is bad or undesirable) to happen suddenly or prematurely.",etym:[{m:"PRAE-",s:"before"},{m:"CAPUT",s:"head"}],
origin:"Latin praecipitare - to throw headlong. Praecipitum = a precipice - the head going first over the edge. To precipitate = to throw something over the edge of timing, making it happen before it was ready.",
hook:"GRE TRAP: <span class='hook-keyword'>Precipitate</span> as a VERB means to CAUSE or TRIGGER suddenly - especially before the right time. 'His resignation precipitated a crisis' = his resignation caused a crisis suddenly, before people were prepared. This is different from the adjective 'precipitate' (rash, hasty) and different from precipitation (rain). Watch for it as a verb in GRE passages. <strong>Precipitate = to throw something over the edge prematurely, causing it to happen before its time.</strong>"},

{g:4,w:"Profundity",pos:"noun",def:"Deep insight; great depth of knowledge or thought.",etym:[{m:"PRO-",s:"forth"},{m:"FUNDUS",s:"bottom"}],
origin:"Latin profundus - deep. Pro- (forward, deep) + fundus (bottom). Profound = having great depth. Profundity = the quality or instance of being profoundly deep. The GRE uses it for ideas that go all the way to the bottom.",
hook:"The student asks a question that sounds simple: 'Why do people fear death?' The professor stops. She sits down. <strong>Forty years of philosophy, psychology, anthropology, and literature</span> begin assembling themselves. Twenty minutes later, she's still talking, and the class has forgotten it was a simple question. This is <span class='hook-keyword'>profundity</span>: the depth that reveals itself when you dig past the surface - ideas whose bottom keeps receding as you approach it."},

{g:4,w:"Prophetic",pos:"adjective",def:"Accurately describing or predicting what will happen in the future.",etym:[{m:"PRO-",s:"before"},{m:"PHANAI",s:"speak"}],
origin:"Greek prophetikos - of a prophet, from pro (before) + phanai (to speak). A prophet speaks before events happen. Prophetic means the speaking turned out to be accurate - the prediction matched the outcome.",
hook:"<strong>The economist published a paper in 2004</span> warning, in specific detail, about the mortgage-backed security structures that would collapse in 2008. Few read it. Nobody acted on it. Four years later, everything she described happened, in the sequence she described. Her paper was <span class='hook-keyword'>prophetic</span>: not mystical, not guesswork, but analysis so accurate that it described a future before that future arrived. Prophetic insight often looks obvious in retrospect."},

{g:4,w:"Prudent",pos:"adjective",def:"Acting with or showing care and thought for the future.",etym:[{m:"PROVIDERE",s:"foresee"}],
origin:"Latin prudens - contraction of providens (foreseeing). From providere (to foresee, provide for). Prudent = the quality of looking forward, anticipating consequences, and acting accordingly.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Prudent</span> (careful and wise, thinking of future consequences) vs <span class='hook-keyword'>Judicious</span> (group 15 - showing good judgment in specific decisions) vs <span class='hook-keyword'>Circumspect</span> (group 9 - cautious, looking all around before acting). Prudent = the general virtue of caring about future consequences. Judicious = the exercise of good judgment in a specific situation. Circumspect = the specific caution of looking all around before acting. <strong>Prudent is the disposition; judicious is the act; circumspect is the method.</strong>"},

{g:4,w:"Punctilious",pos:"adjective",def:"Showing great attention to detail or correct behavior.",etym:[{m:"PUNCTUM",s:"point"}],
origin:"Italian puntiglio - a fine point, from Latin punctum (a point, a prick). Punctilious = attending to every fine point of conduct or procedure. The image: seeing every small point that others overlook.",
hook:"<strong>The court clerk who returns a filing</span> because the attorney used the wrong weight paper (60 lb when regulations specify 24 lb standard bond) and left a 0.4-inch left margin instead of the required 0.5-inch. The content is excellent. The law is correctly cited. None of this matters: the filing must be resubmitted. The clerk is <span class='hook-keyword'>punctilious</span>: every fine point of procedure must be correct, because every fine point exists for a reason, and he is not authorized to decide which points matter today."},

{g:4,w:"Recondite",pos:"adjective",def:"Little known; abstruse.",etym:[{m:"RE-",s:"back"},{m:"CONDERE",s:"put together, hide"}],
origin:"Latin reconditus - hidden away, stored in a secret place. From recondere (to put back, store away, hide). Recondite knowledge is knowledge that has been put away - accessible only to those who know where to look and have the patience to look there.",
hook:"The dissertation footnote cites a 1932 monograph by a Belgian scholar on a narrow aspect of Byzantine land tenure law. This monograph was printed in an edition of 200 copies. Twelve libraries in the world own it. Only a handful of specialists have read it. The knowledge it contains is entirely <span class='hook-keyword'>recondite</span>: not wrong, not irrelevant to specialists, but stored away from the general circulation of ideas in a place where only the truly committed can find it."},

{g:4,w:"Scrupulous",pos:"adjective",def:"Diligent, thorough, and extremely attentive to details; very concerned to avoid doing wrong.",etym:[{m:"SCRUPULUS",s:"uneasiness, anxiety"}],
origin:"Latin scrupulosus - full of anxiety about small matters. From scrupulus, a diminutive of scrupus (a sharp stone, which when in your sandal causes constant anxious attention). To be scrupulous = to feel the sharp stone of conscience at every step.",
hook:"<strong>The accountant who keeps receipts for everything</span>. Who documents every decision. Who double-checks every calculation. Who loses sleep over a $12 discrepancy in the petty cash record until it's resolved. Who has never, in twenty-two years, had an audit finding. This is <span class='hook-keyword'>scrupulous</span> practice: the anxiety of conscience applied to method - the constant small stone in the shoe that prevents comfortable shortcuts."},

{g:4,w:"Tranquil",pos:"adjective",def:"Free from disturbance; calm.",etym:[{m:"TRANQUILLUS",s:"calm"}],
origin:"Latin tranquillus - calm, peaceful. The word's sound is itself a kind of mimicry - the liquid 'l' sounds and the long vowels create a calming acoustic experience. To tranquilize (drug for calming) comes from the same root.",
hook:"<strong>The library at 7 AM on a Sunday</span>. One other person, three sections over, not moving. Sunlight making rectangular shapes on the floor. No notifications. No sounds except the occasional page turn. This environment is <span class='hook-keyword'>tranquil</span>: not because nothing is happening, but because everything that is happening is at a frequency the nervous system accepts as safe. Tranquility is the absence of disturbance - and that absence can be actively nourishing."},

{g:4,w:"Vacillate",pos:"verb",def:"Alternate or waver between different opinions or actions; be indecisive.",etym:[{m:"VACILLARE",s:"sway"}],
origin:"Latin vacillare - to sway, to waver. The same Latin root of a person physically swaying between two directions, unable to commit to movement in either one. Vacillate = the mental version of that physical sway.",
hook:"GRE PAIR: <span class='hook-keyword'>Vacillate</span> (waver between options, unable to decide) vs <span class='hook-keyword'>Irresolute</span> (group 5 - unable to make decisions, hesitant) vs <span class='hook-keyword'>Equivocate</span> (group 3 - use ambiguous language to avoid committing). Vacillate = the physical sway between options. Irresolute = the general condition of being unable to commit. Equivocate = using language to avoid commitment. <strong>Vacillate is about the wavering. Irresolute is about the general inability. Equivocate is about language strategy.</strong>"},

// ─── GROUP 5 ──────────────────────────────────────────────────────────────────
{g:5,w:"Aloof",pos:"adjective",def:"Not friendly or forthcoming; cool and distant.",etym:[{m:"A-",s:"on"},{m:"LOOF",s:"windward direction"}],
origin:"Nautical: 'a-loof' meant 'to the windward' - keeping a ship's head pointed away from danger, maintaining distance. Sailors kept ships 'aloof' from dangerous rocks. The sense of deliberate distancing migrated to people.",
hook:"<strong>At the party, she is present but unreachable</span>. She responds to questions with complete, correct sentences that contain nothing. Her eyes don't quite land on the person she's talking to. She is not rude - she is distant in a way that communicates: 'I am here, but I am not available.' This is <span class='hook-keyword'>aloof</span>: the deliberate maintenance of emotional distance, like a ship keeping itself upwind of the rocks."},

{g:5,w:"Clangor",pos:"noun",def:"A continuous loud banging or ringing sound.",etym:[{m:"CLANGERE",s:"resound"}],
origin:"Latin clangere - to resound, to clang. The word is onomatopoeic - it sounds like what it means. The GRE rarely tests this word alone; it appears in literary passages describing bells, weapons, or industrial noise.",
hook:"<strong>The medieval battlefield</span>: hundreds of metal weapons striking metal armor simultaneously, the chaos of combat in a confined space. Not music. Not noise that organizes into anything the ear can process. Just the continuous, metallic, overlapping <span class='hook-keyword'>clangor</span> of objects built to destroy each other. The word is sonic - it demands to be heard rather than read. Literary writers use it when they need sound to overwhelm sense."},

{g:5,w:"Conventional",pos:"adjective",def:"Based on or in accordance with what is generally done or believed.",etym:[{m:"CON-",s:"together"},{m:"VENIRE",s:"come"}],
origin:"Latin conventio - a coming together, an agreement. What is conventional is what people have come together to agree on as normal. Convention = the agreement; conventional = conforming to that agreement.",
hook:"GRE NUANCE: In GRE passages, <span class='hook-keyword'>conventional</span> is often used critically to suggest a lack of originality or independent thought. 'A conventional interpretation' = the standard reading everyone accepts without question. 'Conventional wisdom' = what most people believe, often challenged in GRE passages. The word describes conformity to established norms - the opposite of original, innovative, or heterodox. <strong>Watch for GRE passages that contrast conventional thinking with a new approach.</strong>"},

{g:5,w:"Debunk",pos:"verb",def:"Expose the falseness or hollowness of (a myth, idea, or belief).",etym:[{m:"DE-",s:"remove"},{m:"BUNKUM",s:"nonsense"}],
origin:"American English, 1920s. 'Bunkum' (or bunk) meant nonsense, from Buncombe County, North Carolina - a congressman gave a pointless speech 'for Buncombe' in 1820, and the county's name became slang for empty talk. Debunk = remove the bunk.",
hook:"<strong>The science journalist publishes the definitive analysis</span>: the famous study was flawed. The sample size was 23 people. The control group was inadequate. The effect disappeared when the data was re-analyzed. Every follow-up study failed to replicate the finding. The journalist has <span class='hook-keyword'>debunked</span> the claim - not just challenged it, but stripped away the nonsense to reveal there was nothing underneath. Debunking doesn't replace the myth; it removes it.",},

{g:5,w:"Diminutive",pos:"adjective",def:"Extremely or unusually small.",etym:[{m:"DE-",s:"down"},{m:"MINUERE",s:"lessen"}],
origin:"Latin diminutivus - from diminuere (to lessen, make smaller). The same root as 'diminish' and 'minute' (tiny). In grammar, a diminutive is a word form that indicates smallness or affection (kitty, doggy).",
hook:"GRE DOUBLE MEANING: <span class='hook-keyword'>Diminutive</span> as an adjective = extremely small (a diminutive figure). As a grammar noun = a word that expresses smallness or endearment (kitten from cat; booklet from book). The GRE may test the grammatical usage. More commonly: in a literary context, it means small in physical size, often with the connotation that the smallness is surprising relative to the person's presence or impact. <strong>Small in size, often with unexpectedly large effect.</strong>"},

{g:5,w:"Discernible",pos:"adjective",def:"Able to be discerned; perceptible.",etym:[{m:"DIS-",s:"apart"},{m:"CERNERE",s:"separate"}],
origin:"Latin discernere - to separate, sift, distinguish. The same root as 'discern' (to perceive) and 'concern' (to strain toward). Discernible = capable of being separated out from the background, capable of being perceived.",
hook:"The experiment ran for three months. At the end, the researchers analyzed the data carefully. The difference between the treatment group and the control group was 0.3%. This difference was statistically significant. But was it practically <span class='hook-keyword'>discernible</span>? Would a person actually notice a 0.3% change in their daily life? The word asks: can you perceive it, not just measure it?"},

{g:5,w:"Enigmatic",pos:"adjective",def:"Difficult to interpret or understand; mysterious.",etym:[{m:"AINIGMA",s:"riddle"}],
origin:"Greek ainigma - a riddle, dark saying. From ainissesthai (to speak in riddles). The Sphinx posed an ainigma: 'What walks on four legs in the morning, two at noon, and three in the evening?' Oedipus solved it; those who didn't were devoured.",
hook:"<strong>Every time you think you understand her</span>, she says something that contradicts the model. She is generous and suddenly cold. She is serious and suddenly absurd. Her motivations don't accumulate into a legible pattern. You can't predict her. After three years of friendship, she remains as resistant to your full understanding as she was on the first day. She is <span class='hook-keyword'>enigmatic</span>: not hiding, exactly, but constitutionally resistant to being solved."},

{g:5,w:"Estranged",pos:"adjective",def:"No longer close or affectionate to someone; alienated.",etym:[{m:"EX-",s:"out"},{m:"STRANGE",s:"unfamiliar"}],
origin:"Old French estrangier - to make strange, from Latin extraneus (foreign, external). To estrange = to make what was once familiar into something foreign. The estranged person has been made a stranger of what they once belonged to.",
hook:"<strong>He hasn't spoken to his brother in seven years</span>. He doesn't know where he lives now, or whether he's well. The person who once knew him better than anyone has become as unknown as a stranger. This is what <span class='hook-keyword'>estranged</span> means: not a relationship that ended, but one that became foreign - where familiarity used to live, strangeness now resides. The loss is the specific loss of intimacy turned into distance."},

{g:5,w:"Extravagant",pos:"adjective",def:"Lacking restraint in spending money or using resources.",etym:[{m:"EXTRA-",s:"outside"},{m:"VAGARI",s:"wander"}],
origin:"Latin extravagari - to wander outside (the bounds). Extra (outside) + vagari (to wander). Originally meant 'straying outside the proper limits' in any sense. The financial application (spending beyond proper limits) followed.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Extravagant</span> (wandering outside the bounds, especially financially or in quantity) vs <span class='hook-keyword'>Lavish</span> (group 26 - sumptuously generous, rich in quality) vs <span class='hook-keyword'>Prodigal</span> (group 3 - recklessly wasteful). Extravagant emphasizes the exceeding of appropriate limits. Lavish emphasizes richness and generosity. Prodigal emphasizes reckless waste. <strong>You can lavish care on someone (positive). Extravagant and prodigal both suggest excessive and possibly irresponsible spending.</strong>"},

{g:5,w:"Fanciful",pos:"adjective",def:"Over-imaginative and unrealistic.",etym:[{m:"FANCY",s:"imagination"}],
origin:"Fancy = from Middle English fantasie, from Greek phantasia (imagination, appearance). Fanciful = full of fancy - governed by imagination rather than reality, producing ideas that are attractive but not grounded.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Fanciful</span> (governed by imagination; pleasant but unrealistic) vs <span class='hook-keyword'>Quixotic</span> (group 1 - idealistic to the point of absurd impracticality) vs <span class='hook-keyword'>Whimsical</span> (group 25 - playfully quaint or fanciful in an appealing way). Fanciful implies the imagination has overridden reality. Quixotic implies the idealism has overridden practicality. Whimsical has a positive, charming connotation. <strong>Fanciful = pretty imagination that won't survive contact with reality.</strong>"},

{g:5,w:"Frivolous",pos:"adjective",def:"Not having any serious purpose or value.",etym:[{m:"FRIVOLUS",s:"silly"}],
origin:"Latin frivolus - silly, of trifling value. Related to friare (to rub away, crumble) - something frivolous is so insubstantial it crumbles when pressed. The legal usage (frivolous lawsuit = lacking legal merit) is an important application.",
hook:"<strong>The lawsuit claims emotional distress from a product that was clearly labeled 'novelty item'</span>. The damages requested are $2 million. The legal theory requires reinterpreting three established precedents. The judge reads it and sighs. She writes 'DISMISSED' in capital letters. In her opinion: 'This lawsuit is <span class='hook-keyword'>frivolous</span> - it lacks any serious legal basis and appears designed to harass rather than to seek legitimate remedy.'"},

{g:5,w:"Heterogeneous",pos:"adjective",def:"Diverse in character or content.",etym:[{m:"HETEROS",s:"other"},{m:"GENOS",s:"kind"}],
origin:"Greek heterogenes - of different kinds. Heteros (other, different) + genos (kind, type). The opposite of homogeneous (same kind). A heterogeneous mixture contains elements of different types that don't reduce to a single category.",
hook:"GRE ANTONYM PAIR: <span class='hook-keyword'>Heterogeneous</span> (diverse, different in kind) vs <span class='hook-keyword'>Homogeneous</span> (group 1 - uniform, same throughout). These appear together in GRE analogies and reading passages frequently. A heterogeneous population has people of many different backgrounds. A homogeneous one is uniform. <strong>The GRE often uses these to discuss cultural diversity, scientific mixtures, and the composition of groups. Hetero = other/different. Homo = same.</strong>"},

{g:5,w:"Imperious",pos:"adjective",def:"Assuming power or authority without justification; arrogant and domineering.",etym:[{m:"IMPERIUM",s:"command"}],
origin:"Latin imperiosus - commanding, from imperium (absolute power, command). An emperor had imperium. Imperious behavior = acting as if you have imperial authority when you don't - demanding obedience you haven't earned.",
hook:"<strong>The project manager who joined three weeks ago</span>. She has no positional authority over the senior engineers. But she speaks to them as if she does: 'I need this by tomorrow.' Not 'could you prioritize this.' Not 'when would you be able to.' Just: 'I need this.' She is <span class='hook-keyword'>imperious</span>: commanding with an authority she hasn't earned, treating her preferences as orders and her requests as non-negotiable."},

{g:5,w:"Impertinent",pos:"adjective",def:"Not showing proper respect; rude.",etym:[{m:"IN-",s:"not"},{m:"PERTINERE",s:"pertain"}],
origin:"Latin impertinens - not pertaining, not belonging. Originally meant 'irrelevant.' Then shifted to mean behavior that doesn't belong in the social context - behavior that violates the rules of what's appropriate, hence: rude.",
hook:"GRE ETYMOLOGY SHIFT: <span class='hook-keyword'>Impertinent</span> originally meant IRRELEVANT (not pertaining to the matter). It still can mean this in formal writing: 'an impertinent question' in a legal context = a question that doesn't pertain to the case. But the dominant modern meaning is RUDE - behavior that doesn't pertain to accepted social norms. <strong>In GRE passages, look for context: irrelevant (formal/legal) or rude (social).</strong>"},

{g:5,w:"Invasive",pos:"adjective",def:"Tending to spread prolifically and undesirably or harmfully.",etym:[{m:"IN-",s:"into"},{m:"VADERE",s:"go"}],
origin:"Latin invadere - to go into, to attack. In + vadere (to go). The same root as 'invade.' An invasive species goes into a new territory and disrupts what was established there, spreading through it like an army.",
hook:"<strong>The kudzu vine in the American South</span>. It arrived in 1876. By 2023, it covers 7.4 million acres. It grows up to a foot per day. It climbs trees, smothers native plants, covers abandoned houses. Nothing native evolved to contain it. It is the exemplary <span class='hook-keyword'>invasive</span> species: going into a system it wasn't designed to be part of, spreading without check, displacing what belonged there."},

{g:5,w:"Irresolute",pos:"adjective",def:"Showing or feeling hesitancy; uncertain.",etym:[{m:"IN-",s:"not"},{m:"RESOLUTUS",s:"resolved"}],
origin:"Latin resolutus - unloosed, resolved. From resolvere (to loosen, dissolve, settle). Irresolute = not settled, not loosed from the tension of the unresolved - still caught in the bind of indecision.",
hook:"<strong>The general stands before two maps</span>. Attack from the north: higher risk, higher reward. Attack from the south: lower risk, almost certain moderate victory. His officers wait. The attack must begin at dawn. He looks at the north map, then the south map, then back. Dawn approaches. He is <span class='hook-keyword'>irresolute</span>: not analyzing, not preparing - just suspended in the tension between two options, neither of which he can commit to."},

{g:5,w:"Laudable",pos:"adjective",def:"Deserving praise and commendation.",etym:[{m:"LAUS",s:"praise"}],
origin:"Latin laudabilis - praiseworthy, from laus (praise, glory). The same root gives us 'laud' (to praise) and 'eulogy' (good word = praise of the dead). Laudable = deserving the laus.",
hook:"GRE NUANCE: <span class='hook-keyword'>Laudable</span> means deserving praise - but not necessarily achieving the goal. A laudable effort can still fail. A laudable intention can produce bad results. The word evaluates the motive or the attempt, not the outcome. 'Her effort was laudable even though the result was poor.' This distinction matters in GRE argument analysis: <strong>something can be laudable (praiseworthy in aim) and simultaneously ineffective (failing in execution).</strong>"},

{g:5,w:"Lax",pos:"adjective",def:"Not sufficiently strict, severe, or careful.",etym:[{m:"LAXUS",s:"loose"}],
origin:"Latin laxus - loose, relaxed. The same root as 'relax' (to loosen again) and 'laxative' (something that loosens the bowels). Lax = the quality of being too loose - not holding enough tension to maintain proper function.",
hook:"<strong>The airport security checkpoint</span>. The officer waves people through without checking IDs. The X-ray machine is off for maintenance. Bags are cursorily examined if at all. Nobody is watching the perimeter. The system has the structure of security without performing its function. Security here is <span class='hook-keyword'>lax</span>: the mechanism exists but the tension required to make it work has been released. Lax always implies there was a standard that is no longer being upheld."},

{g:5,w:"Marginalize",pos:"verb",def:"Treat (a person, group, or concept) as insignificant or peripheral.",etym:[{m:"MARGO",s:"edge"}],
origin:"Latin margo - edge, border. The margin is the edge of the page - the blank space outside the main text. To marginalize = to push toward the margin, to treat as peripheral to the main text of social or political life.",
hook:"<strong>The history textbook has eleven chapters</span>. Indigenous peoples appear in one paragraph of Chapter 3 as context for European exploration, and in a brief mention in Chapter 8 as a 'problem' for westward expansion. They are not agents of their own history. They are <span class='hook-keyword'>marginalized</span>: pushed to the edge of the narrative, appearing only when they briefly intersect with the central story - which is about someone else."},

{g:5,w:"Panache",pos:"noun",def:"Flamboyant confidence of style or manner.",etym:[{m:"PINNACULUM",s:"small wing/plume"}],
origin:"French panache - a plume, especially on a helmet. From Italian pennacchio (plume). The knight's helmet plume became a symbol of dashing style. Henry IV of France said his soldiers should follow his white plume into battle: 'Follow my panache!'",
hook:"<strong>Two surgeons perform the same procedure with equal skill</span>. One is efficient, clean, precise - a craftsperson. The other is all of that, plus something else: a casual elegance, a slight flourish in the setup, a manner that makes the procedure look less like work and more like performance. The second surgeon operates with <span class='hook-keyword'>panache</span>: the plume on the helmet, the style that transforms competence into something memorable."},

{g:5,w:"Plodding",pos:"adjective",def:"Slow-moving and unexciting.",etym:[{m:"PLOD",s:"walk heavily"}],
origin:"Possibly imitative of the sound of heavy footsteps. To plod = to walk with heavy, laborious steps, each one costing effort without producing speed. Plodding = characterized by this heavy, slow, effortful progress.",
hook:"GRE USAGE: <span class='hook-keyword'>Plodding</span> in a literary context almost always describes something as dull and slow-paced: a plodding narrative, a plodding argument, a plodding style. It implies the work is getting where it's going but at such cost and such slow pace that the journey itself becomes painful. The pace is the problem, not the destination. <strong>Competent but exhausting to accompany.</strong>"},

{g:5,w:"Prosaic",pos:"adjective",def:"Having the style or diction of prose; lacking poetic beauty; commonplace.",etym:[{m:"PROSA",s:"straightforward discourse"}],
origin:"Latin prosaicus - from prosa (prose, direct discourse). Prose = straightforward text without the elevated quality of poetry. Prosaic = having the quality of plain prose - functional, clear, but without elevation or beauty.",
hook:"GRE PAIR: <span class='hook-keyword'>Prosaic</span> (ordinary, unimaginative, like plain prose) vs <span class='hook-keyword'>Mundane</span> (group 8 - of this world, lacking excitement) vs <span class='hook-keyword'>Pedestrian</span> (group 19 - dull, uninspired). All three mean 'ordinary and boring.' Prosaic emphasizes the lack of beauty or imagination. Mundane emphasizes the worldliness (opposite of heavenly). Pedestrian emphasizes the ground-level lack of inspiration. <strong>Prosaic = missing poetry. Mundane = missing transcendence. Pedestrian = missing elevation.</strong>"},

{g:5,w:"Remedial",pos:"adjective",def:"Giving or intended as a remedy or cure.",etym:[{m:"REMEDIUM",s:"cure"}],
origin:"Latin remedium - a cure, from re- (again) + mederi (to heal). A remedy restores health. Remedial = serving to restore - either health (medical usage) or a deficiency (educational usage). Remedial courses correct deficiencies.",
hook:"GRE NUANCE: <span class='hook-keyword'>Remedial</span> is often used in educational contexts (remedial classes = classes to address deficiencies) but in GRE passages may appear in any context where something is designed to correct a problem or fill a gap. The word is descriptive, not pejorative: remedial action = action designed to address a specific deficiency. <strong>Remedial addresses a real gap. The gap must be diagnosed before the remedy can be designed.</strong>"},

{g:5,w:"Restive",pos:"adjective",def:"Unable to keep still or silent and becoming increasingly difficult to control.",etym:[{m:"RESTARE",s:"remain"}],
origin:"Old French restif - refusing to move, balky (said of horses that stop and refuse to go forward). Paradoxically, restive originally meant 'staying still' - but a horse that refuses to move becomes harder and harder to manage, eventually erupting. Hence: difficult to control through suppressed energy.",
hook:"GRE ETYMOLOGY TRAP: <span class='hook-keyword'>Restive</span> does NOT mean resting or restful. It means the opposite - difficult to keep still, increasingly agitated. A restive crowd is not a resting crowd: it's a crowd whose suppressed energy is building toward eruption. Like a horse that won't move forward but won't stand quietly either - it's gathered energy looking for an outlet. <strong>Restive = suppressed agitation building toward action, not peaceful rest.</strong>"},

{g:5,w:"Sporadic",pos:"adjective",def:"Occurring at irregular intervals or only in a few places; scattered or isolated.",etym:[{m:"SPORAS",s:"scattered"}],
origin:"Greek sporas - scattered, from speirein (to sow, scatter seed). The same root as 'diaspora' (a scattering). Sporadic = scattered like seeds thrown randomly, appearing here and there without pattern.",
hook:"GRE PRECISION: <span class='hook-keyword'>Sporadic</span> has two components: (1) IRREGULAR timing - not predictable, not systematic; and (2) SCATTERED distribution - not concentrated in one place. 'Sporadic outbreaks' = outbreaks that occur at unpredictable times in scattered locations. The combination distinguishes it from 'occasional' (just infrequent) or 'isolated' (just geographically scattered). <strong>Sporadic = irregular in both time and space simultaneously.</strong>"},

{g:5,w:"Stigmatize",pos:"verb",def:"Describe or regard as worthy of disgrace or great disapproval.",etym:[{m:"STIGMA",s:"mark"}],
origin:"Greek stigma - a mark, brand. Criminals and enslaved people in ancient Greece were physically marked (burned or tattooed) as social stigma. To stigmatize = to mark with the symbolic brand of social disapproval.",
hook:"<strong>The community gossip ensures that one mistake</span> - an arrest that led to no charges, a family conflict that became public - follows a person through decades. Every time they enter a room, the 'mark' precedes them. Employers hesitate. Neighbors talk. The person has been <span class='hook-keyword'>stigmatized</span>: branded with a social mark that shapes how they're perceived regardless of what they do after the event that created it."},

{g:5,w:"Undermine",pos:"verb",def:"Damage or weaken (someone or something), especially gradually or insidiously.",etym:[{m:"UNDER-",s:"beneath"},{m:"MINE",s:"dig"}],
origin:"Literally: to dig beneath (a wall or foundation) to cause it to collapse. Medieval siege warfare: tunneling under castle walls to make them fall. The figurative use preserves this meaning exactly: weakening from below, invisibly.",
hook:"<strong>The manager never contradicts her colleague directly</span>. She always agrees in meetings. But she questions his judgment with her team. She casually mentions his past mistakes to stakeholders. She frames his proposals as 'ambitious' (implying unrealistic) in email chains he's not copied on. After six months, his credibility has collapsed. She has <span class='hook-keyword'>undermined</span> him: dug beneath his foundations without ever making a visible attack."},

{g:5,w:"Utterly",pos:"adverb",def:"Completely and without qualification; absolutely.",etym:[{m:"UTERA",s:"outer"}],
origin:"Old English uttor - outer, further out. The superlative of 'out' - the most completely outside, the most extreme. Utterly = to the furthest possible degree, without reservation or partial qualification.",
hook:"GRE USAGE: <span class='hook-keyword'>Utterly</span> is an intensifier that eliminates all qualification. 'Utterly destroyed' = not partially destroyed, not mostly destroyed, but completely destroyed with no exceptions. In GRE reading passages, utterly often signals an extreme claim that the passage will then support or challenge. When you see 'utterly,' the next word is the full, unqualified version of what follows. <strong>Utterly eliminates the middle ground entirely.</strong>"},

{g:5,w:"Weary",pos:"adjective",def:"Feeling or showing tiredness, especially as a result of excessive exertion.",etym:[{m:"WERIG",s:"tired"}],
origin:"Old English wērig - tired, weary. One of the oldest words in English for tiredness. The word implies tiredness accumulated through sustained effort - not the tiredness of one bad night's sleep but the tiredness of prolonged exertion.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Weary</span> (tired from sustained effort or a long difficult experience) vs <span class='hook-keyword'>Lethargic</span> (group 13 - lacking energy, sluggish, often suggesting illness or depression) vs <span class='hook-keyword'>Enervated</span> (drained of vitality). Weary has a dignity - it implies genuine effort was made. Lethargic implies a constitutional sluggishness. Enervated implies something external drained the energy. <strong>The weary person earned their tiredness. The lethargic one may not have.</strong>"},

{g:5,w:"Zealous",pos:"adjective",def:"Having or showing zeal; passionate.",etym:[{m:"ZELOS",s:"jealousy/fervor"}],
origin:"Greek zelos - jealousy, fervor, passionate devotion. The same root gives us 'jealous' - both words come from zelos, which captured the intensity of feeling that can manifest as either passionate devotion or envious rivalry.",
hook:"GRE PAIR: <span class='hook-keyword'>Zealous</span> (intensely passionate and eager) vs <span class='hook-keyword'>Fervent</span> (group 22 - deeply passionate, burning with feeling) vs <span class='hook-keyword'>Fervid</span> (group 4 - intensely passionate, possibly excessively so). The distinction: zealous emphasizes the active, eager pursuit - the zealous person acts on their passion. Fervent emphasizes the depth of feeling. Fervid emphasizes intensity that may overflow. <strong>Zealous = passion that drives action. Fervent = passion as a feeling. Fervid = passion turned up past optimal.</strong>"},

// ─── GROUP 6 ──────────────────────────────────────────────────────────────────
{g:6,w:"Admonish",pos:"verb",def:"Warn or reprimand someone firmly.",etym:[{m:"AD-",s:"to"},{m:"MONERE",s:"warn"}],
origin:"Latin admonere - to warn toward, to remind. From ad- (to, toward) + monere (to warn, advise). The same root gives us 'monitor,' 'monument' (reminder), and 'premonition' (warning before). To admonish = to deliver a warning that arrives before the next mistake.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Admonish</span> (warn firmly, with the expectation of future compliance) vs <span class='hook-keyword'>Castigate</span> (group 2 - reprimand severely, often publicly) vs <span class='hook-keyword'>Censure</span> (group 3 - formally express disapproval). Admonish is the mildest of the three: a firm warning meant to correct before the offense becomes a pattern. Castigate is more severe and thorough. Censure is formal institutional disapproval. <strong>Admonish = correct before it gets worse. Castigate = punish through thorough criticism. Censure = official institutional condemnation.</strong>"},

{g:6,w:"Aesthetic",pos:"adjective",def:"Concerned with beauty or the appreciation of beauty.",etym:[{m:"AISTHETIKOS",s:"perceptive"}],
origin:"Greek aisthetikos - of sense perception. From aisthesthai (to perceive). The German philosopher Baumgarten coined 'aesthetics' as a philosophical discipline in 1735. Aesthetic = relating to perception, specifically of beauty.",
hook:"GRE NUANCE: <span class='hook-keyword'>Aesthetic</span> as an adjective = related to beauty or sensory perception. As a noun = a particular set of principles about what is beautiful: 'the minimalist aesthetic,' 'the Baroque aesthetic.' The GRE uses both. A 'keen aesthetic sense' = sensitivity to beauty. 'Her aesthetic favors restraint' = her principles of beauty favor restraint. <strong>The core meaning: beauty perceived through the senses, not through logic.</strong>"},

{g:6,w:"Affectation",pos:"noun",def:"Behavior, speech, or writing that is artificial and designed to impress.",etym:[{m:"AD-",s:"to"},{m:"FACERE",s:"do"}],
origin:"Latin affectatio - striving for effect, from affectare (to strive after, aim at). An affectation is a performance aimed at a desired effect - specifically, the effect of appearing more sophisticated, learned, or refined than one actually is.",
hook:"<strong>He has lived in suburban Ohio his entire life</span>. But he speaks with a faint British accent he acquired after six weeks in London, uses French phrases in casual conversation, and carries a fountain pen he doesn't know how to fill. None of this is authentically his. It is <span class='hook-keyword'>affectation</span>: performance designed to project an image. The tell: it has been acquired and deployed rather than grown from experience."},

{g:6,w:"Alleviate",pos:"verb",def:"Make (suffering, deficiency, or a problem) less severe.",etym:[{m:"AD-",s:"to"},{m:"LEVIS",s:"light"}],
origin:"Latin alleviare - to make lighter. Ad- (to) + levis (light). To alleviate = to make the burden lighter - not to remove it, but to reduce the weight so it can be carried more easily.",
hook:"GRE PRECISION: <span class='hook-keyword'>Alleviate</span> = make less severe (the problem remains, but hurts less). Compare: <span class='hook-keyword'>Mitigate</span> (group 4) = make less severe. <span class='hook-keyword'>Ameliorate</span> (group 2) = make better. <span class='hook-keyword'>Remedy</span> = fix. All four appear in GRE passages about policy and health. The key: alleviate always implies the underlying problem persists. 'The drug alleviates pain' ≠ 'the drug cures the condition.' <strong>Lighter burden, same burden.</strong>"},

{g:6,w:"Analogous",pos:"adjective",def:"Comparable in certain respects, typically in a way which makes clearer the nature of the things compared.",etym:[{m:"ANA-",s:"according to"},{m:"LOGOS",s:"ratio"}],
origin:"Greek analogos - proportionate, according to ratio. Ana (according to) + logos (reason, ratio). Analogy = a proportional comparison. Something analogous is proportionally similar - not identical, but sharing the same relational structure.",
hook:"<strong>Explaining electricity to someone who has never seen it</span>: 'Voltage is analogous to water pressure. Current is analogous to flow rate. Resistance is analogous to pipe diameter.' The water is not electricity. But the relationships are structurally identical - and the analogy allows understanding to transfer. <span class='hook-keyword'>Analogous</span> things share the same relational pattern even when their substance is completely different."},

{g:6,w:"Bolster",pos:"verb",def:"Support or strengthen; prop up.",etym:[{m:"BOLSTER",s:"pillow"}],
origin:"Old English bolster - a long pillow or cushion used to support. To bolster = to provide the supporting cushion - to prop up something that might otherwise sag or collapse.",
hook:"<strong>The case is strong in three of four sections</span>. The fourth is thin - one supporting example that the opposition will easily challenge. The lawyer needs to <span class='hook-keyword'>bolster</span> that section: add additional evidence, a second example, a precedent that provides cushioning. The argument won't fall without it - but it will be vulnerable. Bolstering = adding the supporting pillow that turns a vulnerable point into a stable one."},

{g:6,w:"Chauvinistic",pos:"adjective",def:"Feeling or displaying aggressive or exaggerated patriotism.",etym:[{m:"CHAUVIN",s:"name"}],
origin:"Named for Nicolas Chauvin, a French soldier legendary for his fanatical devotion to Napoleon. His name became the generic term for blind devotion to one's own group - whether national, cultural, or gender-based.",
hook:"GRE EXPANSION: <span class='hook-keyword'>Chauvinistic</span> has broadened beyond nationalism to describe exaggerated loyalty to any in-group with contempt for out-groups. 'Male chauvinism' = exaggerated belief in male superiority. 'Cultural chauvinism' = the belief that one's culture is superior. The common thread: the loyalty is blind (no evidence needed), aggressive (not merely preferential), and involves contempt for the other. <strong>Exaggerated in-group loyalty + contempt for out-groups = chauvinism in any domain.</strong>"},

{g:6,w:"Connoisseur",pos:"noun",def:"An expert judge in matters of taste.",etym:[{m:"COGNOSCERE",s:"to know"}],
origin:"French connaisseur - one who knows, from connaître (to know, to be acquainted with), from Latin cognoscere (to come to know). A connoisseur has achieved deep familiarity through sustained experience - the knowledge that comes from years of discriminating attention.",
hook:"<strong>The wine expert picks up the glass, sniffs</span>, holds it to the light, swirls, tastes, holds a moment, swallows. 'Burgundy, probably Chambolle-Musigny, 2011 or 2012, aged in French oak.' The bottle confirms: Chambolle-Musigny, 2011. This is the knowledge of the <span class='hook-keyword'>connoisseur</span>: not just preference, but deep familiarity - the ability to perceive what others cannot because you've spent decades learning how to look."},

{g:6,w:"Dissemble",pos:"verb",def:"Conceal one's true motives, feelings, or beliefs.",etym:[{m:"DIS-",s:"not"},{m:"SIMULARE",s:"simulate"}],
origin:"Latin dissimulare - to not simulate, to hide under a false appearance. To dissemble = to disguise your true self under a performance of something else. The word implies active concealment of genuine feeling.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Dissemble</span> (conceal true feelings/motives under a false appearance) vs <span class='hook-keyword'>Disseminate</span> (group 1 - spread widely). These look similar; they are entirely different. 'She dissembled her anger' = she hid her anger under a calm appearance. 'She disseminated her findings' = she spread them widely. <strong>Dissemble = hide (shrink inward). Disseminate = spread (expand outward). Don't confuse them on the GRE.</strong>"},

{g:6,w:"Dogged",pos:"adjective",def:"Having or showing tenacity and grim persistence.",etym:[{m:"DOG",s:"animal"}],
origin:"From the dog - specifically the quality of a dog that has bitten down on something and will not let go regardless of what you do. Dogged = having the grip-and-hold quality of a determined dog. Tenacious in a grim, persistent way.",
hook:"<strong>The investigative journalist has been working on this story for three years</span>. Sources deny it. Documents are sealed. Lawyers threaten. Editors question whether it's worth pursuing. She keeps working. Every week there is a new refusal, a new obstacle. Every week she finds another approach. Her <span class='hook-keyword'>dogged</span> pursuit of the story is not glamorous - it's grim, daily, persistent work against resistance. The dog has the story's ankle and will not let go."},

{g:6,w:"Dupe",pos:"verb",def:"Deceive; trick.",etym:[{m:"DUPPE",s:"hoopoe bird (foolish)"}],
origin:"French duppe - the hoopoe bird, considered stupid (perhaps because it's easy to catch). The bird became slang for a fool. To dupe = to make someone into a fool through deception.",
hook:"GRE USAGE: <span class='hook-keyword'>Dupe</span> can be a VERB (to deceive) or NOUN (a person who has been deceived). 'He was duped' = he was tricked. 'He is an easy dupe' = he's someone who is easily tricked. The noun is slightly contemptuous - it implies not just that they were deceived but that they were easily deceived, a willing or naive participant in their own fooling. <strong>Both the act (verb) and the victim (noun) carry this edge of 'should have known better.'</strong>"},

{g:6,w:"Empirical",pos:"adjective",def:"Based on, concerned with, or verifiable by observation or experience.",etym:[{m:"EMPEIRIA",s:"experience"}],
origin:"Greek empeiria - experience. From en (in) + peira (trial, experiment). Empirical knowledge = knowledge gained through direct experience or experiment, as opposed to theoretical or a priori knowledge.",
hook:"GRE CORE CONCEPT: <span class='hook-keyword'>Empirical</span> appears constantly in GRE science and philosophy passages. The empirical vs theoretical distinction: empirical evidence = actually observed data from experiments or the world. Theoretical claims = derived from principles without direct observation. An empirical claim can be tested; a purely theoretical one may not be. <strong>When the GRE asks for 'empirical support' for a claim, it means: actual data, actual observations, actual experiments - not logical deduction.</strong>"},

{g:6,w:"Engender",pos:"verb",def:"Cause or give rise to (a feeling, situation, or condition).",etym:[{m:"IN-",s:"in"},{m:"GENERARE",s:"beget"}],
origin:"Latin ingenerare - to beget within. From in + generare (to beget, produce). To engender = to give birth to something, to cause it to come into existence. The metaphor is biological: the thing didn't exist before; the action brings it into being.",
hook:"GRE USAGE: <span class='hook-keyword'>Engender</span> is one of the GRE's preferred words for 'cause' in formal academic contexts. Unlike simple 'cause,' engender implies that the thing created is a genuine product - something that grew from the conditions rather than being mechanically produced. 'The policy engendered resentment' = the policy gave birth to resentment; the resentment was generated by and grew from the policy. <strong>Engender = to bring into being organically.</strong>"},

{g:6,w:"Entitled",pos:"adjective",def:"Believing oneself to be inherently deserving of privileges or special treatment.",etym:[{m:"IN-",s:"in"},{m:"TITULUS",s:"title"}],
origin:"Latin titulus - a title, inscription. To be entitled = to hold a title that grants rights. The modern pejorative sense evolved from this: someone who acts as if they hold a title (and its associated rights) they haven't actually earned.",
hook:"GRE NUANCE: <span class='hook-keyword'>Entitled</span> has two meanings. Neutral: 'She is entitled to a refund' = she has a legal right to one. Pejorative: 'He has an entitled attitude' = he expects special treatment without having earned it. The GRE may use either. Context is key: 'entitled to X' = has the right to X (neutral). 'Entitled behavior/attitude/person' = expecting rights without basis (negative). <strong>The word has drifted from legal right to social criticism.</strong>"},

{g:6,w:"Pertinacious",pos:"adjective",def:"Holding firmly to an opinion or a course of action.",etym:[{m:"PER-",s:"thoroughly"},{m:"TENAX",s:"tenacious"}],
origin:"Latin pertinax - thoroughly tenacious. Per- (thoroughly) + tenax (tenacious, from tenere, to hold). Pertinacious = completely holding on, refusing to release. The word implies the holding is admirable or frustrating depending on the context.",
hook:"GRE DISTINCTION: <span class='hook-keyword'>Pertinacious</span> (holding firmly to a position, possibly stubborn) vs <span class='hook-keyword'>Tenacious</span> (holding firmly, usually admirably) vs <span class='hook-keyword'>Obstinate</span> (group 22 - stubbornly refusing to change, usually negatively). Pertinacious is in between: it can be admirable (a pertinacious reformer) or frustrating (a pertinacious objector). Context determines tone. <strong>Tenacious = admirably holding on. Pertinacious = holding on firmly with implied inflexibility. Obstinate = holding on unreasonably despite evidence.</strong>"},

{g:6,w:"Presumptuous",pos:"adjective",def:"Failing to observe the limits of what is permitted or appropriate.",etym:[{m:"PRAE-",s:"before"},{m:"SUMERE",s:"take"}],
origin:"Latin praesumere - to take before being given, to anticipate without permission. From prae (before) + sumere (to take). Presumptuous = taking something (authority, rights, familiarity) before it has been granted.",
hook:"<strong>The new employee rewrites the company's strategic plan</span> on her third day. She emails it to the CEO, unsolicited, with the subject line 'Here's how we should proceed.' She has been in the building for 72 hours. She has made no effort to understand the existing strategy. She is <span class='hook-keyword'>presumptuous</span>: she has taken (presumed) the authority to redesign strategy before anyone gave it to her. The problem isn't the idea - it's the taking."},

{g:6,w:"Probity",pos:"noun",def:"The quality of having strong moral principles; honesty and decency.",etym:[{m:"PROBUS",s:"good"}],
origin:"Latin probitas - goodness, uprightness, from probus (good, honest). To probe = to test for goodness. Probity = the quality that survives the testing - confirmed, demonstrated moral uprightness.",
