{g:21,w:"Abject",pos:"adjective",def:"At the most extreme and degraded level; completely without pride or dignity.",etym:[{m:"AB-",s:"away"},{m:"JACERE",s:"to throw"}],
origin:"Latin abjectus - thrown away, cast down. What is abject has been thrown to the lowest possible point. The word always intensifies whatever it modifies - abject poverty is poverty at its absolute worst, abject failure is total and humiliating failure. It cannot modify anything positive.",
hook:"The refugees were living in <span class='hook-keyword'>abject</span> poverty - no clean water, no shelter from the rain, surviving on whatever aid organizations could deliver before the roads flooded again."},

{g:21,w:"Amicable",pos:"adjective",def:"Friendly and without hostility; describing a relationship or settlement reached cooperatively.",etym:[{m:"AMICUS",s:"friend"}],
origin:"Latin amicabilis - friendly, from amicus (friend). Amicable describes the tone of a relationship or negotiation, not a person's character (that's 'amiable'). An amicable divorce is settled without bitterness; an amicable disagreement is one where both sides leave still respecting each other.",
hook:"Despite eighteen months of tense litigation, the two companies ultimately reached an <span class='hook-keyword'>amicable</span> settlement - both sides gave something up and neither had to admit wrongdoing publicly."},

{g:21,w:"Animosity",pos:"noun",def:"Strong, active hostility; hatred that shows itself in behavior.",etym:[{m:"ANIMUS",s:"spirit, hostility"}],
origin:"Latin animositas - boldness, spirit. The same root as 'animus' (ill-will) but more intense and more active: animosity doesn't just sit inside - it drives action. Long-standing animosity between two people or groups shapes everything they do in relation to each other.",
hook:"The animosity between the two departments had been building for years - budget disputes, credit disputes, competing deadlines - until even the most routine email exchange carried an undercurrent of <span class='hook-keyword'>animosity</span>."},

{g:21,w:"Aver",pos:"verb",def:"To state something formally and confidently as being true.",etym:[{m:"AD-",s:"to"},{m:"VERUS",s:"true"}],
origin:"Latin averare - to state as true. To aver is a formal, elevated way of asserting - the speaker stands behind the truth of the statement with conviction. A witness avers; a philosopher avers a position. It implies not just saying something but vouching for it.",
hook:"She stood before the committee and <span class='hook-keyword'>averred</span> that the documents were genuine - not claimed, not suggested, but formally and firmly declared to be authentic from her own direct knowledge."},

{g:21,w:"Barrage",pos:"noun",def:"An overwhelming, concentrated outpouring of the same thing directed at a target.",etym:[{m:"BARRER",s:"to bar, block"}],
origin:"French barrage - a barrier, from barrer (to bar). In warfare, a barrage of artillery creates a wall of explosions so dense that nothing can pass through. Extended to any overwhelming flood: a barrage of questions, criticism, or demands - so much coming so fast that no individual response is possible.",
hook:"The moment the CEO stepped onto the stage, she was met with a <span class='hook-keyword'>barrage</span> of questions from journalists - every hand in the room raised simultaneously, everyone shouting over everyone else."},

{g:21,w:"Cathartic",pos:"adjective",def:"Providing relief through the open expression or release of strong emotions.",etym:[{m:"KATHARSIS",s:"purification, cleansing"}],
origin:"Greek katharsis - cleansing, from kathairein (to cleanse). Aristotle used catharsis to describe what great tragedy does to its audience: by experiencing intense emotion vicariously through the play, viewers are purged of pent-up feelings they carry in real life. Something cathartic doesn't just make you feel - it releases what was trapped.",
hook:"Crying through the final scene of the film was unexpectedly <span class='hook-keyword'>cathartic</span> for her - she hadn't let herself grieve properly in months, and something about watching a fictional loss cracked open what she'd been holding closed."},

{g:21,w:"Decipher",pos:"verb",def:"To decode something hidden or unclear; to work out the meaning of something that resists easy reading.",etym:[{m:"DE-",s:"remove"},{m:"CIPHER",s:"zero, code"}],
origin:"From cipher - originally the Arabic word for zero (sifr), which became a word for coded messages. To decipher is to strip away the code and recover the meaning underneath - whether that's a literal cipher, ancient script, difficult handwriting, or someone's ambiguous behavior.",
hook:"It took the archaeologists three years to fully <span class='hook-keyword'>decipher</span> the inscriptions - the script had been used by a single administrative class and had never been taught outside that group, so there were no bilingual texts to work from."},

{g:21,w:"Delusion",pos:"noun",def:"A false belief held firmly despite clear evidence to the contrary; resistant to correction.",etym:[{m:"DE-",s:"away"},{m:"LUDERE",s:"to play"}],
origin:"Latin delusio - a cheating, a mockery, from deludere (to play tricks on). A delusion is reality playing a trick on you - or more precisely, your mind playing a trick on itself. Unlike an illusion (a false perception from outside) or a misconception (a correctable error), a delusion is maintained even when the evidence against it is shown directly.",
hook:"He had built his entire career on the <span class='hook-keyword'>delusion</span> that his partners were loyal to him personally rather than to the profits he generated - a belief that lasted exactly as long as the firm remained profitable."},

{g:21,w:"Dispense",pos:"verb",def:"To distribute or provide; 'dispense with' means to do without or eliminate entirely.",etym:[{m:"DIS-",s:"apart"},{m:"PENSARE",s:"to weigh out"}],
origin:"Latin dispensare - to weigh out carefully and distribute. The image of a pharmacist measuring precise doses. 'Dispense with' - the GRE's preferred usage - inverts this: instead of distributing something, you eliminate it from the equation entirely.",
hook:"Given the urgency of the situation, the committee agreed to <span class='hook-keyword'>dispense</span> with the usual two-week review period and vote on the proposal that same afternoon."},

{g:21,w:"Eloquent",pos:"adjective",def:"Fluent and persuasive in expression; speech or writing that moves as well as informs.",etym:[{m:"E-",s:"out"},{m:"LOQUI",s:"to speak"}],
origin:"Latin eloqui - to speak out, from loqui (to speak). The same root gives us 'loquacious' (talks too much) and 'soliloquy' (speaking alone). Eloquent is the positive extreme: not just fluent but powerfully expressive, speech that achieves an effect on the listener - it persuades, moves, or illuminates.",
hook:"Her closing argument was the most <span class='hook-keyword'>eloquent</span> thing anyone in that courtroom had heard in years - by the end, three jurors were visibly moved, and even the opposing counsel stopped taking notes to listen."},

{g:21,w:"Enthrall",pos:"verb",def:"To hold someone in complete, involuntary fascination; to captivate as if by force.",etym:[{m:"EN-",s:"in"},{m:"THRALL",s:"slave"}],
origin:"Old Norse thrall - a slave, a captive. To enthrall is to enslave someone's attention - to hold it so completely that they cannot look away or leave, even if they wanted to. The strongest word for captivation: not earned attention, but seized attention.",
hook:"The documentary <span class='hook-keyword'>enthralled</span> the entire family for three hours - nobody got up for water, nobody checked their phone, and when it ended they sat in silence for a long moment before anyone spoke."},

{g:21,w:"Eradicate",pos:"verb",def:"To destroy something so completely that it cannot return; to eliminate root and all.",etym:[{m:"E-",s:"out"},{m:"RADIX",s:"root"}],
origin:"Latin eradicare - to uproot, from radix (root). The same root as 'radical' and 'radish.' To eradicate is not to reduce or suppress - it is to pull out the root so that nothing can regrow. The word sets a standard of complete, permanent elimination.",
hook:"The global campaign to <span class='hook-keyword'>eradicate</span> smallpox took decades of coordinated vaccination across every country - and it succeeded, making smallpox the only human disease to have been permanently eliminated from the world."},

{g:21,w:"Fledgling",pos:"adjective",def:"Newly established and still developing; inexperienced and not yet proven.",etym:[{m:"FLEDGE",s:"to grow feathers"},{m:"-LING",s:"young/small"}],
origin:"A fledgling bird has just grown its flight feathers but hasn't mastered flying yet - it exists, it has the equipment, but it hasn't proven it can sustain itself. Extended to any new, fragile enterprise: it's past the idea stage but not yet capable of standing on its own.",
hook:"The <span class='hook-keyword'>fledgling</span> democracy had held its first free election and written its first constitution, but it had no independent judiciary yet, no established press, and no tradition of peaceful transfers of power to draw on."},

{g:21,w:"Fortitude",pos:"noun",def:"The inner strength to endure pain or adversity without giving in.",etym:[{m:"FORTIS",s:"strong"}],
origin:"Latin fortitudo - strength of character, from fortis (strong). Fortitude is the courage of endurance - not charging into battle (that's valor) but holding firm when everything presses you to break. It is the quiet, sustained bravery of the person who keeps going when stopping would be easier.",
hook:"What struck her oncologist most was his patient's <span class='hook-keyword'>fortitude</span> - eighteen months of grueling treatment, three setbacks, and not once had he asked to stop or expressed self-pity in any of their appointments."},

{g:21,w:"Fortuitous",pos:"adjective",def:"Happening by chance, especially a lucky chance.",etym:[{m:"FORTUITUS",s:"accidental"},{m:"FORS",s:"luck, chance"}],
origin:"Latin fortuitus - accidental, from fors (chance, luck). Strictly means 'by chance' - the luck is implied but not guaranteed by the word itself. In practice, fortuitous nearly always describes a happy accident - a chance encounter that turns out to be beneficial, a coincidence that works in your favor.",
hook:"It was entirely <span class='hook-keyword'>fortuitous</span> that she mentioned the job opening at all - she'd only brought it up to fill an awkward silence, and it turned out to be exactly the position he'd been trying to find for two years."},

{g:21,w:"Goad",pos:"verb",def:"To provoke someone into action through irritation, taunting, or challenge.",etym:[{m:"GAD",s:"spike, rod"}],
origin:"Old English gad - the pointed rod used to drive cattle. You don't inspire cattle forward; you prod them with something sharp until they move. To goad someone is to use the same method on a person - irritating or taunting them until they react, often in the direction you intended.",
hook:"The defense lawyer suspected that his client had been <span class='hook-keyword'>goaded</span> into throwing the first punch - the other man had spent twenty minutes making increasingly personal comments, knowing exactly which buttons to press."},

{g:21,w:"Imminent",pos:"adjective",def:"About to happen very soon; looming directly overhead.",etym:[{m:"IMMINERE",s:"to overhang, threaten"}],
origin:"Latin imminens - overhanging, from minere (to project). Something imminent doesn't just approach - it hangs directly over you, ready to fall. The word is about time: so close that it's already casting a shadow on the present moment.",
hook:"With the hurricane declared <span class='hook-keyword'>imminent</span> by the National Weather Service, the evacuation order went out at six in the morning and the last buses left the coastal neighborhoods by noon."},

{g:21,w:"Incontrovertible",pos:"adjective",def:"Impossible to dispute or deny; beyond any reasonable argument.",etym:[{m:"IN-",s:"not"},{m:"CONTRA",s:"against"},{m:"VERTERE",s:"to turn"}],
origin:"Latin in (not) + controvertere (to dispute - to turn against). Incontrovertible = cannot be turned against. Evidence so complete and clear that no argument can work against it. The strongest possible claim about certainty - stronger than 'convincing' or 'conclusive.'",
hook:"The security footage was <span class='hook-keyword'>incontrovertible</span> - it showed him entering the building at 11:47 PM, which made every alibi his defense team had constructed physically impossible."},

{g:21,w:"Itinerant",pos:"adjective",def:"Traveling from place to place, especially for work; without a fixed base.",etym:[{m:"ITER",s:"journey"}],
origin:"Latin iter - a journey. An itinerant person's life is organized around movement - they don't settle in one place but follow the work, the congregation, or the season from location to location. The travel is purposeful, not recreational.",
hook:"For three years after graduating he lived as an <span class='hook-keyword'>itinerant</span> musician - playing whatever venues would have him, sleeping in the van between cities, living out of two bags and a guitar case."},

{g:21,w:"Magnanimous",pos:"adjective",def:"Generously forgiving or noble, especially toward someone who has wronged you or who you have defeated.",etym:[{m:"MAGNUS",s:"great"},{m:"ANIMUS",s:"spirit, mind"}],
origin:"Latin magnanimous - great-spirited, from magnus (great) + animus (soul). A magnanimous person has a soul large enough to rise above personal grievance. Crucially, magnanimity requires a power differential: you can only be magnanimous toward someone you could reasonably treat worse - a defeated enemy, a former critic, someone who wronged you.",
hook:"In his victory speech, he was <span class='hook-keyword'>magnanimous</span> toward his opponent - praising her campaign, thanking her years of public service, and asking his supporters to extend her the same respect - which cost him nothing and meant everything."},

{g:21,w:"Meritorious",pos:"adjective",def:"Genuinely deserving of praise or reward; earning recognition through real worth.",etym:[{m:"MERITUM",s:"that which is deserved"}],
origin:"Latin meritorius - deserving of payment, from merere (to earn). Meritorious is the formal, institutional word for genuine worth - the kind that earns official recognition. A meritorious case has legal validity; a meritorious service deserves a medal. The recognition is earned, not granted.",
hook:"The committee found her research to be genuinely <span class='hook-keyword'>meritorious</span> - not just technically sound, but asking exactly the questions the field had been avoiding because the answers were uncomfortable."},

{g:21,w:"Mutiny",pos:"noun",def:"Organized rebellion against authority by people who are supposed to obey it.",etym:[{m:"MOUVOIR",s:"to move"}],
origin:"Old French mutin - rebellious. A mutiny is rebellion from within an institution's own chain of command - sailors against a captain, soldiers against officers. What makes it different from general revolution is the insider quality: the rebels are supposed to obey the very authority they're overthrowing.",
hook:"By the third week of the disastrous expedition, the crew's resentment had grown so intense that the captain genuinely feared <span class='hook-keyword'>mutiny</span> - not from one or two malcontents but from virtually everyone aboard the ship."},

{g:21,w:"Paradoxical",pos:"adjective",def:"Seemingly self-contradictory, yet potentially true on closer examination.",etym:[{m:"PARA-",s:"contrary to"},{m:"DOXA",s:"opinion"}],
origin:"Greek paradoxon - contrary to expectation, from para (contrary to) + doxa (opinion). A paradox contradicts what common sense would predict - and yet may be true. The value of identifying something as paradoxical is that it signals: don't dismiss this because it sounds impossible; think harder about why both things might be true.",
hook:"It seems <span class='hook-keyword'>paradoxical</span> that the countries with the most generous social safety nets consistently produce the most entrepreneurial citizens - but researchers argue that the security makes risk-taking possible rather than reckless."},

{g:21,w:"Perseverance",pos:"noun",def:"Continued effort toward a goal despite difficulty, failure, or opposition.",etym:[{m:"PER-",s:"through"},{m:"SEVERUS",s:"strict, severe"}],
origin:"Latin perseverantia - strict continuation, from perseverare (to abide strictly through). The 'severe' in the root is significant: perseverance is not easy continuation but strict, demanding continuation - holding yourself to the task even when everything in you wants to stop.",
hook:"What the biography made clear was that his eventual success had far less to do with talent than with sheer <span class='hook-keyword'>perseverance</span> - he had submitted the manuscript to forty-three publishers before the forty-fourth said yes."},

{g:21,w:"Render",pos:"verb",def:"To provide; to cause to become; to represent artistically.",etym:[{m:"RENDRE",s:"to give back"}],
origin:"Old French rendre - to give back, from Latin reddere. Three GRE senses: (1) to provide ('render assistance'), (2) to cause to become ('render speechless'), (3) to represent ('rendered in watercolor'). The second is tested most often: 'the storm rendered the bridge impassable' means it caused the bridge to become impassable.",
hook:"The funding cuts <span class='hook-keyword'>rendered</span> the entire research program effectively useless - without access to the equipment, the team couldn't run a single experiment from the approved proposal."},

{g:21,w:"Repertoire",pos:"noun",def:"The full set of works, skills, or techniques a person has mastered and can deploy.",etym:[{m:"REPERTORIUM",s:"inventory, storehouse"}],
origin:"French répertoire - a catalog, from Latin repertorium (an inventory). A repertoire is what has been found, learned, and catalogued - everything ready to be performed or deployed. Extended beyond music and theater to any domain: a diplomat's repertoire of tactics, a scientist's repertoire of methods.",
hook:"After twenty years as a chef, his <span class='hook-keyword'>repertoire</span> was enormous - he could produce a flawless dish from almost any cuisine without consulting a recipe, because he had internalized the underlying logic of each tradition."},

{g:21,w:"Resilient",pos:"adjective",def:"Able to recover quickly from adversity; springing back to full function after being bent.",etym:[{m:"RESILIRE",s:"to spring back"}],
origin:"Latin resilire - to spring back, from re- (back) + salire (to jump). The same root as 'salient' (jumping out). Resilient is not just surviving hardship - it's the capacity to return to full function afterward. Like elastic that snaps back into shape, the resilient person doesn't just endure; they recover.",
hook:"What made the city's economy resilient wasn't any single industry but its diversity - when manufacturing collapsed in the 1980s, healthcare and finance had already grown large enough to absorb most of the displaced workers within a decade."},

{g:21,w:"Resolute",pos:"adjective",def:"Admirably firm and unwavering in purpose; all doubt resolved into clear determination.",etym:[{m:"RE-",s:"intensifier"},{m:"SOLVERE",s:"to loosen - here, to settle firmly"}],
origin:"Latin resolutus - settled, from resolvere (to loosen uncertainty into clarity). Resolute = having resolved all internal doubt and standing completely firm in the result. The key GRE distinction: resolute firmness is admirable because it's principled; obstinate firmness is criticized because it resists good evidence.",
hook:"She was <span class='hook-keyword'>resolute</span> in her decision to testify despite the threats - she had weighed the risks carefully, made her choice, and nothing anyone said in the following weeks managed to move her even slightly."},

{g:21,w:"Supple",pos:"adjective",def:"Gracefully flexible; bending easily without breaking - physically or intellectually.",etym:[{m:"SUPPLEX",s:"bending the knee"}],
origin:"Latin supplex - bending under, from sub (under) + plicare (to fold). Supple means effortlessly flexible - it bends without resistance and returns without damage. Applied to minds or writing styles, it means flexible enough to adapt to new ideas or forms without losing integrity.",
hook:"The best legal minds aren't the most rigid ones - they're the most <span class='hook-keyword'>supple</span>, able to bend their argument around unexpected evidence without abandoning their core position or contradicting themselves."},

{g:21,w:"Valor",pos:"noun",def:"Great courage in the face of danger, especially active bravery in battle.",etym:[{m:"VALERE",s:"to be strong"}],
origin:"Latin valor - strength, from valere (to be strong). The same root as 'value,' 'valid,' and 'prevail.' Valor is the active form of courage - not the patience of endurance (fortitude) but the willingness to advance into danger. The soldier who charges; the firefighter who enters the building.",
hook:"The medal was awarded posthumously for valor under fire - he had carried three wounded soldiers to safety across open ground while the position was still being shelled, and was killed on his fourth attempt."},


// ─────────────────────────────────────────────
// GROUP 22
// ─────────────────────────────────────────────

{g:22,w:"Arresting",pos:"adjective",def:"So visually or intellectually striking that it stops your attention in its tracks.",etym:[{m:"AD-",s:"at"},{m:"RESTARE",s:"to stop"}],
origin:"Latin arrestare - to stop, to bring to a halt. An arresting image literally arrests your movement - you cannot pass it without stopping. Nothing to do with legal arrest in this usage; everything to do with the original meaning of 'arrest': to bring to a complete halt.",
hook:"The photograph was immediately <span class='hook-keyword'>arresting</span> - a child's shoe sitting alone in the rubble - and it stopped every editor who saw it, all of them knowing without discussion that it had to be the front page."},

{g:22,w:"Chastise",pos:"verb",def:"To rebuke or reprimand severely, with the intent of correction.",etym:[{m:"CASTUS",s:"pure"}],
origin:"Latin castigare - to correct, to make pure, from castus (pure). The original sense: punishment as purification, correcting someone so they return to a proper state. Chastise is stronger than 'criticize' and more formal than 'scold' - it implies the reproof is both serious and intended to produce change.",
hook:"The editorial <span class='hook-keyword'>chastised</span> the city council in unusually direct language - naming each member who had voted for the zoning change and detailing exactly what they had received in campaign donations from the developers who stood to benefit."},

{g:22,w:"Cumbersome",pos:"adjective",def:"So heavy, bulky, or complex that it impedes efficient movement or use.",etym:[{m:"CUMBER",s:"hinder"},{m:"-SOME",s:"characterized by"}],
origin:"Middle English cumber - to obstruct, to hinder. Cumbersome applies to anything that gets in its own way through sheer bulk or complexity - a heavy piece of equipment you can barely lift, or a bureaucratic process with so many steps that completing it takes longer than the task it was designed to manage.",
hook:"The grant application process was so <span class='hook-keyword'>cumbersome</span> - fourteen separate forms, three different portals, two required signatures from people who had retired - that several researchers gave up and sought private funding instead."},

{g:22,w:"Economy",pos:"noun",def:"The careful, efficient management of resources; using exactly what is needed and no more.",etym:[{m:"OIKOS",s:"house"},{m:"NEMEIN",s:"manage"}],
origin:"Greek oikonomia - household management. The financial sense came from this: managing the resources of a household carefully. But the original sense also gives us 'economy of language' - managing words like a careful housekeeper, using exactly what's needed. This is the GRE's preferred sense in literary contexts.",
hook:"What made her prose so powerful was its complete <span class='hook-keyword'>economy</span> - she never used two words where one would do, and the restraint made every word she did use carry twice the weight."},

{g:22,w:"Elementary",pos:"adjective",def:"Relating to the most basic, foundational aspects of a subject.",etym:[{m:"ELEMENTUM",s:"first principle"}],
origin:"Latin elementum - a first principle, a basic building block. Elementary = of the elements, the fundamentals - the bedrock from which everything else is built. Often used with a slightly dismissive edge: 'elementary logic' means reasoning so basic that any careful thinker should already have it.",
hook:"The flaw in his argument was <span class='hook-keyword'>elementary</span> - he had confused correlation with causation, which is the kind of error that gets caught in the first week of any statistics course."},

{g:22,w:"Embellish",pos:"verb",def:"To add decorative detail; or, more commonly, to add false or exaggerated detail to a story.",etym:[{m:"BEL",s:"beautiful"}],
origin:"Old French embellir - to make beautiful, from bel (beautiful). To embellish is to add ornament - neutral when applied to physical objects, negative when applied to stories or accounts. An embellished account isn't just more interesting; it's more interesting because parts of it aren't true.",
hook:"Every time he told the story of how he'd started the company, he <span class='hook-keyword'>embellished</span> it a little more - the original investment grew from fifty thousand to five hundred thousand dollars over the course of a few years of dinner parties."},

{g:22,w:"Euphoric",pos:"adjective",def:"Feeling intense, overwhelming happiness - sometimes to a degree that seems disproportionate.",etym:[{m:"EU",s:"well"},{m:"PHEREIN",s:"to bear"}],
origin:"Greek euphoria - a state of good feeling, from eu (well) + pherein (to bear). Euphoric is at the extreme positive end of emotional states - so happy that the feeling is almost overwhelming. The word carries an implicit note of excess: euphoric joy may not be sustainable or entirely rational.",
hook:"The crowd was <span class='hook-keyword'>euphoric</span> after the final whistle - forty years since the city had won a championship, and the streets were full of strangers embracing each other and weeping with relief."},

{g:22,w:"Exonerate",pos:"verb",def:"To officially remove blame from someone after due consideration of the evidence.",etym:[{m:"EX-",s:"from"},{m:"ONUS",s:"burden"}],
origin:"Latin exonerare - to free from a burden, from onus (burden). To exonerate lifts the weight of blame off someone's shoulders - formally, after investigation, declaring them not responsible. It can happen in courts (where it resembles acquittal) or in any institution where blame has been officially assigned.",
hook:"Twenty-two years after his conviction, the Innocence Project's DNA analysis fully <span class='hook-keyword'>exonerated</span> him - not just raising doubts, but proving beyond question that someone else had committed the crime."},

{g:22,w:"Extrapolate",pos:"verb",def:"To project from known data into unknown territory by assuming existing trends will continue.",etym:[{m:"EXTRA",s:"outside"},{m:"POLIRE",s:"to smooth"}],
origin:"From extra (outside) + polire (to smooth out a curve). A mathematical term: extend a known curve beyond the range of your data, assuming the pattern holds. To extrapolate is to go outside your evidence - which is useful and necessary, but riskier than staying within what you actually know.",
hook:"From the current rate of ice loss, scientists can <span class='hook-keyword'>extrapolate</span> that the glacier will have retreated another forty kilometers by mid-century - a projection that assumes no dramatic acceleration of the existing trend."},

{g:22,w:"Falter",pos:"verb",def:"To begin losing strength or momentum; to waver at the edge of stopping.",etym:[{m:"FALTEREN",s:"to stumble"}],
origin:"Middle English, possibly from Old Norse faltrast (to be encumbered). To falter is not to fall - it's the moment just before, when the pace slows and the commitment wavers. It implies a potential still to recover, which is what makes it different from 'fail.'",
hook:"Her campaign had been leading comfortably for months, but after the leaked emails it began to <span class='hook-keyword'>falter</span> - the polling gap narrowed week by week until, three days before the election, the race was called too close to call."},

{g:22,w:"Fervent",pos:"adjective",def:"Intensely passionate and sincere; boiling with genuine feeling.",etym:[{m:"FERVERE",s:"to boil"}],
origin:"Latin fervere - to boil, to be hot. Fervent describes deep, genuine intensity - religious conviction, political belief, artistic dedication - the kind of passion that comes from something being truly important to a person, not performed for an audience.",
hook:"She was a <span class='hook-keyword'>fervent</span> believer in early childhood education - not because it was her professional field, but because of what she had personally witnessed it do for children in the communities where she had grown up."},

{g:22,w:"Foment",pos:"verb",def:"To deliberately stir up and encourage something undesirable - trouble, rebellion, resentment.",etym:[{m:"FOVERE",s:"to heat"}],
origin:"Latin fomentum - a warm poultice, from fovere (to warm). A foment was a warm cloth applied to inflamed tissue to stimulate it. Extended: to foment unrest is to apply heat to something volatile until it boils over. Always negative - you foment discord, rebellion, or hatred, never peace.",
hook:"The investigation concluded that the account had been deliberately used to <span class='hook-keyword'>foment</span> division - posting inflammatory content during moments of national tension, designed to make existing disagreements escalate into something uglier."},

{g:22,w:"Gaffe",pos:"noun",def:"An unintentional social or verbal blunder that causes embarrassment to the person who made it.",etym:[{m:"GAFFE",s:"boat hook"}],
origin:"French gaffe - a boat hook, a long pole used to clumsily hook and snag things. The shift to 'blunder' may come from the image of clumsily catching something you didn't intend. A gaffe is always unintentional - that's what distinguishes it from a deliberate insult.",
hook:"Calling the host country's prime minister by the wrong name was a diplomatic <span class='hook-keyword'>gaffe</span> that the press corps replayed for days - not a crisis, but the kind of avoidable mistake that makes everyone in the room wince simultaneously."},

{g:22,w:"Heterodox",pos:"adjective",def:"Departing from accepted or established opinion; unorthodox.",etym:[{m:"HETEROS",s:"other"},{m:"DOXA",s:"opinion"}],
origin:"Greek heterodoxos - of a different opinion, from heteros (other) + doxa (opinion). The opposite of 'orthodox' (correct opinion). Heterodox is not inherently negative - a heterodox idea may be wrong, or it may be revolutionary. The word only says it departs from received wisdom, not whether that departure is justified.",
hook:"His <span class='hook-keyword'>heterodox</span> approach to macroeconomics earned him ridicule from mainstream colleagues for a decade - and then a Nobel Prize when the 2008 financial crisis validated exactly the mechanisms he had been warning about."},

{g:22,w:"Histrionic",pos:"adjective",def:"Excessively theatrical or melodramatic; performing emotion rather than genuinely feeling it.",etym:[{m:"HISTER",s:"actor"}],
origin:"Latin histrio - an actor, a stage player. Histrionic behavior is actor behavior - specifically bad actor behavior, where every reaction is amplified far beyond what the situation warrants. The problem isn't the emotion itself but the theatrical excess, the sense that the performance is for an audience.",
hook:"His reaction to the minor criticism was completely <span class='hook-keyword'>histrionic</span> - he pushed back from the table, declared the meeting over, and swept out of the room as though he'd been personally insulted in front of thousands rather than gently questioned by two colleagues."},

{g:22,w:"Implicit",pos:"adjective",def:"Present but not directly stated; folded inside something rather than laid out in the open.",etym:[{m:"IM-",s:"in"},{m:"PLICARE",s:"to fold"}],
origin:"Latin implicitus - enfolded, entangled, from plicare (to fold). Implicit = folded inside. An implicit assumption underlies an argument without being stated; implicit approval is given by not objecting. The opposite is explicit: fully unfolded, openly stated.",
hook:"His silence during the meeting gave <span class='hook-keyword'>implicit</span> approval to the plan - he said nothing, raised no objections, and later claimed he had never agreed to it, but everyone in the room understood his silence as consent."},

{g:22,w:"Inviolate",pos:"adjective",def:"Not violated; kept perfectly intact and undisturbed.",etym:[{m:"IN-",s:"not"},{m:"VIOLARE",s:"violate"}],
origin:"Latin inviolatus - unhurt, unbroken. Inviolate describes something that has successfully been kept from violation - a right that has been protected, a sanctuary that has been respected, a principle that has never been compromised. It's about the outcome: not just worth protecting, but actually protected.",
hook:"For sixty years, the organization's commitment to editorial independence had remained <span class='hook-keyword'>inviolate</span> - no advertiser, no government, and no owner had ever succeeded in changing what appeared in print."},

{g:22,w:"Liability",pos:"noun",def:"A person or thing that creates disadvantage or risk; a burden that outweighs its benefit.",etym:[{m:"LIGARE",s:"to bind"}],
origin:"Latin ligare - to bind. A liability is something you are bound to - an obligation or burden that constrains you. The legal sense (financial responsibility) is primary, but the figurative sense matters more in GRE passages: a person or factor that creates more risk or damage than value.",
hook:"His unpredictable temper, once seen as passionate intensity, had become a genuine <span class='hook-keyword'>liability</span> to the campaign - one viral clip of him losing his composure at a town hall was enough to undo weeks of careful image management."},

{g:22,w:"Obstinate",pos:"adjective",def:"Stubbornly refusing to change position despite good reasons to do so.",etym:[{m:"OB-",s:"by"},{m:"STARE",s:"stand"}],
origin:"Latin obstinatus - standing firm against, from obstare (to stand against). Obstinate = planted against all pressure. The key GRE distinction: obstinate firmness has no principled justification - the person holds their position not because the evidence supports it, but simply because they refuse to move.",
hook:"She was not principled - she was <span class='hook-keyword'>obstinate</span>. There is a difference. A principled person changes their mind when shown better evidence. She had been shown better evidence three times in this meeting and had simply repeated her original position louder each time."},

{g:22,w:"Painstaking",pos:"adjective",def:"Requiring and showing meticulous care and effort; thorough to the point of being exhausting.",etym:[{m:"PAIN",s:"trouble"},{m:"TAKE",s:"accept"}],
origin:"Middle English - literally 'taking pains.' The word acknowledges that this level of care costs something: it is painful in its demands. Painstaking work isn't just careful - it's exhaustingly careful, requiring sustained attention that most people couldn't maintain.",
hook:"The restoration of the fresco was <span class='hook-keyword'>painstaking</span> beyond anything the apprentices had anticipated - each square centimeter of damage had to be assessed individually, documented, and treated with a different combination of materials before being matched to the original pigment."},

{g:22,w:"Phlegmatic",pos:"adjective",def:"Calm and unemotional by temperament; not easily excited or disturbed.",etym:[{m:"PHLEGMA",s:"phlegm - one of the four humors"}],
origin:"Greek phlegma - phlegm, the humor associated with cold, sluggish temperament. In medieval medicine, a phlegmatic person was dominated by this cold humor: slow to react, unemotional, unmoved. It can be negative (seeming indifferent) or positive (unshakably composed under pressure).",
hook:"The trauma surgeon was famously <span class='hook-keyword'>phlegmatic</span> in the operating room - while everyone else's adrenaline spiked at a complication, she slowed down, spoke more quietly, and made better decisions than anyone who was panicking could have."},

{g:22,w:"Prodigious",pos:"adjective",def:"Impressively great in scale, extent, or degree; remarkable in quantity.",etym:[{m:"PRODIGIUM",s:"omen, monster"}],
origin:"Latin prodigiosus - extraordinary, monstrous, from prodigium (a portent - something that breaks the natural order). A prodigious amount was originally so large it seemed unnatural, a violation of ordinary expectation. Now used for anything of remarkable scale: prodigious talent, prodigious output, prodigious appetite.",
hook:"He had a <span class='hook-keyword'>prodigious</span> memory - he could recall the first and last names of every student he had taught over thirty years, which was somewhere north of four thousand people."},

{g:22,w:"Propensity",pos:"noun",def:"A natural, built-in tendency to behave in a particular way.",etym:[{m:"PRO-",s:"forward"},{m:"PENDERE",s:"hang"}],
origin:"Latin propensitas - an inclination, from propensus (leaning forward). The image: leaning or hanging toward something by nature, like a gravitational pull. A propensity is not a choice or a habit - it's a built-in inclination, often toward something problematic.",
hook:"The study found a clear <span class='hook-keyword'>propensity</span> among early investors to overvalue companies in sectors they themselves had worked in - not from bad faith, but from a deep familiarity that made the risks feel smaller than they actually were."},

{g:22,w:"Qualm",pos:"noun",def:"An uneasy feeling of moral doubt about one's own actions or decisions.",etym:[{m:"CWELM",s:"pain, death"}],
origin:"Old English cwelm - plague, pain, death. Over centuries weakened from physical agony to moral unease. A qualm is a twinge of conscience - not a full crisis of ethics, but an uncomfortable feeling that something you're about to do (or have done) may not be right.",
hook:"She signed the contract without a single <span class='hook-keyword'>qualm</span> - she had examined every clause, consulted two lawyers, and had no doubt it was the right decision for everyone involved."},

{g:22,w:"Renege",pos:"verb",def:"To go back on a promise, agreement, or commitment after the fact.",etym:[{m:"RE-",s:"back"},{m:"NEGARE",s:"deny"}],
origin:"Latin renegare - to deny back, from negare (to deny). To renege is to take back a promise - to deny, after the fact, what you committed to before. It always represents a betrayal of trust, which is what makes it stronger than simply 'changing your mind.'",
hook:"He had agreed to the terms in writing, shaken hands, and smiled for the cameras - and then <span class='hook-keyword'>reneged</span> on every major commitment within sixty days, claiming the market conditions had changed."},

{g:22,w:"Stint",pos:"noun",def:"A fixed or limited period of work; a set time assigned to a particular task or role.",etym:[{m:"STYNTAN",s:"to blunt, make dull"}],
origin:"Old English styntan - to restrain, to blunt. A stint is a bounded period - a set time given to a task, after which you move on. As a verb, 'to stint' means to be restrictive or sparing; 'without stinting' means giving generously with no holding back.",
hook:"After a two-year <span class='hook-keyword'>stint</span> managing the Paris office, she returned to headquarters with a much better understanding of how different the company looked from the outside than it did from the inside."},

{g:22,w:"Temper",pos:"verb",def:"To moderate something by adding a counterbalancing force; to make less extreme.",etym:[{m:"TEMPERARE",s:"mingle, restrain"}],
origin:"Latin temperare - to mix in due proportion, to regulate. Steel is tempered by heating and cooling - the process makes it harder and more resilient than it was. To temper criticism with praise, or justice with mercy, is to mix in something moderating so the result is more balanced than the original.",
hook:"The report's conclusions were damning, but the authors were careful to <span class='hook-keyword'>temper</span> their criticism with an acknowledgment of the genuine constraints the team had been working under - making the critique more credible, not less."},

{g:22,w:"Tentative",pos:"adjective",def:"Provisional and uncertain; not yet committed; or hesitant in manner.",etym:[{m:"TEMPTARE",s:"to test, try"}],
origin:"Latin tentativus - of testing, from temptare (to test, to try out). Tentative = in the mode of trying without committing. A tentative plan is being tested provisionally; a tentative voice is feeling its way forward without confidence. Both senses involve being not-yet-decided.",
hook:"The peace talks produced only a <span class='hook-keyword'>tentative</span> agreement - a framework that both sides had initialed but neither had signed, and which three unresolved clauses could still unravel completely."},

{g:22,w:"Unprecedented",pos:"adjective",def:"Never having happened before; having no precedent in all of recorded history.",etym:[{m:"UN-",s:"not"},{m:"PRAECEDERE",s:"go before"}],
origin:"Latin praecedere - to go before. Unprecedented = nothing has gone before it. A logically absolute claim: if it is truly unprecedented, a single example from history defeats it. The word is often overused in journalism to mean 'very unusual,' which is not the same thing.",
hook:"The scale of the flooding was <span class='hook-keyword'>unprecedented</span> in the region's recorded history - not just the worst in living memory, but the worst in any document, survey, or oral account anyone could find going back three hundred years."},

{g:22,w:"Vivacious",pos:"adjective",def:"Attractively full of life and animated energy; sparklingly lively.",etym:[{m:"VIVUS",s:"alive"}],
origin:"Latin vivax - lively, tenacious of life, from vivere (to live). The same root as 'vivid,' 'vital,' 'viable,' and 'revive.' Vivacious = brimming with life - the energy is visible, outward, and infectious. Applied almost always to people, and almost always as a compliment.",
hook:"Even in a room full of compelling speakers, she was the most <span class='hook-keyword'>vivacious</span> presence - her enthusiasm for every topic she raised was so genuine and so visible that people naturally gathered around her."},

// GROUP 23
// ─────────────────────────────────────────────

{g:23,w:"Allusive",pos:"adjective",def:"Using indirect suggestion or reference rather than stating something explicitly.",etym:[{m:"AD-",s:"to"},{m:"LUDERE",s:"to play"}],
origin:"Latin alludere - to play with, to hint at. To allude is to play near a subject without touching it directly. Allusive writing relies on the reader catching references, recognizing patterns, and filling in what isn't said - it trusts the audience to meet it halfway.",
hook:"His speech was deliberately <span class='hook-keyword'>allusive</span>, never naming the scandal directly but referencing 'recent failures of judgment' and 'decisions that cannot be undone' in a way that left no one in the room uncertain about what he meant."},

{g:23,w:"Astute",pos:"adjective",def:"Able to accurately assess situations and people; shrewdly perceptive in a way that turns observation to advantage.",etym:[{m:"ASTUS",s:"craft"}],
origin:"Latin astutus - cunning, shrewd. Astute is the positive form of perceptive intelligence - you observe clearly and use what you see to your advantage. Unlike 'cunning' (which implies deception), astute implies the intelligence is applied honestly and skillfully.",
hook:"An <span class='hook-keyword'>astute</span> observer would have noticed the deputy's expression change at the mention of the contract - just a flicker, lasting less than a second - but it was enough to know that the story he was telling was incomplete."},

{g:23,w:"Commence",pos:"verb",def:"To begin or start, especially in a formal context.",etym:[{m:"COM-",s:"together"},{m:"INITIARE",s:"begin"}],
origin:"Old French commencer - to begin, from Latin com- + initiare (to begin, to initiate). Commence is the more formal, official register of 'begin' - you commence a ceremony, a proceeding, or a construction project. The word carries a sense of official initiation.",
hook:"The chair called for order, announced that the proceedings would <span class='hook-keyword'>commence</span> in five minutes, and asked the parties to take their seats - which transformed the informal milling around into something that felt like a proper hearing."},

{g:23,w:"Convalescent",pos:"adjective",def:"Recovering from an illness or operation; in the process of regaining health.",etym:[{m:"CON-",s:"together"},{m:"VALESCERE",s:"grow strong"}],
origin:"Latin convalescere - to grow strong again, from valere (to be strong). A convalescent person is in the process of returning to strength - they have survived the crisis and are now slowly rebuilding what the illness took. The word captures the in-between state: past danger, not yet well.",
hook:"The letters he wrote during his long <span class='hook-keyword'>convalescent</span> months after the surgery turned out to be some of his best work - the enforced stillness had given him time to think at a depth his busy life never had."},

{g:23,w:"Curb",pos:"verb",def:"To restrain or keep something in check; to limit what would otherwise run freely.",etym:[{m:"CURVARE",s:"to bend"}],
origin:"Old French courber - to bend, to curve, from Latin curvare. A curb is literally a curved barrier - the raised edge that bends a horse's path. To curb something is to bend its trajectory, to keep it within limits it would otherwise exceed.",
hook:"The central bank raised interest rates specifically to <span class='hook-keyword'>curb</span> inflation - not to stop economic growth entirely, but to slow it down enough that prices stopped rising faster than wages."},

{g:23,w:"Decry",pos:"verb",def:"To publicly condemn or speak out against something.",etym:[{m:"DE-",s:"down"},{m:"CRIER",s:"to cry out"}],
origin:"French décrier - to cry down, from de- (down) + crier (to cry). To decry is to cry something down from a position of public voice - a formal, public condemnation. Stronger than 'criticize' - it implies the speaker is declaring something wrong and calling on others to share that judgment.",
hook:"Every major medical association has <span class='hook-keyword'>decried</span> the spread of unverified health information online - not merely disagreed with it, but formally and publicly declared it a danger to public health requiring regulatory response."},

{g:23,w:"Duress",pos:"noun",def:"Coercive pressure - threats or force that compel someone to act against their will.",etym:[{m:"DURUS",s:"hard"}],
origin:"Latin durus - hard. Duress is the hard pressure that closes off a person's choices until they comply. Legally significant: agreements or confessions made under duress are not considered genuine consent, because the person had no real freedom to refuse.",
hook:"The contract was later challenged on the grounds that it had been signed under <span class='hook-keyword'>duress</span> - she had been told the offer was valid for twenty minutes, a lawyer was not available, and refusal would result in immediate termination."},

{g:23,w:"Evoke",pos:"verb",def:"To bring a memory, emotion, or image to mind; to call something up from within.",etym:[{m:"E-",s:"out"},{m:"VOCARE",s:"to call"}],
origin:"Latin evocare - to call out, from vocare (to call). To evoke is to call something out from inside a person - a memory, a feeling, an image - that was already there but dormant. A smell evokes a childhood summer; a melody evokes grief. The thing evoked was always within the person; the stimulus calls it forth.",
hook:"The architect designed the entrance to deliberately <span class='hook-keyword'>evoke</span> the feeling of walking into a forest - the tall wooden columns, the filtered light, the sound of water - so visitors would arrive already feeling calm before they'd taken ten steps inside."},

{g:23,w:"Fawn",pos:"verb",def:"To give exaggerated, servile flattery or affection in hopes of gaining favor.",etym:[{m:"FAGEN",s:"glad"}],
origin:"Old English fagnian - to rejoice, to express delight. Originally the innocent joy of a dog greeting its owner. Over centuries it acquired a contemptuous edge: to fawn is to perform that kind of eager, tail-wagging delight at a person of power, hoping to gain something from it.",
hook:"The junior associates <span class='hook-keyword'>fawned</span> over the visiting partner in a way that made the senior associates visibly uncomfortable - laughing at jokes that weren't funny, volunteering opinions that mirrored hers exactly, competing to refill her coffee cup."},

{g:23,w:"Fret",pos:"verb",def:"To worry persistently about small things; to be consumed by low-level, ongoing anxiety.",etym:[{m:"FRETHAN",s:"devour"}],
origin:"Old English fretan - to devour. Fretting was originally a physical devouring - the way acid eats through metal, or rust consumes iron. Extended to the mind: to fret is to be gnawed at from inside by small, persistent worries that eat away at your peace.",
hook:"She knew perfectly well that <span class='hook-keyword'>fretting</span> about the interview wouldn't improve her performance, but she lay awake rehearsing answers to questions she probably wouldn't be asked anyway, until three in the morning."},

{g:23,w:"Glib",pos:"adjective",def:"Fluent and confident in a way that is too smooth to be sincere; facile charm over genuine depth.",etym:[{m:"GLIB",s:"slippery"}],
origin:"Germanic origin - slippery. Glib speech slides out easily and smoothly, which is precisely what makes it suspect. It has the surface features of credibility - fluency, confidence, readiness - without the substance underneath. The answer comes too fast, too easily, too polished.",
hook:"His answer was polished and immediate, which was exactly the problem - the question deserved five minutes of genuine thought, and the <span class='hook-keyword'>glib</span> response told her everything she needed to know about how seriously he had actually engaged with it."},

{g:23,w:"Headstrong",pos:"adjective",def:"Determined to do things one's own way; obstinately self-willed.",etym:[{m:"HEAD",s:"head"},{m:"STRONG",s:"strong"}],
origin:"English compound - a strong head that goes where it wants. Headstrong implies the willfulness is habitual: this person consistently refuses direction, insisting on their own course even when better guidance is available. Can be said with admiration (of someone who got it right) or criticism (of someone who didn't).",
hook:"The young director was <span class='hook-keyword'>headstrong</span> to the point that the studio eventually stopped sending notes - not because they agreed with all her choices, but because they had learned she would ignore the ones she disagreed with regardless."},

{g:23,w:"Intermittent",pos:"adjective",def:"Occurring at irregular intervals; stopping and starting rather than being continuous.",etym:[{m:"INTER-",s:"between"},{m:"MITTERE",s:"let go"}],
origin:"Latin intermittere - to let go between, from inter (between) + mittere (to let go, to send). An intermittent signal is released and let go, released and let go - it doesn't flow continuously but keeps stopping and restarting. The gaps are as significant as the signal itself.",
hook:"The <span class='hook-keyword'>intermittent</span> power outages were harder to manage than a single sustained failure would have been - each time the system came back, it required a full restart cycle, and the unpredictable timing made planning impossible."},

{g:23,w:"Ire",pos:"noun",def:"Anger; strong displeasure.",etym:[{m:"IRA",s:"anger"}],
origin:"Latin ira - anger. A direct, formal word for anger - more elevated in register than 'anger' itself, appearing most often in literary and formal contexts. 'Drawing the ire of' is a common construction: to provoke the anger of someone who then becomes adversarial.",
hook:"The proposal drew the <span class='hook-keyword'>ire</span> of every environmental group in the region - within forty-eight hours, all three major organizations had issued statements, and a coalition was forming to challenge it in court."},

{g:23,w:"Languid",pos:"adjective",def:"Slow and relaxed in a way that suggests pleasurable ease or lack of energy.",etym:[{m:"LANGUERE",s:"be weak"}],
origin:"Latin languere - to be faint, to lack energy. Languid movement is slow and unhurried - it can signal pleasurable relaxation (a languid afternoon by the river) or listless fatigue (a languid recovery from fever). The pace is the same; the cause and tone differ.",
hook:"The afternoon had a wonderfully <span class='hook-keyword'>languid</span> quality - no meetings, no deadlines, just slow coffee and a novel and the sound of rain, and the rare luxury of not needing to be anywhere for hours."},

{g:23,w:"Lull",pos:"noun",def:"A temporary pause or reduction in activity; a calm interval within a larger period of intensity.",etym:[{m:"LULLEN",s:"soothe to sleep"}],
origin:"Middle English lullen - to soothe to sleep. A lull is a moment of quieting - the storm pauses, the noise drops, the pressure briefly eases. It can be welcome rest or a deceptive calm before the next wave. The temporary quality is essential: a lull is defined by what surrounds it.",
hook:"There was a brief <span class='hook-keyword'>lull</span> in the negotiations around lunchtime - everyone stepped away, ate in silence, and returned to the table without having resolved anything, but somehow less hostile than before."},

{g:23,w:"Mettlesome",pos:"adjective",def:"Full of spirit, courage, and determination; not easily discouraged.",etym:[{m:"METTLE",s:"spirit, courage"}],
origin:"From 'mettle' - the quality of character that enables you to meet difficulty without flinching. The same word as 'metal' historically: the quality of metal that determines whether it bends or holds under pressure. A mettlesome person is made of good metal - they don't collapse when tested.",
hook:"The <span class='hook-keyword'>mettlesome</span> young lawyer had taken on a case everyone else had declined, was fighting it against a firm with fifty times her resources, and showed absolutely no sign of backing down as the trial approached."},

{g:23,w:"Mollify",pos:"verb",def:"To soften someone's anger or anxiety; to appease or pacify.",etym:[{m:"MOLLIS",s:"soft"}],
origin:"Latin mollire - to make soft, from mollis (soft). To mollify is to make a hard situation or a person's hard feelings softer - to reduce the sharpness of anger or anxiety through concession, explanation, or reassurance. The mollified person is not fully satisfied but less agitated than before.",
hook:"The manager's attempt to <span class='hook-keyword'>mollify</span> the client with a partial refund only made things worse - the client didn't want money back, she wanted an acknowledgment that the error had happened, and the money felt like an attempt to avoid that."},

{g:23,w:"Neutralize",pos:"verb",def:"To render something ineffective by applying an opposite force; to cancel out.",etym:[{m:"NEUTER",s:"neither"}],
origin:"Latin neuter - neither (of two). To neutralize is to bring something to a point of 'neither' - neither acid nor base, neither threat nor safe, neither advancing nor retreating. The neutralizing force doesn't destroy what it acts on; it cancels its effect.",
hook:"The diplomatic strategy was designed to <span class='hook-keyword'>neutralize</span> the opposition's strongest argument by conceding the minor point it rested on - once they agreed that point was valid, the larger conclusion it was supposed to support no longer followed."},

{g:23,w:"Nonplussed",pos:"adjective",def:"So surprised and confused that one doesn't know how to react.",etym:[{m:"NON PLUS",s:"no more - no further possible"}],
origin:"Latin non plus - no more, nothing further. To be nonplussed is to be brought to a point where there is no more you can do - you are stopped by surprise and confusion, unable to respond, at a loss for what comes next. Often misused to mean 'unimpressed' - the correct meaning is 'baffled.'",
hook:"The interviewer was completely <span class='hook-keyword'>nonplussed</span> when the candidate responded to 'where do you see yourself in five years?' with a detailed critique of the question's underlying assumptions - it wasn't a bad answer, but it was the last one anyone had expected."},

{g:23,w:"Precipitous",pos:"adjective",def:"Dangerously steep; or done hastily and without careful consideration.",etym:[{m:"PRAECIPITARE",s:"throw headlong"}],
origin:"Latin praecipitare - to throw headlong, from prae (before) + caput (head). Precipitous originally described a cliff so steep that falling meant going headfirst. Extended to decisions or actions: a precipitous move is one made so fast that there was no time to look where you were going.",
hook:"The <span class='hook-keyword'>precipitous</span> drop in the company's stock price after the announcement - thirty percent in a single trading day - wiped out a decade of accumulated value before anyone had time to fully process what had been disclosed."},

{g:23,w:"Pretentious",pos:"adjective",def:"Claiming or appearing to have greater importance, talent, or culture than one actually possesses.",etym:[{m:"PRAETENDERE",s:"to pretend"}],
origin:"Latin praetendere - to stretch before, to hold out as a pretext. A pretentious person holds out a false front - they present themselves as more sophisticated, more cultured, or more important than the reality behind the performance. The display is designed to impress, and the gap between display and reality is what makes it pretentious.",
hook:"The restaurant's menu was almost satirically <span class='hook-keyword'>pretentious</span> - 'deconstructed' dishes served with tweezers, descriptions that were longer than the food was good, and a price list that seemed designed to filter out anyone who might actually enjoy eating."},

{g:23,w:"Profound",pos:"adjective",def:"Very deep or intense; showing great insight or knowledge.",etym:[{m:"PRO-",s:"before"},{m:"FUNDUS",s:"bottom"}],
origin:"Latin profundus - deep, from pro (before/forward) + fundus (bottom). Profound reaches the bottom - it doesn't skim the surface. A profound insight reaches a depth that changes how you see things; a profound silence is total and weighted; a profound impact reshapes what comes after.",
hook:"Reading that single essay in college had a <span class='hook-keyword'>profound</span> effect on her - not because it gave her new information, but because it arranged what she already knew in a way that made her see her entire field differently."},

{g:23,w:"Propagate",pos:"verb",def:"To spread and promote an idea, belief, or signal widely.",etym:[{m:"PROPAGARE",s:"multiply"}],
origin:"Latin propagare - to multiply, to extend. Originally used for plants: to propagate a species is to spread it into new territory. Extended to ideas, beliefs, and signals: to propagate a theory is to spread it actively, to push it into new audiences and new contexts.",
hook:"The false claim <span class='hook-keyword'>propagated</span> so rapidly through social media that by the time the original source issued a correction, the correction had reached only a fraction of the audience that had already seen the original error."},

{g:23,w:"Recourse",pos:"noun",def:"A source of help in a difficult situation; an option to turn to when other options have failed.",etym:[{m:"RE-",s:"back"},{m:"CURSUS",s:"course"}],
origin:"Latin recursus - a running back, from re- (back) + currere (to run). Recourse is the path you run back to when the forward path is blocked - an option held in reserve for when all other options have been exhausted. 'Having no recourse' means there is no remaining option.",
hook:"With the manufacturer refusing to honor the warranty and the retailer claiming it wasn't their problem, she had no <span class='hook-keyword'>recourse</span> but to file a complaint with the consumer protection agency and hope someone there responded."},

{g:23,w:"Refute",pos:"verb",def:"To prove a statement or theory to be false; to disprove with evidence.",etym:[{m:"RE-",s:"back"},{m:"FUTARE",s:"beat"}],
origin:"Latin refutare - to beat back, to rebut. To refute is not merely to deny or to argue against - it is to demonstrate that something is false with evidence or logic. Often misused to mean 'deny'; the correct meaning requires actual proof, not just counter-assertion.",
hook:"The study didn't merely challenge the hypothesis - it <span class='hook-keyword'>refuted</span> it, presenting experimental data from four independent trials that produced results incompatible with the theory's central prediction."},

{g:23,w:"Regress",pos:"verb",def:"To return to a former or less developed state; to move backward rather than forward.",etym:[{m:"RE-",s:"back"},{m:"GRADI",s:"to walk"}],
origin:"Latin regredi - to step back, from re- (back) + gradi (to walk). To regress is to walk backward - to lose ground already gained, to return to an earlier and less developed state. The same root as 'progress' (walking forward): regress is its exact opposite.",
hook:"Without regular practice, the skills he had built over two years of intensive training began to <span class='hook-keyword'>regress</span> surprisingly quickly - fluency in a language, it turns out, is not a permanent achievement but an ongoing one."},

{g:23,w:"Repercussion",pos:"noun",def:"An unintended, often unwelcome consequence that follows some time after an action.",etym:[{m:"RE-",s:"back"},{m:"PERCUTERE",s:"to strike"}],
origin:"Latin repercussio - a striking back, an echo. A repercussion is what strikes back at you after you've struck something else - the reverberating consequence, often felt well after the original action and in places you didn't anticipate.",
hook:"The policy change was popular in the short term, but its <span class='hook-keyword'>repercussions</span> took three years to fully materialize - by which point the officials who had championed it were no longer in office to be held accountable for what it had caused."},

{g:23,w:"Replenish",pos:"verb",def:"To fill something up again after it has been depleted.",etym:[{m:"RE-",s:"again"},{m:"PLENUS",s:"full"}],
origin:"Latin replere - to fill again, from re- (again) + plere (to fill). Replenish implies something was once full, became depleted, and is now being returned to its full state. You don't replenish something that was never full; you restore it to a previous completeness.",
hook:"The expedition's first priority after reaching base camp was to <span class='hook-keyword'>replenish</span> their water supply - they had arrived with less than a day's reserve, and the next stage of the climb would be even more demanding."},

{g:23,w:"Vigilant",pos:"adjective",def:"Keeping careful, sustained watch for possible danger or problems.",etym:[{m:"VIGIL",s:"awake"}],
origin:"Latin vigil - awake, watchful. A vigil is a period of staying awake to watch over something. Vigilant = maintaining that watchfulness actively and continuously, not just glancing up occasionally but sustaining careful attention specifically to catch what might otherwise be missed.",
hook:"The network's security team had to remain <span class='hook-keyword'>vigilant</span> around the clock - sophisticated attacks rarely announced themselves, and the difference between a near-miss and a breach was often a matter of noticing something small and anomalous before it escalated."},

{g:24,w:"Assail",pos:"verb",def:"Make a concerted or violent attack on.",etym:[{m:"AD-",s:"to"},{m:"SALIRE",s:"to leap"}],origin:"From Latin.",hook:"The media began to <span class='hook-keyword'>assail</span> the politician with harsh criticisms."},
{g:24,w:"Benevolent",pos:"adjective",def:"Well meaning and kindly.",etym:[{m:"BENE",s:"well"},{m:"VOLLE",s:"to wish"}],origin:"From Latin.",hook:"The <span class='hook-keyword'>benevolent</span> billionaire gave most of his fortune to charity."},
{g:24,w:"Berate",pos:"verb",def:"Scold or criticize (someone) angrily.",etym:[{m:"BE-",s:"thoroughly"},{m:"RATE",s:"scold"}],origin:"English formation.",hook:"The angry customer proceeded to <span class='hook-keyword'>berate</span> the cashier for the small mistake."},
{g:24,w:"Buoyant",pos:"adjective",def:"Able or apt to stay afloat or rise to the top of a liquid or gas; cheerful and optimistic.",etym:[{m:"BOYA",s:"buoy"}],origin:"From Spanish.",hook:"Despite the bad news, she remained in a remarkably <span class='hook-keyword'>buoyant</span> mood."},
{g:24,w:"Buttress",pos:"verb",def:"Provide (a building or structure) with projecting supports built against its walls; increase the strength of or justification for; reinforce.",etym:[{m:"BOTER",s:"to strike"}],origin:"From Old French.",hook:"The lawyer found a new witness to help <span class='hook-keyword'>buttress</span> his weak case."},
{g:24,w:"Condone",pos:"verb",def:"Accept and allow (behavior that is considered morally wrong or offensive) to continue.",etym:[{m:"CON-",s:"altogether"},{m:"DONARE",s:"give"}],origin:"From Latin.",hook:"The school will absolutely not <span class='hook-keyword'>condone</span> cheating of any kind."},
{g:24,w:"Contravene",pos:"verb",def:"Violate the prohibition or order of (a law, treaty, or code of conduct).",etym:[{m:"CONTRA-",s:"against"},{m:"VENIRE",s:"come"}],origin:"From Latin.",hook:"By ignoring the safety protocols, you actively <span class='hook-keyword'>contravene</span> company policy."},
{g:24,w:"Denounce",pos:"verb",def:"Publicly declare to be wrong or evil.",etym:[{m:"DE-",s:"down"},{m:"NUNTIARE",s:"announce"}],origin:"From Latin.",hook:"The United Nations gathered to fiercely <span class='hook-keyword'>denounce</span> the dictator's war crimes."},
{g:24,w:"Despotic",pos:"adjective",def:"Of or typical of a despot; tyrannical.",etym:[{m:"DESPOTA",s:"master"}],origin:"From Greek.",hook:"The <span class='hook-keyword'>despotic</span> king imprisoned anyone who dared to disagree with him."},
{g:24,w:"Deviate",pos:"verb",def:"Depart from an established course.",etym:[{m:"DE-",s:"away from"},{m:"VIA",s:"way"}],origin:"From Latin.",hook:"We must not <span class='hook-keyword'>deviate</span> from the recipe if we want the cake to turn out right."},
{g:24,w:"Disinterested",pos:"adjective",def:"Not influenced by considerations of personal advantage.",etym:[{m:"DIS-",s:"not"},{m:"INTERESSE",s:"concern"}],origin:"From Latin.",hook:"A judge must remain completely <span class='hook-keyword'>disinterested</span> when presiding over a trial."},
{g:24,w:"Escalate",pos:"verb",def:"Increase rapidly; become or cause to become more intense or serious.",etym:[{m:"SCALA",s:"ladder"}],origin:"From Latin.",hook:"The minor argument quickly began to <span class='hook-keyword'>escalate</span> into a physical fight."},
{g:24,w:"Exorcize",pos:"verb",def:"Drive out or attempt to drive out (an evil spirit) from a person or place.",etym:[{m:"EX-",s:"out"},{m:"HORKOS",s:"oath"}],origin:"From Greek.",hook:"He went to therapy to finally <span class='hook-keyword'>exorcize</span> the demons of his past trauma."},
{g:24,w:"Finicky",pos:"adjective",def:"Fussy about one's needs or requirements.",etym:[{m:"FINE",s:"delicate"}],origin:"English origin.",hook:"The <span class='hook-keyword'>finicky</span> cat refused to eat any brand of food except the most expensive one."},
{g:24,w:"Foil",pos:"verb",def:"Prevent (something considered wrong or undesirable) from succeeding.",etym:[{m:"FULLIAN",s:"to trample"}],origin:"From Old French.",hook:"The brave security guard managed to <span class='hook-keyword'>foil</span> the bank robbery."},
{g:24,w:"Intertwined",pos:"adjective",def:"Twisted or twined together.",etym:[{m:"INTER-",s:"between"},{m:"TWINE",s:"thread"}],origin:"English formation.",hook:"The history of the two neighboring countries is deeply <span class='hook-keyword'>intertwined</span>."},
{g:24,w:"Inundate",pos:"verb",def:"Overwhelm (someone) with things or people to be dealt with; flood.",etym:[{m:"IN-",s:"into"},{m:"UNDA",s:"wave"}],origin:"From Latin.",hook:"Fans immediately began to <span class='hook-keyword'>inundate</span> the singer with fan mail."},
{g:24,w:"Ironclad",pos:"adjective",def:"Covered or protected with iron; impossible to contradict, weaken, or change.",etym:[{m:"IRON",s:"metal"},{m:"CLAD",s:"clothed"}],origin:"English formation.",hook:"The lawyer drafted an <span class='hook-keyword'>ironclad</span> contract that could not be broken."},
{g:24,w:"Jeopardize",pos:"verb",def:"Put (someone or something) into a situation in which there is a danger of loss, harm, or failure.",etym:[{m:"JEU PARTI",s:"divided game"}],origin:"From French.",hook:"A DUI conviction will severely <span class='hook-keyword'>jeopardize</span> his career as a bus driver."},
{g:24,w:"Mercurial",pos:"adjective",def:"(Of a person) subject to sudden or unpredictable changes of mood or mind.",etym:[{m:"MERCURY",s:"roman god"}],origin:"From Latin.",hook:"The <span class='hook-keyword'>mercurial</span> boss could be laughing one minute and screaming the next."},
{g:24,w:"Oblivious",pos:"adjective",def:"Not aware of or not concerned about what is happening around one.",etym:[{m:"OBLIVISCI",s:"forget"}],origin:"From Latin.",hook:"He walked right past the parade, totally <span class='hook-keyword'>oblivious</span> to the loud music."},
{g:24,w:"Perpetrate",pos:"verb",def:"Carry out or commit (a harmful, illegal, or immoral action).",etym:[{m:"PER-",s:"completely"},{m:"PATRARE",s:"bring about"}],origin:"From Latin.",hook:"The police are looking for the men who chose to <span class='hook-keyword'>perpetrate</span> this awful crime."},
{g:24,w:"Plaintive",pos:"adjective",def:"Sounding sad and mournful.",etym:[{m:"PLAINDRE",s:"to lament"}],origin:"From Old French.",hook:"The lost dog let out a highly <span class='hook-keyword'>plaintive</span> howl."},
{g:24,w:"Poignant",pos:"adjective",def:"Evoking a keen sense of sadness or regret.",etym:[{m:"PONGERE",s:"to prick"}],origin:"From Latin.",hook:"Looking at the old photographs was a deeply <span class='hook-keyword'>poignant</span> experience for the widow."},
{g:24,w:"Quiescent",pos:"adjective",def:"In a state or period of inactivity or dormancy.",etym:[{m:"QUIESCERE",s:"to rest"}],origin:"From Latin.",hook:"The volcano has remained safely <span class='hook-keyword'>quiescent</span> for the last three centuries."},
{g:24,w:"Reiterate",pos:"verb",def:"Say something again or a number of times, typically for emphasis or clarity.",etym:[{m:"RE-",s:"again"},{m:"ITERARE",s:"do a second time"}],origin:"From Latin.",hook:"Allow me to <span class='hook-keyword'>reiterate</span> my main point so there is no confusion."},
{g:24,w:"Subside",pos:"verb",def:"Become less intense, violent, or severe.",etym:[{m:"SUB-",s:"down"},{m:"SIDERE",s:"to settle"}],origin:"From Latin.",hook:"We waited inside the cabin for the raging blizzard to finally <span class='hook-keyword'>subside</span>."},
{g:24,w:"Subsume",pos:"verb",def:"Include or absorb (something) in something else.",etym:[{m:"SUB-",s:"under"},{m:"SUMERE",s:"take"}],origin:"From Latin.",hook:"The larger corporation will slowly <span class='hook-keyword'>subsume</span> the small startup into its own brand."},
{g:24,w:"Surmount",pos:"verb",def:"Overcome (a difficulty or obstacle).",etym:[{m:"SUR-",s:"above"},{m:"MONTER",s:"to mount"}],origin:"From Old French.",hook:"With determination, she managed to <span class='hook-keyword'>surmount</span> her fear of public speaking."},
{g:24,w:"Tangential",pos:"adjective",def:"Relating to or along a tangent; diverging from a previous course or line; erratic; hardly touching a matter; peripheral.",etym:[{m:"TANGERE",s:"to touch"}],origin:"From Latin.",hook:"His comment was only loosely <span class='hook-keyword'>tangential</span> to the main topic of the meeting."},

{g:25,w:"Adept",pos:"adjective",def:"Very skilled or proficient at something.",etym:[{m:"ADIPISCI",s:"obtain"}],origin:"From Latin.",hook:"She is highly <span class='hook-keyword'>adept</span> at solving complex crossword puzzles."},
{g:25,w:"Adverse",pos:"adjective",def:"Preventing success or development; harmful; unfavorable.",etym:[{m:"AD-",s:"to"},{m:"VERTERE",s:"to turn"}],origin:"From Latin.",hook:"The new medication had completely unexpected <span class='hook-keyword'>adverse</span> side effects."},
{g:25,w:"Appropriate",pos:"verb",def:"Take (something) for one's own use, typically without the owner's permission; devote (money or assets) to a special purpose.",etym:[{m:"AD-",s:"to"},{m:"PROPRIUS",s:"own"}],origin:"From Latin.",hook:"The government decided to <span class='hook-keyword'>appropriate</span> the private land to build a highway."},
